name: Release

# Canonical release path: push a semver tag and CI runs goreleaser — GitHub
# Release (tarballs + checksums + install scripts), ghcr images (multi-arch,
# cosign keyless-signed), and — when the HOMEBREW_TAP_TOKEN secret is present —
# the Homebrew tap. Local goreleaser (docs/SHIP.md) remains the manual fallback.
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push ghcr images with the built-in GITHUB_TOKEN (no PAT)
  id-token: write   # cosign keyless (OIDC) image signing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history + tags

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # go/web/ is committed + go:embed'd; prove it matches ui/ source (v3 Vite
      # stack — the retired no-build JSX pipeline lives on only in git history).
      - name: UI dist up to date (vite build --check)
        run: |
          cd ui && npm ci && npm run build && cd ..
          diff -r ui/dist go/web >/dev/null || {
            echo "::error::go/web is stale — run: cd ui && npm run build && rm -rf ../go/web/* && cp -R dist/* ../go/web/"
            exit 1
          }

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      # Don't publish a tag that never passed tests: a tag can point at any
      # commit, not just a CI-green master. Gate the release on the suite.
      - name: Go build + test
        working-directory: go
        run: |
          go build ./...
          go test ./...

      - name: Set up QEMU (arm64 image build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Stage the installers into go/ so goreleaser's release.extra_files can
      # glob them without a `../` prefix (which its zglob rejects at publish
      # time). Kept out of git via .gitignore.
      - name: Stage installers for goreleaser extra_files
        run: cp scripts/install.sh scripts/install.ps1 go/

      - name: Set up goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true

      # Homebrew gating: the built-in GITHUB_TOKEN cannot push to the
      # holland-built/homebrew-tap repo. If the HOMEBREW_TAP_TOKEN secret (PAT,
      # repo scope on homebrew-tap) is present, release everything; if absent,
      # skip only the brew channel so the release never fails for lack of it.
      - name: goreleaser release
        working-directory: go
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$HOMEBREW_TAP_TOKEN" ]; then
            goreleaser release --clean
          else
            echo "HOMEBREW_TAP_TOKEN not set — skipping Homebrew tap publish"
            goreleaser release --clean --skip=homebrew
          fi
