name: Publish Docker image

# Builds the dashboard image and pushes it to GitHub Container Registry (GHCR)
# on every push to master and on version tags (vX.Y.Z). End users then just
# `docker pull ghcr.io/holland-built/bloxsmith:latest` — no build needed.

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # write: lets the master build cut a vX.Y.Z release
  packages: write
  id-token: write   # keyless cosign signing via the Sigstore OIDC token

# Run JS-based actions on Node 24 (Node 20 is deprecated on runners). Opt-in env
# avoids churning every action's major version. Remove once the actions default
# to Node 24 (mid-2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Playwright against a throwaway container built from THIS commit (scripts/e2e.sh) —
  # closes the gap where 46/64 specs inherited a live-stack baseURL and 5 commits
  # shipped this year verified only by hand (see scripts/e2e.sh header).
  #
  # Deliberately has no `needs:`/`if:` tie to build-push and build-push has no
  # `needs: e2e` either — they run in parallel, so a Playwright flake or the
  # harness container's own startup time never slows or blocks the publish path.
  # A failure here is a visible red X on the commit (and blocks the "Cut release"
  # step below it only in spirit, not by CI mechanics) — not a hard release gate.
  # Rationale: the harness rebuilds the whole image a second time from source,
  # which is the slowest step in this file; gating `push: true` on that would
  # turn every infra flake (e.g. registry hiccup) into a blocked release for a
  # dashboard that today ships same-day fixes. Revisit once the quarantine list
  # in scripts/e2e.sh's sibling specs is burned down and the suite is stable
  # enough to trust as a hard gate.
  # Gate: the harness needs a real tenant key (the app has no mock backend, and
  # unmocked specs need live data). Rather than fail every push until someone adds
  # the secret — a permanently-red CI is a CI nobody reads — detect it and let the
  # e2e job SKIP. Skipped shows grey, not green: it can't be mistaken for "tests
  # passed". Add INFOBLOX_API_KEY as a repo secret to switch e2e on.
  # `secrets` is not readable from a job-level `if:`, hence this one-step job.
  e2e-creds:
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - id: check
        env:
          KEY: ${{ secrets.INFOBLOX_API_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::e2e skipped — no INFOBLOX_API_KEY secret. Add it to enable the Playwright harness."
          fi

  e2e:
    needs: e2e-creds
    if: needs.e2e-creds.outputs.present == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('playwright.config.ts') }}

      - name: Install Playwright + Chromium
        run: npx -y playwright@1.61.1 install --with-deps chromium

      - name: Write .env for the harness
        run: |
          {
            echo "INFOBLOX_URL=https://csp.infoblox.com"
            echo "INFOBLOX_API_KEY=${INFOBLOX_API_KEY}"
          } > .env
        env:
          INFOBLOX_API_KEY: ${{ secrets.INFOBLOX_API_KEY }}

      - name: Run e2e harness
        run: ./scripts/e2e.sh

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the commit count (app version) is correct

      - name: Compute app version
        id: ver
        run: echo "version=1.0.$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      # Phase 1: index.html loads a precompiled app.bundle.js built from src/*.jsx.
      # The bundle is committed (the image build stays python-only, no node stage),
      # so this gate fails the build if someone edited src/ without rebuilding.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify UI bundle is current
        run: node scripts/build_ui.js --check

      # Scoped type gate (tsconfig.json is added by a companion change). Runs on
      # the same Node 24 setup above, BEFORE the image is built, so a type error
      # fails the build instead of shipping.
      - name: Type-check (tsc --noEmit)
        # --package names the pkg that provides `tsc`; without it npx treats `tsc` as a
        # source file and tsc errors TS5042 (project can't be mixed with source files).
        run: npx -y --package typescript@latest tsc --noEmit -p tsconfig.json

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keyless (OIDC) signing of the pushed image by digest. No private key —
      # the signature is bound to this workflow's identity and stored in the
      # registry's transparency log. Verify with:
      #   cosign verify ghcr.io/holland-built/bloxsmith:latest \
      #     --certificate-identity-regexp 'https://github.com/holland-built/bloxsmith/.+' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      # Signing is best-effort: it must NEVER block shipping the image or cutting the
      # release. If keyless OIDC isn't enabled on the repo, these steps warn and the
      # workflow continues (image is already pushed above). Enable signing later by
      # confirming id-token permissions — no code change needed.
      - name: Install cosign
        continue-on-error: true
        uses: sigstore/cosign-installer@v3

      - name: Sign the pushed image (keyless)
        continue-on-error: true
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      # Auto-publish a GitHub Release for this build so the in-app update check
      # (which polls the Releases API) sees every master push. Runs only on the
      # default branch; the tag it creates re-triggers this workflow once, but
      # that run skips this step (not on master) and the release already exists.
      - name: Cut release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes --target "$GITHUB_SHA"
          fi
