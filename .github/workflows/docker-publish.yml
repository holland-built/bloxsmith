name: Publish Docker image

# Builds the dashboard image and pushes it to GitHub Container Registry (GHCR).
#
# AUTOMATIC BUILDS ARE OFF. This no longer runs on every push — it only runs when
# you start it by hand (Actions tab → "Publish Docker image" → Run workflow), so
# pushing code costs zero Actions minutes. To re-enable auto-builds, add back the
# `push:` trigger below. To publish an image locally instead, run ./scripts/release-image.sh.

on:
  workflow_dispatch:

permissions:
  contents: write   # write: lets the master build cut a vX.Y.Z release
  packages: write
  id-token: write   # keyless cosign signing via the Sigstore OIDC token

# Run JS-based actions on Node 24 (Node 20 is deprecated on runners). Opt-in env
# avoids churning every action's major version. Remove once the actions default
# to Node 24 (mid-2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Playwright against a throwaway container built from THIS commit (scripts/e2e.sh) —
  # closes the gap where 46/64 specs inherited a live-stack baseURL and 5 commits
  # shipped this year verified only by hand (see scripts/e2e.sh header).
  #
  # Deliberately has no `needs:`/`if:` tie to build-push and build-push has no
  # `needs: e2e` either — they run in parallel, so a Playwright flake or the
  # harness container's own startup time never slows or blocks the publish path.
  # A failure here is a visible red X on the commit (and blocks the "Cut release"
  # step below it only in spirit, not by CI mechanics) — not a hard release gate.
  # Rationale: the harness rebuilds the whole image a second time from source,
  # which is the slowest step in this file; gating `push: true` on that would
  # turn every infra flake (e.g. registry hiccup) into a blocked release for a
  # dashboard that today ships same-day fixes. Revisit once the quarantine list
  # in scripts/e2e.sh's sibling specs is burned down and the suite is stable
  # enough to trust as a hard gate.
  # Credentials: e2e runs on EVERY push now — with or without the secret.
  # It used to skip when INFOBLOX_API_KEY was absent, on the theory that the app
  # has no mock backend. That was half-true and cost us the whole suite: ~59 of
  # the 64 specs mock **/api/data with page.route at the BROWSER layer, so they
  # never reach the upstream and don't care whether the key is real. The actual
  # blocker was vault mode — server.py:46 sets VAULT_MODE=True when no key is
  # set, gated /api/* GETs 503 {locked:true} (server.py:5223), and VaultGate
  # renders <VaultSetup/> instead of the app (src/50.routing-vault.jsx:540-545),
  # so no spec ever sees .tabbar.
  #
  # Escape hatch: ANY non-empty key makes VAULT_MODE=False. With a dummy key the
  # app boots the normal shell and /api/data answers 200 with empty arrays in
  # ~3ms (measured — no upstream timeout/retry, so runners that can't reach
  # csp.infoblox.com are fine). Measured credential-free result: 205 passed /
  # 18 failed vs 196/27 with a real key — the dummy set is a strict SUBSET, and
  # a sabotage test (one inverted assertion in a mocked spec) exits 1 naming the
  # regression, proving this is a real gate and not green-by-construction.
  #
  # The two runs have DIFFERENT expected failing sets, so the baseline swaps with
  # them via E2E_KNOWN_FAILURES: reusing the 27-line real-key list on a dummy-key
  # run would wave through 9 genuine failures.
  # `secrets` is not readable from a job-level `if:`, hence this one-step job.
  e2e-creds:
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - id: check
        env:
          KEY: ${{ secrets.INFOBLOX_API_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No INFOBLOX_API_KEY secret — e2e runs credential-free (dummy key, ~59 mocked specs, tests/known-failures-nokey.txt baseline). Add the secret to also cover the 5 unmocked specs."
          fi

  e2e:
    needs: e2e-creds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # No `cache: npm` — this repo has NO package.json/lockfile at all (tsc and
          # playwright are fetched on demand via npx; see scripts/check.sh). setup-node's npm
          # cache REQUIRES a lockfile and hard-fails without one, which killed this job
          # before a single test ran. The Playwright browser cache below is the one that
          # actually matters here.
          node-version: 24

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('playwright.config.ts') }}

      - name: Install Playwright + Chromium
        # Install the TEST RUNNER (@playwright/test), not just the `playwright`
        # package. e2e.sh calls `npx playwright test`, which resolves against a
        # globally-installed @playwright/test — that is what exists on a dev machine.
        # Installing only `playwright` gets you the browsers and an unusable `test`
        # command: the run produced an EMPTY json report and the gate died with
        # "could not parse the playwright report". Pin matches the local version.
        # Install into ./node_modules, NOT -g. playwright.config.ts starts with
        # `import { defineConfig } from '@playwright/test'`, which node resolves from
        # the repo directory — a global install does not satisfy that, so the config
        # failed to load, playwright printed nothing to stdout, and the gate saw an
        # empty report. A dev machine works because it has node_modules/@playwright.
        # --no-save/--no-package-lock: this repo deliberately has no package.json.
        run: |
          npm i --no-save --no-package-lock @playwright/test@1.61.1
          npx playwright install --with-deps chromium

      # Real key when the secret exists (covers the 5 unmocked specs too); else a
      # dummy key, which is enough to clear vault mode so the ~59 mocked specs run.
      # KNOWN is exported to $GITHUB_ENV so the harness step picks the matching
      # baseline — the failing sets differ (27 real-key vs 18 dummy-key).
      - name: Write .env for the harness
        env:
          INFOBLOX_API_KEY: ${{ secrets.INFOBLOX_API_KEY }}
          PRESENT: ${{ needs.e2e-creds.outputs.present }}
        run: |
          echo "INFOBLOX_URL=https://csp.infoblox.com" > .env
          if [ "$PRESENT" = "true" ]; then
            echo "INFOBLOX_API_KEY=${INFOBLOX_API_KEY}" >> .env
            echo "E2E_KNOWN_FAILURES=tests/known-failures.txt" >> "$GITHUB_ENV"
            echo "e2e: real tenant key — full baseline (27 known-failing)."
          else
            echo "INFOBLOX_API_KEY=ci-dummy-key-no-tenant" >> .env
            echo "E2E_KNOWN_FAILURES=tests/known-failures-nokey.txt" >> "$GITHUB_ENV"
            echo "e2e: credential-free — dummy key, no-key baseline (18 known-failing)."
          fi

      - name: Run e2e harness
        run: ./scripts/e2e.sh

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the commit count (app version) is correct

      - name: Compute app version
        id: ver
        run: echo "version=1.0.$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      # Phase 1: index.html loads a precompiled app.bundle.js built from src/*.jsx.
      # The bundle is committed (the image build stays python-only, no node stage),
      # so this gate fails the build if someone edited src/ without rebuilding.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify UI bundle is current
        run: node scripts/build_ui.js --check

      # Scoped type gate (tsconfig.json is added by a companion change). Runs on
      # the same Node 24 setup above, BEFORE the image is built, so a type error
      # fails the build instead of shipping.
      - name: Type-check (tsc --noEmit)
        # --package names the pkg that provides `tsc`; without it npx treats `tsc` as a
        # source file and tsc errors TS5042 (project can't be mixed with source files).
        # DELIBERATE DUPLICATE of scripts/check.sh — inlined on purpose so this
        # workflow never depends on the repo's file layout. Kept in sync by
        # ToolingDriftTests in tests/test_regression.py; change one, change both.
        run: npx -y --package typescript@latest tsc --noEmit -p tsconfig.json

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keyless (OIDC) signing of the pushed image by digest. No private key —
      # the signature is bound to this workflow's identity and stored in the
      # registry's transparency log. Verify with:
      #   cosign verify ghcr.io/holland-built/bloxsmith:latest \
      #     --certificate-identity-regexp 'https://github.com/holland-built/bloxsmith/.+' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      # Signing is best-effort: it must NEVER block shipping the image or cutting the
      # release. If keyless OIDC isn't enabled on the repo, these steps warn and the
      # workflow continues (image is already pushed above). Enable signing later by
      # confirming id-token permissions — no code change needed.
      - name: Install cosign
        continue-on-error: true
        uses: sigstore/cosign-installer@v3

      - name: Sign the pushed image (keyless)
        continue-on-error: true
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      # Auto-publish a GitHub Release for this build so the in-app update check
      # (which polls the Releases API) sees every master push. Runs only on the
      # default branch; the tag it creates re-triggers this workflow once, but
      # that run skips this step (not on master) and the release already exists.
      - name: Cut release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes --target "$GITHUB_SHA"
          fi
