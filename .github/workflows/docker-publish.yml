name: Publish Docker image

# Builds the dashboard image and pushes it to GitHub Container Registry (GHCR)
# on every push to master and on version tags (vX.Y.Z). End users then just
# `docker pull ghcr.io/<owner>/infoblox-noc-dashboard:latest` — no build needed.

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # write: lets the master build cut a vX.Y.Z release
  packages: write

# Run JS-based actions on Node 24 (Node 20 is deprecated on runners). Opt-in env
# avoids churning every action's major version. Remove once the actions default
# to Node 24 (mid-2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend-lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Generate dark tokens and verify no drift
        run: |
          npm run gen:tokens
          git diff --exit-code src/styles/tokens.dark.css

      - name: Lint tokens (fail on raw hex/rgb)
        run: npm run lint:tokens

      - name: Build frontend
        run: npm run build

  build-push:
    needs: frontend-lint-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the commit count (app version) is correct

      - name: Compute app version
        id: ver
        run: echo "version=1.0.$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Auto-publish a GitHub Release for this build so the in-app update check
      # (which polls the Releases API) sees every master push. Runs only on the
      # default branch; the tag it creates re-triggers this workflow once, but
      # that run skips this step (not on master) and the release already exists.
      - name: Cut release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes --target "$GITHUB_SHA"
          fi
