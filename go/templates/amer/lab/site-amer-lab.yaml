type: site

# Bloxsmith seed template — original content, no third-party source.
# Fictional Americas lab site: Austin, TX.
site:
  name: amer-lab
  region: Americas
  environment: lab
  location: Austin, TX
  owner: labops-amer@example.com

network:
  ip_space: default
  subnet_size: 25
  subnets:
    - name: amer-lab-bench
      purpose: Test bench VLAN
      cidr: 25
      dhcp: true
      dhcp_start: 20
      dhcp_end: 120
    - name: amer-lab-mgmt
      purpose: Out-of-band management VLAN
      cidr: 27
      dhcp: false

dns:
  parent: lab.example.com
  view: default
  create_zone: true
  create_reverse_zone: false

hosts:
  - hostname: amer-lab-jump01
    subnet: amer-lab-mgmt
    comment: Lab jump host

tags:
  cost_center: amer-200
  managed_by: bloxsmith
