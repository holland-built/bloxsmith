# goreleaser config for Bloxsmith — the Go single-binary distribution layer.
#
# Lives in go/ because the module (go.mod) and the //go:embed'd frontend
# (go/web/) both live here. Run every command from this directory:
#   goreleaser build   --snapshot --clean   # local cross-compile test, NO publish
#   goreleaser release --clean               # real: archives + checksums + Release
#                                            #       + Homebrew + winget + ghcr image
#
# Version: goreleaser derives {{ .Version }} from the pushed git tag. Tags are
# `v1.0.<git-commit-count>` (SHIP.md), so {{ .Version }} == `1.0.<n>` — exactly
# what update.go's verN() compares against the GitHub Releases API. The ldflags
# `-X main.version=` below REPLACES the old Dockerfile `APP_VERSION` ARG.
#
# The frontend needs no staging step: go/web/ is committed, so `go:embed all:web`
# bakes the UI into every cross-compiled binary from a clean checkout.
version: 2

project_name: bloxsmith

before:
  hooks:
    - go mod tidy

builds:
  - id: bloxsmith
    main: .
    binary: bloxsmith
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - darwin
      - windows
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      # No windows/arm64 target (winget audience is amd64).
      - goos: windows
        goarch: arm64

# Merge darwin/amd64 + darwin/arm64 into a single fat macOS binary. `replace`
# drops the two per-arch builds so Homebrew ships one universal artifact.
universal_binaries:
  - id: bloxsmith
    replace: true

archives:
  - id: bloxsmith
    ids:
      - bloxsmith
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS_universal
      {{- else }}{{ .Os }}_{{ .Arch }}{{ end }}
    format_overrides:
      # winget cannot consume tar.gz; Windows ships a zip.
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  # Local `--snapshot` builds have no tag on HEAD; stamp a clearly-non-release
  # version so verN() still parses an <n> and /api/update/check shows it.
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: holland-built
    name: bloxsmith
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

# --- Homebrew tap: `brew install holland-built/tap/bloxsmith` -----------------
brews:
  - name: bloxsmith
    ids:
      - bloxsmith
    repository:
      owner: holland-built
      name: homebrew-tap
      branch: main
    homepage: "https://github.com/holland-built/bloxsmith"
    description: "Bloxsmith — self-contained Infoblox BloxOne NOC dashboard (embedded UI + API proxy)."
    license: "MIT"
    # Formula lands here in the tap repo.
    directory: Formula
    commit_author:
      name: goreleaser-bot
      email: bot@holland-built.dev
    install: |
      bin.install "bloxsmith"
    test: |
      system "#{bin}/bloxsmith", "--version"

# --- winget: `winget install holland-built.Bloxsmith` ------------------------
winget:
  - name: Bloxsmith
    publisher: holland-built
    package_identifier: holland-built.Bloxsmith
    ids:
      - bloxsmith
    short_description: "Self-contained Infoblox BloxOne NOC dashboard."
    description: "Bloxsmith is a single static binary that embeds its React UI, proxies the Infoblox BloxOne/CSP APIs, and self-updates from GitHub Releases."
    license: "MIT"
    homepage: "https://github.com/holland-built/bloxsmith"
    publisher_url: "https://github.com/holland-built"
    release_notes_url: "https://github.com/holland-built/bloxsmith/releases/tag/v{{ .Version }}"
    commit_author:
      name: goreleaser-bot
      email: bot@holland-built.dev
    repository:
      owner: holland-built
      name: winget-pkgs
      branch: "bloxsmith-{{ .Version }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

# --- Container image for the enterprise-server audience ----------------------
# distroless/static — same env contract as the old python image, so the existing
# docker-compose.yml + noc-vault volume drop in unchanged. Built only during
# `goreleaser release` (skipped by `goreleaser build`).
dockers:
  - id: bloxsmith-amd64
    ids:
      - bloxsmith
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/holland-built/bloxsmith:{{ .Version }}-amd64"
      - "ghcr.io/holland-built/bloxsmith:latest-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/holland-built/bloxsmith"
  - id: bloxsmith-arm64
    ids:
      - bloxsmith
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/holland-built/bloxsmith:{{ .Version }}-arm64"
      - "ghcr.io/holland-built/bloxsmith:latest-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/holland-built/bloxsmith"

docker_manifests:
  - name_template: "ghcr.io/holland-built/bloxsmith:{{ .Version }}"
    image_templates:
      - "ghcr.io/holland-built/bloxsmith:{{ .Version }}-amd64"
      - "ghcr.io/holland-built/bloxsmith:{{ .Version }}-arm64"
  - name_template: "ghcr.io/holland-built/bloxsmith:latest"
    image_templates:
      - "ghcr.io/holland-built/bloxsmith:latest-amd64"
      - "ghcr.io/holland-built/bloxsmith:latest-arm64"
