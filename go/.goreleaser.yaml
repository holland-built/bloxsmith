# goreleaser config for Bloxsmith — the Go single-binary distribution layer.
#
# Lives in go/ because the module (go.mod) and the //go:embed'd frontend
# (go/web/) both live here. Run every command from this directory:
#   goreleaser build   --snapshot --clean   # local cross-compile test, NO publish
#   goreleaser release --clean               # real: archives + checksums + Release
#                                            #       + Homebrew + ghcr image
#
# Version: goreleaser derives {{ .Version }} from the pushed git tag. Tags are
# semver `vX.Y.Z` (SHIP.md; e.g. v2.2.0), so {{ .Version }} == `X.Y.Z` — exactly
# what update.go's verN() compares against the GitHub Releases API. The ldflags
# `-X main.version=` below REPLACES the old Dockerfile `APP_VERSION` ARG.
#
# The frontend needs no staging step: go/web/ is committed, so `go:embed all:web`
# bakes the UI into every cross-compiled binary from a clean checkout.
version: 2

project_name: bloxsmith

before:
  hooks:
    - go mod tidy
    # Fetch third-party demo/seed templates (ccmarris/uddi_automation_toolkit)
    # into go/templates (gitignored) so archives + images can bundle them.
    # cwd is go/, so the script is at ../scripts/. TEMPLATES_DIR overrides the
    # script's repo-root default.
    - sh -c "TEMPLATES_DIR=templates python3 ../scripts/fetch_templates.py"

builds:
  - id: bloxsmith
    main: .
    binary: bloxsmith
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - darwin
      - windows
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      # No windows/arm64 target (Windows audience is amd64).
      - goos: windows
        goarch: arm64

# Merge darwin/amd64 + darwin/arm64 into a single fat macOS binary. `replace`
# drops the two per-arch builds so Homebrew ships one universal artifact.
universal_binaries:
  - id: bloxsmith
    replace: true

archives:
  - id: bloxsmith
    ids:
      - bloxsmith
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS_universal
      {{- else }}{{ .Os }}_{{ .Arch }}{{ end }}
    # Bundle the fetched third-party templates next to the binary: the binary's
    # default TemplatesDir is <binary-dir>/templates, so extracting the archive
    # yields a working template/seed provisioning setup with zero extra steps.
    files:
      - src: templates/**/*
    format_overrides:
      # Windows ships a zip (install.ps1 / direct download consume it).
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  # Local `--snapshot` builds have no tag on HEAD; stamp a clearly-non-release
  # version so verN() still parses an <n> and /api/update/check shows it.
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  disable: true

release:
  github:
    owner: holland-built
    name: bloxsmith
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  # Attach both installers to every release so
  # releases/latest/download/install.{sh,ps1} always resolve — no manual
  # `gh release upload`. Globs are relative to go/ (goreleaser's cwd). The
  # scripts are staged INTO go/ first (CI: a copy step in release.yml; local:
  # `cp ../scripts/install.{sh,ps1} .`) — a `../` glob here trips goreleaser's
  # zglob at SCM-publish time ("stat static prefix .//<abs>: invalid argument"),
  # which `--snapshot` never exercises, so it only fails on a real release.
  extra_files:
    - glob: install.sh
    - glob: install.ps1

# --- Homebrew tap: `brew install holland-built/tap/bloxsmith` -----------------
brews:
  - name: bloxsmith
    ids:
      - bloxsmith
    repository:
      owner: holland-built
      name: homebrew-tap
      branch: main
      # CI: HOMEBREW_TAP_TOKEN (PAT with repo scope on homebrew-tap) — the
      # built-in GITHUB_TOKEN can't push cross-repo. Local fallback: falls back
      # to GITHUB_TOKEN (gh auth token has repo scope on personal repos).
      token: "{{ if index .Env \"HOMEBREW_TAP_TOKEN\" }}{{ .Env.HOMEBREW_TAP_TOKEN }}{{ else }}{{ .Env.GITHUB_TOKEN }}{{ end }}"
    homepage: "https://github.com/holland-built/bloxsmith"
    description: "Bloxsmith — self-contained Infoblox BloxOne NOC dashboard (embedded UI + API proxy)."
    license: "MIT"
    # Formula lands here in the tap repo.
    directory: Formula
    commit_author:
      name: goreleaser-bot
      email: bot@holland-built.dev
    install: |
      bin.install "bloxsmith"
    test: |
      system "#{bin}/bloxsmith", "--version"
    caveats: |
      Start Bloxsmith by running:  bloxsmith
      Then open the dashboard:     http://localhost:8080
      Run it at login in the background:  bloxsmith service install

# --- Container image for the enterprise-server audience ----------------------
# distroless/static — same env contract as the old python image, so the existing
# docker-compose.yml + noc-vault volume drop in unchanged. Built only during
# `goreleaser release` (skipped by `goreleaser build`).
dockers:
  - id: bloxsmith-amd64
    ids:
      - bloxsmith
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    extra_files:
      - templates
    image_templates:
      - "ghcr.io/holland-built/bloxsmith:{{ .Version }}-amd64"
      - "ghcr.io/holland-built/bloxsmith:latest-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/holland-built/bloxsmith"
  - id: bloxsmith-arm64
    ids:
      - bloxsmith
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    extra_files:
      - templates
    image_templates:
      - "ghcr.io/holland-built/bloxsmith:{{ .Version }}-arm64"
      - "ghcr.io/holland-built/bloxsmith:latest-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/holland-built/bloxsmith"

docker_manifests:
  - name_template: "ghcr.io/holland-built/bloxsmith:{{ .Version }}"
    image_templates:
      - "ghcr.io/holland-built/bloxsmith:{{ .Version }}-amd64"
      - "ghcr.io/holland-built/bloxsmith:{{ .Version }}-arm64"
  - name_template: "ghcr.io/holland-built/bloxsmith:latest"
    image_templates:
      - "ghcr.io/holland-built/bloxsmith:latest-amd64"
      - "ghcr.io/holland-built/bloxsmith:latest-arm64"

# --- cosign keyless signing of the pushed ghcr images -------------------------
# Runs in CI (release.yml) with id-token: write — the signature's identity is
# the workflow's OIDC identity; no key is stored anywhere. Verify with:
#   cosign verify ghcr.io/holland-built/bloxsmith:<tag> \
#     --certificate-identity-regexp '^https://github\.com/holland-built/bloxsmith/\.github/workflows/release\.yml@refs/tags/' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
docker_signs:
  - cmd: cosign
    artifacts: all
    output: true
    args: ["sign", "--yes", "${artifact}@${digest}"]
