# Bloxsmith — Docker Compose deploy.
#
#   docker compose up -d                        # dashboard only (loopback); no auto-update sidecar
#   docker compose --profile autoupdate up -d   # + Watchtower auto-update sidecar (demo laptops)
#   BIND=0.0.0.0 docker compose up -d           # expose on the LAN (no login — keep vault locked)
#   docker compose --profile secure up -d       # add a TLS + basic-auth reverse proxy
#
# Self-update: click "Update now" in the app — the app pulls :latest over the
# Docker socket, health-checks a candidate, and recreates itself (auto-rollback
# on failure). Or run: docker compose pull && docker compose up -d
# Out-of-band revert (boot-failed image): ./rollback.sh
# Copy .env.example to .env to set BIND/PORT/token/auth.
#
# AUTO_UPDATE: the Watchtower sidecar is OFF by default. Enterprise deploys pin a
# digest (see below) and update on a controlled, verified schedule — auto-pull is
# opt-in only. Demo/laptop installs opt in with `--profile autoupdate`. The in-app
# "Update now" button works either way (it drives the Docker socket directly and
# does not need the sidecar).

services:
  bloxsmith:
    # ── Image reference ────────────────────────────────────────────────
    # Enterprise: PIN BY DIGEST for a reproducible, signature-verifiable deploy.
    # Replace :latest below with the digest of the tag you trust, e.g.:
    #   image: ghcr.io/holland-built/bloxsmith@sha256:<64-hex-digest>
    # Resolve + verify the digest first:
    #   docker buildx imagetools inspect ghcr.io/holland-built/bloxsmith:latest
    #   cosign verify ghcr.io/holland-built/bloxsmith@sha256:<digest> \
    #     --certificate-identity-regexp 'https://github.com/holland-built/bloxsmith/.+' \
    #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
    # Demo/laptop installs may stay on :latest for convenience.
    image: ghcr.io/holland-built/bloxsmith:latest
    container_name: bloxsmith
    restart: unless-stopped
    ports:
      - "${BIND:-127.0.0.1}:${PORT:-8080}:8080"
    volumes:
      - noc-vault:/vault
      - /var/run/docker.sock:/var/run/docker.sock   # in-app "Update now" self-update; remove to disable
    environment:
      INFOBLOX_URL: ${INFOBLOX_URL:-https://csp.infoblox.com}
      # single-key mode (optional) — leave unset to use the in-app encrypted vault
      INFOBLOX_API_KEY: ${INFOBLOX_API_KEY:-}
      # LLM natural-language query box (optional)
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      # vault auto-unlock (optional) — skips passphrase prompt after restarts/updates
      VAULT_PASSPHRASE: ${VAULT_PASSPHRASE:-}
      VAULT_PASSPHRASE_FILE: ${VAULT_PASSPHRASE_FILE:-}
      # wires the in-app "Update now" button to the Watchtower sidecar
      WATCHTOWER_URL: http://noc-watchtower:8080/v1/update
      WATCHTOWER_TOKEN: ${WATCHTOWER_TOKEN:-noc-local-update-token}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    networks: [noc-net]

  # Auto-update sidecar — OFF by default (enterprise pins + updates deliberately).
  # Opt in on demo laptops: `docker compose --profile autoupdate up -d`.
  noc-watchtower:
    image: containrrr/watchtower
    container_name: noc-watchtower
    profiles: [autoupdate]
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_API_VERSION: "1.44"          # modern daemons reject Watchtower's old default
      WATCHTOWER_HTTP_API_UPDATE: "true"  # HTTP-API mode, no polling (alternate trigger; the in-app button uses the Docker socket)
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_TOKEN:-noc-local-update-token}
      WATCHTOWER_LABEL_ENABLE: "true"     # only touch the labeled dashboard
      WATCHTOWER_CLEANUP: "true"
    networks: [noc-net]

  # Opt-in reverse proxy: TLS (self-signed local CA) + basic-auth in front of the
  # dashboard. Use when exposing on an untrusted LAN. Set BIND=127.0.0.1 so the
  # dashboard itself stays loopback-only and all external access goes through Caddy.
  #   docker compose --profile secure up -d
  caddy:
    image: caddy:2
    container_name: noc-caddy
    profiles: [secure]
    restart: unless-stopped
    ports:
      - "${HTTPS_BIND:-0.0.0.0}:${HTTPS_PORT:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:443}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-admin}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH:-}   # docker run caddy caddy hash-password -p 'yourpass'
    networks: [noc-net]

volumes:
  noc-vault:
    name: noc-vault      # match run-image.sh volume name; vault survives run-image.sh ↔ compose switches
  caddy-data:

networks:
  noc-net:
