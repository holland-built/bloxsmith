<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>v3 — Auto-refresh in ⋯ menu</title>
  <style>
    :root {
      --blue-deep:#262B36; --blue-mid:#171A21; --blue-dark:#10131A;
      --teal:#D6D2CB; --teal-bright:#EBE8E2;
      --surface:#1B1F28; --surface-2:#232834; --surface-3:#2E3440;
      --border:rgba(255,255,255,0.09);
      --gray-100:#ECEAE7; --gray-200:#C5C1BB; --gray-400:#8F949C; --gray-500:#82868E; --gray-600:#5C5954;
      --red:#EF4444; --amber:#F59E0B; --green:#10B981;
      --ink:#F1F2F4;
      --hover:rgba(255,255,255,.045);
      --hover-strong:rgba(255,255,255,.1);
      --tint:rgba(255,255,255,.11);
      --sev-amber-t:#FCD34D;
      --badge-amber-bg:rgba(245,158,11,.15); --badge-amber-bd:rgba(245,158,11,.3);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--blue-dark);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .col-menu {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      min-width: 210px;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    .col-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      border-radius: 5px;
      font-size: 12px;
      color: var(--gray-200);
      cursor: pointer;
      user-select: none;
    }
    .col-row:hover { background: var(--hover); }
    .col-row .row-label { flex: 1; }
    .col-row .row-value { color: var(--gray-400); font-size: 11px; }
    .col-row .row-icon { color: var(--gray-400); font-size: 12px; width: 14px; text-align: center; }
    .value-pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: var(--tint);
      border: 1px solid rgba(214,210,203,0.2);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      color: var(--teal-bright);
      font-weight: 600;
      letter-spacing: .01em;
    }
    .value-pill .chevron {
      font-size: 9px;
      color: var(--gray-400);
      margin-left: 1px;
    }
    .theme-btn {
      background: var(--blue-deep);
      border: 1px solid var(--border);
      color: var(--gray-200);
      border-radius: 6px;
      font-size: 14px;
      padding: 7px 10px;
      cursor: pointer;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div style="margin-right:40px; color:var(--gray-400); font-size:11px; padding-top:8px; width:160px;">
    <strong style="color:var(--gray-200)">v3</strong><br>
    Inline single row — label left, pill badge with current value right. Cycles on click. No sub-rows.
  </div>

  <div>
    <button class="theme-btn">⋯</button>
    <div class="col-menu" style="position:relative;">
      <div class="col-row">
        <span class="row-label">Copy link to this view</span>
        <span class="row-icon">◳</span>
      </div>
      <!-- AUTO-REFRESH — single inline row with pill -->
      <div class="col-row">
        <span class="row-label">Auto-refresh</span>
        <span class="value-pill">30s <span class="chevron">▾</span></span>
      </div>
      <div class="col-row">
        <span class="row-label">Row density</span>
        <span class="row-value">Comfortable</span>
      </div>
      <div class="col-row">
        <span class="row-label">Wall display mode</span>
        <span class="row-value">Off</span>
      </div>
      <div class="col-row">
        <span class="row-label">Demo mode</span>
        <span class="row-value">Off</span>
      </div>
      <div class="col-row">
        <span class="row-label">Freeze data</span>
        <span class="row-value">Live</span>
      </div>
      <div class="col-row">
        <span class="row-label">Reset dashboard</span>
        <span class="row-icon">↺</span>
      </div>
      <div class="col-row">
        <span class="row-label">Keyboard shortcuts</span>
        <span class="row-icon">?</span>
      </div>
    </div>
  </div>
</body>
</html>
