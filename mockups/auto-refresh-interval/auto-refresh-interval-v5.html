<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>v5 — Auto-refresh in ⋯ menu</title>
  <style>
    :root {
      --blue-deep:#262B36; --blue-mid:#171A21; --blue-dark:#10131A;
      --teal:#D6D2CB; --teal-bright:#EBE8E2;
      --surface:#1B1F28; --surface-2:#232834; --surface-3:#2E3440;
      --border:rgba(255,255,255,0.09);
      --gray-100:#ECEAE7; --gray-200:#C5C1BB; --gray-400:#8F949C; --gray-500:#82868E; --gray-600:#5C5954;
      --red:#EF4444; --amber:#F59E0B; --green:#10B981;
      --ink:#F1F2F4;
      --hover:rgba(255,255,255,.045);
      --hover-strong:rgba(255,255,255,.1);
      --tint:rgba(255,255,255,.11);
      --sev-amber-t:#FCD34D;
      --badge-amber-bg:rgba(245,158,11,.15); --badge-amber-bd:rgba(245,158,11,.3);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--blue-dark);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .col-menu {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      min-width: 210px;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    .col-menu-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--gray-400);
      padding: 4px 6px 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    /* Active value badge inside the header */
    .header-value-badge {
      font-size: 10px;
      font-weight: 700;
      color: var(--teal-bright);
      background: rgba(235,232,226,.1);
      border: 1px solid rgba(235,232,226,.2);
      border-radius: 3px;
      padding: 0 4px;
      letter-spacing: .02em;
    }
    .header-sep {
      color: var(--gray-600);
      font-weight: 400;
      letter-spacing: 0;
    }
    .col-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      border-radius: 5px;
      font-size: 12px;
      color: var(--gray-200);
      cursor: pointer;
      user-select: none;
    }
    .col-row:hover { background: var(--hover); }
    .col-row .row-label { flex: 1; }
    .col-row .row-value { color: var(--gray-400); font-size: 11px; }
    .col-row .row-icon { color: var(--gray-400); font-size: 12px; width: 14px; text-align: center; }
    .col-row .checkmark { color: var(--teal-bright); font-size: 12px; width: 14px; text-align: center; }
    .col-row .checkmark-empty { width: 14px; }
    .col-row.selected { color: var(--teal-bright); }
    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }
    .theme-btn {
      background: var(--blue-deep);
      border: 1px solid var(--border);
      color: var(--gray-200);
      border-radius: 6px;
      font-size: 14px;
      padding: 7px 10px;
      cursor: pointer;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div style="margin-right:40px; color:var(--gray-400); font-size:11px; padding-top:8px; width:160px;">
    <strong style="color:var(--gray-200)">v5</strong><br>
    Section at TOP with active value in header — "AUTO-REFRESH · 30s". State visible without scanning rows.
  </div>

  <div>
    <button class="theme-btn">⋯</button>
    <div class="col-menu" style="position:relative;">
      <!-- AUTO-REFRESH SECTION — header shows current value inline -->
      <div class="col-menu-title">
        Auto-Refresh
        <span class="header-sep">·</span>
        <span class="header-value-badge">30s</span>
      </div>
      <div class="col-row">
        <span class="checkmark-empty"></span>
        <span class="row-label">Off</span>
      </div>
      <div class="col-row selected">
        <span class="checkmark">✓</span>
        <span class="row-label">30s</span>
      </div>
      <div class="col-row">
        <span class="checkmark-empty"></span>
        <span class="row-label">1m</span>
      </div>
      <div class="col-row">
        <span class="checkmark-empty"></span>
        <span class="row-label">5m</span>
      </div>

      <div class="divider"></div>

      <!-- EXISTING MENU ROWS -->
      <div class="col-row">
        <span class="row-label">Copy link to this view</span>
        <span class="row-icon">◳</span>
      </div>
      <div class="col-row">
        <span class="row-label">Row density</span>
        <span class="row-value">Comfortable</span>
      </div>
      <div class="col-row">
        <span class="row-label">Wall display mode</span>
        <span class="row-value">Off</span>
      </div>
      <div class="col-row">
        <span class="row-label">Demo mode</span>
        <span class="row-value">Off</span>
      </div>
      <div class="col-row">
        <span class="row-label">Freeze data</span>
        <span class="row-value">Live</span>
      </div>
      <div class="col-row">
        <span class="row-label">Reset dashboard</span>
        <span class="row-icon">↺</span>
      </div>
      <div class="col-row">
        <span class="row-label">Keyboard shortcuts</span>
        <span class="row-icon">?</span>
      </div>
    </div>
  </div>
</body>
</html>
