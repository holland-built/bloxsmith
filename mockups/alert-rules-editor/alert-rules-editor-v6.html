<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>v6 — Amber outline on each editable input</title>
<style>
:root {
  --blue-deep:#262B36; --blue-mid:#171A21; --blue-dark:#10131A;
  --teal:#D6D2CB; --teal-bright:#EBE8E2;
  --surface:#1B1F28; --surface-2:#232834; --surface-3:#2E3440;
  --border:rgba(255,255,255,0.09);
  --gray-100:#ECEAE7; --gray-200:#C5C1BB; --gray-400:#8F949C; --gray-500:#82868E; --gray-600:#5C5954;
  --red:#EF4444; --amber:#F59E0B; --green:#10B981;
  --ink:#F1F2F4;
  --hover:rgba(255,255,255,.045);
  --hover-strong:rgba(255,255,255,.1);
  --tint:rgba(255,255,255,.11);
  --row-border:rgba(255,255,255,.07);
  --sev-red-t:#FCA5A5; --sev-green-t:#6EE7B7;
  --badge-red-bg:rgba(239,68,68,.15); --badge-red-bd:rgba(239,68,68,.3);
  --badge-green-bg:rgba(16,185,129,.15); --badge-green-bd:rgba(16,185,129,.3);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--blue-dark);padding:40px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-400);margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0;}
.add-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-400);padding:7px 10px;border-bottom:1px solid var(--border);}
.tbl td{padding:8px 10px;font-size:12px;border-bottom:1px solid var(--row-border);color:var(--gray-200);}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;letter-spacing:.04em;}
.b-red{background:var(--badge-red-bg);border:1px solid var(--badge-red-bd);color:var(--sev-red-t);}
.b-green{background:var(--badge-green-bg);border:1px solid var(--badge-green-bd);color:var(--sev-green-t);}
.viz-sel{background:var(--surface);border:1px solid var(--border);color:var(--gray-200);font-size:10px;border-radius:5px;padding:2px 5px;}
.lookup-btn{background:var(--teal);border:none;border-radius:6px;color:var(--blue-dark);font-size:12px;font-weight:700;padding:8px 16px;cursor:pointer;}
.action-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 5px;color:var(--gray-400);}
.action-btn:hover{color:var(--gray-200);}
/* standard edit inputs */
.edit-sel{background:var(--surface-3);border:1px solid var(--border);color:var(--gray-200);font-size:12px;border-radius:5px;padding:3px 6px;width:100%;}
.edit-num{background:var(--surface-3);border:1px solid var(--border);color:var(--gray-200);font-size:12px;border-radius:5px;padding:3px 6px;width:64px;}
.save-btn{background:var(--teal);border:none;border-radius:5px;color:var(--blue-dark);font-size:11px;font-weight:700;padding:3px 9px;cursor:pointer;}
.cancel-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--gray-400);font-size:11px;padding:3px 7px;cursor:pointer;}
/* v6 specific: amber border + faint amber glow on all editable inputs in the row */
.edit-sel-amber{
  background:var(--surface-3);
  border:1px solid var(--amber);
  outline:1px solid rgba(245,158,11,.25);
  color:var(--gray-200);
  font-size:12px;
  border-radius:5px;
  padding:3px 6px;
  width:100%;
}
.edit-num-amber{
  background:var(--surface-3);
  border:1px solid var(--amber);
  outline:1px solid rgba(245,158,11,.25);
  color:var(--gray-200);
  font-size:12px;
  border-radius:5px;
  padding:3px 6px;
  width:64px;
}
</style>
</head>
<body>
<div style="margin-bottom:12px;color:var(--gray-400);font-size:11px;"><strong style="color:var(--gray-200)">v6</strong> — Faint amber outline on each editable input (no row bg change)</div>
<div class="card" style="max-width:680px;">
  <div class="card-title"><span class="dot"></span>Alert Rules — fire when a live metric crosses a threshold</div>

  <!-- Add-form row -->
  <div class="add-row">
    <select class="viz-sel" style="font-size:11px;padding:4px 6px;">
      <option>Offline / error hosts</option>
      <option>Subnets ≥90% utilization</option>
      <option>Failed audit events</option>
    </select>
    <select class="viz-sel" style="font-size:11px;padding:4px 6px;">
      <option>≥</option><option>&gt;</option><option>&lt;</option><option>≤</option>
    </select>
    <input type="number" class="viz-sel" value="1" style="width:64px;font-size:11px;padding:4px 6px;">
    <button class="lookup-btn" style="padding:5px 14px;font-size:11px;">+ Add rule</button>
  </div>

  <!-- Table -->
  <table class="tbl">
    <thead>
      <tr>
        <th>Status</th>
        <th>Metric</th>
        <th>Condition</th>
        <th>Current</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <!-- Row 1: read-only OK -->
      <tr>
        <td><span class="badge b-green">OK</span></td>
        <td>Offline / error hosts</td>
        <td>≥ 1</td>
        <td>0</td>
        <td style="white-space:nowrap;">
          <button class="action-btn" title="Edit">✎</button>
          <button class="action-btn" title="Delete" style="color:var(--gray-500);">✕</button>
        </td>
      </tr>

      <!-- Row 2: EDIT MODE — v6: amber-outlined inputs, no row bg change -->
      <tr>
        <td><span class="badge b-red">Firing</span></td>
        <td>
          <select class="edit-sel-amber">
            <option>Offline / error hosts</option>
            <option selected>Subnets ≥90% utilization</option>
            <option>Failed audit events</option>
          </select>
        </td>
        <td>
          <div style="display:flex;align-items:center;gap:4px;">
            <select class="edit-sel-amber" style="width:48px;">
              <option selected>≥</option><option>&gt;</option><option>&lt;</option><option>≤</option>
            </select>
            <input type="number" class="edit-num-amber" value="1">
          </div>
        </td>
        <td>3</td>
        <td style="white-space:nowrap;">
          <button class="save-btn">Save</button>
          <button class="cancel-btn" style="margin-left:4px;">✕</button>
        </td>
      </tr>

      <!-- Row 3: read-only OK -->
      <tr>
        <td><span class="badge b-green">OK</span></td>
        <td>Failed audit events</td>
        <td>≥ 1</td>
        <td>0</td>
        <td style="white-space:nowrap;">
          <button class="action-btn" title="Edit">✎</button>
          <button class="action-btn" title="Delete" style="color:var(--gray-500);">✕</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
</body></html>
