<!-- VARIANT: v8 — Status latch strip -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHCP Pool Utilization — v8 Status Latch Strip</title>
<style>
  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Locked tokens ── */
  :root[data-theme="dark"] {
    --bg:        #1a1b1e;
    --surface:   #24252a;
    --surface-2: #2e2f35;
    --border:    rgba(255,255,255,0.10);
    --accent:    #6694ff;
    --red:       #f87171;
    --amber:     #fbbf24;
    --green:     #4ade80;
    --muted:     #75767b;
    --ink:       #e8e8ea;
    --font-ui:   "Inter", system-ui, sans-serif;
    --font-data: "Geist Mono", "JetBrains Mono", monospace;

    --crit-tint: rgba(248,113,113,0.08);
    --warn-tint: transparent;
    --ok-tint:   transparent;
  }

  :root[data-theme="light"] {
    --bg:        #f9fafa;
    --surface:   #fff;
    --surface-2: #f3f4f9;
    --border:    #d4d4d8;
    --accent:    #003ecc;
    --red:       #c81f0c;
    --amber:     #977405;
    --green:     #13854f;
    --muted:     #6b6c71;
    --ink:       #232429;
    --font-ui:   "Inter", system-ui, sans-serif;
    --font-data: "Geist Mono", "JetBrains Mono", monospace;

    --crit-tint: rgba(200,31,12,0.06);
    --warn-tint: transparent;
    --ok-tint:   transparent;
  }

  /* ── Page shell ── */
  body {
    background: var(--bg);
    font-family: var(--font-ui);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px 16px;
    transition: background 0.2s, color 0.2s;
  }

  /* ── Theme toggle ── */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--ink);
    font-family: var(--font-ui);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s;
  }
  .theme-toggle:hover { background: var(--surface); }

  /* ── Widget card ── */
  .widget-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px;
    width: 100%;
    max-width: 620px;
  }

  /* ── Section header ── */
  .section-header {
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* ── Latch strip row ── */
  .latch-strip {
    display: flex;
    flex-direction: row;
    gap: 6px;
    flex-wrap: nowrap;
    overflow-x: auto;
  }

  /* ── Individual latch tile ── */
  .latch-tile {
    flex: 0 0 auto;
    width: 80px;
    height: 52px;
    background: var(--surface-2);
    border-radius: 2px;
    border-left: 3px solid var(--green);
    padding: 6px 7px 5px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: default;
    transition: opacity 0.15s;
  }
  .latch-tile:hover { opacity: 0.85; }

  /* Severity variants */
  .latch-tile[data-sev="crit"] {
    border-left-color: var(--red);
    background: var(--crit-tint);
  }
  .latch-tile[data-sev="warn"] {
    border-left-color: var(--amber);
  }
  .latch-tile[data-sev="ok"] {
    border-left-color: var(--green);
  }

  /* Pool CIDR label */
  .tile-cidr {
    font-family: var(--font-data);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Utilization percentage */
  .tile-pct {
    font-family: var(--font-data);
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
    color: var(--green);
  }
  .latch-tile[data-sev="crit"] .tile-pct { color: var(--red); }
  .latch-tile[data-sev="warn"] .tile-pct { color: var(--amber); }
  .latch-tile[data-sev="ok"]   .tile-pct { color: var(--green); }

  /* Trend delta */
  .tile-delta {
    font-family: var(--font-data);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  /* ── Context label below strip ── */
  .strip-meta {
    margin-top: 8px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  /* ── Demo context wrapper ── */
  .demo-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: center;
  }
</style>
<script>if(new URLSearchParams(location.search).get("theme")==="light")document.documentElement.setAttribute("data-theme","light");</script>
</head>
<body>

<button class="theme-toggle" onclick="
  var el = document.documentElement;
  el.dataset.theme = el.dataset.theme === 'dark' ? 'light' : 'dark';
  this.textContent = el.dataset.theme === 'dark' ? 'Switch to Light' : 'Switch to Dark';
">Switch to Light</button>

<div class="demo-label">v8 — Status Latch Strip</div>

<!-- Widget card -->
<div class="widget-card">

  <!-- Section header -->
  <div class="section-header">· DHCP</div>

  <!-- Latch strip: 5 pools -->
  <div class="latch-strip">

    <!-- Pool 1: CRIT >90% -->
    <div class="latch-tile" data-sev="crit" title="10.10.0.0/24 — CRITICAL">
      <span class="tile-cidr">10.10.0.0/24</span>
      <span class="tile-pct">94%</span>
      <span class="tile-delta">+3%</span>
    </div>

    <!-- Pool 2: WARN 75-90% -->
    <div class="latch-tile" data-sev="warn" title="10.20.1.0/24 — WARNING">
      <span class="tile-cidr">10.20.1.0/24</span>
      <span class="tile-pct">82%</span>
      <span class="tile-delta">+2%</span>
    </div>

    <!-- Pool 3: OK <75% -->
    <div class="latch-tile" data-sev="ok" title="192.168.0.0/22 — OK">
      <span class="tile-cidr">192.168.0.0/22</span>
      <span class="tile-pct">61%</span>
      <span class="tile-delta">−1%</span>
    </div>

    <!-- Pool 4: OK -->
    <div class="latch-tile" data-sev="ok" title="172.16.5.0/24 — OK">
      <span class="tile-cidr">172.16.5.0/24</span>
      <span class="tile-pct">44%</span>
      <span class="tile-delta">+0%</span>
    </div>

    <!-- Pool 5: WARN -->
    <div class="latch-tile" data-sev="warn" title="10.50.8.0/23 — WARNING">
      <span class="tile-cidr">10.50.8.0/23</span>
      <span class="tile-pct">78%</span>
      <span class="tile-delta">+5%</span>
    </div>

  </div><!-- /latch-strip -->

  <div class="strip-meta">5 pools · 1 critical · 2 warnings · updated 14s ago</div>

</div><!-- /widget-card -->

</body>
</html>
