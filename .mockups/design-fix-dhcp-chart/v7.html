<!-- VARIANT: v7 — Vertical bar columns (WILD) -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHCP Pool Utilization — v7 Vertical Bars (WILD)</title>
<style>
  /* ── LOCKED TOKENS ── */
  :root {
    --bg:         #1a1b1e;
    --surface:    #24252a;
    --surface-2:  #2e2f35;
    --border:     rgba(255,255,255,0.10);
    --accent:     #6694ff;
    --red:        #f87171;
    --amber:      #fbbf24;
    --green:      #4ade80;
    --muted:      #75767b;
    --ink:        #e8e8ea;
    --font-ui:    "Inter", system-ui, sans-serif;
    --font-data:  "Geist Mono", "Fira Mono", monospace;
  }
  [data-theme="light"] {
    --bg:         #f9fafa;
    --surface:    #fff;
    --surface-2:  #f3f4f9;
    --border:     #d4d4d8;
    --accent:     #003ecc;
    --red:        #c81f0c;
    --amber:      #977405;
    --green:      #13854f;
    --muted:      #6b6c71;
    --ink:        #232429;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: var(--font-ui);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 24px;
    padding: 32px;
    transition: background 0.2s;
  }

  /* ── Toggle ── */
  .toggle-btn {
    font-family: var(--font-data);
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 5px 12px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: color 0.15s, background 0.15s;
  }
  .toggle-btn:hover { color: var(--ink); }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px;
    width: 280px;
    transition: background 0.2s, border-color 0.2s;
  }

  /* ── Section header ── */
  .section-header {
    font-family: var(--font-data);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* ── Chart container ── */
  .chart-wrap {
    width: 100%;
    overflow: visible;
  }

  /* ── SVG bar chart ── */
  .bar-chart {
    display: block;
    overflow: visible;
  }

  /* Bar fill colors via CSS vars so theme switch works */
  .bar-green  { fill: var(--green); }
  .bar-amber  { fill: var(--amber); }
  .bar-red    { fill: var(--red);   }

  .threshold-line {
    stroke: var(--muted);
    stroke-dasharray: 3 3;
    stroke-width: 1;
  }

  .threshold-label {
    fill: var(--muted);
    font-family: var(--font-data);
    font-size: 8px;
  }

  .pct-label {
    fill: var(--ink);
    font-family: var(--font-data);
    font-size: 9px;
    text-anchor: middle;
  }

  .pool-label {
    fill: var(--muted);
    font-family: var(--font-data);
    font-size: 8px;
    text-anchor: end;
  }

  /* ── Legend row ── */
  .legend {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: var(--font-data);
    font-size: 9px;
    color: var(--muted);
  }
  .legend-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
</style>
<script>if(new URLSearchParams(location.search).get("theme")==="light")document.documentElement.setAttribute("data-theme","light");</script>
</head>
<body>

<button class="toggle-btn" onclick="toggleTheme()">Toggle Light / Dark</button>

<div class="card">
  <!-- Section header -->
  <div class="section-header">· DHCP</div>

  <!-- SVG bar chart
       Chart area: 60px tall, bars 28px wide, 8px gap
       5 pools → 5×28 + 4×8 = 172px bars area
       Left margin 8px for threshold label, right margin 0px
       Bottom margin 28px for rotated pool labels
       Top margin 14px for pct labels above bars
  -->
  <div class="chart-wrap">
    <!--
      viewBox: x=0 y=0 w=220 h=102
        Top 14px  = pct label zone
        Mid 60px  = bar zone (y=14 to y=74)
        Bot 28px  = label zone (y=74 to y=102)
      Bars start x=24 (room for threshold label)
      Bar width=28, gap=8, stride=36
      Pool utilizations: 45%, 72%, 88%, 61%, 95%
      Threshold at 80% → y = 14 + 60*(1-0.80) = 14+12 = 26
    -->
    <svg class="bar-chart" viewBox="0 0 220 102" width="220" height="102" aria-label="DHCP pool utilization bar chart">

      <!-- Threshold dashed line at 80% -->
      <!-- y at 80%: barTop=14, barH=60 → y = 14 + 60*(1-0.8) = 14+12 = 26 -->
      <line class="threshold-line" x1="24" y1="26" x2="196" y2="26" />
      <text class="threshold-label" x="2" y="29">80%</text>

      <!-- Pool 1: "Corp-A" 45% → green; bar height=0.45*60=27; y=74-27=47 -->
      <rect class="bar-green" x="24" y="47" width="28" height="27" rx="1" />
      <text class="pct-label" x="38" y="44">45%</text>
      <!-- pool label rotated -45° anchored at base of bar center -->
      <text class="pool-label" transform="translate(38,77) rotate(-45)">Corp-A</text>

      <!-- Pool 2: "Corp-B" 72% → amber; bar height=0.72*60≈43; y=74-43=31 -->
      <rect class="bar-amber" x="60" y="31" width="28" height="43" rx="1" />
      <text class="pct-label" x="74" y="28">72%</text>
      <text class="pool-label" transform="translate(74,77) rotate(-45)">Corp-B</text>

      <!-- Pool 3: "Guest" 88% → red; bar height=0.88*60≈53; y=74-53=21 -->
      <rect class="bar-red" x="96" y="21" width="28" height="53" rx="1" />
      <text class="pct-label" x="110" y="18">88%</text>
      <text class="pool-label" transform="translate(110,77) rotate(-45)">Guest</text>

      <!-- Pool 4: "VoIP" 61% → amber; bar height=0.61*60≈37; y=74-37=37 -->
      <rect class="bar-amber" x="132" y="37" width="28" height="37" rx="1" />
      <text class="pct-label" x="146" y="34">61%</text>
      <text class="pool-label" transform="translate(146,77) rotate(-45)">VoIP</text>

      <!-- Pool 5: "IoT" 95% → red; bar height=0.95*60=57; y=74-57=17 -->
      <rect class="bar-red" x="168" y="17" width="28" height="57" rx="1" />
      <text class="pct-label" x="182" y="14">95%</text>
      <text class="pool-label" transform="translate(182,77) rotate(-45)">IoT</text>

    </svg>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background: var(--green);"></div>
      &lt;80%
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background: var(--amber);"></div>
      80–90%
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background: var(--red);"></div>
      &gt;90%
    </div>
  </div>
</div>

<script>
  function toggleTheme() {
    const html = document.documentElement;
    html.setAttribute('data-theme',
      html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'
    );
  }
</script>

</body>
</html>
