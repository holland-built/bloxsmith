/* AuditTab — immutable audit log from /api/audit/log (SHA-256 hash-chained,
   port of Chris Marrison's backend/audit/log.py). Chain integrity is
   re-verified server-side on every poll; a broken chain means an entry was
   edited or removed outside audit_append(). */
function AuditTab(){
  const {data,error,locked,fetchedAt,refetch,loading}=useApi('/api/audit/log',{poll:15000});
  // Expose a stringified `_detail` so free-text BQL search reaches the JSON detail
  // blob (e.g. `teardown`) — the `detail` column itself stays the raw object.
  const rows=useMemo(()=>((data&&data.entries)||[]).map(r=>({...r,
    _detail:(r.detail&&typeof r.detail==='object'&&Object.keys(r.detail).length)?JSON.stringify(r.detail):''})),[data]);
  const chainValid=data?data.chain_valid:null;
  const cols=[
    {key:'ts',label:'Time',mono:true,align:'left',width:190,
      render:v=>v==null?'—':new Date(parseTs(v)).toLocaleString()},
    {key:'actor',label:'Actor',mono:true},
    {key:'event',label:'Event'},
    {key:'detail',label:'Detail',render:v=>
      <span className="mono" style={{fontSize:11,color:'var(--text-dim)'}}>{v&&Object.keys(v).length?JSON.stringify(v):'—'}</span>},
  ];

  const total=rows.length;
  const tone=chainValid===false?'crit':'ok';
  const verdict=chainValid===false
    ? 'Audit chain BROKEN at entry '+data.broken_index+' — log may have been tampered with'
    : total+' audit '+(total===1?'entry':'entries')+', hash chain intact';

  return <div className="page">
    <SynthBand tone={tone} verdict={verdict} facts={[]}/>

    <Panel title="Audit log"
      side={<span style={{display:'inline-flex',alignItems:'center',gap:'var(--s3)'}}>
        {chainValid!=null && <Astryx.Badge variant={chainValid?'success':'error'} label={chainValid?'Chain valid':'Chain broken'}/>}
        <AuditExportButton/>
        <Freshness at={fetchedAt} error={error} onRetry={refetch}/>
      </span>}>
      {loading&&!data
        ? <Skeleton rows={6}/>
        : locked
          ? <div className="dt-empty">Vault locked — unlock to load the audit log.</div>
          : error
            ? <ErrorState error={error} onRetry={refetch}/>
            : <DataTable cols={cols} rows={rows} defaultSort={{key:'ts',dir:'desc'}} csvName="audit"
                tableId="audit" rowKey={r=>String(r.hash||((r.ts||'')+'|'+(r.actor||'')+'|'+(r.event||'')))}
                maxRows={50} selectable filterable filterKeys={['actor','event','_detail']}/>}
    </Panel>
  </div>;
}

/* AuditExportButton — downloads /api/audit/export as a JSON blob (port of
   src/components/AuditExportButton.tsx). */
function AuditExportButton(){
  const [pending,setPending]=useState(false);
  const handleExport=async()=>{
    setPending(true);
    try{
      const r=await fetch('/api/audit/export');
      if(!r.ok){toast('Export failed — HTTP '+r.status,'err');return;}
      const payload=await r.json();
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url; a.download='audit-export-'+Date.now()+'.json';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }catch(e){
      toast(String((e&&e.message)||e),'err');
    }finally{
      setPending(false);
    }
  };
  return <Astryx.Button variant="primary" size="sm" isDisabled={pending} onClick={handleExport}>{pending?'Exporting…':'Export Audit Log'}</Astryx.Button>;
}

/* SeverityBadge — thin wrapper over Astryx <Badge> (real prop API: variant=
   neutral|info|success|warning|error|<color-name>, label — Badge renders
   [icon,label], NOT children). Keeps call sites (<SeverityBadge severity=.../>)
   unchanged while swapping the old hand-rolled .sev-badge chip. */
const SEVERITY_TO_ASTRYX_VARIANT={crit:'error',warn:'warning',ok:'success'};
function SeverityBadge({severity}){
  const s=severity==='crit'?'crit':severity==='warn'?'warn':'ok';
  return <Astryx.Badge variant={SEVERITY_TO_ASTRYX_VARIANT[s]} label={s.toUpperCase()}/>;
}

/* SnoozeControl — port of src/components/SnoozeControl.tsx. POSTs
   /api/alerts/snooze {category,minutes}; onSnoozed() refetches the triage list. */
const SNOOZE_DURATIONS=[{minutes:15,label:'15m'},{minutes:60,label:'1h'},{minutes:240,label:'4h'}];
function SnoozeControl({category,onSnoozed}){
  const [minutes,setMinutes]=useState(SNOOZE_DURATIONS[0].minutes);
  const [pending,setPending]=useState(false);
  const handleSnooze=async()=>{
    setPending(true);
    const {ok,data}=await vpost('/api/alerts/snooze',{category,minutes});
    setPending(false);
    if(ok&&data&&data.ok){ toast('Snoozed '+category+' for '+minutes+'m','ok'); onSnoozed&&onSnoozed(); }
    else toast('Snooze failed: '+((data&&data.error)||'unknown'),'err');
  };
  return <span style={{display:'inline-flex',alignItems:'center',gap:'var(--s2)'}} onClick={e=>e.stopPropagation()}>
    <select value={minutes} disabled={pending} aria-label="Snooze duration"
      onChange={e=>setMinutes(Number(e.target.value))}
      style={{height:26,fontSize:11,background:'var(--raised)',border:'1px solid var(--border)',borderRadius:'var(--r-ctl)',color:'var(--text)'}}>

    </select>

/* MCP IQ Actions/events carry 'priority' (low/medium/high), not this app's
   ok/warn/crit vocabulary — map client-side, same as backend/data/fetch_mcp.py's
   _PRIORITY_MAP did server-side in the source app. */
const MCP_PRIORITY_TO_SEVERITY={low:'ok',medium:'warn',high:'crit'};
function mcpSeverity(row){
  if(row&&row.severity) return row.severity;
  const p=String((row&&row.priority)||'').toLowerCase();
  return MCP_PRIORITY_TO_SEVERITY[p]||'ok';
}

   this app's DataTable/Panel/SynthBand idioms (pattern = AuditTab).

    ? incidents.length+' active '+(incidents.length===1?'incident':'incidents')+(crit?(' · '+crit+' critical'):'')

  const actionsCols=actionsRows.length
    ? [{key:'_sev',label:'Sev',width:70,render:(_,row)=><SeverityBadge severity={mcpSeverity(row)}/>},
       ...secAutoCols(actionsRows).filter(c=>c.key!=='severity')]
    : [];

  const eventsRows=Array.isArray(eventsApi.data)?eventsApi.data:[];
  const eventsCols=eventsRows.length?secAutoCols(eventsRows):[];

  return <div className="page">
    <div className={"inc-strip "+tone} role="status" aria-live="polite"

      <span className={"sd pulse "+tone} aria-hidden="true"/>

    </div>

    <Panel title="Triage" api={incApi} size="md">
      <Astryx.Card variant="default" padding={0}>
        {incApi.loading&&!incApi.data
          ? <Skeleton rows={4}/>
          : incApi.locked
            ? <div className="dt-empty">Vault locked — unlock to load incidents.</div>
            : incidents.length===0
              ? <div className="dt-empty">No issues detected — all metrics within normal thresholds.</div>
              : <DataTable cols={triageCols} rows={incidents} rowKey={r=>r.key} tableId="incidents-triage"
                  filterable searchSchema={{fields:{count:{type:'number'}}}} csvName="incidents" maxRows={50}/>}
      </Astryx.Card>
    </Panel>

    <Panel title="SOC queue (IQ Actions)" api={actionsApi} empty={!actionsRows.length}>
      <DataTable cols={actionsCols} rows={actionsRows}
        rowKey={r=>String((r&&(r.id||r.display_id))||JSON.stringify(r).slice(0,40))}
        tableId="incidents-soc" csvName="soc-queue" maxRows={50} filterable/>
    </Panel>

    <Panel title="MCP event stream" api={eventsApi} empty={!eventsRows.length}>
      <DataTable cols={eventsCols} rows={eventsRows}
        rowKey={r=>String((r&&(r.ophid||r.event_id||r.id))||JSON.stringify(r).slice(0,40))}
        tableId="incidents-events" csvName="mcp-events" maxRows={50}/>
    </Panel>
  </div>;
}

/* SelfServiceTab — 4-mode self-service surface (mirrors ProvisionTab's
   mode-switch pattern):
   - Allocate: original self-service IP allocation form (unchanged), POSTs
     /api/selfservice/allocate (subnet_id OR tag_key/tag_value + count + name,
     optional dns block). Dry-run defaults ON.
   - DNS Records: full CRUD against /api/dns/records for a chosen zone.
   - IP Manager: subnet availability + allocated-address release.
   - Inventory: read-only cascading drilldown (space→subnet→addresses,
     zone→records). No write buttons.
   All hooks run unconditionally above the locked-gate so switching modes
   never violates hooks-before-return. */
function SelfServiceTab(){
  const {locked}=useData();
  const {bind}=useHoverDetail();
  const zonesApi=useApi('/api/dns/zones');
  const [mode,setMode]=useState('allocate'); // 'allocate' | 'dns' | 'ipman' | 'inventory'

  // Allocate mode (unchanged).
  const [subnetId,setSubnetId]=useState('');
  const [tagKey,setTagKey]=useState('');
  const [tagValue,setTagValue]=useState('');
  const [count,setCount]=useState(1);
  const [name,setName]=useState('');
  const [dnsOn,setDnsOn]=useState(false);
  const [zoneId,setZoneId]=useState('');
  const [recName,setRecName]=useState('');
  const [recType,setRecType]=useState('A');
  const [recValue,setRecValue]=useState('');
  const [dry,setDry]=useState(true);
  const [busy,setBusy]=useState(false);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState(null);
  const [ssExample,setSsExample]=useState(false); // show the allocate example note after "Try example"

  // DNS Records mode.
  const [dnsZoneId,setDnsZoneId]=useState('');
  const recordsApi=useApi(dnsZoneId?('/api/dns/records?zone='+encodeURIComponent(dnsZoneId)):null);
  const [addName,setAddName]=useState('');
  const [addType,setAddType]=useState('A');
  const [addValue,setAddValue]=useState('');
  const [addTtl,setAddTtl]=useState('');
  const [addComment,setAddComment]=useState('');
  const [addBusy,setAddBusy]=useState(false);
  const [addErr,setAddErr]=useState(null);
  const [editingId,setEditingId]=useState(null);
  const [editValue,setEditValue]=useState('');
  const [editTtl,setEditTtl]=useState('');
  const [editComment,setEditComment]=useState('');
  const [editDisabled,setEditDisabled]=useState(false);
  const [editBusy,setEditBusy]=useState(false);
  const [deletingId,setDeletingId]=useState(null);

  // IP Manager + Inventory share the space list.
  const spacesApi=useApi('/api/ipam/spaces');

  // IP Manager mode.
  const [ipSpace,setIpSpace]=useState('');
  const [ipBlock,setIpBlock]=useState('');
  const ipBlocksApi=useApi(ipSpace?('/api/ipam/blocks?space='+encodeURIComponent(ipSpace)):null);
  const [ipSubnetId,setIpSubnetId]=useState('');
  const ipSubnetsApi=useApi(ipSpace?('/api/ipam/subnets?space='+encodeURIComponent(ipSpace)+(ipBlock?('&block='+encodeURIComponent(ipBlock)):'')):null);
  const availApi=useApi(ipSubnetId?('/api/ipam/availability?subnet='+encodeURIComponent(ipSubnetId)):null);
  const addrApi=useApi(ipSubnetId?('/api/ipam/addresses?subnet='+encodeURIComponent(ipSubnetId)):null);
  const [releasingId,setReleasingId]=useState(null);

  // Inventory mode (read-only) — its own drilldown state, independent of IP Manager.
  const [invSpace,setInvSpace]=useState('');
  const [invBlock,setInvBlock]=useState('');
  const invBlocksApi=useApi(invSpace?('/api/ipam/blocks?space='+encodeURIComponent(invSpace)):null);
  const [invSubnetId,setInvSubnetId]=useState('');
  const invSubnetsApi=useApi(invSpace?('/api/ipam/subnets?space='+encodeURIComponent(invSpace)+(invBlock?('&block='+encodeURIComponent(invBlock)):'')):null);
  const invAddrApi=useApi(invSubnetId?('/api/ipam/addresses?subnet='+encodeURIComponent(invSubnetId)):null);
  const [invZoneId,setInvZoneId]=useState('');
  const invRecordsApi=useApi(invZoneId?('/api/dns/records?zone='+encodeURIComponent(invZoneId)):null);

  if(locked) return null;

  const zones=(zonesApi.data&&zonesApi.data.zones)||[];
  const spaces=(spacesApi.data&&spacesApi.data.spaces)||[];
  const records=Array.isArray(recordsApi.data)?recordsApi.data:[];
  const ipBlocks=(ipBlocksApi.data&&ipBlocksApi.data.blocks)||[];
  const ipSubnets=Array.isArray(ipSubnetsApi.data)?ipSubnetsApi.data:[];
  const availability=availApi.data||null;
  const addresses=Array.isArray(addrApi.data)?addrApi.data:[];
  const invBlocks=(invBlocksApi.data&&invBlocksApi.data.blocks)||[];
  const invSubnets=Array.isArray(invSubnetsApi.data)?invSubnetsApi.data:[];
  const invAddresses=Array.isArray(invAddrApi.data)?invAddrApi.data:[];
  const invRecords=Array.isArray(invRecordsApi.data)?invRecordsApi.data:[];

  const addRecord=()=>{
    if(!dnsZoneId||addBusy) return;
    setAddBusy(true);setAddErr(null);
    const body={zone_id:dnsZoneId,name_in_zone:addName,type:addType,value:addValue};
    if(addTtl!=='') body.ttl=Number(addTtl);
    if(addComment) body.comment=addComment;
    fetch('/api/dns/records',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(async r=>{
        const j=await r.json().catch(()=>({}));
        setAddBusy(false);
        if(!r.ok||j.error||j.ok===false){
          const msg=(j&&j.error)||('HTTP '+r.status);
          setAddErr(msg);toast('Add record failed: '+msg,'err');return;
        }
        setAddName('');setAddValue('');setAddTtl('');setAddComment('');setAddErr(null);
        toast('Record added','ok');recordsApi.refetch();
      })
      .catch(e=>{setAddBusy(false);const msg=String((e&&e.message)||e);setAddErr(msg);toast('Add record failed — '+msg,'err');});
  };

  const startEdit=(r)=>{
    setEditingId(r.id);setEditValue(r.dns_rdata||'');
    setEditTtl(r.ttl!=null?String(r.ttl):'');setEditComment(r.comment||'');setEditDisabled(!!r.disabled);
  };
  const cancelEdit=()=>setEditingId(null);
  const saveEdit=()=>{
    if(editBusy||editingId==null) return;
    setEditBusy(true);
    const body={id:editingId,value:editValue,comment:editComment,disabled:editDisabled};
    body.ttl=editTtl!==''?Number(editTtl):undefined;
    fetch('/api/dns/records',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(async r=>{
        const j=await r.json().catch(()=>({}));
        setEditBusy(false);
        if(!r.ok||j.error||j.ok===false){
          const msg=(j&&j.error)||('HTTP '+r.status);
          toast('Edit failed: '+msg,'err');return;
        }
        setEditingId(null);toast('Record updated','ok');recordsApi.refetch();
      })
      .catch(e=>{setEditBusy(false);toast('Edit failed — '+String((e&&e.message)||e),'err');});
  };
  const deleteRecord=(r)=>{
    const label=(r.type||'')+' record '+(r.name_in_zone||'@')+' → '+(r.dns_rdata||'');
    if(!window.confirm('Delete '+label+'?')) return;
    setDeletingId(r.id);
    fetch('/api/dns/records/'+encodeURIComponent(r.id),{method:'DELETE'})
      .then(async resp=>{
        const j=await resp.json().catch(()=>({}));
        setDeletingId(null);
        if(!resp.ok||j.error||j.ok===false){
          const msg=(j&&j.error)||('HTTP '+resp.status);
          toast('Delete failed: '+msg,'err');return;
        }
        toast('Record deleted','ok');recordsApi.refetch();
      })
      .catch(e=>{setDeletingId(null);toast('Delete failed — '+String((e&&e.message)||e),'err');});
  };

  const recordCols=[
    {key:'name_in_zone',label:'Name',primary:true,render:v=>v||'@'},
    {key:'type',label:'Type',mono:true},
    {key:'ttl',label:'TTL',mono:true,align:'right',render:(v,r)=>r.id===editingId
      ?<input className="vault-in" style={{width:70}} type="number" min="0" value={editTtl} onChange={e=>setEditTtl(e.target.value)}/>
      :v},
    {key:'dns_rdata',label:'Value',mono:true,render:(v,r)=>r.id===editingId
      ?<input className="vault-in" value={editValue} onChange={e=>setEditValue(e.target.value)}/>
      :(v||'—')},
    {key:'comment',label:'Comment',render:(v,r)=>r.id===editingId
      ?<input className="vault-in" value={editComment} onChange={e=>setEditComment(e.target.value)}/>
      :(v||'—')},
    {key:'disabled',label:'Disabled',render:(v,r)=>r.id===editingId
      ?<input type="checkbox" checked={editDisabled} onChange={e=>setEditDisabled(e.target.checked)}/>
      :(v?'yes':'no')},
    {key:'actions',label:'',render:(_,r)=>r.id===editingId
      ?<span style={{display:'flex',gap:6}}>
          <button className="btn" disabled={editBusy} onClick={saveEdit}>{editBusy?'Saving…':'Save'}</button>
          <button className="btn" disabled={editBusy} onClick={cancelEdit}>Cancel</button>
        </span>
      :<span style={{display:'flex',gap:6}}>
          <button className="btn" onClick={()=>startEdit(r)} {...bind({title:'Edit record',rows:[['What it does','Modify this record in place — change its value, TTL, comment, or disable it.']]})}>Edit</button>
          <button className="btn" disabled={deletingId===r.id} onClick={()=>deleteRecord(r)} {...bind({title:'Delete record',rows:[['What it does','Permanently remove this DNS record from the zone.']]})}>{deletingId===r.id?'Deleting…':'Delete'}</button>
        </span>},
  ];

  const releaseAddress=(r)=>{
    const label='address '+(r.address||r.name||r.id);
    if(!window.confirm('Release '+label+'?')) return;
    setReleasingId(r.id);
    fetch('/api/ipam/addresses/'+encodeURIComponent(r.id),{method:'DELETE'})
      .then(async resp=>{
        let j=null;try{j=await resp.json();}catch(e){j=null;}
        setReleasingId(null);
        if(!resp.ok||(j&&j.error)||(j&&j.ok===false)){
          const msg=(j&&j.error)||('HTTP '+resp.status);
          toast('Release failed: '+msg,'err');return;
        }
        toast('Address released','ok');addrApi.refetch();availApi.refetch();
      })
      .catch(e=>{setReleasingId(null);toast('Release failed — '+String((e&&e.message)||e),'err');});
  };

  const addrCols=[
    {key:'address',label:'Address',mono:true,primary:true},
    {key:'name',label:'Name',render:v=>v||'—'},
    {key:'comment',label:'Comment',render:v=>v||'—'},
    {key:'state',label:'State',render:v=>StateText(v)},
    {key:'actions',label:'',render:(_,r)=>
      <button className="btn" disabled={releasingId===r.id} onClick={()=>releaseAddress(r)} {...bind({title:'Release address',rows:[['What it does','Return this address to the free pool so it can be allocated again.']]})}>{releasingId===r.id?'Releasing…':'Release'}</button>},
  ];

  const invAddrCols=[
    {key:'address',label:'Address',mono:true,primary:true},
    {key:'name',label:'Name',render:v=>v||'—'},
    {key:'comment',label:'Comment',render:v=>v||'—'},
    {key:'state',label:'State',render:v=>StateText(v)},
  ];
  const invRecordCols=[
    {key:'name_in_zone',label:'Name',primary:true,render:v=>v||'@'},
    {key:'type',label:'Type',mono:true},
    {key:'ttl',label:'TTL',mono:true,align:'right'},
    {key:'dns_rdata',label:'Value',mono:true,render:v=>v||'—'},
    {key:'comment',label:'Comment',render:v=>v||'—'},
    {key:'disabled',label:'Disabled',render:v=>v?'yes':'no'},
  ];
  const subnetLabel=s=>(s.address||'')+(s.cidr?('/'+s.cidr):'')+(s.name?(' — '+s.name):'');

  const submit=()=>{
    setBusy(true);setErr(null);setResult(null);
    const body={
      count:Number(count)||1,
      name,
      dry,
    };
    if(subnetId) body.subnet_id=subnetId;
    if(tagKey) body.tag_key=tagKey;
    if(tagValue) body.tag_value=tagValue;
    if(dnsOn) body.dns={zone_id:zoneId,name:recName,type:recType,value:recValue};
    fetch('/api/selfservice/allocate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(async r=>{
        const j=await r.json().catch(()=>({}));
        setBusy(false);
        if(!r.ok||j.ok===false){
          const msg=(j&&j.error)||('HTTP '+r.status);
          setErr(msg);toast('Allocation failed: '+msg,'err');return;
        }
        setResult(j);
        toast((dry?'Dry run':'Allocation')+' complete','ok');
      })
      .catch(e=>{setBusy(false);const msg=String((e&&e.message)||e);setErr(msg);toast('Allocation failed — '+msg,'err');});
  };

  // Example prefill (secondary, kebab): seeds the allocate form with illustrative
  // values — next-free /24 host from environment=prod. Prefill only, never submits.
  const loadAllocateExample=()=>{
    const ex=MARRIS_EXAMPLES.selfservice.allocate;
    setSubnetId('');setTagKey(ex.tagKey);setTagValue(ex.tagValue);
    setCount(ex.count);setName(ex.name);setDnsOn(false);setResult(null);setErr(null);setSsExample(true);
    toast('Example loaded — review, nothing submitted','ok',{duration:1800});
  };
  const resetAllocate=()=>{
    setSubnetId('');setTagKey('');setTagValue('');setCount(1);setName('');setDnsOn(false);
    setZoneId('');setRecName('');setRecType('A');setRecValue('');setResult(null);setErr(null);setSsExample(false);
  };

  return <div className="page fadein">
    <PageHeader title="Self-Service" subtitle="Requests users have queued for address space"/>
    <div className="dly-seg" role="group" aria-label="Self-service mode" style={{marginBottom:'var(--s3)'}}>
      <button className={'dly-seg-btn'+(mode==='allocate'?' on':'')} onClick={()=>setMode('allocate')}
        {...bind({title:'Allocate',rows:[['What it does','Grab the next free address (or addresses) from a subnet — or from whatever subnet matches a tag — and optionally create a DNS record in one step.']]})}>Allocate</button>
      <button className={'dly-seg-btn'+(mode==='dns'?' on':'')} onClick={()=>setMode('dns')}
        {...bind({title:'DNS Records',rows:[['What it does','Create, edit, or delete individual DNS records (A/AAAA/CNAME/MX/TXT/PTR/SRV) inside a chosen zone.']]})}>DNS Records</button>
      <button className={'dly-seg-btn'+(mode==='ipman'?' on':'')} onClick={()=>setMode('ipman')}
        {...bind({title:'IP Manager',rows:[['What it does','See how full a subnet is, and release addresses you no longer need back to the free pool.']]})}>IP Manager</button>
      <button className={'dly-seg-btn'+(mode==='inventory'?' on':'')} onClick={()=>setMode('inventory')}
        {...bind({title:'Inventory',rows:[['What it does','Read-only drilldown: browse IP spaces → blocks → subnets → addresses, and DNS zones → records. Nothing is changed.']]})}>Inventory</button>
    </div>
    {mode==='allocate'?<div className="grid">
      <Panel title="Request">
        <div className="form-col">
          <label className="mono field-lbl"
            {...bind({title:'Subnet ID',rows:[['What it does','Allocate from this exact subnet. Leave blank to instead find a subnet by tag (key/value below).']]})}>
            Subnet ID (or leave blank and use tag key/value below)
            <input className="vault-in" value={subnetId} onChange={e=>setSubnetId(e.target.value)} placeholder="subnet id"/>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Tag key',rows:[['What it does','Find a subnet by a tag name instead of an ID — e.g. region, environment, or status. Pairs with Tag value below.']]})}>
            Tag key
            <input className="vault-in" value={tagKey} onChange={e=>setTagKey(e.target.value)} placeholder="env"/>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Tag value',rows:[['What it does','The value that tag must equal — e.g. prod. The next free address is taken from the first subnet whose tag matches.']]})}>
            Tag value
            <input className="vault-in" value={tagValue} onChange={e=>setTagValue(e.target.value)} placeholder="prod"/>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Count',rows:[['What it does','How many next-available addresses to allocate in this one request.']]})}>
            Count
            <input className="vault-in" type="number" min="1" value={count} onChange={e=>setCount(e.target.value)}/>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Name',rows:[['What it does','Label recorded on the allocation — who requested it or what it is for (the Owner).']]})}>
            Name
            <input className="vault-in" value={name} onChange={e=>setName(e.target.value)} placeholder="requester / purpose"/>
          </label>
          <label className="check-row"
            {...bind({title:'Create DNS record',rows:[['What it does','Also create a DNS record pointing at the address you just allocated, in the same step.']]})}>
            <input type="checkbox" checked={dnsOn} onChange={e=>setDnsOn(e.target.checked)}/>
            <span>Create DNS record</span>
          </label>
          {dnsOn?<div style={{display:'flex',flexDirection:'column',gap:'var(--s3)',paddingLeft:'var(--s4)'}}>
            <label className="mono field-lbl"
              {...bind({title:'DNS zone',rows:[['What it does','The forward zone the new record is created in.']]})}>
              Zone
              <select className="vault-in" value={zoneId} onChange={e=>setZoneId(e.target.value)}>
                <option value="">{zonesApi.loading?'Loading zones…':'Select a zone'}</option>
                {zones.map(z=><option key={z.id} value={z.id}>{z.fqdn}</option>)}
              </select>
            </label>
            <label className="mono field-lbl"
              {...bind({title:'Record name',rows:[['What it does','Host label within the zone — e.g. "web" becomes web.your-zone.']]})}>
              Record name
              <input className="vault-in" value={recName} onChange={e=>setRecName(e.target.value)} placeholder="host"/>
            </label>
            <label className="mono field-lbl"
              {...bind({title:'Record type',rows:[['A','name → IPv4 address'],['AAAA','name → IPv6 address'],['CNAME','alias → another name'],['TXT','free text (SPF, verification)']]})}>
              Type
              <select className="vault-in" value={recType} onChange={e=>setRecType(e.target.value)}>
                <option value="A">A</option>
                <option value="AAAA">AAAA</option>
                <option value="CNAME">CNAME</option>
                <option value="TXT">TXT</option>
              </select>
            </label>
            <label className="mono field-lbl"
              {...bind({title:'Record value',rows:[['What it does','What the record points to. Leave blank and it auto-fills with the IP just allocated.']]})}>
              Value
              <input className="vault-in" value={recValue} onChange={e=>setRecValue(e.target.value)} placeholder="auto-fills from allocated IP if blank"/>
            </label>
          </div>:null}
          <label className="check-row"
            {...bind({title:'Dry-run',rows:[['What it does','Preview every step and make NO changes. Turn this off to actually allocate.']]})}>
            <input type="checkbox" checked={dry} onChange={e=>setDry(e.target.checked)}/>
            <span>Dry-run (no changes made)</span>
          </label>
          <div style={{display:'flex',alignItems:'center',gap:'var(--s2)'}}>
            <button className="btn" disabled={busy||!name} onClick={submit}
              {...bind({title:'Submit request',rows:[['What it does','Run the allocation — or, with Dry-run on, just preview it.']]})}>{busy?'Submitting…':'Submit'}</button>
            <KebabMenu label="More allocate actions" items={[
              {label:'Try example', run:loadAllocateExample},
              {label:'Reset form', run:resetAllocate},
            ]}/>
          </div>
          {ssExample?<div className="marris-example">
            <div className="mx-head"><span className="mx-tag">Example</span>
              <span className="mono" style={{fontSize:'var(--t12)',color:'var(--text-dim)'}}>prefilled — nothing submitted</span></div>
            <pre className="mx-body mono">{MARRIS_EXAMPLES.selfservice.allocate.note}
{'\n'}allocate: environment=prod · count 1 · name example-app-01</pre>
          </div>:null}
        </div>
      </Panel>
      {result?<Panel title="Result">
        <div className="mono" style={{fontSize:'var(--t12)'}}>
          {(result.addresses||[]).length} address{(result.addresses||[]).length===1?'':'es'} allocated{result.dry?' (dry run)':''}
        </div>
        <div style={{marginTop:'var(--s2)',display:'flex',flexDirection:'column',gap:2}}>
          {(result.addresses||[]).map((a,i)=><div key={i} className="mono" style={{fontSize:'var(--t12)'}}>{typeof a==='string'?a:JSON.stringify(a)}</div>)}
        </div>
        {result.record?<div className="mono" style={{marginTop:'var(--s3)',fontSize:'var(--t12)',color:'var(--text-dim)'}}>
          Record: {JSON.stringify(result.record)}
        </div>:null}
      </Panel>:null}
      {err?<Panel title="Error"><div className="mono" style={{color:'var(--crit)'}}>{err}</div></Panel>:null}
    </div>:null}
    {mode==='dns'?<div className="grid">
      <Panel title="Zone">
        <div className="form-col">
          <label className="mono field-lbl"
            {...bind({title:'DNS zone',rows:[['What it does','Pick the zone whose records you want to view and edit in the table below.']]})}>
            Zone
            <select className="vault-in" value={dnsZoneId} onChange={e=>setDnsZoneId(e.target.value)}>
              <option value="">{zonesApi.loading?'Loading zones…':'Select a zone'}</option>
              {zones.map(z=><option key={z.id} value={z.id}>{z.fqdn}</option>)}
            </select>
          </label>
        </div>
      </Panel>
      {dnsZoneId?<Panel title="Add record">
        <div className="form-col">
          <label className="mono field-lbl"
            {...bind({title:'Record name',rows:[['What it does','Host label within the zone; leave blank for the zone apex (@).']]})}>
            Name
            <input className="vault-in" value={addName} onChange={e=>setAddName(e.target.value)} placeholder="host (blank = @)"/>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Record type',rows:[['A / AAAA','name → IPv4 / IPv6 address'],['CNAME','alias to another name'],['MX','mail exchanger for the domain'],['TXT','free text (SPF, verification)'],['PTR','reverse lookup: IP → name'],['SRV','service location (host + port)']]})}>
            Type
            <select className="vault-in" value={addType} onChange={e=>setAddType(e.target.value)}>
              {RTYPE_OPTIONS.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Record value',rows:[['What it does','What this record points to; the exact format depends on the type above.']]})}>
            Value
            <input className="vault-in" value={addValue} onChange={e=>setAddValue(e.target.value)} placeholder={RTYPE_HINTS[addType]||'value'}/>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'TTL (seconds)',rows:[['What it does','How long resolvers may cache this record. Blank uses the zone default.']]})}>
            TTL (optional)
            <input className="vault-in" type="number" min="0" value={addTtl} onChange={e=>setAddTtl(e.target.value)} placeholder="default"/>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Comment',rows:[['What it does','Optional free-text note stored alongside the record.']]})}>
            Comment (optional)
            <input className="vault-in" value={addComment} onChange={e=>setAddComment(e.target.value)}/>
          </label>
          <button className="btn" disabled={addBusy||!addValue} onClick={addRecord}
            {...bind({title:'Add record',rows:[['What it does','Create this record in the selected zone.']]})}>{addBusy?'Adding…':'Add record'}</button>
          {addErr?<div className="mono" style={{fontSize:'var(--t11)',color:'var(--crit)'}}>{addErr}</div>:null}
        </div>
      </Panel>:null}
      <Panel title="Records" api={dnsZoneId?recordsApi:undefined}>
        {!dnsZoneId?<div className="dt-empty">Select a zone</div>
          :recordsApi.loading?<Skeleton rows={3}/>
          :records.length===0?<div className="dt-empty">No records</div>
          :<DataTable tableId="ss-dns-records" rowKey={r=>r.id} cols={recordCols} rows={records}
              defaultSort={{key:'name_in_zone',dir:'asc'}} filterable filterKeys={['name_in_zone','type','dns_rdata']}
              searchSchema={{fields:{ttl:{type:'number'}},aliases:{name:'name_in_zone',value:'dns_rdata'}}}/>}
      </Panel>
    </div>:null}
    {mode==='ipman'?<div className="grid">
      <Panel title="Subnet">
        <div className="form-col">
          <label className="mono field-lbl"
            {...bind({title:'IP space',rows:[['What it does','The top-level Infoblox address container to work inside.']]})}>
            Space
            <select className="vault-in" value={ipSpace} onChange={e=>{setIpSpace(e.target.value);setIpBlock('');setIpSubnetId('');}}>
              <option value="">{spacesApi.loading?'Loading spaces…':'Select a space'}</option>
              {spaces.map(sp=><option key={sp.id} value={sp.id}>{sp.name}</option>)}
            </select>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Address block',rows:[['What it does','Narrow to one block (a large CIDR range) within the space. Optional — leave as All blocks.']]})}>
            Block (optional)
            <select className="vault-in" value={ipBlock} onChange={e=>{setIpBlock(e.target.value);setIpSubnetId('');}} disabled={!ipSpace}>
              <option value="">{ipBlocksApi.loading?'Loading blocks…':'All blocks'}</option>
              {ipBlocks.map(b=><option key={b.id} value={b.id}>{b.name||b.cidr||b.address}</option>)}
            </select>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Subnet',rows:[['What it does','The subnet whose usage and allocated addresses you want to inspect and manage.']]})}>
            Subnet
            <select className="vault-in" value={ipSubnetId} onChange={e=>setIpSubnetId(e.target.value)} disabled={!ipSpace}>
              <option value="">{ipSubnetsApi.loading?'Loading subnets…':'Select a subnet'}</option>
              {ipSubnets.map(s=><option key={s.id} value={s.id}>{subnetLabel(s)}</option>)}
            </select>
          </label>
        </div>
      </Panel>
      {ipSubnetId?<Panel title="Availability" api={availApi}>
        {availability?<div style={{display:'flex',flexDirection:'column',gap:'var(--s2)'}}>
            {UtilBar(availability.pct)}
            <div className="mono" style={{fontSize:'var(--t12)',color:'var(--text-dim)'}}>
              {availability.used ?? 0} used · {availability.free ?? 0} free · {availability.total ?? 0} total
            </div>
          </div>
          :<div className="dt-empty">{availApi.loading?'Loading…':'No data'}</div>}
      </Panel>:null}
      <Panel title="Addresses" api={ipSubnetId?addrApi:undefined}>
        {!ipSubnetId?<div className="dt-empty">Select a subnet</div>
          :addrApi.loading?<Skeleton rows={3}/>
          :addresses.length===0?<div className="dt-empty">No allocated addresses</div>
          :<DataTable tableId="ss-ip-addresses" rowKey={r=>r.id} cols={addrCols} rows={addresses}
              defaultSort={{key:'address',dir:'asc'}} filterable filterKeys={['address','name','comment']}/>}
      </Panel>
    </div>:null}
    {mode==='inventory'?<div className="grid">
      <Panel title="Space / Block / Subnet">
        <div className="form-col">
          <label className="mono field-lbl"
            {...bind({title:'IP space',rows:[['What it does','Start the read-only drilldown here: the Infoblox address container to browse.']]})}>
            Space
            <select className="vault-in" value={invSpace} onChange={e=>{setInvSpace(e.target.value);setInvBlock('');setInvSubnetId('');}}>
              <option value="">{spacesApi.loading?'Loading spaces…':'Select a space'}</option>
              {spaces.map(sp=><option key={sp.id} value={sp.id}>{sp.name}</option>)}
            </select>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Address block',rows:[['What it does','Narrow the drilldown to one block within the space. Optional.']]})}>
            Block (optional)
            <select className="vault-in" value={invBlock} onChange={e=>{setInvBlock(e.target.value);setInvSubnetId('');}} disabled={!invSpace}>
              <option value="">{invBlocksApi.loading?'Loading blocks…':'All blocks'}</option>
              {invBlocks.map(b=><option key={b.id} value={b.id}>{b.name||b.cidr||b.address}</option>)}
            </select>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Subnet',rows:[['What it does','Pick a subnet to list its addresses (read-only) on the right.']]})}>
            Subnet
            <select className="vault-in" value={invSubnetId} onChange={e=>setInvSubnetId(e.target.value)} disabled={!invSpace}>
              <option value="">{invSubnetsApi.loading?'Loading subnets…':'Select a subnet'}</option>
              {invSubnets.map(s=><option key={s.id} value={s.id}>{subnetLabel(s)}</option>)}
            </select>
          </label>
        </div>
      </Panel>
      <Panel title="Addresses" api={invSubnetId?invAddrApi:undefined}>
        {!invSubnetId?<div className="dt-empty">Select a subnet</div>
          :invAddrApi.loading?<Skeleton rows={3}/>
          :invAddresses.length===0?<div className="dt-empty">No addresses</div>
          :<DataTable tableId="ss-inv-addresses" rowKey={r=>r.id} cols={invAddrCols} rows={invAddresses}
              defaultSort={{key:'address',dir:'asc'}} filterable filterKeys={['address','name','comment']}/>}
      </Panel>
      <Panel title="Zone">
        <div className="form-col">
          <label className="mono field-lbl"
            {...bind({title:'DNS zone',rows:[['What it does','Browse this zone\'s DNS records read-only (DNS view → zone → records).']]})}>
            Zone
            <select className="vault-in" value={invZoneId} onChange={e=>setInvZoneId(e.target.value)}>
              <option value="">{zonesApi.loading?'Loading zones…':'Select a zone'}</option>
              {zones.map(z=><option key={z.id} value={z.id}>{z.fqdn}</option>)}
            </select>
          </label>
        </div>
      </Panel>
      <Panel title="Records" api={invZoneId?invRecordsApi:undefined}>
        {!invZoneId?<div className="dt-empty">Select a zone</div>
          :invRecordsApi.loading?<Skeleton rows={3}/>
          :invRecords.length===0?<div className="dt-empty">No records</div>
          :<DataTable tableId="ss-inv-records" rowKey={r=>r.id} cols={invRecordCols} rows={invRecords}
              defaultSort={{key:'name_in_zone',dir:'asc'}} filterable filterKeys={['name_in_zone','type','dns_rdata']}
              searchSchema={{fields:{ttl:{type:'number'}},aliases:{name:'name_in_zone',value:'dns_rdata'}}}/>}
      </Panel>
    </div>:null}
  </div>;
}

/* ProvisionTab — 3-mode provisioning surface: Subnet (original deep-linkable
   wizard, unchanged), Full site (template-driven site provision), Seed demo
   (one-click multi-region demo data seed). All three modes stream over SSE
   using the same EventSource-in-a-ref lifecycle: closed on {done}/{error} AND
   on unmount cleanup, and start() refuses to open a second stream while one
   is live. Each mode owns its own ref/log/streaming state so switching modes
   never fights over a single stream. */
function ProvisionTab(){
  const {params}=useRoute();
  const {locked}=useData();
  const {bind}=useHoverDetail();
  const whoamiApi=useApi('/api/whoami');
  const role=(whoamiApi.data&&whoamiApi.data.role)||'viewer';
  const isAdmin=role==='admin';
  const [mode,setMode]=useState('subnet'); // 'subnet' | 'site' | 'seed'
  const spacesApi=useApi('/api/ipam/spaces');
  const [space,setSpace]=useState(params.space||'');
  const [block,setBlock]=useState(params.block||'');
  const blocksApi=useApi(space?('/api/ipam/blocks?space='+encodeURIComponent(space)):null);
  const [cidr,setCidr]=useState(params.cidr||24);
  const [name,setName]=useState(params.from||params.name||'');
  const [comment,setComment]=useState('');
  const [makeZone,setMakeZone]=useState(false);
  const [dry,setDry]=useState(true);
  const [log,setLog]=useState([]);
  const [streaming,setStreaming]=useState(false);
  const [success,setSuccess]=useState(null);
  const [streamErr,setStreamErr]=useState(null);
  const esRef=useRef(null);
  // Marris examples (secondary, kebab): 'site'|'addressBlock'|'dns' = which
  // illustrative example callout to sample-render. Prefill / sample only.
  const [examplePanel,setExamplePanel]=useState(null);

  // Full site mode.
  const templatesApi=useApi('/api/templates');
  const [siteTemplate,setSiteTemplate]=useState('');
  const [siteSpace,setSiteSpace]=useState('');
  const [siteDry,setSiteDry]=useState(true);
  const [siteLog,setSiteLog]=useState([]);
  const [siteStreaming,setSiteStreaming]=useState(false);
  const [siteSuccess,setSiteSuccess]=useState(null);
  const [siteErr,setSiteErr]=useState(null);
  const siteEsRef=useRef(null);

  // Per-site teardown (site mode).
  const [siteTeardownDry,setSiteTeardownDry]=useState(true);
  const [siteTeardownConfirm,setSiteTeardownConfirm]=useState('');
  const [siteTeardownLog,setSiteTeardownLog]=useState([]);
  const [siteTeardownStreaming,setSiteTeardownStreaming]=useState(false);
  const [siteTeardownResult,setSiteTeardownResult]=useState(null);
  const [siteTeardownErr,setSiteTeardownErr]=useState(null);
  const siteTeardownEsRef=useRef(null);

  // Seed demo mode.
  const [seedRegions,setSeedRegions]=useState({amer:true,emea:true,apac:true});
  const [seedSpace,setSeedSpace]=useState('');
  const [seedDry,setSeedDry]=useState(true);
  const [seedLog,setSeedLog]=useState([]);
  const [seedRows,setSeedRows]=useState({});
  const [seedStreaming,setSeedStreaming]=useState(false);
  const [seedSummary,setSeedSummary]=useState(null);
  const [seedErr,setSeedErr]=useState(null);
  const seedEsRef=useRef(null);

  // Seed demo teardown (Phase 2) — live (dry-off) runs require typing DELETE.
  const [teardownDry,setTeardownDry]=useState(true);
  const [teardownConfirm,setTeardownConfirm]=useState('');
  const [teardownLog,setTeardownLog]=useState([]);
  const [teardownRows,setTeardownRows]=useState({});
  const [teardownStreaming,setTeardownStreaming]=useState(false);
  const [teardownSummary,setTeardownSummary]=useState(null);
  const [teardownErr,setTeardownErr]=useState(null);
  const teardownEsRef=useRef(null);

  useEffect(()=>{ setSpace(params.space||''); },[params.space]);
  // Cleanup: close any live streams on unmount so none leak past this tab.
  useEffect(()=>()=>{
    if(esRef.current){ esRef.current.close(); esRef.current=null; }
    if(siteEsRef.current){ siteEsRef.current.close(); siteEsRef.current=null; }
    if(siteTeardownEsRef.current){ siteTeardownEsRef.current.close(); siteTeardownEsRef.current=null; }
    if(seedEsRef.current){ seedEsRef.current.close(); seedEsRef.current=null; }
    if(teardownEsRef.current){ teardownEsRef.current.close(); teardownEsRef.current=null; }
  },[]);

  if(locked) return null;

  const spaces=(spacesApi.data&&spacesApi.data.spaces)||[];
  const blocks=(blocksApi.data&&blocksApi.data.blocks)||[];
  const templates=Array.isArray(templatesApi.data)?templatesApi.data:[];

  const start=()=>{
    if(streaming||esRef.current) return; // guard: never open a second concurrent stream
    setLog([]);setSuccess(null);setStreamErr(null);setStreaming(true);
    const qs=new URLSearchParams({space,block,cidr:String(cidr||24),name,comment,
      make_zone:makeZone?'1':'0',dry:dry?'1':'0'});
    const es=new EventSource('/api/provision/stream?'+qs.toString());
    esRef.current=es;
    const stop=()=>{ if(esRef.current){ esRef.current.close(); esRef.current=null; } setStreaming(false); };
    es.onmessage=(e)=>{
      let j=null; try{ j=JSON.parse(e.data); }catch(parseErr){ return; }
      setLog(prev=>[...prev,j]);
      if(j&&j.error){ setStreamErr(j.error); stop(); toast('Provision failed: '+j.error,'err'); }
      else if(j&&j.done){ setSuccess(j.subnet||null); stop(); toast('Subnet provisioned','ok'); }
    };
    es.onerror=()=>{
      if(!esRef.current) return; // already closed via done/error message
      setStreamErr(prev=>prev||'Stream connection error');
      stop();
    };
  };

  const siteStart=()=>{
    if(siteStreaming||siteEsRef.current) return; // guard: never open a second concurrent stream
    setSiteLog([]);setSiteSuccess(null);setSiteErr(null);setSiteStreaming(true);
    const qs=new URLSearchParams({template:siteTemplate,dry:siteDry?'1':'0'});
    if(siteSpace) qs.set('ip_space',siteSpace);
    const es=new EventSource('/api/provision/site/stream?'+qs.toString());
    siteEsRef.current=es;
    const stop=()=>{ if(siteEsRef.current){ siteEsRef.current.close(); siteEsRef.current=null; } setSiteStreaming(false); };
    es.onmessage=(e)=>{
      let j=null; try{ j=JSON.parse(e.data); }catch(parseErr){ return; }
      setSiteLog(prev=>[...prev,j]);
      if(j&&j.error){ setSiteErr(j.error); stop(); toast('Site provision failed: '+j.error,'err'); }
      else if(j&&j.done){ setSiteSuccess(j.result||null); stop(); toast('Site provisioned','ok'); }
    };
    es.onerror=()=>{
      if(!siteEsRef.current) return; // already closed via done/error message
      setSiteErr(prev=>prev||'Stream connection error');
      stop();
    };
  };

  const siteTeardownStart=()=>{
    if(siteTeardownStreaming||siteTeardownEsRef.current) return; // guard: never open a second concurrent stream
    if(!siteTeardownDry&&!isAdmin){ toast('Admin (dashboard token) required for live teardown','err'); return; }
    if(!siteTeardownDry&&!siteTeardownConfirm.trim()){ toast('Type the site name to confirm','err'); return; }
    if(!siteTeardownDry&&!window.confirm("This permanently deletes the site '"+siteTemplate+"' and its objects. Continue?")) return;
    setSiteTeardownLog([]);setSiteTeardownResult(null);setSiteTeardownErr(null);setSiteTeardownStreaming(true);
    const qs=new URLSearchParams({template:siteTemplate,dry:siteTeardownDry?'1':'0'});
    if(siteSpace) qs.set('ip_space',siteSpace);
    if(!siteTeardownDry) qs.set('confirm',siteTeardownConfirm.trim());
    const es=new EventSource('/api/teardown/site/stream?'+qs.toString());
    siteTeardownEsRef.current=es;
    const stop=()=>{ if(siteTeardownEsRef.current){ siteTeardownEsRef.current.close(); siteTeardownEsRef.current=null; } setSiteTeardownStreaming(false); };
    es.onmessage=(e)=>{
      let j=null; try{ j=JSON.parse(e.data); }catch(parseErr){ return; }
      setSiteTeardownLog(prev=>[...prev,j]);
      if(j&&j.error){ setSiteTeardownErr(j.error); stop(); toast('Site teardown failed: '+j.error,'err'); }
      else if(j&&j.done){ setSiteTeardownResult(j.result||null); stop(); toast('Site torn down','ok'); }
    };
    es.onerror=()=>{
      if(!siteTeardownEsRef.current) return; // already closed via done/error message
      setSiteTeardownErr(prev=>prev||'Stream connection error');
      stop();
    };
  };

  const seedStart=()=>{
    if(seedStreaming||seedEsRef.current) return; // guard: never open a second concurrent stream
    const regionList=Object.keys(seedRegions).filter(r=>seedRegions[r]);
    if(!regionList.length){ toast('Select at least one region','err'); return; }
    if(!seedDry&&!window.confirm('This writes many real objects to the live portal. Continue?')) return;
    setSeedLog([]);setSeedRows({});setSeedSummary(null);setSeedErr(null);setSeedStreaming(true);
    const qs=new URLSearchParams({dry:seedDry?'1':'0',regions:regionList.join(',')});
    if(seedSpace) qs.set('ip_space',seedSpace);
    const es=new EventSource('/api/provision/seed-demo/stream?'+qs.toString());
    seedEsRef.current=es;
    const stop=()=>{ if(seedEsRef.current){ seedEsRef.current.close(); seedEsRef.current=null; } setSeedStreaming(false); };
    es.onmessage=(e)=>{
      let j=null; try{ j=JSON.parse(e.data); }catch(parseErr){ return; }
      setSeedLog(prev=>[...prev,j]);
      if(j&&j.template){ setSeedRows(prev=>({...prev,[j.template]:{phase:j.phase,error:j.error}})); }
      if(j&&j.error&&!j.template){ setSeedErr(j.error); stop(); toast('Seed demo failed: '+j.error,'err'); }
      else if(j&&j.done){ setSeedSummary(j.summary||null); stop(); toast('Seed demo complete','ok'); }
    };
    es.onerror=()=>{
      if(!seedEsRef.current) return; // already closed via done/error message
      setSeedErr(prev=>prev||'Stream connection error');
      stop();
    };
  };

  const teardownStart=()=>{
    if(teardownStreaming||teardownEsRef.current) return; // guard: never open a second concurrent stream
    if(!teardownDry&&!isAdmin){ toast('Admin (dashboard token) required for live teardown','err'); return; }
    if(!teardownDry&&teardownConfirm.trim()!=='DELETE'){ toast('Type DELETE to confirm live teardown','err'); return; }
    const regionList=Object.keys(seedRegions).filter(r=>seedRegions[r]);
    if(!regionList.length){ toast('Select at least one region','err'); return; }
    if(!teardownDry&&!window.confirm('This permanently deletes every seed-created object in '+(seedSpace||'the default space')+'. Continue?')) return;
    setTeardownLog([]);setTeardownRows({});setTeardownSummary(null);setTeardownErr(null);setTeardownStreaming(true);
    const qs=new URLSearchParams({dry:teardownDry?'1':'0',regions:regionList.join(','),confirm:teardownDry?'':'DELETE'});
    if(seedSpace) qs.set('ip_space',seedSpace);
    const es=new EventSource('/api/teardown/seed-demo/stream?'+qs.toString());
    teardownEsRef.current=es;
    const stop=()=>{ if(teardownEsRef.current){ teardownEsRef.current.close(); teardownEsRef.current=null; } setTeardownStreaming(false); };
    es.onmessage=(e)=>{
      let j=null; try{ j=JSON.parse(e.data); }catch(parseErr){ return; }
      setTeardownLog(prev=>[...prev,j]);
      if(j&&j.template){ setTeardownRows(prev=>({...prev,[j.template]:{phase:j.phase,error:j.error}})); }
      if(j&&j.error&&!j.template){ setTeardownErr(j.error); stop(); toast('Teardown failed: '+j.error,'err'); }
      else if(j&&j.done){ setTeardownSummary(j.summary||null); stop(); toast('Teardown complete','ok'); }
    };
    es.onerror=()=>{
      if(!teardownEsRef.current) return; // already closed via done/error message
      setTeardownErr(prev=>prev||'Stream connection error');
      stop();
    };
  };

  // Subnet-mode "Load example": prefill the editable form from the london site
  // template's LAN subnet + open the site-template example callout. Space/Block
  // stay user-picked (live IDs). Prefill only — never opens a stream / submits.
  const loadSubnetExample=()=>{
    const ex=MARRIS_EXAMPLES.provision.subnetForm;
    setCidr(ex.cidr);setName(ex.name);setComment(ex.comment);setMakeZone(ex.makeZone);
    setExamplePanel('site');
    toast('Example loaded — review, nothing provisioned','ok',{duration:1800});
  };
  const copyExample=(obj,what)=>{
    try{ if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(JSON.stringify(obj,null,2)); }catch(e){}
    toast((what||'Example')+' copied (JSON)','ok',{duration:1500});
  };
  const resetSubnet=()=>{ setCidr(24);setName('');setComment('');setMakeZone(false);setExamplePanel(null); };
  // MarrisExamplePanel — render the named provision example as a labeled callout.
  const ExamplePanel=()=>{
    if(!examplePanel) return null;
    const P=MARRIS_EXAMPLES.provision;
    let title='', body='';
    if(examplePanel==='site'){ title='Site template — london / EMEA / production';
      body=JSON.stringify(P.site,null,2); }
    else if(examplePanel==='addressBlock'){ title='Address-block pool — Global /8 → region×env /16';
      body=JSON.stringify(P.addressBlock,null,2); }
    else { title='DNS zone — corp.example.com'; body=JSON.stringify(P.dns,null,2); }
    return <div className="marris-example">
      <div className="mx-head"><span className="mx-tag">Example</span>
        <span className="mono" style={{fontSize:'var(--t12)',color:'var(--text-dim)'}}>{title} — illustrative, not real data</span></div>
      <pre className="mx-body mono">{body}</pre>
    </div>;
  };

  return <div className="page fadein">
    <PageHeader title="Provision" subtitle="Carve new subnets or full sites from available address space"
      actions={<span className={'sev-badge '+(isAdmin?'ok':role==='operator'?'warn':'crit')}
        {...bind({title:'Your role',rows:[['What it means','Your access level. Live (non-dry-run) teardown requires admin (a dashboard token).']]})}>{role.toUpperCase()}</span>}/>
    <div className="dly-seg" role="group" aria-label="Provision mode" style={{marginBottom:'var(--s3)'}}>
      <button className={'dly-seg-btn'+(mode==='subnet'?' on':'')} onClick={()=>setMode('subnet')}
        {...bind({title:'Subnet mode',rows:[['What it does','Carve a single new subnet from a block — optionally with a matching DNS zone.']]})}>Subnet</button>
      <button className={'dly-seg-btn'+(mode==='site'?' on':'')} onClick={()=>setMode('site')}
        {...bind({title:'Full site mode',rows:[['What it does','Provision an entire site from a template: blocks, subnets, DHCP ranges and DNS zones in one run.']]})}>Full site</button>
      <button className={'dly-seg-btn'+(mode==='seed'?' on':'')} onClick={()=>setMode('seed')}
        {...bind({title:'Seed demo mode',rows:[['What it does','One-click load of demo sites, subnets and zones across regions, from the template library.']]})}>Seed demo</button>
    </div>
    {mode==='subnet'?<div className="grid-2">
      <Panel title="Request">
        <div className="form-col">
          <label className="mono field-lbl"
            {...bind({title:'IP space',rows:[['What it does','The Infoblox address container to provision the new subnet from.']]})}>
            Space
            <select className="vault-in" value={space} onChange={e=>{setSpace(e.target.value);setBlock('');}}>
              <option value="">{spacesApi.loading?'Loading spaces…':'Select a space'}</option>
              {spaces.map(sp=><option key={sp.id} value={sp.id}>{sp.name}</option>)}
            </select>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Address block',rows:[['What it does','The parent block the new subnet is carved out of.']]})}>
            Block
            <select className="vault-in" value={block} onChange={e=>setBlock(e.target.value)} disabled={!space}>
              <option value="">{blocksApi.loading?'Loading blocks…':'Select a block'}</option>
              {blocks.map(b=><option key={b.id} value={b.id}>{b.name||b.cidr||b.address}</option>)}
            </select>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Subnet size (CIDR prefix)',rows:[['What it does','Prefix length for the new subnet. Bigger number = smaller subnet.'],['Examples','/24 = 256 addresses · /26 = 64 · /30 = 4']]})}>
            CIDR
            <input className="vault-in" type="number" min="1" max="32" value={cidr} onChange={e=>setCidr(e.target.value)}/>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Name',rows:[['What it does','Label for the new subnet.']]})}>
            Name
            <input className="vault-in" value={name} onChange={e=>setName(e.target.value)} placeholder="subnet name"/>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Comment',rows:[['What it does','Optional free-text note stored on the subnet.']]})}>
            Comment
            <input className="vault-in" value={comment} onChange={e=>setComment(e.target.value)} placeholder="optional"/>
          </label>
          <label className="check-row"
            {...bind({title:'Create matching DNS zone',rows:[['What it does','Also create the forward DNS zone for this subnet — not just the address space.']]})}>
            <input type="checkbox" checked={makeZone} onChange={e=>setMakeZone(e.target.checked)}/>
            <span>Create matching DNS zone</span>
          </label>
          <label className="check-row"
            {...bind({title:'Dry-run',rows:[['What it does','Preview every provisioning step and make NO changes. Turn off to actually create.']]})}>
            <input type="checkbox" checked={dry} onChange={e=>setDry(e.target.checked)}/>
            <span>Dry-run (no changes made)</span>
          </label>
          <div style={{display:'flex',alignItems:'center',gap:'var(--s2)'}}>
            <button className="btn" disabled={streaming||!space} onClick={start}
              {...bind({title:'Provision',rows:[['What it does','Run the provision (or its dry-run preview); each step streams live in the log.']]})}>{streaming?'Provisioning…':'Provision'}</button>
            <KebabMenu label="More provision actions" items={[
              {label:'Load example', run:loadSubnetExample},
              {label:'Copy example (JSON)', run:()=>copyExample(MARRIS_EXAMPLES.provision.site,'Site template')},
              {label:'Reset form', run:resetSubnet},
            ]}/>
          </div>
          <ExamplePanel/>
        </div>
      </Panel>
      <Panel title={<span {...bind({title:'Live log',rows:[['What it does','Live output of each provisioning step, streamed from the server via SSE as it runs.']]})}>Live log</span>}>
        {log.length===0
          ? <div className="dt-empty">No output yet</div>
          : <div className="mono" style={{display:'flex',flexDirection:'column',gap:2,fontSize:'var(--t12)',maxHeight:'var(--panel-md)',overflow:'auto'}}>
              {log.map((l,i)=><div key={i} style={{color:l.error?'var(--crit)':l.done?'var(--ok)':'var(--text-dim)'}}>
                {l.error?('✕ '+l.error):l.done?('✓ done — subnet '+((l.subnet&&(l.subnet.address||l.subnet.id))||'')):(l.step||JSON.stringify(l))}
              </div>)}
            </div>}
      </Panel>
      {success?<Panel title="Success">
        <div className="mono" style={{fontSize:'var(--t12)'}}>
          Subnet id: {success.id ?? '—'} · {success.address||''}{success.cidr?('/'+success.cidr):''}
        </div>
      </Panel>:null}
      {streamErr?<Panel title="Error"><div className="mono" style={{color:'var(--crit)'}}>{streamErr}</div></Panel>:null}
    </div>:null}
    {mode==='site'?<div className="grid-2">
      <Panel title="Request">
        <div className="form-col">
          <label className="mono field-lbl"
            {...bind({title:'IP space override',rows:[['What it does','Provision into this space instead of the template default. Blocks inside are found by Region + Environment + Status=available tags — no hardcoded CIDR.']]})}>
            IP space (override)
            <select className="vault-in" value={siteSpace} onChange={e=>setSiteSpace(e.target.value)}>
              <option value="">— template default —</option>
              {spaces.map(sp=><option key={sp.id} value={sp.name}>{sp.name}</option>)}
            </select>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'Site template',rows:[['What it does','The site blueprint to provision. Its Region / Environment tags decide which available block gets used.'],['Format','name — Region/Environment (invalid templates are marked).']]})}>
            Template
            <select className="vault-in" value={siteTemplate} onChange={e=>setSiteTemplate(e.target.value)}>
              <option value="">{templatesApi.loading?'Loading templates…':'Select a template'}</option>
              {templates.map(t=><option key={t.name} value={t.name}>
                {t.name+' — '+(t.region||'')+'/'+(t.environment||'')+(t.valid===false?' (invalid)':'')}
              </option>)}
            </select>
          </label>
          <label className="check-row"
            {...bind({title:'Dry-run',rows:[['What it does','Preview every step of the site build and make NO changes. Turn off to actually provision.']]})}>
            <input type="checkbox" checked={siteDry} onChange={e=>setSiteDry(e.target.checked)}/>
            <span>Dry-run (no changes made)</span>
          </label>
          <div style={{display:'flex',alignItems:'center',gap:'var(--s2)'}}>
            <button className="btn" disabled={siteStreaming||!siteTemplate} onClick={siteStart}
              {...bind({title:'Provision site',rows:[['What it does','Build the whole site from the template — blocks, subnets, DHCP ranges and DNS zones — or preview it as a dry-run.']]})}>{siteStreaming?'Provisioning…':'Provision site'}</button>
            <KebabMenu label="More site actions" items={[
              {label:'Load site example', run:()=>setExamplePanel('site')},
              {label:'Load address-block example', run:()=>setExamplePanel('addressBlock')},
              {label:'Load DNS example', run:()=>setExamplePanel('dns')},
              {label:'Copy site template (JSON)', run:()=>copyExample(MARRIS_EXAMPLES.provision.site,'Site template')},
            ]}/>
          </div>
          <ExamplePanel/>
          <div style={{borderTop:'1px solid var(--border)',marginTop:'var(--s3)',paddingTop:'var(--s3)',display:'flex',flexDirection:'column',gap:'var(--s3)'}}>
            <div className="mono" style={{fontSize:'var(--t11)',color:'var(--crit)'}}
              {...bind({title:'Tear down / decommission',rows:[['What it does','Undo a site provision — permanently delete every object it created.']]})}>
              Tear down this site — permanently deletes its provisioned objects.
            </div>
            <label className="check-row"
              {...bind({title:'Dry-run',rows:[['What it does','Preview the teardown only — nothing is deleted. Turn off (admin) to actually decommission.']]})}>
              <input type="checkbox" checked={siteTeardownDry} onChange={e=>setSiteTeardownDry(e.target.checked)}/>
              <span>Dry-run (no changes made)</span>
            </label>
            {!siteTeardownDry?(isAdmin?<label className="mono field-lbl"
              {...bind({title:'Confirm teardown',rows:[['What it does','Type the site name to unlock the live teardown — a safety gate against accidental deletion.']]})}>
              Type the site name to confirm
              <input className="vault-in" value={siteTeardownConfirm} onChange={e=>setSiteTeardownConfirm(e.target.value)} placeholder={siteTemplate||'site name'}/>
            </label>:<div className="mono" style={{fontSize:'var(--t11)',color:'var(--warn)'}}>Admin (dashboard token) required for live teardown</div>):null}
            <button className="btn" disabled={siteTeardownStreaming||!siteTemplate||(!siteTeardownDry&&(!isAdmin||!siteTeardownConfirm.trim()))} onClick={siteTeardownStart}
              {...bind({title:'Tear down this site',rows:[['What it does','Permanently delete this site\'s provisioned objects. This decommissions the site.']]})}>
              {siteTeardownStreaming?'Tearing down…':'Tear down this site'}
            </button>
          </div>
        </div>
      </Panel>
      <Panel title={<span {...bind({title:'Live log',rows:[['What it does','Live per-step output of the site build, streamed from the server via SSE.']]})}>Live log</span>}>
        {siteLog.length===0
          ? <div className="dt-empty">No output yet</div>
          : <div className="mono" style={{display:'flex',flexDirection:'column',gap:2,fontSize:'var(--t12)',maxHeight:'var(--panel-md)',overflow:'auto'}}>
              {siteLog.map((l,i)=><div key={i} style={{color:l.error?'var(--crit)':l.done?'var(--ok)':'var(--text-dim)'}}>
                {l.error?('✕ '+l.error):l.done?'✓ done':(l.step||JSON.stringify(l))}
              </div>)}
            </div>}
      </Panel>
      {siteSuccess?<Panel title="Success">
        <div className="mono" style={{fontSize:'var(--t12)'}}>{JSON.stringify(siteSuccess)}</div>
      </Panel>:null}
      {siteErr?<Panel title="Error"><div className="mono" style={{color:'var(--crit)'}}>{siteErr}</div></Panel>:null}
      {siteTeardownLog.length?<Panel title="Teardown log">
        <div className="mono" style={{display:'flex',flexDirection:'column',gap:2,fontSize:'var(--t12)',maxHeight:'var(--panel-md)',overflow:'auto'}}>
          {siteTeardownLog.map((l,i)=><div key={i} style={{color:l.error?'var(--crit)':l.done?'var(--ok)':'var(--text-dim)'}}>
            {l.error?('✕ '+l.error):l.done?'✓ done':(l.step||JSON.stringify(l))}
          </div>)}
        </div>
      </Panel>:null}
      {siteTeardownResult?<Panel title="Teardown result">
        <div className="mono" style={{fontSize:'var(--t12)'}}>{JSON.stringify(siteTeardownResult)}</div>
      </Panel>:null}
      {siteTeardownErr?<Panel title="Teardown error"><div className="mono" style={{color:'var(--crit)'}}>{siteTeardownErr}</div></Panel>:null}
    </div>:null}
    {mode==='seed'?<div className="grid-2">
      <Panel title="Seed multi-region demo data">
        <div className="mono" style={{fontSize:'var(--t11)',color:'var(--text-faint)',marginBottom:'var(--s3)'}}>
          Provisions a full set of demo sites, subnets, and zones across the selected regions from the template library. Dry-run is on by default — review the plan before writing real objects.
        </div>
        <div className="form-col">
          {['amer','emea','apac'].map(r=>
            <label key={r} className="check-row"
              {...bind({title:'Region — '+r.toUpperCase(),rows:[['What it does','Include this region\'s demo sites in the seed. Region is a lifecycle tag also used to discover which blocks to provision from.']]})}>

            <div className="mono" style={{fontSize:'var(--t11)',color:'var(--crit)'}}

            </div>
            <label className="check-row"
              {...bind({title:'Dry-run',rows:[['What it does','Preview the teardown — nothing is deleted. Turn off (admin) to remove seed data.']]})}>
              <input type="checkbox" checked={teardownDry} onChange={e=>setTeardownDry(e.target.checked)}/>
              <span>Dry-run (no changes made)</span>
            </label>
            {!teardownDry?(isAdmin?<label className="mono field-lbl"
              {...bind({title:'Confirm teardown',rows:[['What it does','Type DELETE to unlock live removal of every seed-created object — a safety gate.']]})}>
              Type DELETE to confirm
              <input className="vault-in" value={teardownConfirm} onChange={e=>setTeardownConfirm(e.target.value)} placeholder="DELETE"/>
            </label>:<div className="mono" style={{fontSize:'var(--t11)',color:'var(--warn)'}}>Admin (dashboard token) required for live teardown</div>):null}
            <button className="btn" disabled={teardownStreaming||(!teardownDry&&(!isAdmin||teardownConfirm.trim()!=='DELETE'))} onClick={teardownStart}
              {...bind({title:'Tear down demo',rows:[['What it does','Permanently delete every seed-created object in the target space.']]})}>
              {teardownStreaming?'Tearing down…':'Tear down demo'}
            </button>
          </div>
        </div>
      </Panel>
      <Panel title={<span {...bind({title:'Progress',rows:[['What it does','Per-template status as each demo site is provisioned.']]})}>Progress</span>}>
        {Object.keys(seedRows).length===0
          ? <div className="dt-empty">No output yet</div>
          : <div style={{display:'flex',flexDirection:'column',gap:2}}>
              {Object.entries(seedRows).map(([tpl,row])=>
                <div key={tpl} className="mono" style={{fontSize:'var(--t12)',color:row.error?'var(--crit)':'var(--text-dim)'}}>
                  {tpl}: {row.error?('✕ '+row.error):(row.phase||'…')}
                </div>)}
            </div>}
      </Panel>
      <Panel title={<span {...bind({title:'Live log',rows:[['What it does','Live per-step output of the seed run, streamed from the server via SSE.']]})}>Live log</span>}>
        {seedLog.length===0
          ? <div className="dt-empty">No output yet</div>
          : <div className="mono" style={{display:'flex',flexDirection:'column',gap:2,fontSize:'var(--t12)',maxHeight:'var(--panel-md)',overflow:'auto'}}>
              {seedLog.map((l,i)=><div key={i} style={{color:l.error?'var(--crit)':l.done?'var(--ok)':'var(--text-dim)'}}>
                {l.error?(l.template?('✕ '+l.template+': '+l.error):('✕ '+l.error)):l.done?'✓ done':(l.template?(l.template+' — '+(l.phase||'')):JSON.stringify(l))}
              </div>)}
            </div>}
      </Panel>
      {seedSummary?<Panel title="Summary">
        <div className="mono" style={{fontSize:'var(--t12)'}}>
          Succeeded: {seedSummary.succeeded ?? 0} · Failed: {seedSummary.failed ?? 0} · Skipped: {seedSummary.skipped ?? 0}
        </div>
      </Panel>:null}
      {seedErr?<Panel title="Error"><div className="mono" style={{color:'var(--crit)'}}>{seedErr}</div></Panel>:null}
      <Panel title="Teardown progress">
        {Object.keys(teardownRows).length===0
          ? <div className="dt-empty">No output yet</div>
          : <div style={{display:'flex',flexDirection:'column',gap:2}}>
              {Object.entries(teardownRows).map(([tpl,row])=>
                <div key={tpl} className="mono" style={{fontSize:'var(--t12)',color:row.error?'var(--crit)':'var(--text-dim)'}}>
                  {tpl}: {row.error?('✕ '+row.error):(row.phase||'…')}
                </div>)}
            </div>}
      </Panel>
      <Panel title="Teardown log">
        {teardownLog.length===0
          ? <div className="dt-empty">No output yet</div>
          : <div className="mono" style={{display:'flex',flexDirection:'column',gap:2,fontSize:'var(--t12)',maxHeight:'var(--panel-md)',overflow:'auto'}}>
              {teardownLog.map((l,i)=><div key={i} style={{color:l.error?'var(--crit)':l.done?'var(--ok)':'var(--text-dim)'}}>
                {l.error?(l.template?('✕ '+l.template+': '+l.error):('✕ '+l.error)):l.done?'✓ done':(l.template?(l.template+' — '+(l.phase||'')):(l.step||JSON.stringify(l)))}
              </div>)}
            </div>}
      </Panel>
      {teardownSummary?<Panel title="Teardown summary">
        <div className="mono" style={{fontSize:'var(--t12)'}}>
          Succeeded: {teardownSummary.succeeded ?? 0} · Failed: {teardownSummary.failed ?? 0} · Skipped: {teardownSummary.skipped ?? 0}
        </div>
      </Panel>:null}
      {teardownErr?<Panel title="Teardown error"><div className="mono" style={{color:'var(--crit)'}}>{teardownErr}</div></Panel>:null}
    </div>:null}
  </div>;
}
