<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BloxSmith</title>
<script src="react.min.js"></script>
<script src="react-dom.min.js"></script>
<script src="babel.min.js"></script>
<script>
/* no-flash theme boot — runs before styles parse. bx.theme is stored as JSON
   ("light"/"dark") by the LS helper, so strip quotes defensively. */
try{
  var _t=localStorage.getItem('bx.theme');
  if(_t){_t=_t.replace(/^"|"$/g,'');}
  if(_t!=='light'&&_t!=='dark'){
    _t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';
  }
  document.documentElement.dataset.theme=_t;
  var _d=localStorage.getItem('bx.density');
  if(_d){_d=_d.replace(/^"|"$/g,'');}
  if(_d!=='comfortable'&&_d!=='compact'){_d='compact';}
  document.documentElement.dataset.density=_d;
}catch(e){document.documentElement.dataset.theme='dark';document.documentElement.dataset.density='compact';}
</script>
<style>
@font-face{font-family:'Geist';src:url('Geist-400.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'Geist';src:url('Geist-500.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap;}
@font-face{font-family:'Geist';src:url('Geist-600.woff2') format('woff2');font-weight:600;font-style:normal;font-display:swap;}
@font-face{font-family:'Geist';src:url('Geist-700.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap;}
@font-face{font-family:'GeistMono';src:url('GeistMono-400.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'GeistMono';src:url('GeistMono-500.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap;}

:root{
  color-scheme:dark;
  --bg:#000; --surface:#0a0a0a; --raised:#111; --hover:#1a1a1a;
  --border:#262626; --border-strong:#333;
  --text:#ededed; --text-dim:#a1a1a1; --text-faint:#666;
  --accent:#0070f3; --accent-text:#3291ff;
  --ok:#0cce6b; --warn:#f5a623; --crit:#ff4444;
  --scrim:rgba(0,0,0,.6); --crit-tint:rgba(255,68,68,.08); --crit-tint-border:rgba(255,68,68,.3);
  --accent-contrast:#fff; --logo-chip:#fff;

  --t11:11px; --t12:12px; --t13:13px; --t14:14px; --t16:16px; --t20:20px; --t28:28px;
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s8:32px; --s12:48px;
  --r-ctl:4px; --r-panel:6px;
  --row-h:28px; --dt-fs:var(--t12);
}
[data-density="comfortable"]{--row-h:32px;}
[data-theme="light"]{color-scheme:light;
  --bg:#fafafa;--surface:#fff;--raised:#f2f2f2;--hover:#e8e8e8;
  --border:#e2e2e2;--border-strong:#cfcfcf;
  --text:#171717;--text-dim:#525252;--text-faint:#737373;
  --accent:#0070f3;--accent-text:#0057c2;
  --ok:#047857;--warn:#b45309;--crit:#dc2626;
  --scrim:rgba(0,0,0,.35);--crit-tint:rgba(220,38,38,.06);--crit-tint-border:rgba(220,38,38,.3);}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Geist',-apple-system,system-ui,sans-serif;
  font-size:var(--t13); line-height:1.45;
  color:var(--text); background:var(--bg);
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'GeistMono','SFMono-Regular',ui-monospace,monospace;font-variant-numeric:tabular-nums;}
a{color:var(--accent-text);text-decoration:none;}
button{font-family:inherit;color:inherit;cursor:pointer;}

:focus{outline:none;}
:focus-visible{box-shadow:0 0 0 1px var(--accent-text);border-radius:var(--r-ctl);}

.btn{
  display:inline-flex;align-items:center;gap:var(--s2);
  height:28px;padding:0 var(--s3);
  font-size:var(--t12);font-weight:500;
  background:var(--raised);color:var(--text);
  border:1px solid var(--border);border-radius:var(--r-ctl);
  transition:background .12s ease,border-color .12s ease;
}
.btn:hover{background:var(--hover);border-color:var(--border-strong);}
.btn-ghost{background:transparent;border-color:transparent;}
.btn-ghost:hover{background:var(--hover);border-color:var(--border);}

.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-panel);
}

/* ── top bar ── */
.topbar{
  display:flex;align-items:center;gap:var(--s4);
  height:48px;padding:0 var(--s4);
  border-bottom:1px solid var(--border);
  background:var(--surface);
  position:sticky;top:0;z-index:40;
}
.brand{display:flex;align-items:center;gap:var(--s2);flex:0 0 auto;}
.brand-logo{width:24px;height:24px;border-radius:var(--r-ctl);display:flex;align-items:center;justify-content:center;background:var(--raised);border:1px solid var(--border);overflow:hidden;}
.brand-name{font-size:var(--t13);font-weight:600;color:var(--text);}
.brand-org{font-size:var(--t12);color:var(--text-dim);}

.tabbar{
  display:flex;align-items:center;gap:var(--s1);
  flex:1 1 auto;min-width:0;overflow-x:auto;
  scrollbar-width:none;
}
.tabbar::-webkit-scrollbar{display:none;}
.tab{
  position:relative;flex:0 0 auto;
  height:48px;padding:0 var(--s3);
  display:inline-flex;align-items:center;
  font-size:var(--t12);font-weight:500;color:var(--text-dim);
  background:transparent;border:none;
  transition:color .12s ease;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);}
.tab.active::after{
  content:'';position:absolute;left:var(--s3);right:var(--s3);bottom:0;
  height:2px;background:var(--accent);
}
.topbar-right{display:flex;align-items:center;gap:var(--s3);flex:0 0 auto;margin-left:auto;}
.kbd{
  display:inline-flex;align-items:center;gap:var(--s1);
  height:26px;padding:0 var(--s2);
  font-size:var(--t11);color:var(--text-dim);
  background:var(--raised);border:1px solid var(--border);border-radius:var(--r-ctl);
}

/* ── freshness pill ── */
.fresh{
  display:inline-flex;align-items:center;gap:var(--s2);
  font-size:var(--t11);color:var(--text-faint);
}
.fresh.err{color:var(--crit);}
.fresh-retry{
  font-size:var(--t11);color:var(--accent-text);
  background:transparent;border:none;padding:0;
}

/* ── table ── */
.tbl-wrap{width:100%;overflow-x:auto;}
table.dt{width:100%;border-collapse:collapse;font-size:var(--dt-fs);}
table.dt thead th{
  text-align:left;font-weight:500;color:var(--text-dim);
  padding:0 var(--s3);height:var(--row-h);
  border-bottom:1px solid var(--border);
  white-space:nowrap;user-select:none;cursor:pointer;
  background:var(--surface);
}
table.dt thead th.num{text-align:right;}
table.dt thead th .sort-ind{color:var(--text-faint);margin-left:var(--s1);}
table.dt tbody td{
  padding:0 var(--s3);height:var(--row-h);
  border-bottom:1px solid var(--border);
  color:var(--text);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
}
table.dt tbody td.num{text-align:right;}
table.dt tbody tr{transition:background .1s ease;}
table.dt tbody tr.clickable{cursor:pointer;}
table.dt tbody tr.clickable:hover{background:var(--hover);}
.dt-empty{color:var(--text-faint);padding:var(--s3);text-align:center;}
.dt-toolbar{display:flex;align-items:center;justify-content:flex-end;padding:var(--s2) 0;}

/* ── toasts ── */
.toasts{
  position:fixed;right:var(--s4);bottom:var(--s4);z-index:80;
  display:flex;flex-direction:column;gap:var(--s2);
  max-width:340px;
}
.toast{
  padding:var(--s2) var(--s3);
  font-size:var(--t12);
  background:var(--raised);border:1px solid var(--border-strong);
  border-radius:var(--r-ctl);color:var(--text);
}
.toast.err{border-color:var(--crit);color:var(--crit);}
.toast.warn{border-color:var(--warn);}
.toast.ok{border-color:var(--border-strong);}

/* ── skeleton (no pulse) ── */
.skel{
  display:block;height:12px;border-radius:var(--r-ctl);
  background:var(--hover);opacity:.6;
}
.skel-row{height:14px;margin:var(--s2) 0;}

/* ── stub ── */
.stub{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:280px;gap:var(--s2);
  color:var(--text-faint);
  border:1px dashed var(--border);border-radius:var(--r-panel);
  margin:var(--s6);
}
.stub-name{font-size:var(--t16);font-weight:600;color:var(--text-dim);}
.stub-sub{font-size:var(--t12);color:var(--text-faint);}

.main{padding:var(--s6);width:100%;}

/* ── shared layout + synthesis primitives ── */
.page{display:flex;flex-direction:column;gap:var(--s6);}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(460px,100%),1fr));gap:var(--s6);align-items:start;min-width:0;}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(320px,100%),1fr));gap:var(--s6);align-items:start;min-width:0;}
.grid-2>*,.grid-3>*{min-width:0;}
.prose{max-width:72ch;min-width:0;overflow-wrap:anywhere;}
.band{display:flex;flex-wrap:wrap;align-items:center;gap:var(--s5);width:100%;min-width:0;padding:var(--s5);background:var(--surface);border:1px solid var(--border);border-radius:var(--r-panel);}
.band-verdict{display:flex;align-items:flex-start;gap:var(--s3);flex:1 1 320px;min-width:0;overflow-wrap:anywhere;}
.band-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;margin-top:5px;}
.band-facts{display:flex;flex-wrap:wrap;gap:var(--s6);flex:1 1 auto;min-width:0;}
.band-fact{display:flex;flex-direction:column;gap:2px;min-width:0;}
.band-fact-l{font-size:var(--t11);color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;}
.band-fact-v{font-size:var(--t16);color:var(--text);display:inline-flex;align-items:baseline;gap:var(--s2);min-width:0;overflow-wrap:anywhere;}
.band-chips{display:flex;flex-wrap:wrap;gap:var(--s2);flex:0 1 auto;min-width:0;align-items:center;}
.band-chip{cursor:pointer;}
.band-chip:hover{border-color:var(--border-strong);color:var(--text);}

.chip{
  display:inline-flex;align-items:center;height:20px;padding:0 var(--s2);
  font-size:var(--t11);color:var(--text-dim);
  background:var(--raised);border:1px solid var(--border);border-radius:var(--r-ctl);
}

/* command palette stub */
.palette-scrim{position:fixed;inset:0;z-index:90;background:var(--scrim);display:flex;align-items:flex-start;justify-content:center;padding-top:12vh;}
.palette{width:min(560px,92vw);}
.palette-in{width:100%;height:44px;padding:0 var(--s4);font-size:var(--t14);color:var(--text);background:var(--raised);border:1px solid var(--border-strong);border-radius:var(--r-panel);}
.palette-body{padding:var(--s3);color:var(--text-faint);font-size:var(--t12);}

/* row-level focus ring for keyboard-tabbable clickable rows */
table.dt tbody tr.clickable:focus-visible{box-shadow:inset 0 0 0 1px var(--accent-text);}

/* ── power layer: keyboard cursor, row flash, selection, peek, action bar ── */
table.dt tbody tr.cursor{background:var(--hover);box-shadow:inset 2px 0 0 var(--accent);}
@keyframes bx-flash{0%{background:var(--hover);}100%{background:transparent;}}
table.dt tbody tr.flash{animation:bx-flash .4s ease;}
table.dt td.dt-check,table.dt th.dt-check{width:28px;text-align:center;padding:0 var(--s2);cursor:default;}
table.dt td.dt-check input,table.dt th.dt-check input{cursor:pointer;vertical-align:middle;}
.dt-filter{height:26px;padding:0 var(--s2);font-size:var(--t12);color:var(--text);background:var(--raised);border:1px solid var(--border);border-radius:var(--r-ctl);min-width:200px;}
.dt-filter:focus{border-color:var(--accent);}
.spark{display:inline-block;vertical-align:middle;}

.action-bar{
  position:fixed;left:50%;bottom:var(--s5);transform:translateX(-50%);z-index:75;
  display:flex;align-items:center;gap:var(--s3);flex-wrap:wrap;
  padding:var(--s2) var(--s3);
  background:var(--raised);border:1px solid var(--border-strong);border-radius:var(--r-panel);
  animation:ab-in .16s ease;
}
@keyframes ab-in{from{transform:translate(-50%,120%);opacity:0;}}
.ab-count{font-size:var(--t12);color:var(--text-dim);padding-right:var(--s2);border-right:1px solid var(--border);}
.ab-confirm{display:inline-flex;align-items:center;gap:var(--s2);font-size:var(--t12);color:var(--text-dim);}

.toast{display:flex;align-items:center;gap:var(--s3);justify-content:space-between;}
.toast-action{font-size:var(--t12);font-weight:500;color:var(--accent-text);background:transparent;border:none;padding:0;flex:0 0 auto;}

.peek{
  position:fixed;top:48px;right:0;bottom:0;width:min(420px,100vw);
  background:var(--surface);border-left:1px solid var(--border);
  z-index:70;overflow-y:auto;animation:peek-in .16s ease;
  display:flex;flex-direction:column;
}
@keyframes peek-in{from{transform:translateX(100%);}}
.peek-head{display:flex;align-items:center;justify-content:space-between;gap:var(--s3);padding:var(--s3) var(--s4);border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);}
.peek-title{font-size:var(--t13);font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.peek-close{height:24px;width:24px;display:inline-flex;align-items:center;justify-content:center;font-size:var(--t14);color:var(--text-dim);background:transparent;border:1px solid var(--border);border-radius:var(--r-ctl);flex:0 0 auto;}
.peek-close:hover{color:var(--text);border-color:var(--border-strong);}
.peek-body{flex:1 1 auto;padding:var(--s4);min-width:0;}
.peek-foot{padding:var(--s3) var(--s4);border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--surface);}
.peek-full{font-size:var(--t12);color:var(--accent-text);background:transparent;border:none;padding:0;}

@media (max-width:768px){
  .brand-org{display:none;}
  .main{padding:var(--s4);}
}
@media (max-width:640px){
  .hide-sm{display:none;}
  .kbd{display:none;}
  .topbar-right .acct-trigger{max-width:140px;}
  .topbar{gap:var(--s2);padding:0 var(--s2);}
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{transition:none!important;animation:none!important;}
}
</style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ─────────────────────────────────────────────────────────────
   1. LS — namespaced (bx.) localStorage JSON helper
   ───────────────────────────────────────────────────────────── */
const LS={
  get(key,fallback){
    try{const v=localStorage.getItem('bx.'+key);return v==null?fallback:JSON.parse(v);}
    catch(e){return fallback;}
  },
  set(key,val){
    try{localStorage.setItem('bx.'+key,JSON.stringify(val));}catch(e){}
  },
  del(key){try{localStorage.removeItem('bx.'+key);}catch(e){}},
};

/* downloadCSV — ported verbatim from prior build (helper for DataTable) */
function downloadCSV(filename, rows, columns){
  const header=columns.map(c=>JSON.stringify(c.label||c.key||c)).join(',');
  const body=rows.map(r=>columns.map(c=>JSON.stringify(r[c.key]??'')).join(',')).join('\n');
  const blob=new Blob([header+'\n'+body],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ─────────────────────────────────────────────────────────────
   2. useApi — fetch hook with vault-lock handling.
   Locked-handling pattern ported from prior build: a JSON body of
   {locked:true} or {error:'vault locked'}, or HTTP 503, is treated as
   "locked" (NOT an error) and dispatches window 'bx:vault-locked' so
   App can re-check /api/vault/status. Any other non-OK → error string.
   ───────────────────────────────────────────────────────────── */
function useApi(url,{poll}={}){
  const [data,setData]=useState(null);
  const [error,setError]=useState(null);
  const [locked,setLocked]=useState(false);
  const [loading,setLoading]=useState(!!url);
  const [fetchedAt,setFetchedAt]=useState(null);
  const [tick,setTick]=useState(0);

  const refetch=useCallback(()=>setTick(t=>t+1),[]);

  useEffect(()=>{
    if(!url) return;
    const ctrl=new AbortController();
    let alive=true;
    setLoading(true);
    fetch(url,{signal:ctrl.signal,cache:'no-store'})
      .then(async r=>{
        let body=null;
        try{body=await r.json();}catch(e){body=null;}
        if(!alive) return;
        const jsonLocked=body&&(body.locked===true||body.error==='vault locked');
        if(r.status===503||jsonLocked){
          setLocked(true);setError(null);setLoading(false);setFetchedAt(new Date());
          window.dispatchEvent(new CustomEvent('bx:vault-locked'));
          return;
        }
        if(!r.ok||(body&&body.error)){
          setError((body&&body.error)||('HTTP '+r.status));
          setLoading(false);setFetchedAt(new Date());
          return;
        }
        setLocked(false);setError(null);setData(body);setLoading(false);setFetchedAt(new Date());
      })
      .catch(e=>{
        if(e.name==='AbortError'||!alive) return;
        setError(String((e&&e.message)||e));setLoading(false);setFetchedAt(new Date());
      });
    let iv=null;
    if(poll&&poll>0) iv=setInterval(refetch,poll);
    return ()=>{alive=false;ctrl.abort();if(iv)clearInterval(iv);};
  },[url,poll,tick,refetch]);

  return {data,error,locked,fetchedAt,refetch,loading};
}

/* DataCtx — ONE shared /api/data feed. The payload is multi-MB (5000 subnets),
   so every tab refetching it on mount showed skeletons for seconds. Provider
   mounts once inside VaultGate; all tabs read this instead of their own useApi. */
const DataCtx=React.createContext(null);
function useData(){ return React.useContext(DataCtx)||{data:null,error:null,locked:false,fetchedAt:null,refetch:()=>{},loading:false}; }
function DataProvider({children}){
  const api=useApi('/api/data');
  return <DataCtx.Provider value={api}>{children}</DataCtx.Provider>;
}

/* ─────────────────────────────────────────────────────────────
   3. Freshness — "updated Ns ago" mono pill; red + Retry on error.
   ───────────────────────────────────────────────────────────── */
function relAge(at){
  if(!at) return '';
  const s=Math.max(0,Math.round((Date.now()-new Date(at).getTime())/1000));
  if(s<60) return s+'s ago';
  const m=Math.floor(s/60);if(m<60) return m+'m ago';
  const h=Math.floor(m/60);if(h<24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
function Freshness({at,onRetry,error}){
  const [,force]=useState(0);
  useEffect(()=>{const iv=setInterval(()=>force(x=>x+1),1000);return ()=>clearInterval(iv);},[]);
  if(error){
    return <span className="fresh err mono">
      failed{onRetry?<> · <button className="fresh-retry" onClick={onRetry}>Retry</button></>:null}
    </span>;
  }
  if(!at) return null;
  return <span className="fresh mono">updated {relAge(at)}</span>;
}

/* ─────────────────────────────────────────────────────────────
   4. Toast bus — global toast(msg,kind) + <Toasts/> renderer.
   Flat, 1px border, text-only (no green checkmark icons).
   ───────────────────────────────────────────────────────────── */
let _toastPush=null;let _toastSeq=0;
/* toast(msg,kind[,opts]) — opts={action:{label,run},duration}. The 2-arg form is
   unchanged (default 4000ms, no action) so every existing caller is untouched. */
function toast(msg,kind,opts){
  if(_toastPush) _toastPush({id:++_toastSeq,msg,kind:kind||'ok',
    action:opts&&opts.action,duration:(opts&&opts.duration)||4000});
}
function Toasts(){
  const [items,setItems]=useState([]);
  useEffect(()=>{
    _toastPush=(t)=>{
      setItems(list=>[...list,t]);
      setTimeout(()=>setItems(list=>list.filter(x=>x.id!==t.id)),t.duration||4000);
    };
    return ()=>{_toastPush=null;};
  },[]);
  const dismiss=id=>setItems(list=>list.filter(x=>x.id!==id));
  return <div className="toasts" role="status" aria-live="polite" aria-atomic="false"
    style={items.length?null:{pointerEvents:'none'}}>
    {items.map(t=><div key={t.id} className={'toast '+(t.kind||'ok')}>
      <span>{t.msg}</span>
      {t.action?<button className="toast-action" onClick={()=>{try{t.action.run();}catch(e){} dismiss(t.id);}}>{t.action.label}</button>:null}
    </div>)}
  </div>;
}

/* ─────────────────────────────────────────────────────────────
   5. DataTable — sortable primitive with optional CSV export.
   cols:{key,label,mono,align,render,width}
   ───────────────────────────────────────────────────────────── */
/* ── Sparkline (F7) — ~15-line SVG, normalized to the viewBox, guards flat/empty ── */
function Sparkline({values,width=72,height=18}){
  const v=Array.isArray(values)?values.filter(x=>typeof x==='number'&&isFinite(x)):[];
  if(v.length<2) return null;
  const min=Math.min(...v),max=Math.max(...v),span=(max-min)||1;
  const pts=v.map((n,i)=>{
    const x=(i/(v.length-1))*width;
    const y=height-((n-min)/span)*height;
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  return <svg className="spark" width={width} height={height} viewBox={'0 0 '+width+' '+height} aria-hidden="true">
    <polyline fill="none" stroke="var(--accent)" strokeWidth="1.5" points={pts}/>
  </svg>;
}

/* ── PowerCtx (F1) — registry of keyboard-driven tables + peek + density.
   One global keydown listener (F2) dispatches to the active table's imperative api. ── */
const PowerCtx=React.createContext(null);
function usePower(){ return React.useContext(PowerCtx); }
function PowerProvider({children}){
  const tablesRef=useRef(new Map());   // id → {label, api:ref}
  const activeRef=useRef(null);
  const [activeId,setActiveId]=useState(null);
  const [peek,setPeekState]=useState(null);
  const peekRef=useRef(null);
  const [density,setDensityState]=useState(()=>(typeof document!=='undefined'&&document.documentElement.dataset.density)||'compact');

  const setActive=useCallback(id=>{ activeRef.current=id; setActiveId(id); },[]);
  const setPeek=useCallback(p=>{ peekRef.current=p; setPeekState(p); },[]);
  const closePeek=useCallback(()=>{ peekRef.current=null; setPeekState(null); },[]);
  const register=useCallback((id,entry)=>{ tablesRef.current.set(id,entry); if(!activeRef.current) setActive(id); },[setActive]);
  const unregister=useCallback(id=>{
    tablesRef.current.delete(id);
    if(peekRef.current&&peekRef.current.tableId===id){ peekRef.current=null; setPeekState(null); }
    if(activeRef.current===id){ setActive(tablesRef.current.keys().next().value||null); }
  },[setActive]);
  const getActive=useCallback(()=> activeRef.current?tablesRef.current.get(activeRef.current):null,[]);
  const setDensity=useCallback(v=>{ document.documentElement.dataset.density=v; LS.set('density',v); setDensityState(v); },[]);

  useEffect(()=>{
    const gg={t:0};
    const onKey=e=>{
      if(e.metaKey||e.ctrlKey||e.altKey) return; // leave ⌘K etc. alone
      const t=e.target;
      if(t&&t.closest&&t.closest('input,textarea,select,[contenteditable="true"]')) return;
      if(document.querySelector('.palette-scrim,.vault-screen,.acct-menu,.views-menu')) return;
      const entry=activeRef.current?tablesRef.current.get(activeRef.current):null;
      const api=entry&&entry.api&&entry.api.current;
      if(peekRef.current){
        if(e.key==='Escape'){ e.preventDefault(); closePeek(); return; }
        if((e.key==='j'||e.key==='ArrowDown')&&api){ e.preventDefault(); api.move(1); return; }
        if((e.key==='k'||e.key==='ArrowUp')&&api){ e.preventDefault(); api.move(-1); return; }
        return;
      }
      if(!api) return;
      let handled=false;
      if(e.key==='j'||e.key==='ArrowDown'){ api.move(1); handled=true; }
      else if(e.key==='k'||e.key==='ArrowUp'){ api.move(-1); handled=true; }
      else if(e.key==='Enter'){ handled=api.openCursor(); }
      else if(e.key==='x'){ handled=api.toggleSelect(); }
      else if(e.key==='/'){ handled=api.focusFilter(); }
      else if(e.key==='G'){ handled=api.gotoBottom(); }
      else if(e.key==='g'){ const now=Date.now(); if(now-gg.t<400){ handled=api.gotoTop(); gg.t=0; } else { gg.t=now; handled=true; } }
      else if(e.key==='Escape'){ handled=api.clearOrCursor(); }
      if(handled) e.preventDefault();
    };
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[closePeek]);

  const val={activeId,setActive,register,unregister,getActive,peek,setPeek,closePeek,density,setDensity};
  return <PowerCtx.Provider value={val}>{children}</PowerCtx.Provider>;
}

/* ── PeekDrawer (F4) — conditionally mounted (unmounted = zero width, overflow-safe).
   Focuses close on open, traps Tab, returns focus to the table wrapper on close. ── */
function PeekDrawer(){
  const power=usePower();
  const peek=power&&power.peek;
  const asideRef=useRef(null);
  const closeRef=useRef(null);
  const tid=peek?peek.tableId:null;
  useEffect(()=>{
    if(!peek) return;
    const ret=peek.returnFocus;
    if(closeRef.current) closeRef.current.focus();
    return ()=>{ if(ret&&ret.focus){ try{ret.focus();}catch(e){}} };
  },[tid]); // eslint-disable-line
  if(!peek) return null;
  const onKeyDown=e=>{
    if(e.key==='Escape'){ e.preventDefault(); power.closePeek(); return; }
    if(e.key==='Tab'&&asideRef.current){
      const f=asideRef.current.querySelectorAll('button,a[href],input,select,textarea,[tabindex]:not([tabindex="-1"])');
      if(!f.length) return;
      const first=f[0],last=f[f.length-1];
      if(e.shiftKey&&document.activeElement===first){ e.preventDefault(); last.focus(); }
      else if(!e.shiftKey&&document.activeElement===last){ e.preventDefault(); first.focus(); }
    }
  };
  return <aside className="peek" role="dialog" aria-modal="false" aria-label="Row detail"
    ref={asideRef} onKeyDown={onKeyDown}>
    <div className="peek-head">
      <span className="peek-title mono">{peek.title||'Detail'}</span>
      <button ref={closeRef} className="peek-close" aria-label="Close detail" onClick={()=>power.closePeek()}>✕</button>
    </div>
    <div className="peek-body">{peek.render?peek.render(peek.row):null}</div>
    {peek.onFull?<div className="peek-foot">
      <button className="peek-full" onClick={()=>{const f=peek.onFull;power.closePeek();f();}}>Open full view →</button>
    </div>:null}
  </aside>;
}

/* ── ActionBar (F3) — fixed bulk-action bar shown when a selection exists ── */
function ActionBar({count,actions,onClear}){
  const [confirm,setConfirm]=useState(null);
  useEffect(()=>{setConfirm(null);},[count]);
  return <div className="action-bar" role="toolbar" aria-label="Bulk actions">
    <span className="ab-count mono">{count} selected</span>
    {actions.map((a,i)=> confirm===i
      ? <span key={i} className="ab-confirm">
          <span>{typeof a.confirm==='string'?a.confirm:'Confirm?'}</span>
          <button className="btn" onClick={()=>{try{a.run&&a.run();}catch(e){} setConfirm(null);}}>Yes</button>
          <button className="btn btn-ghost" onClick={()=>setConfirm(null)}>No</button>
        </span>
      : <button key={i} className="btn" onClick={()=>a.confirm?setConfirm(i):(a.run&&a.run())}>{a.label}</button>)}
    <button className="btn btn-ghost" onClick={onClear}>Clear</button>
  </div>;
}

/* ── useRowFlash (F5) — flash(keys) tints rows for 400ms then clears ── */
function useRowFlash(){
  const [flashed,setFlashed]=useState(()=>new Set());
  const timers=useRef([]);
  const flash=useCallback(keys=>{
    const ks=(keys||[]).map(String).filter(Boolean);
    if(!ks.length) return;
    setFlashed(prev=>{const n=new Set(prev);ks.forEach(k=>n.add(k));return n;});
    const tm=setTimeout(()=>setFlashed(prev=>{const n=new Set(prev);ks.forEach(k=>n.delete(k));return n;}),400);
    timers.current.push(tm);
  },[]);
  useEffect(()=>()=>{timers.current.forEach(clearTimeout);},[]);
  return {flashed,flash};
}

/* ── DTRow (F3 perf) — memoized row so only cursor/selected/flashed rows re-render.
   cursor/selected/flash arrive as row-scoped booleans; all callbacks come off a
   stable ref (rowApi) so the memo holds across keypresses (subnet table = 5000 rows). ── */
const DTRow=React.memo(function DTRow({r,rkey,cols,rowId,isCursor,isSel,isFlash,clickable,selectable,rowApi}){
  const align=c=>c.align||(c.mono?'right':'left');
  const isNum=c=>align(c)==='right';
  return <tr id={rowId||undefined}
    className={(clickable?'clickable':'')+(isCursor?' cursor':'')+(isFlash?' flash':'')}
    aria-selected={isCursor?'true':undefined}
    role={clickable?'button':undefined} tabIndex={clickable?0:undefined}
    onClick={clickable?()=>rowApi.current.activate(rkey):undefined}
    onKeyDown={clickable?e=>{if(e.key==='Enter')rowApi.current.activate(rkey);}:undefined}>
    {selectable?<td className="dt-check" onClick={e=>{e.stopPropagation();rowApi.current.check(rkey,e.shiftKey);}}>
      <input type="checkbox" checked={isSel} onChange={()=>{}} aria-label="Select row"/>
    </td>:null}
    {cols.map(c=>{
      let content;
      if(c.spark){ const sv=c.spark(r); content=(Array.isArray(sv)&&sv.length>=2)?<Sparkline values={sv}/>:(c.render?c.render(r[c.key],r):'—'); }
      else content=c.render?c.render(r[c.key],r):(r[c.key]??'');
      return <td key={c.key} className={(isNum(c)?'num ':'')+(c.mono?'mono':'')+(c.hideSm?' hide-sm':'')}
        style={c.width?{width:c.width}:null}>{content}</td>;
    })}
  </tr>;
});

/* ─────────────────────────────────────────────────────────────
   5. DataTable — sortable primitive with optional CSV export.
   cols:{key,label,mono,align,render,width,spark,copy}
   New OPTIONAL power props (omitted ⇒ today's exact DOM/behavior):
     tableId, rowKey, renderPeek, selectable, bulkActions, filterable, filterKeys, initialPeekKey
   ───────────────────────────────────────────────────────────── */
function DataTable({cols,rows,defaultSort,onRowClick,csvName,
  tableId,rowKey,renderPeek,selectable,bulkActions,filterable,filterKeys,initialPeekKey}){
  const power=usePower();
  const id=tableId||(csvName?String(csvName):null);
  const [sort,setSort]=useState(defaultSort||null); // {key,dir}
  const [cursor,setCursor]=useState(-1);             // -1 = no visual until a key is pressed
  const [selected,setSelected]=useState(()=>new Set());
  const [filter,setFilter]=useState('');
  const {flashed,flash}=useRowFlash();
  const columns=cols||[];
  const data=rows||[];
  const wrapRef=useRef(null);
  const filterRef=useRef(null);
  const apiRef=useRef({});
  const lastClickRef=useRef(null);
  const initRef=useRef(false);

  const keyOf=useCallback((r,i)=>rowKey?String(rowKey(r)):String(i),[rowKey]);

  const filtered=useMemo(()=>{
    if(!filterable||!filter.trim()) return data;
    const t=filter.trim().toLowerCase();
    const keys=(filterKeys&&filterKeys.length)?filterKeys:columns.map(c=>c.key);
    return data.filter(r=>keys.some(k=>String(r[k]??'').toLowerCase().includes(t)));
  },[data,filter,filterable,filterKeys,columns]);

  const sorted=useMemo(()=>{
    if(!sort||!sort.key) return filtered;
    const {key,dir}=sort;const mul=dir==='desc'?-1:1;
    return [...filtered].sort((a,b)=>{
      const av=a?.[key],bv=b?.[key];
      if(av==null&&bv==null) return 0;
      if(av==null) return 1;if(bv==null) return -1;
      const an=typeof av==='number',bn=typeof bv==='number';
      if(an&&bn) return (av-bv)*mul;
      return String(av).localeCompare(String(bv),undefined,{numeric:true})*mul;
    });
  },[filtered,sort]);

  const toggle=(key)=>setSort(s=>{
    if(!s||s.key!==key) return {key,dir:'asc'};
    if(s.dir==='asc') return {key,dir:'desc'};
    return null;
  });

  const align=(c)=>c.align||(c.mono?'right':'left');
  const isNum=(c)=>align(c)==='right';
  const rowIdOf=i=>id?(id+'-r-'+i):null;
  const scrollTo=i=>{ const rid=rowIdOf(i); const el=rid&&document.getElementById(rid); if(el&&el.scrollIntoView) el.scrollIntoView({block:'nearest'}); };
  const openPeekAt=i=>{
    if(!power||!renderPeek) return;
    const r=sorted[i]; if(!r) return;
    power.setPeek({tableId:id,render:renderPeek,row:r,
      title:String((columns[0]&&r[columns[0].key])||keyOf(r,i)),
      onFull:onRowClick?()=>onRowClick(r,i):null, returnFocus:wrapRef.current});
  };
  const syncPeek=i=>{ if(power&&power.peek&&power.peek.tableId===id) openPeekAt(i); };
  const clearSel=()=>{ setSelected(new Set()); lastClickRef.current=null; };

  const check=(key,shift)=>{
    const i=sorted.findIndex((r,idx)=>keyOf(r,idx)===key);
    setSelected(prev=>{
      const n=new Set(prev);
      if(shift&&lastClickRef.current!=null&&i>=0){
        const a=Math.min(lastClickRef.current,i),b=Math.max(lastClickRef.current,i);
        for(let j=a;j<=b;j++) n.add(keyOf(sorted[j],j));
      } else { if(n.has(key)) n.delete(key); else n.add(key); }
      return n;
    });
    if(i>=0) lastClickRef.current=i;
  };

  const buildActions=(rws)=>{
    const acts=[];
    if(csvName) acts.push({label:'Export CSV',run:()=>downloadCSV(String(csvName)+'-selected.csv',rws,columns)});
    acts.push({label:'Copy',run:()=>{
      const col=columns.find(c=>c.copy)||columns[0]||{key:'value'};
      const txt=rws.map(r=>String(r[col.key]??'')).join('\n');
      if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt);
      toast('Copied '+rws.length+' row'+(rws.length===1?'':'s'),'ok');
    }});
    acts.push({label:'Watchlist',run:()=>{
      const prev=LS.get('watchlist',[]);
      const {tab,params}=parseHash();
      const adds=rws.map((r,i)=>({key:keyOf(r,i),label:String((columns[0]&&r[columns[0].key])||keyOf(r,i)),tab,params,added:Date.now()}));
      LS.set('watchlist',[...prev,...adds]);
      flash(adds.map(a=>a.key));
      clearSel();
      toast(adds.length+' added · Undo','ok',{duration:5000,action:{label:'Undo',run:()=>LS.set('watchlist',prev)}});
    }});
    if(typeof bulkActions==='function'){
      (bulkActions(rws)||[]).forEach(a=>acts.push({...a,run:()=>{
        const out=a.run&&a.run();
        if(a.flash) flash(rws.map((r,i)=>keyOf(r,i)));
        return out;
      }}));
    }
    return acts;
  };

  // Imperative api — reassigned each render so closures see current state.
  apiRef.current={
    move(delta){ setCursor(c=>{ let n=c<0?0:c+delta; n=Math.max(0,Math.min(sorted.length-1,n)); scrollTo(n); syncPeek(n); return n; }); return true; },
    openCursor(){ const i=cursor<0?0:cursor; const r=sorted[i]; if(!r) return false;
      if(renderPeek){ setCursor(i); openPeekAt(i); return true; }
      if(onRowClick){ onRowClick(r,i); return true; } return false; },
    toggleSelect(){ if(!selectable||cursor<0||cursor>=sorted.length) return false; check(keyOf(sorted[cursor],cursor),false); return true; },
    focusFilter(){ if(!filterable) return false; if(filterRef.current){ filterRef.current.focus(); return true; } return false; },
    gotoTop(){ if(!sorted.length) return false; setCursor(0); scrollTo(0); syncPeek(0); return true; },
    gotoBottom(){ if(!sorted.length) return false; const i=sorted.length-1; setCursor(i); scrollTo(i); syncPeek(i); return true; },
    clearOrCursor(){ if(selected.size>0){ clearSel(); return true; } if(cursor>=0){ setCursor(-1); return true; } return false; },
    activate(key){ const i=sorted.findIndex((r,idx)=>keyOf(r,idx)===key); if(i<0) return; if(onRowClick) onRowClick(sorted[i],i); },
    check,
    getState(){
      const keyRow=new Map(); data.forEach((r,i)=>keyRow.set(keyOf(r,i),r));
      const selRows=[...selected].map(k=>keyRow.get(k)).filter(Boolean);
      return {selected,selectedRows:selRows,cursorRow:(cursor>=0&&cursor<sorted.length)?sorted[cursor]:null,buildActions};
    },
  };

  // Register / unregister with the power layer (only powered when it has an id).
  useEffect(()=>{
    if(!id||!power) return;
    power.register(id,{label:String(csvName||id),api:apiRef});
    return ()=>power.unregister(id);
  },[id]); // eslint-disable-line

  // Keep the cursor in range when the visible list shrinks.
  useEffect(()=>{ setCursor(c=>c>=sorted.length?sorted.length-1:c); },[sorted.length]);

  // initialPeekKey → open peek once for the matching row (nav {peek:key} handoff).
  useEffect(()=>{
    if(initRef.current||!initialPeekKey||!renderPeek) return;
    const i=sorted.findIndex((r,idx)=>keyOf(r,idx)===String(initialPeekKey));
    if(i>=0){ initRef.current=true; setCursor(i); openPeekAt(i); }
  },[initialPeekKey,sorted]); // eslint-disable-line

  const allKeys=sorted.map((r,i)=>keyOf(r,i));
  const allSel=allKeys.length>0&&allKeys.every(k=>selected.has(k));
  const toggleAll=()=>setSelected(prev=>{ const n=new Set(prev); if(allSel) allKeys.forEach(k=>n.delete(k)); else allKeys.forEach(k=>n.add(k)); return n; });

  const showToolbar=csvName||filterable;
  return <div ref={wrapRef}
    tabIndex={id?0:undefined}
    aria-activedescendant={(id&&cursor>=0)?rowIdOf(cursor):undefined}
    onMouseEnter={id&&power?()=>power.setActive(id):undefined}
    onFocus={id&&power?()=>power.setActive(id):undefined}
    style={id?{outline:'none'}:undefined}>
    {showToolbar&&<div className="dt-toolbar" style={filterable?{justifyContent:'space-between'}:null}>
      {filterable?<input ref={filterRef} className="dt-filter mono" value={filter}
        onChange={e=>setFilter(e.target.value)} placeholder="Filter…" aria-label="Filter rows"/>:null}
      {csvName?<button className="btn btn-ghost" onClick={()=>downloadCSV(String(csvName)+'.csv',sorted,columns)}>CSV</button>:null}
    </div>}
    <div className="tbl-wrap">
      <table className="dt">
        <thead><tr>
          {selectable?<th className="dt-check"><input type="checkbox" checked={allSel} onChange={toggleAll} aria-label="Select all rows"/></th>:null}
          {columns.map(c=><th key={c.key} className={(isNum(c)?'num':'')+(c.hideSm?' hide-sm':'')}
            style={c.width?{width:c.width}:null} onClick={()=>toggle(c.key)}>
            {c.label||c.key}
            <span className="sort-ind">{sort&&sort.key===c.key?(sort.dir==='asc'?'↑':'↓'):''}</span>
          </th>)}
        </tr></thead>
        <tbody>
          {sorted.length===0
            ? <tr><td className="dt-empty" colSpan={(columns.length||1)+(selectable?1:0)}>No data</td></tr>
            : sorted.map((r,ri)=>{
                const rk=keyOf(r,ri);
                return <DTRow key={rk} r={r} rkey={rk} cols={columns} rowId={rowIdOf(ri)}
                  isCursor={ri===cursor} isSel={selected.has(rk)} isFlash={flashed.has(rk)}
                  clickable={!!onRowClick} selectable={!!selectable} rowApi={apiRef}/>;
              })}
        </tbody>
      </table>
    </div>
    {selectable&&selected.size>0?<ActionBar count={selected.size} actions={buildActions(apiRef.current.getState().selectedRows)} onClear={clearSel}/>:null}
  </div>;
}

/* 9. Skeleton loader (shimmer-free). */
function Skeleton({rows=4}){
  const widths=[62,88,50,74,42,68];
  return <div aria-busy="true" aria-label="Loading" style={{padding:'6px 2px'}}>
    {Array.from({length:rows}).map((_,i)=>
      <span key={i} className="skel skel-row" style={{width:widths[i%widths.length]+'%'}}/>)}
  </div>;

/* ─────────────────────────────────────────────────────────────
   6. Hash router — parse #tab?k=v. Legacy redirects. nav() helper.
   ───────────────────────────────────────────────────────────── */
const TABS=['overview','daily','network','dns','infra','security','audit','ask'];
const TAB_LABELS={overview:'Overview',daily:'Daily',network:'Network',dns:'DNS',infra:'Infra',security:'Security',audit:'Audit',ask:'Ask'};
const LEGACY={home:'overview',map:'network',dhcp:'network',ipam:'network',dns:'dns',
  security:'security',assets:'infra',audit:'audit',search:'ask',hub:'overview',
  summary:'daily',trends:'daily'};

function parseHash(){
  let h=(location.hash||'').replace(/^#/,'');
  if(!h) return {tab:'overview',params:{}};
  const qi=h.indexOf('?');
  let tab=qi>=0?h.slice(0,qi):h;
  const qs=qi>=0?h.slice(qi+1):'';
  if(LEGACY[tab]) tab=LEGACY[tab];
  if(!TABS.includes(tab)) tab='overview';
  const params={};
  if(qs) new URLSearchParams(qs).forEach((v,k)=>{params[k]=v;});
  return {tab,params};
}
function nav(tab,params){
  const t=LEGACY[tab]||tab;
  let h='#'+t;
  if(params&&Object.keys(params).length){
    h+='?'+new URLSearchParams(params).toString();
  }
  location.hash=h;
}
function useRoute(){
  const [route,setRoute]=useState(parseHash());
  useEffect(()=>{
    const on=()=>setRoute(parseHash());
    window.addEventListener('hashchange',on);
    return ()=>window.removeEventListener('hashchange',on);
  },[]);
  return route;
}

// Ordered logo sources tried by BrandLogoImg — browser <img> sends Referer so Brandfetch works
function buildLogoSources(domain){
  return [
    '/api/logo',
    `https://cdn.brandfetch.io/${domain}/w/128/h/128`,
    `https://www.google.com/s2/favicons?domain=${domain}&sz=128`,
    `https://icons.duckduckgo.com/ip3/${domain}.ico`,
  ];
}
// BrandLogoImg: tries sources in order via onError waterfall, falls back to IB_LOGO
function BrandLogoImg({domain, fallback, alt, className, style, onClick, title}){
  const sources = domain ? buildLogoSources(domain) : [];
  const [idx, setIdx] = useState(0);
  useEffect(()=>{ setIdx(0); }, [domain]);
  const src = idx < sources.length ? sources[idx] : (fallback||IB_LOGO);
  return <img className={className} src={src} alt={alt||''} style={style}
    title={title} onClick={onClick}
    referrerPolicy="no-referrer-when-downgrade"
    onError={()=>setIdx(i=>i+1)}/>;
}
function downloadLogo(src){
  if(src.startsWith('data:')){
    const a=document.createElement('a');
    a.href=src; a.download='infoblox-logo.png'; a.click();
  } else {
    fetch(src)
      .then(r=>r.blob())
      .then(blob=>{
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url; a.download='infoblox-logo.png';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
      })
      .catch(()=>window.open(src,'_blank'));
  }
}
function extractDomain(url){
  const s=url.trim().replace(/^https?:\/?\/?/i,'').replace(/^www\./i,'').split('/')[0].split('?')[0];
  try{ return new URL('https://'+s).hostname.replace(/^www\./i,''); }
  catch(e){ return s; }
}

/* vpost — POST JSON, always resolves {ok,data} (ported verbatim). */
const vpost=(url,body)=>fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(async r=>({ok:r.ok,data:await r.json().catch(()=>({}))})).catch(()=>({ok:false,error:'network error'}));

/* AuthContext — carries vault status + accounts + brand to TopBar slots. */
const AuthCtx=React.createContext(null);
function useAuth(){ return React.useContext(AuthCtx)||{}; }

function AuthProvider({vault,onVaultChange,children}){
  const [accounts,setAccounts]=useState([]);
  const [activeAcct,setActiveAcct]=useState('');
  const [acctErr,setAcctErr]=useState('');
  const [switchingAcct,setSwitchingAcct]=useState(false);
  const [acctSearch,setAcctSearch]=useState('');
  const [brand,setBrand]=useState(()=>{const d=LS.get('orgDomain','');const n=LS.get('orgName','');return d?{domain:d,name:n}:null;});

  // CSP accounts this key can act in. Error shape: {accounts:[],active:'',error,status}.
  useEffect(()=>{
    fetch('/api/accounts',{cache:'no-store'}).then(r=>r.json()).then(d=>{
      setAccounts(d.accounts||[]);
      setActiveAcct(d.active||'');
      setAcctErr(d.error||'');
    }).catch(()=>{});
  },[]);
  // Brand override from server (only if user hasn't set one locally).
  useEffect(()=>{
    fetch('/api/brand').then(r=>r.ok?r.json():null).then(b=>{
      if(!b||!b.domain) return;
      if(!LS.get('orgDomain','')){ setBrand({domain:b.domain,name:b.name||''}); LS.set('orgDomain',b.domain); LS.set('orgName',b.name||''); }
    }).catch(()=>{});
  },[]);

  const switchAcct=async(id)=>{
    setAcctSearch('');
    if(id===activeAcct) return;
    setSwitchingAcct(true);
    try{
      const r=await fetch('/api/switch-account',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
      const d=await r.json().catch(()=>({}));
      if(r.status===403){ toast('Not allowed to switch to that account'+(d.error?': '+d.error:''),'err'); }
      else if(d.ok){
        setActiveAcct(d.active);
        LS.del('_dc');
        const nm=(accounts.find(a=>a.id===d.active)||{}).name||'account';
        toast('Switched to '+nm,'ok');
        setTimeout(()=>window.location.reload(),350);
      } else {
        toast('Account switch failed'+(d.error?': '+d.error:''),'err');
      }
    }catch{ toast('Account switch failed — server unreachable','err'); }
    setSwitchingAcct(false);
  };

  const saveBrand=(domain,name)=>{
    setBrand({domain,name});
    LS.set('orgDomain',domain); LS.set('orgName',name);
    fetch('/api/brand',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain,name})})
      .catch(()=>toast('Failed to save brand settings — server unreachable','err'));
  };

  const activeAcctName=(accounts.find(a=>a.id===activeAcct)||{}).name;
  const orgDomain=(brand&&brand.domain)||'';
  const orgName=(brand&&brand.name)||activeAcctName||'';
  const val={vault,onVaultChange,accounts,activeAcct,acctErr,switchAcct,switchingAcct,
    acctSearch,setAcctSearch,brand,saveBrand,activeAcctName,orgDomain,orgName};
  return <AuthCtx.Provider value={val}>{children}</AuthCtx.Provider>;
}

function VaultSetup({onDone}) {
  const [p1,setP1]=useState(''),[p2,setP2]=useState(''),[err,setErr]=useState(''),[busy,setBusy]=useState(false);
  const go=async()=>{ setErr('');
    if(p1.length<8){setErr('Passphrase must be at least 8 characters.');return;}
    if(p1!==p2){setErr('Passphrases do not match.');return;}
    setBusy(true); const {ok,data}=await vpost('/api/vault/init',{passphrase:p1}); setBusy(false);
    if(ok&&data.ok) onDone(); else setErr(data.error||'Setup failed.');
  };
  return (<div className="vault-screen"><div className="vault-card">
    <div className="vault-logo">BloxSmith</div>
    <h1>Create your vault</h1>
    <p>Set a passphrase to encrypt your Infoblox tenant keys at rest. It is never stored — you re-enter it after a restart to unlock. There is no recovery if you forget it.</p>
    <label htmlFor="vs-pass">Passphrase</label>
    <input id="vs-pass" className="vault-in" type="password" value={p1} onChange={e=>setP1(e.target.value)} autoFocus/>
    <label htmlFor="vs-confirm">Confirm passphrase</label>
    <input id="vs-confirm" className="vault-in" type="password" value={p2} onChange={e=>setP2(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')go();}}/>
    {err&&<div className="vault-err">{err}</div>}
    <button className="vault-btn" onClick={go} disabled={busy||!p1||!p2}>{busy?'Creating…':'Create vault'}</button>
  </div></div>);
}

function VaultUnlock({onDone}) {
  const [p,setP]=useState(''),[err,setErr]=useState(''),[busy,setBusy]=useState(false);
  const [confirmVaultReset,setConfirmVaultReset]=useState(false);
  const go=async()=>{ if(!p)return; setErr(''); setBusy(true);
    const {ok,data}=await vpost('/api/vault/unlock',{passphrase:p}); setBusy(false);
    if(ok&&data.ok) onDone(); else setErr(data.error||'Unlock failed.');
  };
  return (<div className="vault-screen"><div className="vault-card">
    <div className="vault-logo">BloxSmith</div>
    <h1>Unlock vault</h1>
    <p>Enter your passphrase to decrypt your saved tenant keys.</p>
    <label htmlFor="vu-pass">Passphrase</label>
    <input id="vu-pass" className="vault-in" type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')go();}} autoFocus/>
    {err&&<div className="vault-err">{err}</div>}
    <button className="vault-btn" onClick={go} disabled={busy||!p}>{busy?'Unlocking…':'Unlock'}</button>
    <div style={{textAlign:'center',marginTop:14}}>
      <button style={{background:'none',border:'none',color:'var(--text-faint)',fontSize:11,cursor:'pointer',textDecoration:'underline',textUnderlineOffset:'2px'}}
        onClick={()=>setConfirmVaultReset(true)}>
        Forgot passphrase? Reset vault
      </button>
    </div>
    {confirmVaultReset&&<div style={{marginTop:12,padding:'10px',border:'1px solid var(--crit-tint-border)',borderRadius:4,background:'var(--crit-tint)'}} role="dialog" aria-label="Confirm vault reset">
      <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:4}}>Reset vault?</div>
      <div style={{fontSize:11,color:'var(--text-dim)',lineHeight:1.5,marginBottom:8}}>Permanently deletes the vault and all stored keys. No recovery. You will set a new passphrase.</div>
      <div style={{display:'flex',gap:8}}>
        <button className="tc-yes" style={{width:'auto',padding:'0 10px',color:'var(--crit)',borderColor:'var(--crit)'}} onClick={async()=>{setConfirmVaultReset(false);await vpost('/api/vault/reset',{});onDone();}}>Reset vault</button>
        <button className="tc-no" style={{width:'auto',padding:'0 10px'}} autoFocus onClick={()=>setConfirmVaultReset(false)}>Cancel</button>
      </div>
    </div>}
  </div></div>);
}

function VaultAddTenant({onDone, onCancel, first, editId, editLabel}) {
  const isEdit=!!editId;
  const [key,setKey]=useState(''),[label,setLabel]=useState(editLabel||''),[err,setErr]=useState(''),[busy,setBusy]=useState(false),[test,setTest]=useState('');
  const go=async()=>{ if(!key)return; setErr(''); setBusy(true);
    const {ok,data}=isEdit
      ? await vpost('/api/vault/tenant-update',{id:editId,label,key})
      : await vpost('/api/vault/tenant',{label,key});
    setBusy(false);
    if(ok&&data.ok) onDone(); else setErr(data.error||(isEdit?'Could not replace key.':'Could not add connection.'));
  };
  const doTest=async()=>{ if(!key)return; setTest('Testing…');
    const {ok,data}=await vpost('/api/vault/test-key',{key});
    setTest(ok&&data.ok ? ('Key valid'+(data.name?(' — '+data.name):' (no account name)')) : ('Invalid: '+(data.error||'rejected')));
  };
  useEffect(()=>{ if(!onCancel)return; const h=e=>{if(e.key==='Escape')onCancel();}; window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h); },[onCancel]);
  return (<div className="vault-screen" onClick={onCancel?()=>onCancel():undefined}><div className="vault-card" onClick={e=>e.stopPropagation()}>
    <div className="vault-logo">BloxSmith</div>
    <h1>{isEdit?`Replace key for ${editLabel||'connection'}`:(first?'Add your first connection':'Add a connection')}</h1>
    <p>{isEdit
      ? 'Paste a new Infoblox API key for this connection — e.g. when the old one was rejected or lacks account access. The connection re-names itself from the new key.'
      : 'Paste an Infoblox API key. The key is encrypted in your vault, and the connection is named automatically from its CSP account.'}</p>
    <label htmlFor="vat-key">Infoblox API key</label>
    <input id="vat-key" className="vault-in" type="password" value={key} onChange={e=>{setKey(e.target.value);setTest('');}} onKeyDown={e=>{if(e.key==='Enter')go();}} placeholder="paste token (any format — Token/Bearer prefix optional)" autoFocus/>
    <label htmlFor="vat-name">Name (optional — auto-named from the portal if blank)</label>
    <input id="vat-name" className="vault-in" value={label} onChange={e=>setLabel(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')go();}} placeholder="leave blank to use the CSP account name"/>
    {test&&<div style={{fontSize:11,marginTop:8,color:test.startsWith('Key valid')?'var(--ok)':(test==='Testing…'?'var(--text-dim)':'var(--crit)')}}>{test}</div>}
    {err&&<div className="vault-err">{err}</div>}
    <button className="vault-btn" onClick={go} disabled={busy||!key}>{busy?(isEdit?'Replacing…':'Adding…'):(isEdit?'Replace key':'Add connection')}</button>
    <button className="vault-cancel" onClick={doTest} disabled={!key}>Test key</button>
    {onCancel&&<button className="vault-cancel" onClick={onCancel}>Cancel</button>}
  </div></div>);
}

function VaultSettings({llm, onDone, onCancel}) {
  const [key,setKey]=useState(''),[base,setBase]=useState((llm&&llm.base_url)||''),[model,setModel]=useState((llm&&llm.model)||''),[busy,setBusy]=useState(false),[err,setErr]=useState(''),[test,setTest]=useState('');
  const applyPreset=name=>{ const p=LLM_PRESETS[name]; if(p){setBase(p.base_url);setModel(p.model);setTest('');} };
  const go=async()=>{ setErr(''); setBusy(true);
    const {ok,data}=await vpost('/api/vault/llm',{key,base_url:base,model}); setBusy(false);
    if(ok&&data.ok) onDone(); else setErr(data.error||'Could not save.');
  };
  const doTest=async()=>{ setTest('Testing…');
    const {ok,data}=await vpost('/api/vault/llm-test',{key,base_url:base,model});
    setTest(ok&&data.ok ? ('Connection OK — '+(data.model||'default model')) : ('Failed: '+(data.error||'error')));

    </select>
    <label htmlFor="llm-key">API key{llm&&llm.hasKey?' (leave blank to keep current)':''}</label>
    <input id="llm-key" className="vault-in" type="password" value={key} onChange={e=>{setKey(e.target.value);setTest('');}} placeholder={llm&&llm.hasKey?'•••••••• (unchanged)':'gsk_… / sk-… / sk-ant-…'}/>

/* VaultGate — decision tree (ported verbatim). Wraps unlocked children in
   AuthProvider so TopBar slots see accounts/brand. Re-checks on bx:vault-locked. */
function VaultGate({children}){
  const [st,setSt]=useState(null);
  const refresh=useCallback(()=>fetch('/api/vault/status',{cache:'no-store'}).then(r=>r.json()).then(setSt).catch(()=>setSt({vaultMode:false})),[]);
  useEffect(()=>{refresh();},[refresh]);
  useEffect(()=>{
    const on=()=>refresh();
    window.addEventListener('bx:vault-locked',on);
    return ()=>window.removeEventListener('bx:vault-locked',on);
  },[refresh]);
  if(!st) return <div className="vault-boot"><div className="vault-spinner"/></div>;
  const wrap=kids=><AuthProvider vault={st} onVaultChange={refresh}>{kids}</AuthProvider>;
  if(!st.vaultMode) return wrap(children);
  if(st.ready)      return wrap(children);
  if(!st.exists)    return <VaultSetup onDone={refresh}/>;
  if(!st.unlocked)  return <VaultUnlock onDone={refresh}/>;
  return <VaultAddTenant first onDone={refresh}/>;
}

/* ─────────────────────────────────────────────────────────────
   SHARED SYNTHESIS PRIMITIVES — answer-first band, signed deltas, and a
   day-over-day snapshot store. Consumed by every tab (not a region body).
   ───────────────────────────────────────────────────────────── */

/* Delta — signed mono +N / −N. `good` names the improving direction
   ('up'|'down'); green when v moves that way, red when against, faint at 0. */
function Delta({v,good}){
  if(v==null) return <span className="mono" style={{color:'var(--text-faint)'}}>—</span>;
  const n=Number(v);
  if(!isFinite(n)) return <span className="mono" style={{color:'var(--text-faint)'}}>—</span>;
  const dir=good==='down'?-1:1;
  const moved=n*dir; // >0 = moved the good way
  const color=n===0?'var(--text-faint)':(moved>0?'var(--ok)':'var(--crit)');
  const sign=n>0?'+':(n<0?'−':'');
  return <span className="mono" style={{color}}>{sign}{Math.abs(n)}</span>;
}

/* SynthBand — full-width answer-first band. Renders with partial/missing
   facts (shows —) and never throws.
   facts: [{label,value,delta}] where delta is a number (good='up') or {v,good}.
   chips: [{label,onClick}]. */
function SynthBand({tone,verdict,facts,chips}){
  const dot=tone==='crit'?'var(--crit)':tone==='warn'?'var(--warn)':'var(--ok)';
  const fx=Array.isArray(facts)?facts:[];
  const cx=Array.isArray(chips)?chips:[];
  return <div className="band" role="status">
    <div className="band-verdict">
      <span className="band-dot" style={{background:dot}}/>
      <span className="prose" style={{fontSize:16,fontWeight:600,lineHeight:1.4}}>{verdict||'—'}</span>
    </div>
    {fx.length?<div className="band-facts">
      {fx.map((f,i)=>{
        const d=f&&f.delta;
        const hasV=f&&f.value!=null&&f.value!=='';
        return <div className="band-fact" key={i}>
          <span className="band-fact-l">{f&&f.label!=null?f.label:'—'}</span>
          <span className="band-fact-v mono">
            {hasV?f.value:'—'}
            {d!=null?<Delta v={typeof d==='object'?d.v:d} good={typeof d==='object'?d.good:'up'}/>:null}
          </span>
        </div>;
      })}
    </div>:null}
    {cx.length?<div className="band-chips">
      {cx.map((c,i)=><button className="chip band-chip" key={i}
        style={{cursor:c&&c.onClick?'pointer':'default'}}
        onClick={c&&c.onClick?c.onClick:undefined}>{c&&c.label!=null?c.label:'—'}</button>)}
    </div>:null}
  </div>;
}

/* Snapshot store — one row per calendar day (last 30), for day-over-day deltas. */
const snapKey='snap';
function todayISO(){ return new Date().toISOString().slice(0,10); }
function readSnaps(){
  const s=LS.get(snapKey,null);
  if(!s||typeof s!=='object'||!Array.isArray(s.days)) return {v:1,days:[]};
  return s;
}
function writeSnap(todayObj){
  if(!todayObj||!todayObj.date) return;
  let days=(readSnaps().days||[]).filter(d=>d&&d.date!==todayObj.date); // same-day overwrite
  days.push(todayObj);
  days.sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  if(days.length>30) days=days.slice(days.length-30); // hard cap: last 30
  LS.set(snapKey,{v:1,days});
}
function snapPath(obj,path){
  if(!obj||!path) return null;
  let cur=obj;
  for(const p of String(path).split('.')){
    if(cur==null||typeof cur!=='object') return null;
    cur=cur[p];
  }
  return cur==null?null:cur;
}
/* useSnapshots → {prev, today, delta(path)}. prev = most recent day < today. */
function useSnapshots(){
  const ti=todayISO();
  const days=(readSnaps().days||[]).slice().sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  const today=days.filter(d=>d.date===ti).slice(-1)[0]||null;
  const prev=days.filter(d=>d.date<ti).slice(-1)[0]||null;
  const delta=(path)=>{
    if(!prev) return null;
    const cur=snapPath(today,path),old=snapPath(prev,path);
    if(typeof cur!=='number'||typeof old!=='number') return null;
    return cur-old;
  };
  return {prev,today,delta};
}

/* SnapshotWriter — mounted in Shell (inside DataProvider). On data present,
   captures today's snapshot (same-day overwrite) after one guarded security fetch. */
function SnapshotWriter(){
  const {data}=useData();
  useEffect(()=>{
    const d=data&&data.data;
    if(!d) return;
    try{
      const subnets=Array.isArray(d.subnets)?d.subnets:[];
      const leases=Array.isArray(d.leases)?d.leases:[];
      const zones=Array.isArray(d.zones)?d.zones:[];
      const hosts=Array.isArray(d.hosts)?d.hosts:[];
      const utilOf=s=>Number(s&&s.util)||0;
      const gt85=subnets.filter(s=>utilOf(s)>85).length;
      const b7085=subnets.filter(s=>{const u=utilOf(s);return u>=70&&u<=85;}).length;
      const top=[...subnets].sort((a,b)=>utilOf(b)-utilOf(a)).slice(0,20)
        .map(s=>({a:s.addr||s.name||'',u:utilOf(s)}));
      const active=leases.filter(l=>String(l.state||'').toLowerCase()==='active').length;
      const zoneIssues=zones.filter(z=>Array.isArray(z.issues)&&z.issues.length>0).length;
      const online=hosts.filter(h=>/^(online|up)$/i.test(String(h.status||''))).length;
      const base={
        date:todayISO(), ts:Date.now(),
        subnets:{n:subnets.length,gt85,b7085,top},
        leases:{n:leases.length,active},
        zones:{n:zones.length,issues:zoneIssues},
        hosts:{n:hosts.length,online,offline:hosts.length-online},
        sec:{crit:0,high:0,med:0,low:0,blocked:0,logged:0,total:0},
        dns7d:null,
      };
      fetch('/api/hub/security',{cache:'no-store'}).then(r=>r.json()).then(sd=>{
        const c=(sd&&sd.counts)||{};
        base.sec={crit:Number(c.critical)||0,high:Number(c.high)||0,med:Number(c.medium)||0,
          low:Number(c.low)||0,blocked:Number(sd&&sd.blocked)||0,logged:Number(sd&&sd.logged)||0,
          total:Number(sd&&sd.total)||0};
        writeSnap(base);
      }).catch(()=>writeSnap(base));
    }catch(e){}
  },[data&&data.data]);
  return null;
}

const OV_SEV_RANK={critical:0,high:1,medium:2,low:3};
function ovSevColor(sev){
  const v=String(sev||'').toLowerCase();
  if(v==='critical') return 'var(--crit)';
  if(v==='high') return 'var(--warn)';
  return 'var(--text-dim)';
}
function ovUtilColor(u){ return u>85?'var(--crit)':u>70?'var(--warn)':'var(--accent)'; }
function ovDotColor(status){
  return status==='crit'?'var(--crit)':status==='warn'?'var(--warn)':'var(--ok)';
}

function OvSection({title,aside,link,api,children}){
  return <section className="ov-sec">
    <div className="ov-head">
      <div className="ov-head-l">
        <h2 className="ov-title">{title}</h2>
        {aside?<span className="ov-aside mono">{aside}</span>:null}
        {link||null}
      </div>
      <Freshness at={api.fetchedAt} error={api.error} onRetry={api.refetch}/>
    </div>
    {api.loading&&!api.data?<Skeleton rows={3}/>:children}
  </section>;
}

function OverviewTab(){
  const health=useApi('/api/hub/health',{poll:60000});
  const data=useData();
  const sec=useApi('/api/hub/security');
  const dns=useApi('/api/dns-analytics');
  const {delta}=useSnapshots();

  // ── KPI derivations (case-tolerant) ──
  const d=data.data||{};
  const subnets=Array.isArray(d.subnets)?d.subnets:[];
  const leases=Array.isArray(d.leases)?d.leases:[];
  const zones=Array.isArray(d.zones)?d.zones:[];
  const hosts=Array.isArray(d.hosts)?d.hosts:[];
  const activeLeases=leases.filter(l=>String(l.state||'').toLowerCase()==='active').length;
  const hostsOnline=hosts.filter(h=>/^(online|up)$/i.test(String(h.status||''))).length;
  const counts=(sec.data&&sec.data.counts)||{};
  const threats1h=Object.values(counts).reduce((a,b)=>a+(Number(b)||0),0);

  // ── Top-5 subnets by util ──
  const topSubs=useMemo(()=>[...subnets].sort((a,b)=>(b.util||0)-(a.util||0)).slice(0,5),[subnets]);

  // ── Triage preview: top-5 unacked, severity-ranked ──
  const acks=LS.get('acks',{});
  const events=useMemo(()=>{
    const all=(sec.data&&Array.isArray(sec.data.events))?sec.data.events:[];
    return all
      .filter(e=>!acks[String(e.event_time)+'|'+String(e.qname)])
      .sort((a,b)=>{
        const ra=OV_SEV_RANK[String(a.severity||'').toLowerCase()];
        const rb=OV_SEV_RANK[String(b.severity||'').toLowerCase()];
        return (ra===undefined?9:ra)-(rb===undefined?9:rb);
      })
      .slice(0,5);
  },[sec.data]);

  // ── DNS volume: defensive key inspection on first row ──
  const volSeries=useMemo(()=>{
    const vol=(dns.data&&Array.isArray(dns.data.volume))?dns.data.volume:[];
    if(!vol.length) return [];
    const row0=vol[0],keys=Object.keys(row0);
    const numKey=keys.find(k=>{
      const v=row0[k];
      if(typeof v==='number') return true;
      return typeof v==='string'&&v!==''&&!isNaN(Number(v))&&!/[-T:]/.test(v);
    });
    const dateKey=keys.find(k=>k!==numKey&&row0[k]!=null&&!isNaN(Date.parse(row0[k])));
    if(!numKey||!dateKey) return [];
    return vol.map(r=>({t:r[dateKey],v:Number(r[numKey])||0}))
      .sort((a,b)=>new Date(a.t)-new Date(b.t))
      .slice(-7);
  },[dns.data]);
  const volMax=Math.max(1,...volSeries.map(p=>p.v));
  const volTotal=volSeries.reduce((a,p)=>a+p.v,0);
  const dayLabel=(t)=>{
    const dt=new Date(t);
    return isNaN(dt.getTime())?String(t).slice(5,10):dt.toLocaleDateString(undefined,{weekday:'short'});
  };

  // ── Synthesis band (answer-first) — computed pre-return, hooks already run ──
  const healthArr=Array.isArray(health.data)?health.data:[];
  const anyHealthCrit=healthArr.some(s=>s.status==='crit');
  const anyHealthWarn=healthArr.some(s=>s.status==='warn');
  const gt85=subnets.filter(s=>(Number(s.util)||0)>85).length;
  const worst=topSubs[0]||null;
  const worstUtil=worst?(Number(worst.util)||0):0;
  const hostsOffline=hosts.length-hostsOnline;
  const critHigh=(Number(counts.critical)||0)+(Number(counts.high)||0);
  const bandTone=(anyHealthCrit||(Number(counts.critical)||0)>0||worstUtil>85)?'crit'
    :(anyHealthWarn||(Number(counts.high)||0)>0||worstUtil>70)?'warn':'ok';
  const dCrit=delta('sec.crit'),dHigh=delta('sec.high');
  const dThreat=(dCrit==null&&dHigh==null)?null:(dCrit||0)+(dHigh||0);
  const dnsLast=volSeries.length?volSeries[volSeries.length-1].v:0;
  const dnsAvg=volSeries.length?volTotal/volSeries.length:0;
  const dnsPct=dnsAvg>0?Math.round((dnsLast-dnsAvg)/dnsAvg*100):null;
  const bandFacts=[
    {label:'Critical + high threats',value:critHigh,delta:{v:dThreat,good:'down'}},
    {label:'Subnets >85%',value:gt85,delta:{v:delta('subnets.gt85'),good:'down'}},
    {label:'Hosts offline',value:hostsOffline,delta:{v:delta('hosts.offline'),good:'down'}},
    {label:'DNS 7d volume',value:volTotal.toLocaleString(),delta:{v:dnsPct,good:'up'}},
  ];
  const bandIssues=[];
  if(critHigh>0) bandIssues.push((Number(counts.critical)||0)+' critical / '+(Number(counts.high)||0)+' high threats');
  if(gt85>0) bandIssues.push(gt85+' subnet'+(gt85===1?'':'s')+' over 85%'+(worst?(' (worst '+(worst.name||worst.addr)+' '+Math.round(worstUtil)+'%)'):''));
  else if(worstUtil>70) bandIssues.push('subnets nearing capacity (peak '+Math.round(worstUtil)+'%)');
  if(hostsOffline>0) bandIssues.push(hostsOffline+' host'+(hostsOffline===1?'':'s')+' offline');
  if(anyHealthCrit) bandIssues.unshift('service health degraded');
  const bandVerdict=bandTone==='ok'
    ? 'All systems healthy — no critical threats, capacity normal'
    : bandIssues.slice(0,2).join('; ').replace(/^./,c=>c.toUpperCase());
  const bandChips=[];
  if(critHigh>0) bandChips.push({label:'Threats · '+critHigh,onClick:()=>nav('security')});
  if(gt85>0||worstUtil>70) bandChips.push({label:'Capacity · '+(worst?((worst.name||worst.addr)+' '+Math.round(worstUtil)+'%'):Math.round(worstUtil)+'%'),onClick:()=>nav('network',{subnet:worst&&(worst.addr||worst.id)})});
  if(hostsOffline>0) bandChips.push({label:hostsOffline+' offline',onClick:()=>nav('infra')});
  const bandChips3=bandChips.slice(0,3);

  // Vault locked → render nothing; the gate handles it. (After all hooks.)
  if(health.locked||data.locked||sec.locked||dns.locked) return null;

  const kpis=[
    {n:subnets.length,l:'Subnets'},
    {n:activeLeases,l:'Active leases'},
    {n:zones.length,l:'Zones'},
    {n:hostsOnline+'/'+hosts.length,l:'Hosts online'},
    {n:threats1h,l:'Threats 1h'},
  ];

  return <div className="page">

    <SynthBand tone={bandTone} verdict={bandVerdict} facts={bandFacts} chips={bandChips3}/>

    <OvSection title="Service health" api={health}>
      {Array.isArray(health.data)&&health.data.length
        ? <div className="ov-strip">
            {health.data.map((s,i)=><div key={s.name||i} className="ov-cell">
              <span className="ov-dot" style={{background:ovDotColor(s.status)}}/>
              <span className="ov-svc">{s.name}</span>
              <span className="ov-svclbl">{s.statusLabel}</span>
              <span className="ov-meta mono">{s.meta}</span>
            </div>)}
          </div>
        : <div className="ov-empty">No services reported</div>}
    </OvSection>

    <OvSection title="Key metrics" api={data}>
      <div className="ov-kpis">
        {kpis.map(k=><div key={k.l} className="ov-kpi">
          <div className="ov-kpi-n mono">{typeof k.n==='number'?k.n.toLocaleString():k.n}</div>
          <div className="ov-kpi-l">{k.l}</div>
        </div>)}
      </div>
    </OvSection>

    <div className="grid-2">

    <OvSection title="Top subnets by utilization" api={data}>
      {topSubs.length
        ? topSubs.map((s,i)=><div key={s.id||s.addr||i} className="ov-row" role="button" tabIndex={0}
            onClick={()=>nav('network',{subnet:s.id||s.addr})}
            onKeyDown={e=>{if(e.key==='Enter')nav('network',{subnet:s.id||s.addr});}}>
            <span className="ov-sub-name">{s.name||s.addr}</span>
            <span className="ov-sub-cidr mono">{s.addr}{s.cidr?'/'+s.cidr:''}</span>
            <span className="ov-bar"><span className="ov-bar-fill" style={{width:Math.min(100,s.util||0)+'%',background:ovUtilColor(s.util||0)}}/></span>
            <span className="ov-pct mono">{(s.util||0)}%</span>
          </div>)
        : <div className="ov-empty">No subnets</div>}
    </OvSection>

    <OvSection title="Triage"
      aside={'critical '+(counts.critical||0)+' · high '+(counts.high||0)}
      link={<button className="ov-link" onClick={()=>nav('security')}>View all →</button>}
      api={sec}>
      {events.length
        ? events.map((e,i)=><div key={String(e.event_time)+'|'+String(e.qname)+i} className="ov-ev">
            <span className="ov-sev mono" style={{color:ovSevColor(e.severity)}}>{String(e.severity||'—')}</span>
            <span className="ov-q mono">{e.qname}</span>
            <span className="ov-dev">{e.device}</span>
            <span className="ov-when mono">{relAge(e.event_time)}</span>
          </div>)
        : <div className="ov-empty">No unacknowledged events</div>}
    </OvSection>

    </div>

    <OvSection title="DNS volume — 7 days"
      aside={volSeries.length?volTotal.toLocaleString()+' queries':null}
      api={dns}>
      {volSeries.length
        ? <div className="ov-bars">
            {volSeries.map((p,i)=><div key={i} className="ov-bcol">
              <span className="ov-b" title={p.v.toLocaleString()}
                style={{height:Math.max(2,Math.round(p.v/volMax*96))+'px'}}/>
              <span className="ov-blbl mono">{dayLabel(p.t)}</span>
            </div>)}
          </div>
        : <div className="ov-empty">No volume data</div>}
    </OvSection>

  </div>;
}

const DAILY_NO_KEY=/no (?:llm|ai)[\s\S]{0,24}(?:key|provider|configured)|configure[\s\S]{0,24}(?:llm|ai|provider)|provider is not configured|add[\s\S]{0,12}api key|no ai provider/i;

function DailyTab(){
  const {data,fetchedAt,refetch,error,locked,loading}=useData();
  const sec=useApi('/api/hub/security');

  // ── Snapshot baselines (read straight from the store for period control) ──
  const ti=todayISO();
  const allDays=(readSnaps().days||[]).slice().sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  const priorDays=allDays.filter(d=>d&&d.date<ti);
  const firstRun=priorDays.length===0;
  const yesterdaySnap=priorDays.length?priorDays[priorDays.length-1]:null;
  const wa=new Date();wa.setDate(wa.getDate()-7);const weekAgoISO=wa.toISOString().slice(0,10);
  const weekSnap=priorDays.filter(d=>d.date<=weekAgoISO).slice(-1)[0]||null;

  const [period,setPeriod]=useState(()=>weekSnap&&!yesterdaySnap?'7d':'yesterday');
  const [narrative,setNarrative]=useState(null);
  const narrRef=useRef(false);
  const baseline=period==='7d'?weekSnap:yesterdaySnap;

  // ── Live derivations (numerator for deltas comes from current data) ──
  const subnets=Array.isArray(data&&data.subnets)?data.subnets:[];
  const leases=Array.isArray(data&&data.leases)?data.leases:[];
  const zones=Array.isArray(data&&data.zones)?data.zones:[];
  const hosts=Array.isArray(data&&data.hosts)?data.hosts:[];
  const utilOf=s=>Number(s&&s.util)||0;
  const nSub=subnets.length,nZone=zones.length,nHost=hosts.length;
  const gt85=subnets.filter(s=>utilOf(s)>85).length;
  const b7085=subnets.filter(s=>{const u=utilOf(s);return u>=70&&u<=85;}).length;
  const activeLeases=leases.filter(l=>String(l.state||'').toLowerCase()==='active').length;
  const zoneIssues=zones.filter(z=>Array.isArray(z.issues)&&z.issues.length>0).length;
  const online=hosts.filter(h=>/^(online|up)$/i.test(String(h.status||''))).length;
  const hostsOffline=nHost-online;
  const sortedSubs=[...subnets].sort((a,b)=>utilOf(b)-utilOf(a));
  const worst=sortedSubs[0]||null;
  const worstUtil=worst?Math.round(utilOf(worst)):0;

  const counts=(sec.data&&sec.data.counts)||{};
  const critThreats=Number(counts.critical)||0;
  const highThreats=Number(counts.high)||0;
  const blocked=Number(sec.data&&sec.data.blocked)||0;
  const acks=LS.get('acks',{});
  const secEvents=(sec.data&&Array.isArray(sec.data.events))?sec.data.events:[];
  const unacked=secEvents.filter(e=>!acks[(e.event_time||'')+'|'+(e.qname||'')]);
  const uCrit=unacked.filter(e=>String(e.severity||'').toLowerCase()==='critical').length;
  const uHigh=unacked.filter(e=>String(e.severity||'').toLowerCase()==='high').length;

  const liveSnap={
    subnets:{n:nSub,gt85,b7085},
    leases:{n:leases.length,active:activeLeases},
    zones:{n:nZone,issues:zoneIssues},
    hosts:{n:nHost,online,offline:hostsOffline},
    sec:{crit:critThreats,high:highThreats,blocked},
  };
  const bdelta=(path)=>{
    if(!baseline) return null;
    const cur=snapPath(liveSnap,path),old=snapPath(baseline,path);
    if(typeof cur!=='number'||typeof old!=='number') return null;
    return cur-old;
  };

  // ── 1. One-line narrative — LLM (10s), cached once/day, else template ──
  const dataReady=data!=null;
  const secReady=!!(sec.data||sec.error||sec.locked);
  useEffect(()=>{
    if(narrRef.current) return;
    const cached=LS.get('dailyNarrative',null);
    if(cached&&cached.date===ti&&typeof cached.text==='string'&&cached.text){
      narrRef.current=true;setNarrative(cached.text);return;
    }
    if(!(dataReady&&secReady)) return;
    narrRef.current=true;
    let alive=true;
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),10000);
    const ctx=nSub+' subnets, worst subnet utilization '+worstUtil+'%, '+gt85+' subnets over 85% capacity, '+
      critThreats+' critical threats, '+hostsOffline+' of '+nHost+' hosts offline, '+zoneIssues+' DNS zones with issues.';
    const fallback='Network is '+((critThreats>0||gt85>0||hostsOffline>0)?'degraded':'healthy')+': '+
      nSub+' subnets tracked, '+gt85+' near capacity, '+critThreats+' critical threats, '+hostsOffline+' hosts offline.';
    const finish=text=>{ if(!alive) return; setNarrative(text); LS.set('dailyNarrative',{date:ti,text}); };
    fetch('/api/query',{method:'POST',headers:{'Content-Type':'application/json'},signal:ctrl.signal,
      body:JSON.stringify({question:"In one sentence for an executive, summarize today's network health.",context:ctx})})
      .then(async r=>{const j=await r.json().catch(()=>null);return {r,j};})
      .then(({r,j})=>{
        const ans=(j&&typeof j.answer==='string')?j.answer.trim():'';
        const bad=!r.ok||r.status===503||(j&&(j.error||j.locked))||!ans||DAILY_NO_KEY.test(ans);
        finish(bad?fallback:ans);
      })
      .catch(()=>finish(fallback))
      .finally(()=>clearTimeout(timer));
    return ()=>{alive=false;ctrl.abort();clearTimeout(timer);};
  },[dataReady,secReady]);

  // ── 2. Delta tiles ──
  const tiles=[
    {l:'Subnets',v:nSub.toLocaleString(),path:'subnets.n',good:null},
    {l:'Active leases',v:activeLeases.toLocaleString(),path:'leases.active',good:'up'},
    {l:'Zones',v:nZone.toLocaleString(),path:'zones.n',good:'up'},
    {l:'Hosts online',v:online+'/'+nHost,path:'hosts.online',good:'up'},
    {l:'Critical threats',v:critThreats,path:'sec.crit',good:'down'},
    {l:'Blocked',v:blocked.toLocaleString(),path:'sec.blocked',good:'up'},
  ];
  const renderDelta=(t)=>{
    const dv=bdelta(t.path);
    if(t.good==='up'||t.good==='down') return <Delta v={dv} good={t.good}/>;
    if(dv==null) return <span className="mono" style={{color:'var(--text-faint)'}}>—</span>;
    const sign=dv>0?'+':(dv<0?'−':'');
    return <span className="mono" style={{color:'var(--text-faint)'}}>{sign}{Math.abs(dv)}</span>;
  };

  // ── 3. Top movers — overlap of live top-util subnets with baseline snapshot ──
  const baseTop=(baseline&&baseline.subnets&&Array.isArray(baseline.subnets.top))?baseline.subnets.top:[];
  const baseMap={};baseTop.forEach(p=>{if(p&&p.a!=null)baseMap[p.a]=Math.round(Number(p.u)||0);});
  const movers=sortedSubs
    .map(s=>({a:s.addr||s.name||'',u:Math.round(utilOf(s))}))
    .filter(t=>t.a&&(t.a in baseMap))
    .map(t=>({a:t.a,before:baseMap[t.a],after:t.u,d:t.u-baseMap[t.a]}))
    .filter(m=>m.d!==0)
    .sort((x,y)=>Math.abs(y.d)-Math.abs(x.d))
    .slice(0,5);

  // ── 4. Open-issues rollup (crit → warn) ──

  if(hostsOffline>0) issues.push({sev:'crit',label:hostsOffline+' host'+(hostsOffline===1?'':'s')+' offline',onClick:()=>nav('infra')});

  issues.sort((a,b)=>sevRank[a.sev]-sevRank[b.sev]);
  const sevDot=s=>s==='crit'?'var(--crit)':s==='warn'?'var(--warn)':'var(--ok)';

  // Vault locked → gate handles it (after all hooks). Loading → skeleton.
  if(locked) return null;
  if(loading&&!data) return <div className="page"><Skeleton rows={8}/></div>;

  const baseLabel=firstRun?'first check-in — no prior day yet'
    :(baseline?('vs '+baseline.date):(weekSnap||yesterdaySnap?'no comparison for this period':'no prior day yet'));

  // Synthesis tone for the answer-first band (matches the narrative's health call).
  const dlyTone=(uCrit>0||critThreats>0)?'crit'
    :((gt85>0||hostsOffline>0||uHigh>0||zoneIssues>0)?'warn':'ok');

  return <div className="page">

    <div className="dly-head">
      <div style={{display:'flex',alignItems:'baseline',gap:8,minWidth:0}}>
        <h2 className="dly-title">Daily summary</h2>
        <span className="dly-base mono">{baseLabel}</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div className="dly-seg" role="group" aria-label="Comparison period">
          <button className={'dly-seg-btn'+(period==='yesterday'?' on':'')} disabled={!yesterdaySnap}
            title={yesterdaySnap?undefined:'A prior daily snapshot is needed'} onClick={()=>setPeriod('yesterday')}>vs yesterday</button>
          <button className={'dly-seg-btn'+(period==='7d'?' on':'')} disabled={!weekSnap}
            title={weekSnap?undefined:'Needs a snapshot 7+ days old'} onClick={()=>setPeriod('7d')}>vs 7 days</button>
        </div>
        <Freshness at={fetchedAt} error={error} onRetry={refetch}/>
      </div>
    </div>

    <SynthBand tone={dlyTone} verdict={narrative||'Summarizing today’s network health…'} facts={[]} chips={[]}/>

    <div>
      <div className="dly-tiles">
        {tiles.map(t=><div className="dly-tile" key={t.l}>
          <div className="dly-tile-l">{t.l}</div>
          <div className="dly-tile-v mono">
            <span>{t.v}</span>
            {firstRun?null:<span className="dly-tile-d">{renderDelta(t)}</span>}
          </div>
        </div>)}
      </div>
      {firstRun&&<div className="dly-note">First visit — deltas begin after your next daily check-in.</div>}
    </div>

    <div className="grid-2">
      <section>
        <SectionHead title="Open issues"/>
        {issues.length
          ? issues.map((it,i)=><div className="dly-issue" key={i}>
              <span className="dly-issue-dot" style={{background:sevDot(it.sev)}}/>
              <span className="dly-issue-l">{it.label}</span>
              <button className="dly-issue-link" onClick={it.onClick}>View →</button>
            </div>)
          : <div className="dly-issue">
              <span className="dly-issue-dot" style={{background:'var(--ok)'}}/>
              <span className="dly-issue-l">No open issues — all systems clear</span>
            </div>}
      </section>
      {baseline&&movers.length>0&&<section>
        <SectionHead title={'Top movers vs '+baseline.date}/>
        {movers.map((m,i)=><div className="dly-mover" key={m.a+i}>
          <span className="dly-mover-a mono">{m.a}</span>
          <span className="dly-mover-ba mono">{m.before}% → {m.after}%</span>
          <Delta v={m.d} good="down"/>
        </div>)}
      </section>}
    </div>

  </div>;
}
