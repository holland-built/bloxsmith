<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BloxSmith</title>
<script src="react.min.js"></script>
<script src="react-dom.min.js"></script>
<script src="babel.min.js"></script>
<style>
@font-face{font-family:'Geist';src:url('Geist-400.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'Geist';src:url('Geist-500.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap;}
@font-face{font-family:'Geist';src:url('Geist-600.woff2') format('woff2');font-weight:600;font-style:normal;font-display:swap;}
@font-face{font-family:'Geist';src:url('Geist-700.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap;}
@font-face{font-family:'GeistMono';src:url('GeistMono-400.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'GeistMono';src:url('GeistMono-500.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap;}

:root{
  --bg:#000; --surface:#0a0a0a; --raised:#111; --hover:#1a1a1a;
  --border:#262626; --border-strong:#333;
  --text:#ededed; --text-dim:#a1a1a1; --text-faint:#666;
  --accent:#0070f3; --accent-text:#3291ff;
  --ok:#0cce6b; --warn:#f5a623; --crit:#ff4444;

  --t11:11px; --t12:12px; --t13:13px; --t14:14px; --t16:16px; --t20:20px; --t28:28px;
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s6:24px; --s8:32px; --s12:48px;
  --r-ctl:4px; --r-panel:6px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Geist',-apple-system,system-ui,sans-serif;
  font-size:var(--t13); line-height:1.45;
  color:var(--text); background:var(--bg);
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'GeistMono','SFMono-Regular',ui-monospace,monospace;font-variant-numeric:tabular-nums;}
a{color:var(--accent-text);text-decoration:none;}
button{font-family:inherit;color:inherit;cursor:pointer;}

:focus{outline:none;}
:focus-visible{box-shadow:0 0 0 1px var(--accent-text);border-radius:var(--r-ctl);}

.btn{
  display:inline-flex;align-items:center;gap:var(--s2);
  height:28px;padding:0 var(--s3);
  font-size:var(--t12);font-weight:500;
  background:var(--raised);color:var(--text);
  border:1px solid var(--border);border-radius:var(--r-ctl);
  transition:background .12s ease,border-color .12s ease;
}
.btn:hover{background:var(--hover);border-color:var(--border-strong);}
.btn-ghost{background:transparent;border-color:transparent;}
.btn-ghost:hover{background:var(--hover);border-color:var(--border);}

.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-panel);
}

/* ── top bar ── */
.topbar{
  display:flex;align-items:center;gap:var(--s4);
  height:48px;padding:0 var(--s4);
  border-bottom:1px solid var(--border);
  background:var(--surface);
  position:sticky;top:0;z-index:40;
}
.brand{display:flex;align-items:center;gap:var(--s2);flex:0 0 auto;}
.brand-logo{width:24px;height:24px;border-radius:var(--r-ctl);display:flex;align-items:center;justify-content:center;background:var(--raised);border:1px solid var(--border);overflow:hidden;}
.brand-name{font-size:var(--t13);font-weight:600;color:var(--text);}
.brand-org{font-size:var(--t12);color:var(--text-dim);}

.tabbar{
  display:flex;align-items:center;gap:var(--s1);
  flex:1 1 auto;min-width:0;overflow-x:auto;
  scrollbar-width:none;
}
.tabbar::-webkit-scrollbar{display:none;}
.tab{
  position:relative;flex:0 0 auto;
  height:48px;padding:0 var(--s3);
  display:inline-flex;align-items:center;
  font-size:var(--t12);font-weight:500;color:var(--text-dim);
  background:transparent;border:none;
  transition:color .12s ease;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);}
.tab.active::after{
  content:'';position:absolute;left:var(--s3);right:var(--s3);bottom:0;
  height:2px;background:var(--accent);
}
.topbar-right{display:flex;align-items:center;gap:var(--s3);flex:0 0 auto;margin-left:auto;}
.kbd{
  display:inline-flex;align-items:center;gap:var(--s1);
  height:26px;padding:0 var(--s2);
  font-size:var(--t11);color:var(--text-dim);
  background:var(--raised);border:1px solid var(--border);border-radius:var(--r-ctl);
}

/* ── freshness pill ── */
.fresh{
  display:inline-flex;align-items:center;gap:var(--s2);
  font-size:var(--t11);color:var(--text-faint);
}
.fresh.err{color:var(--crit);}
.fresh-retry{
  font-size:var(--t11);color:var(--accent-text);
  background:transparent;border:none;padding:0;
}

/* ── table ── */
.tbl-wrap{width:100%;overflow-x:auto;}
table.dt{width:100%;border-collapse:collapse;font-size:var(--t12);}
table.dt thead th{
  text-align:left;font-weight:500;color:var(--text-dim);
  padding:0 var(--s3);height:32px;
  border-bottom:1px solid var(--border);
  white-space:nowrap;user-select:none;cursor:pointer;
  background:var(--surface);
}
table.dt thead th.num{text-align:right;}
table.dt thead th .sort-ind{color:var(--text-faint);margin-left:var(--s1);}
table.dt tbody td{
  padding:0 var(--s3);height:32px;
  border-bottom:1px solid var(--border);
  color:var(--text);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
}
table.dt tbody td.num{text-align:right;}
table.dt tbody tr{transition:background .1s ease;}
table.dt tbody tr.clickable{cursor:pointer;}
table.dt tbody tr.clickable:hover{background:var(--hover);}
.dt-empty{color:var(--text-faint);padding:var(--s3);text-align:center;}
.dt-toolbar{display:flex;align-items:center;justify-content:flex-end;padding:var(--s2) 0;}

/* ── toasts ── */
.toasts{
  position:fixed;right:var(--s4);bottom:var(--s4);z-index:80;
  display:flex;flex-direction:column;gap:var(--s2);
  max-width:340px;
}
.toast{
  padding:var(--s2) var(--s3);
  font-size:var(--t12);
  background:var(--raised);border:1px solid var(--border-strong);
  border-radius:var(--r-ctl);color:var(--text);
}
.toast.err{border-color:var(--crit);color:var(--crit);}
.toast.warn{border-color:var(--warn);}
.toast.ok{border-color:var(--border-strong);}

/* ── skeleton (no pulse) ── */
.skel{
  display:block;height:12px;border-radius:var(--r-ctl);
  background:var(--hover);opacity:.6;
}
.skel-row{height:14px;margin:var(--s2) 0;}

/* ── stub ── */
.stub{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:280px;gap:var(--s2);
  color:var(--text-faint);
  border:1px dashed var(--border);border-radius:var(--r-panel);
  margin:var(--s6);
}
.stub-name{font-size:var(--t16);font-weight:600;color:var(--text-dim);}
.stub-sub{font-size:var(--t12);color:var(--text-faint);}

.main{padding:var(--s6);max-width:1400px;margin:0 auto;}

.chip{
  display:inline-flex;align-items:center;height:20px;padding:0 var(--s2);
  font-size:var(--t11);color:var(--text-dim);
  background:var(--raised);border:1px solid var(--border);border-radius:var(--r-ctl);
}

/* command palette stub */
.palette-scrim{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.6);display:flex;align-items:flex-start;justify-content:center;padding-top:12vh;}
.palette{width:min(560px,92vw);}
.palette-in{width:100%;height:44px;padding:0 var(--s4);font-size:var(--t14);color:var(--text);background:var(--raised);border:1px solid var(--border-strong);border-radius:var(--r-panel);}
.palette-body{padding:var(--s3);color:var(--text-faint);font-size:var(--t12);}

@media (max-width:768px){
  .brand-org{display:none;}
  .main{padding:var(--s4);}
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{transition:none!important;animation:none!important;}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ─────────────────────────────────────────────────────────────
   1. LS — namespaced (bx.) localStorage JSON helper
   ───────────────────────────────────────────────────────────── */
const LS={
  get(key,fallback){
    try{const v=localStorage.getItem('bx.'+key);return v==null?fallback:JSON.parse(v);}
    catch(e){return fallback;}
  },
  set(key,val){
    try{localStorage.setItem('bx.'+key,JSON.stringify(val));}catch(e){}
  },
  del(key){try{localStorage.removeItem('bx.'+key);}catch(e){}},
};

/* downloadCSV — ported verbatim from prior build (helper for DataTable) */
function downloadCSV(filename, rows, columns){
  const header=columns.map(c=>JSON.stringify(c.label||c.key||c)).join(',');
  const body=rows.map(r=>columns.map(c=>JSON.stringify(r[c.key]??'')).join(',')).join('\n');
  const blob=new Blob([header+'\n'+body],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ─────────────────────────────────────────────────────────────
   2. useApi — fetch hook with vault-lock handling.
   Locked-handling pattern ported from prior build: a JSON body of
   {locked:true} or {error:'vault locked'}, or HTTP 503, is treated as
   "locked" (NOT an error) and dispatches window 'bx:vault-locked' so
   App can re-check /api/vault/status. Any other non-OK → error string.
   ───────────────────────────────────────────────────────────── */
function useApi(url,{poll}={}){
  const [data,setData]=useState(null);
  const [error,setError]=useState(null);
  const [locked,setLocked]=useState(false);
  const [loading,setLoading]=useState(!!url);
  const [fetchedAt,setFetchedAt]=useState(null);
  const [tick,setTick]=useState(0);

  const refetch=useCallback(()=>setTick(t=>t+1),[]);

  useEffect(()=>{
    if(!url) return;
    const ctrl=new AbortController();
    let alive=true;
    setLoading(true);
    fetch(url,{signal:ctrl.signal,cache:'no-store'})
      .then(async r=>{
        let body=null;
        try{body=await r.json();}catch(e){body=null;}
        if(!alive) return;
        const jsonLocked=body&&(body.locked===true||body.error==='vault locked');
        if(r.status===503||jsonLocked){
          setLocked(true);setError(null);setLoading(false);setFetchedAt(new Date());
          window.dispatchEvent(new CustomEvent('bx:vault-locked'));
          return;
        }
        if(!r.ok||(body&&body.error)){
          setError((body&&body.error)||('HTTP '+r.status));
          setLoading(false);setFetchedAt(new Date());
          return;
        }
        setLocked(false);setError(null);setData(body);setLoading(false);setFetchedAt(new Date());
      })
      .catch(e=>{
        if(e.name==='AbortError'||!alive) return;
        setError(String((e&&e.message)||e));setLoading(false);setFetchedAt(new Date());
      });
    let iv=null;
    if(poll&&poll>0) iv=setInterval(refetch,poll);
    return ()=>{alive=false;ctrl.abort();if(iv)clearInterval(iv);};
  },[url,poll,tick,refetch]);

  return {data,error,locked,fetchedAt,refetch,loading};
}

/* ─────────────────────────────────────────────────────────────
   3. Freshness — "updated Ns ago" mono pill; red + Retry on error.
   ───────────────────────────────────────────────────────────── */
function relAge(at){
  if(!at) return '';
  const s=Math.max(0,Math.round((Date.now()-new Date(at).getTime())/1000));
  if(s<60) return s+'s ago';
  const m=Math.floor(s/60);if(m<60) return m+'m ago';
  const h=Math.floor(m/60);if(h<24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
function Freshness({at,onRetry,error}){
  const [,force]=useState(0);
  useEffect(()=>{const iv=setInterval(()=>force(x=>x+1),1000);return ()=>clearInterval(iv);},[]);
  if(error){
    return <span className="fresh err mono">
      failed{onRetry?<> · <button className="fresh-retry" onClick={onRetry}>Retry</button></>:null}
    </span>;
  }
  if(!at) return null;
  return <span className="fresh mono">updated {relAge(at)}</span>;
}

/* ─────────────────────────────────────────────────────────────
   4. Toast bus — global toast(msg,kind) + <Toasts/> renderer.
   Flat, 1px border, text-only (no green checkmark icons).
   ───────────────────────────────────────────────────────────── */
let _toastPush=null;let _toastSeq=0;
function toast(msg,kind){
  if(_toastPush) _toastPush({id:++_toastSeq,msg,kind:kind||'ok'});
}
function Toasts(){
  const [items,setItems]=useState([]);
  useEffect(()=>{
    _toastPush=(t)=>{
      setItems(list=>[...list,t]);
      setTimeout(()=>setItems(list=>list.filter(x=>x.id!==t.id)),4000);
    };
    return ()=>{_toastPush=null;};
  },[]);
  if(!items.length) return null;
  return <div className="toasts" role="status" aria-live="polite">
    {items.map(t=><div key={t.id} className={'toast '+(t.kind||'ok')}>{t.msg}</div>)}
  </div>;
}

/* ─────────────────────────────────────────────────────────────
   5. DataTable — sortable primitive with optional CSV export.
   cols:{key,label,mono,align,render,width}
   ───────────────────────────────────────────────────────────── */
function DataTable({cols,rows,defaultSort,onRowClick,csvName}){
  const [sort,setSort]=useState(defaultSort||null); // {key,dir}
  const columns=cols||[];
  const data=rows||[];

  const sorted=useMemo(()=>{
    if(!sort||!sort.key) return data;
    const {key,dir}=sort;const mul=dir==='desc'?-1:1;
    return [...data].sort((a,b)=>{
      const av=a?.[key],bv=b?.[key];
      if(av==null&&bv==null) return 0;
      if(av==null) return 1;if(bv==null) return -1;
      const an=typeof av==='number',bn=typeof bv==='number';
      if(an&&bn) return (av-bv)*mul;
      return String(av).localeCompare(String(bv),undefined,{numeric:true})*mul;
    });
  },[data,sort]);

  const toggle=(key)=>setSort(s=>{
    if(!s||s.key!==key) return {key,dir:'asc'};
    if(s.dir==='asc') return {key,dir:'desc'};
    return null;
  });

  const align=(c)=>c.align||(c.mono?'right':'left');
  const isNum=(c)=>align(c)==='right';

  return <div>
    {csvName&&<div className="dt-toolbar">
      <button className="btn btn-ghost" onClick={()=>downloadCSV(csvName+'.csv',sorted,columns)}>CSV</button>
    </div>}
    <div className="tbl-wrap">
      <table className="dt">
        <thead><tr>
          {columns.map(c=><th key={c.key} className={isNum(c)?'num':''}
            style={c.width?{width:c.width}:null} onClick={()=>toggle(c.key)}>
            {c.label||c.key}
            <span className="sort-ind">{sort&&sort.key===c.key?(sort.dir==='asc'?'↑':'↓'):''}</span>
          </th>)}
        </tr></thead>
        <tbody>
          {sorted.length===0
            ? <tr><td className="dt-empty" colSpan={columns.length||1}>No data</td></tr>
            : sorted.map((r,ri)=><tr key={ri}
                className={onRowClick?'clickable':''}
                onClick={onRowClick?()=>onRowClick(r,ri):null}>
                {columns.map(c=><td key={c.key} className={(isNum(c)?'num ':'')+(c.mono?'mono':'')}
                  style={c.width?{width:c.width}:null}>
                  {c.render?c.render(r[c.key],r):(r[c.key]??'')}
                </td>)}
              </tr>)}
        </tbody>
      </table>
    </div>
  </div>;
}

/* 9. Skeleton loader (shimmer-free). */
function Skeleton({rows=4}){
  const widths=[62,88,50,74,42,68];
  return <div aria-busy="true" aria-label="Loading" style={{padding:'6px 2px'}}>
    {Array.from({length:rows}).map((_,i)=>
      <span key={i} className="skel skel-row" style={{width:widths[i%widths.length]+'%'}}/>)}
  </div>;
}

/* ─────────────────────────────────────────────────────────────
   6. Hash router — parse #tab?k=v. Legacy redirects. nav() helper.
   ───────────────────────────────────────────────────────────── */
const TABS=['overview','network','dns','infra','security','audit','ask'];
const TAB_LABELS={overview:'Overview',network:'Network',dns:'DNS',infra:'Infra',security:'Security',audit:'Audit',ask:'Ask'};
const LEGACY={home:'overview',map:'network',dhcp:'network',ipam:'network',dns:'dns',
  security:'security',assets:'infra',audit:'audit',search:'ask',hub:'overview'};

function parseHash(){
  let h=(location.hash||'').replace(/^#/,'');
  if(!h) return {tab:'overview',params:{}};
  const qi=h.indexOf('?');
  let tab=qi>=0?h.slice(0,qi):h;
  const qs=qi>=0?h.slice(qi+1):'';
  if(LEGACY[tab]) tab=LEGACY[tab];
  if(!TABS.includes(tab)) tab='overview';
  const params={};
  if(qs) new URLSearchParams(qs).forEach((v,k)=>{params[k]=v;});
  return {tab,params};
}
function nav(tab,params){
  const t=LEGACY[tab]||tab;
  let h='#'+t;
  if(params&&Object.keys(params).length){
    h+='?'+new URLSearchParams(params).toString();
  }
  location.hash=h;
}
function useRoute(){
  const [route,setRoute]=useState(parseHash());
  useEffect(()=>{
    const on=()=>setRoute(parseHash());
    window.addEventListener('hashchange',on);
    return ()=>window.removeEventListener('hashchange',on);
  },[]);
  return route;
}

/* 8. Stub — centered dim panel "<name> — building". */
function Stub({name}){
  return <div className="stub">
    <div className="stub-name">{name}</div>
    <div className="stub-sub">Section — building</div>
  </div>;
}

// ═══ REGION: AUTH ═══
/* Vault auth gate + brand/logo system — ported from prior build (index-old.html).
   Logic (API payloads, state transitions, guards) is verbatim; visuals restyled
   with the new dark tokens. Scoped CSS injected once below. */
(function injectAuthStyles(){
  if(document.getElementById('bx-auth-styles')) return;
  const s=document.createElement('style');s.id='bx-auth-styles';
  s.textContent=`

  .vault-cancel:disabled{opacity:.5;}
  .vault-boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;}
  .vault-spinner{width:28px;height:28px;border:2px solid #262626;border-top-color:#0070f3;border-radius:50%;animation:vspin .7s linear infinite;}
  @keyframes vspin{to{transform:rotate(360deg);}}
  .acct-slot{position:relative;}
  .acct-trigger{display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 10px;font-size:12px;font-weight:500;color:#ededed;background:#111;border:1px solid #262626;border-radius:4px;cursor:pointer;max-width:220px;}

  .acct-sec-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#666;padding:6px 8px 4px;}
  .acct-search{width:100%;height:28px;margin:0 0 6px;padding:0 8px;font-size:12px;color:#ededed;background:#111;border:1px solid #262626;border-radius:4px;}
  .acct-item{display:flex;align-items:center;gap:6px;flex:1;min-width:0;padding:6px 8px;font-size:12px;color:#ededed;background:transparent;border:none;border-radius:4px;text-align:left;cursor:pointer;}
  .acct-item:hover{background:#1a1a1a;}
  .acct-item.active,.acct-item.nokey{cursor:default;}
  .acct-item.nokey{color:#666;}
  .acct-item .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .acct-row{display:flex;align-items:center;gap:4px;padding:0 4px;}

// Ordered logo sources tried by BrandLogoImg — browser <img> sends Referer so Brandfetch works
function buildLogoSources(domain){
  return [
    '/api/logo',
    `https://cdn.brandfetch.io/${domain}/w/128/h/128`,
    `https://www.google.com/s2/favicons?domain=${domain}&sz=128`,
    `https://icons.duckduckgo.com/ip3/${domain}.ico`,
  ];
}
// BrandLogoImg: tries sources in order via onError waterfall, falls back to IB_LOGO
function BrandLogoImg({domain, fallback, alt, className, style, onClick, title}){
  const sources = domain ? buildLogoSources(domain) : [];
  const [idx, setIdx] = useState(0);
  useEffect(()=>{ setIdx(0); }, [domain]);
  const src = idx < sources.length ? sources[idx] : (fallback||IB_LOGO);
  return <img className={className} src={src} alt={alt||''} style={style}
    title={title} onClick={onClick}
    referrerPolicy="no-referrer-when-downgrade"
    onError={()=>setIdx(i=>i+1)}/>;
}
function downloadLogo(src){
  if(src.startsWith('data:')){
    const a=document.createElement('a');
    a.href=src; a.download='infoblox-logo.png'; a.click();
  } else {
    fetch(src)
      .then(r=>r.blob())
      .then(blob=>{
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url; a.download='infoblox-logo.png';
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
      })
      .catch(()=>window.open(src,'_blank'));
  }
}
function extractDomain(url){
  const s=url.trim().replace(/^https?:\/?\/?/i,'').replace(/^www\./i,'').split('/')[0].split('?')[0];
  try{ return new URL('https://'+s).hostname.replace(/^www\./i,''); }
  catch(e){ return s; }
}

/* vpost — POST JSON, always resolves {ok,data} (ported verbatim). */
const vpost=(url,body)=>fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(async r=>({ok:r.ok,data:await r.json().catch(()=>({}))}));

/* AuthContext — carries vault status + accounts + brand to TopBar slots. */
const AuthCtx=React.createContext(null);
function useAuth(){ return React.useContext(AuthCtx)||{}; }

function AuthProvider({vault,onVaultChange,children}){
  const [accounts,setAccounts]=useState([]);
  const [activeAcct,setActiveAcct]=useState('');
  const [acctErr,setAcctErr]=useState('');
  const [switchingAcct,setSwitchingAcct]=useState(false);
  const [acctSearch,setAcctSearch]=useState('');
  const [brand,setBrand]=useState(()=>{const d=LS.get('orgDomain','');const n=LS.get('orgName','');return d?{domain:d,name:n}:null;});

  // CSP accounts this key can act in. Error shape: {accounts:[],active:'',error,status}.
  useEffect(()=>{
    fetch('/api/accounts',{cache:'no-store'}).then(r=>r.json()).then(d=>{
      setAccounts(d.accounts||[]);
      setActiveAcct(d.active||'');
      setAcctErr(d.error||'');
    }).catch(()=>{});
  },[]);
  // Brand override from server (only if user hasn't set one locally).
  useEffect(()=>{
    fetch('/api/brand').then(r=>r.ok?r.json():null).then(b=>{
      if(!b||!b.domain) return;
      if(!LS.get('orgDomain','')){ setBrand({domain:b.domain,name:b.name||''}); LS.set('orgDomain',b.domain); LS.set('orgName',b.name||''); }
    }).catch(()=>{});
  },[]);

  const switchAcct=async(id)=>{
    setAcctSearch('');
    if(id===activeAcct) return;
    setSwitchingAcct(true);
    try{
      const r=await fetch('/api/switch-account',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
      const d=await r.json().catch(()=>({}));
      if(r.status===403){ toast('Not allowed to switch to that account'+(d.error?': '+d.error:''),'err'); }
      else if(d.ok){
        setActiveAcct(d.active);
        LS.del('_dc');
        const nm=(accounts.find(a=>a.id===d.active)||{}).name||'account';
        toast('Switched to '+nm,'ok');
        setTimeout(()=>window.location.reload(),350);
      } else {
        toast('Account switch failed'+(d.error?': '+d.error:''),'err');
      }
    }catch{ toast('Account switch failed — server unreachable','err'); }
    setSwitchingAcct(false);
  };

  const saveBrand=(domain,name)=>{
    setBrand({domain,name});
    LS.set('orgDomain',domain); LS.set('orgName',name);
    fetch('/api/brand',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain,name})})
      .catch(()=>toast('Failed to save brand settings — server unreachable','err'));
  };

  const activeAcctName=(accounts.find(a=>a.id===activeAcct)||{}).name;
  const orgDomain=(brand&&brand.domain)||'';
  const orgName=(brand&&brand.name)||activeAcctName||'';
  const val={vault,onVaultChange,accounts,activeAcct,acctErr,switchAcct,switchingAcct,
    acctSearch,setAcctSearch,brand,saveBrand,activeAcctName,orgDomain,orgName};
  return <AuthCtx.Provider value={val}>{children}</AuthCtx.Provider>;
}

function VaultSetup({onDone}) {
  const [p1,setP1]=useState(''),[p2,setP2]=useState(''),[err,setErr]=useState(''),[busy,setBusy]=useState(false);
  const go=async()=>{ setErr('');
    if(p1.length<8){setErr('Passphrase must be at least 8 characters.');return;}
    if(p1!==p2){setErr('Passphrases do not match.');return;}
    setBusy(true); const {ok,data}=await vpost('/api/vault/init',{passphrase:p1}); setBusy(false);
    if(ok&&data.ok) onDone(); else setErr(data.error||'Setup failed.');
  };
  return (<div className="vault-screen"><div className="vault-card">
    <div className="vault-logo">BloxSmith</div>
    <h1>Create your vault</h1>
    <p>Set a passphrase to encrypt your Infoblox tenant keys at rest. It is never stored — you re-enter it after a restart to unlock. There is no recovery if you forget it.</p>
    <label htmlFor="vs-pass">Passphrase</label>
    <input id="vs-pass" className="vault-in" type="password" value={p1} onChange={e=>setP1(e.target.value)} autoFocus/>
    <label htmlFor="vs-confirm">Confirm passphrase</label>
    <input id="vs-confirm" className="vault-in" type="password" value={p2} onChange={e=>setP2(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')go();}}/>
    {err&&<div className="vault-err">{err}</div>}
    <button className="vault-btn" onClick={go} disabled={busy||!p1||!p2}>{busy?'Creating…':'Create vault'}</button>
  </div></div>);
}

function VaultUnlock({onDone}) {
  const [p,setP]=useState(''),[err,setErr]=useState(''),[busy,setBusy]=useState(false);
  const [confirmVaultReset,setConfirmVaultReset]=useState(false);
  const go=async()=>{ if(!p)return; setErr(''); setBusy(true);
    const {ok,data}=await vpost('/api/vault/unlock',{passphrase:p}); setBusy(false);

  return (<div className="vault-screen"><div className="vault-card">

      <div style={{fontSize:11,color:'#a1a1a1',lineHeight:1.5,marginBottom:8}}>Permanently deletes the vault and all stored keys. No recovery. You will set a new passphrase.</div>

        <button className="tc-no" style={{width:'auto',padding:'0 10px'}} autoFocus onClick={()=>setConfirmVaultReset(false)}>Cancel</button>
      </div>
    </div>}
  </div></div>);
}

function VaultAddTenant({onDone, onCancel, first, editId, editLabel}) {
  const isEdit=!!editId;
  const [key,setKey]=useState(''),[label,setLabel]=useState(editLabel||''),[err,setErr]=useState(''),[busy,setBusy]=useState(false),[test,setTest]=useState('');
  const go=async()=>{ if(!key)return; setErr(''); setBusy(true);
    const {ok,data}=isEdit
      ? await vpost('/api/vault/tenant-update',{id:editId,label,key})
      : await vpost('/api/vault/tenant',{label,key});
    setBusy(false);
    if(ok&&data.ok) onDone(); else setErr(data.error||(isEdit?'Could not replace key.':'Could not add connection.'));
  };
  const doTest=async()=>{ if(!key)return; setTest('Testing…');
    const {ok,data}=await vpost('/api/vault/test-key',{key});
    setTest(ok&&data.ok ? ('Key valid'+(data.name?(' — '+data.name):' (no account name)')) : ('Invalid: '+(data.error||'rejected')));
  };
  useEffect(()=>{ if(!onCancel)return; const h=e=>{if(e.key==='Escape')onCancel();}; window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h); },[onCancel]);
  return (<div className="vault-screen" onClick={onCancel?()=>onCancel():undefined}><div className="vault-card" onClick={e=>e.stopPropagation()}>
    <div className="vault-logo">BloxSmith</div>
    <h1>{isEdit?`Replace key for ${editLabel||'connection'}`:(first?'Add your first connection':'Add a connection')}</h1>
    <p>{isEdit
      ? 'Paste a new Infoblox API key for this connection — e.g. when the old one was rejected or lacks account access. The connection re-names itself from the new key.'
      : 'Paste an Infoblox API key. The key is encrypted in your vault, and the connection is named automatically from its CSP account.'}</p>
    <label htmlFor="vat-key">Infoblox API key</label>
    <input id="vat-key" className="vault-in" type="password" value={key} onChange={e=>{setKey(e.target.value);setTest('');}} onKeyDown={e=>{if(e.key==='Enter')go();}} placeholder="paste token (any format — Token/Bearer prefix optional)" autoFocus/>
    <label htmlFor="vat-name">Name (optional — auto-named from the portal if blank)</label>
    <input id="vat-name" className="vault-in" value={label} onChange={e=>setLabel(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')go();}} placeholder="leave blank to use the CSP account name"/>
    {test&&<div style={{fontSize:11,marginTop:8,color:test.startsWith('Key valid')?'#0cce6b':(test==='Testing…'?'#a1a1a1':'#ff4444')}}>{test}</div>}
    {err&&<div className="vault-err">{err}</div>}
    <button className="vault-btn" onClick={go} disabled={busy||!key}>{busy?(isEdit?'Replacing…':'Adding…'):(isEdit?'Replace key':'Add connection')}</button>
    <button className="vault-cancel" onClick={doTest} disabled={!key}>Test key</button>
    {onCancel&&<button className="vault-cancel" onClick={onCancel}>Cancel</button>}
  </div></div>);
}

function VaultSettings({llm, onDone, onCancel}) {

/* TenantManager — unified account list + vault management (ported logic). */
function TenantManager({onClose}) {
  const {vault,accounts=[],activeAcct,acctErr,switchAcct,switchingAcct,acctSearch='',setAcctSearch,brand,saveBrand}=useAuth();
  const [open,setOpen]=useState(false),[adding,setAdding]=useState(false),[settings,setSettings]=useState(false),[editBrand,setEditBrand]=useState(false);
  const [confirmRm,setConfirmRm]=useState(null);
  const [editTenant,setEditTenant]=useState(null);
  const [testing,setTesting]=useState(false);
  const [locking,setLocking]=useState(false);
  const [refreshingNames,setRefreshingNames]=useState(false);
  const [switchingKey,setSwitchingKey]=useState(null);
  const tenants=vault.tenants||[];
  const active=tenants.find(t=>t.id===vault.active);
  const activeAcctName=(accounts.find(a=>a.id===activeAcct)||{}).name;
  const headline=activeAcctName||(active&&active.label)||(accounts[0]&&accounts[0].name)||'—';
  const allTenants=vault.vaultMode?(vault.tenants||[]):[];
  const unified=accounts.map(a=>{const t=allTenants.find(t=>t.label===a.name);return{name:a.name,accountId:a.id,tenantId:t?t.id:null,hasKey:!!t,isActive:a.id===activeAcct};}).sort((x,y)=>(y.isActive-x.isActive)||(y.hasKey-x.hasKey)||x.name.localeCompare(y.name));
  const filteredAccts=acctSearch?unified.filter(u=>u.name.toLowerCase().includes(acctSearch.toLowerCase())):unified;
  const showAcctSearch=unified.length>6;
  const hasNoKey=filteredAccts.some(u=>!u.hasKey);
  const hasWithKey=filteredAccts.some(u=>u.hasKey);
  const reload=()=>window.location.reload();
  const close=()=>{ setOpen(false); setConfirmRm(null); setAcctSearch&&setAcctSearch(''); };
  const switchAccount=id=>{ close(); switchAcct&&switchAcct(id); };
  const switchKey=async id=>{
    if(id===vault.active){return;}
    setSwitchingKey(id);
    const {ok,data}=await vpost('/api/vault/active',{id});
    if(!ok||!data.ok){ setSwitchingKey(null); toast('Switch failed: '+(data.error||'unknown'),'err'); return; }
    toast('Switching account…','ok');
    reload();
  };
  const remove=async (id,label)=>{ await vpost('/api/vault/tenant-remove',{id}); toast('Removed '+label,'ok'); reload(); };
  const refreshNames=async()=>{ close(); await vpost('/api/vault/refresh-names',{}); window.location.reload(); };
  const testConn=async()=>{ setTesting(true);
    const {ok,data}=await vpost('/api/vault/conn-test',{}); setTesting(false); close();
    toast(ok&&data.ok ? ('Infoblox OK — '+(data.name||'connected')) : ('Infoblox connection failed: '+((data&&data.error)||'unreachable')), ok&&data.ok?'ok':'err');
  };
  if(adding) return <VaultAddTenant onCancel={()=>setAdding(false)} onDone={reload}/>;
  if(editTenant) return <VaultAddTenant editId={editTenant.id} editLabel={editTenant.label} onCancel={()=>setEditTenant(null)} onDone={reload}/>;
  if(settings) return <VaultSettings llm={vault.llm} onCancel={()=>setSettings(false)} onDone={reload}/>;
  if(editBrand) return <BrandEdit brand={brand} onSave={saveBrand} onCancel={()=>setEditBrand(false)}/>;
  return (
    <div className="acct-slot">
      <button className="acct-trigger" title="Switch account or manage vault" aria-label="Switch account or manage vault"
        aria-expanded={open} disabled={switchingAcct} onClick={()=>open?close():setOpen(true)}>
        <span className="dot">{switchingAcct?'⟳':'●'}</span>
        <span className="nm">{headline}</span>
      </button>
      {open&&(<>
        <div className="acct-overlay" onClick={close}/>
        <div className="acct-menu" role="menu">
          <div className="acct-sec-label">Accounts</div>
          {showAcctSearch&&<input className="acct-search" aria-label="Search accounts" autoFocus placeholder="Search accounts…" value={acctSearch} onChange={e=>setAcctSearch&&setAcctSearch(e.target.value)}/>}
          <div style={{maxHeight:200,overflowY:'auto'}}>
            {filteredAccts.filter(u=>u.hasKey).map(u=>(
              <div key={u.accountId} className="acct-row">
                {confirmRm===u.tenantId ? (
                  <div className="tenant-confirm">
                    <span className="tenant-confirm-q">Remove {u.name}?</span>
                    <button className="tc-yes" title="Remove permanently" aria-label="Confirm removal" onClick={()=>remove(u.tenantId,u.name)}>✓</button>
                    <button className="tc-no" title="Keep" aria-label="Cancel removal" onClick={()=>setConfirmRm(null)}>✕</button>
                  </div>
                ) : (<>
                  <button className={'acct-item'+(u.isActive?' active':'')}
                    disabled={u.isActive||!!switchingKey}
                    onClick={()=>u.isActive?undefined:(u.tenantId&&u.tenantId!==vault.active?switchKey(u.tenantId):switchAccount(u.accountId))}>
                    <span>{u.isActive?'● ':(switchingKey===u.tenantId?'⟳ ':'○ ')}</span>
                    <span className="nm">{u.name}</span>
                  </button>
                  {vault.vaultMode&&<>
                    <button className="tenant-mini" title="Replace this key (e.g. if expired)" aria-label="Replace this key" onClick={()=>{setOpen(false);setEditTenant({id:u.tenantId,label:u.name});}}>chg</button>
                    <button className="tenant-rm" title="Remove key" aria-label="Remove key" onClick={()=>setConfirmRm(u.tenantId)}>✕</button>
                  </>}
                </>)}
              </div>
            ))}
            {hasWithKey&&hasNoKey&&<div className="acct-divider"/>}
            {filteredAccts.filter(u=>!u.hasKey).map(u=>(
              <div key={u.accountId} className="acct-row">
                <button className="acct-item nokey" disabled><span className="nm">{'○ '}{u.name}</span></button>
                {vault.vaultMode&&<button className="tenant-addkey" onClick={e=>{e.stopPropagation();setAdding(true);}}>+ key</button>}
              </div>
            ))}
            {accounts.length===0&&<div className="acct-notice">{acctErr?('Accounts unavailable: '+acctErr):'No accounts found for this key.'}</div>}
          </div>
          <div className="acct-divider"/>
          <div className="acct-sec-label">Manage</div>
          <button className="menu-item" onClick={()=>{close();setEditBrand(true);}}>
            <span className="menu-lbl">Brand / logo</span>
            <span className="menu-desc">Company domain &amp; display name</span>
          </button>
          {vault.vaultMode&&vault.unlocked&&(<>
            <button className="menu-item" disabled={testing} onClick={testConn}>
              <span className="menu-lbl">{testing?'Testing…':'Test Infoblox connection'}</span>
              <span className="menu-desc">Verify the active key reaches CSP</span>
            </button>
            {!hasNoKey&&(<button className="menu-item" onClick={()=>{close();setAdding(true);}}>
              <span className="menu-lbl">+ Add key</span>
              <span className="menu-desc">Store another Infoblox login</span>
            </button>)}
            <button className="menu-item" disabled={refreshingNames} onClick={async()=>{setRefreshingNames(true);await refreshNames();setRefreshingNames(false);}}>
              <span className="menu-lbl">{refreshingNames?'Refreshing…':'Refresh names'}</span>
              <span className="menu-desc">Re-fetch account names from CSP</span>
            </button>
            <button className="menu-item" onClick={()=>{close();setSettings(true);}}>
              <span className="menu-lbl">AI provider</span>
              <span className="menu-desc">LLM for the query box (vault-wide)</span>
            </button>
            <button className="menu-item" disabled={locking} onClick={async()=>{setLocking(true);await vpost('/api/vault/lock',{});window.location.reload();}}>
              <span className="menu-lbl">{locking?'Locking…':'Lock vault'}</span>
              <span className="menu-desc">Hide your saved keys behind the passphrase</span>
            </button>
          </>)}
        </div>
      </>)}
    </div>
  );
}

/* VaultGate — decision tree (ported verbatim). Wraps unlocked children in
   AuthProvider so TopBar slots see accounts/brand. Re-checks on bx:vault-locked. */
function VaultGate({children}){
  const [st,setSt]=useState(null);
  const refresh=useCallback(()=>fetch('/api/vault/status',{cache:'no-store'}).then(r=>r.json()).then(setSt).catch(()=>setSt({vaultMode:false})),[]);
  useEffect(()=>{refresh();},[refresh]);
  useEffect(()=>{
    const on=()=>refresh();
    window.addEventListener('bx:vault-locked',on);
    return ()=>window.removeEventListener('bx:vault-locked',on);
  },[refresh]);
  if(!st) return <div className="vault-boot"><div className="vault-spinner"/></div>;
  const wrap=kids=><AuthProvider vault={st} onVaultChange={refresh}>{kids}</AuthProvider>;
  if(!st.vaultMode) return wrap(children);
  if(st.ready)      return wrap(children);
  if(!st.exists)    return <VaultSetup onDone={refresh}/>;
  if(!st.unlocked)  return <VaultUnlock onDone={refresh}/>;
  return <VaultAddTenant first onDone={refresh}/>;
}

const OV_SEV_RANK={critical:0,high:1,medium:2,low:3};
function ovSevColor(sev){
  const v=String(sev||'').toLowerCase();
  if(v==='critical') return 'var(--crit)';
  if(v==='high') return 'var(--warn)';
  return 'var(--text-dim)';
}
function ovUtilColor(u){ return u>85?'var(--crit)':u>70?'var(--warn)':'var(--accent)'; }
function ovDotColor(status){
  return status==='crit'?'var(--crit)':status==='warn'?'var(--warn)':'var(--ok)';
}

function OverviewTab(){
  const health=useApi('/api/hub/health',{poll:60000});
  const data=useApi('/api/data');
  const sec=useApi('/api/hub/security');
  const dns=useApi('/api/dns-analytics');

  // ── KPI derivations (case-tolerant) ──
  const d=data.data||{};
  const subnets=Array.isArray(d.subnets)?d.subnets:[];
  const leases=Array.isArray(d.leases)?d.leases:[];
  const zones=Array.isArray(d.zones)?d.zones:[];
  const hosts=Array.isArray(d.hosts)?d.hosts:[];
  const activeLeases=leases.filter(l=>String(l.state||'').toLowerCase()==='active').length;
  const hostsOnline=hosts.filter(h=>/^(online|up)$/i.test(String(h.status||''))).length;
  const counts=(sec.data&&sec.data.counts)||{};
  const threats1h=Object.values(counts).reduce((a,b)=>a+(Number(b)||0),0);

  // ── Top-5 subnets by util ──
  const topSubs=useMemo(()=>[...subnets].sort((a,b)=>(b.util||0)-(a.util||0)).slice(0,5),[subnets]);

  // ── Triage preview: top-5 unacked, severity-ranked ──
  const acks=LS.get('acks',{});
  const events=useMemo(()=>{
    const all=(sec.data&&Array.isArray(sec.data.events))?sec.data.events:[];
    return all
      .filter(e=>!acks[String(e.event_time)+'|'+String(e.qname)])
      .sort((a,b)=>{
        const ra=OV_SEV_RANK[String(a.severity||'').toLowerCase()];
        const rb=OV_SEV_RANK[String(b.severity||'').toLowerCase()];
        return (ra===undefined?9:ra)-(rb===undefined?9:rb);
      })
      .slice(0,5);
  },[sec.data]);

  // ── DNS volume: defensive key inspection on first row ──
  const volSeries=useMemo(()=>{
    const vol=(dns.data&&Array.isArray(dns.data.volume))?dns.data.volume:[];
    if(!vol.length) return [];
    const row0=vol[0],keys=Object.keys(row0);
    const numKey=keys.find(k=>{
      const v=row0[k];
      if(typeof v==='number') return true;
      return typeof v==='string'&&v!==''&&!isNaN(Number(v))&&!/[-T:]/.test(v);
    });
    const dateKey=keys.find(k=>k!==numKey&&row0[k]!=null&&!isNaN(Date.parse(row0[k])));
    if(!numKey||!dateKey) return [];
    return vol.map(r=>({t:r[dateKey],v:Number(r[numKey])||0}))
      .sort((a,b)=>new Date(a.t)-new Date(b.t))
      .slice(-7);
  },[dns.data]);
  const volMax=Math.max(1,...volSeries.map(p=>p.v));
  const volTotal=volSeries.reduce((a,p)=>a+p.v,0);
  const dayLabel=(t)=>{
    const dt=new Date(t);
    return isNaN(dt.getTime())?String(t).slice(5,10):dt.toLocaleDateString(undefined,{weekday:'short'});
  };

  // Vault locked → render nothing; the gate handles it. (After all hooks.)
  if(health.locked||data.locked||sec.locked||dns.locked) return null;

  const kpis=[
    {n:subnets.length,l:'Subnets'},
    {n:activeLeases,l:'Active leases'},
    {n:zones.length,l:'Zones'},
    {n:hostsOnline+'/'+hosts.length,l:'Hosts online'},
    {n:threats1h,l:'Threats 1h'},
  ];

  return <div className="ov">

    <OvSection title="Service health" api={health}>
      {Array.isArray(health.data)&&health.data.length
        ? <div className="ov-strip">
            {health.data.map((s,i)=><div key={s.name||i} className="ov-cell">
              <span className="ov-dot" style={{background:ovDotColor(s.status)}}/>
              <span className="ov-svc">{s.name}</span>
              <span className="ov-svclbl">{s.statusLabel}</span>
              <span className="ov-meta mono">{s.meta}</span>
            </div>)}
          </div>
        : <div className="ov-empty">No services reported</div>}
    </OvSection>

    <OvSection title="Key metrics" api={data}>
      <div className="ov-kpis">
        {kpis.map(k=><div key={k.l} className="ov-kpi">
          <div className="ov-kpi-n mono">{typeof k.n==='number'?k.n.toLocaleString():k.n}</div>
          <div className="ov-kpi-l">{k.l}</div>
        </div>)}
      </div>
    </OvSection>

    <OvSection title="Top subnets by utilization" api={data}>
      {topSubs.length
        ? topSubs.map((s,i)=><div key={s.id||s.addr||i} className="ov-row" role="button" tabIndex={0}
            onClick={()=>nav('network',{subnet:s.id||s.addr})}
            onKeyDown={e=>{if(e.key==='Enter')nav('network',{subnet:s.id||s.addr});}}>
            <span className="ov-sub-name">{s.name||s.addr}</span>

/* leasesInSubnet — ported verbatim from prior build (index-old.html ~L1061).
   Octet-prefix CIDR match: /8→1 octet, /16→2, /24→3, /32→4. */
function leasesInSubnet(leases, subnet) {
  const parts = (subnet.addr||'').split('.').map(Number);
  const cidr = subnet.cidr || 24;
  const octets = cidr <= 8 ? 1 : cidr <= 16 ? 2 : cidr <= 24 ? 3 : 4;
  const prefix = parts.slice(0, octets).join('.');
  return leases.filter(l => (l.addr || '').startsWith(prefix + '.') ||
                            (octets === 4 && l.addr === subnet.addr));
}

const M_HOST='HostMetrics.host_name', M_NAME='HostMetrics.metric_name', M_VAL='HostMetrics.avg_value';

function infraStatusColor(s){
  const v=(s||'').toLowerCase();
  if(v==='online'||v==='up') return 'var(--ok)';
  if(v==='degraded') return 'var(--warn)';
  if(v==='down'||v==='offline') return 'var(--crit)';
  return 'var(--text-faint)';
}
function fmtMetric(v){
  if(v==null||v==='') return null;
  const n=Number(v);
  if(!isFinite(n)) return null;
  const a=Math.abs(n);
  if(a>=1e6) return (n/1e6).toFixed(1)+'M';
  if(a>=1e3) return (n/1e3).toFixed(1)+'k';
  return n.toFixed(1);
}

function InfraTab({vaultTick}={}){
  const {params}=useRoute();
  const hostParam=params.host||'';
  const {data,error,loading,fetchedAt,refetch}=useApi('/api/data');
  const mx=useApi('/api/host-metrics');

  // Re-fetch both feeds once a vault unlock is reported upstream.
  useEffect(()=>{ if(vaultTick){ refetch(); mx.refetch(); } },[vaultTick]);

  const hosts=(data&&data.hosts)||[];
  const metricRows=(mx.data&&mx.data.metrics)||[];

  // Pivot metrics into rows=host, cols=metric; flag each column's top decile.
  const {hostNames,metricNames,pivot,hotSet}=useMemo(()=>{
    const pv={},hSet=new Set(),mSet=new Set(),cols={};
    metricRows.forEach(r=>{
      const h=r[M_HOST],m=r[M_NAME];
      if(h==null||m==null) return;
      const val=Number(r[M_VAL]);
      hSet.add(h);mSet.add(m);
      (pv[h]||(pv[h]={}))[m]=isFinite(val)?val:null;
      if(isFinite(val)) (cols[m]||(cols[m]=[])).push(val);
    });
    const hot=new Set();
    Object.keys(cols).forEach(m=>{
      const vals=cols[m].slice().sort((a,b)=>a-b);
      if(vals.length<2||vals[0]===vals[vals.length-1]) return; // no spread → no tint
      const thr=vals[Math.floor(0.9*(vals.length-1))];
      Object.keys(pv).forEach(h=>{
        const v=pv[h][m];
        if(v!=null&&v>=thr) hot.add(h+'␀'+m);
      });
    });
    return {
      hostNames:[...hSet].sort((a,b)=>a.localeCompare(b)),
      metricNames:[...mSet].sort((a,b)=>a.localeCompare(b)),
      pivot:pv, hotSet:hot,
    };
  },[metricRows]);

  // ── Per-host drill panel ──
  if(hostParam){
    const host=hosts.find(h=>h.name===hostParam);
    const drillRows=metricRows
      .filter(r=>r[M_HOST]===hostParam)
      .map(r=>({metric:r[M_NAME],value:Number(r[M_VAL])}));
    const drillCols=[
      {key:'metric',label:'Metric'},
      {key:'value',label:'Value',mono:true,align:'right',render:v=>{const f=fmtMetric(v);return f==null?'·':f;}},
    ];
    return <div className="infra-page">
      <div className="infra-sec">
        <div className="infra-drill-top">
          <button className="infra-back" onClick={()=>history.back()}>← Back</button>
          <span className="infra-h">{hostParam}</span>
          {host&&host.ip?<span className="infra-ip mono">{host.ip}</span>:null}
          {host?<span className="infra-st mono" style={{color:infraStatusColor(host.status)}}>{host.status}</span>:null}
        </div>
      </div>
      <div className="infra-sec">
        <div className="infra-head">
          <span className="infra-h">Metrics</span>
          <Freshness at={mx.fetchedAt} error={mx.error} onRetry={mx.refetch}/>
        </div>
        {mx.loading&&!mx.data ? <Skeleton rows={5}/>
          : drillRows.length===0 ? <div className="infra-dim">No metrics reported</div>
          : <DataTable cols={drillCols} rows={drillRows} defaultSort={{key:'metric',dir:'asc'}}/>}
      </div>
    </div>;
  }

  // ── Host inventory ──
  const hostCols=[
    {key:'name',label:'Host'},
    {key:'ip',label:'IP',mono:true},
    {key:'type',label:'Type'},
    {key:'status',label:'Status',render:v=><span className="mono infra-st" style={{color:infraStatusColor(v)}}>{v||'—'}</span>},
  ];

  return <div className="infra-page">
    <div className="infra-sec">
      <div className="infra-head">
        <span className="infra-h">Hosts</span>
        <Freshness at={fetchedAt} error={error} onRetry={refetch}/>
      </div>
      {loading&&!data ? <Skeleton rows={6}/>
        : <DataTable cols={hostCols} rows={hosts} defaultSort={{key:'name',dir:'asc'}}
            csvName="infra-hosts" onRowClick={r=>nav('infra',{host:r.name})}/>}
    </div>

    <div className="infra-sec">
      <div className="infra-head">
        <span className="infra-h">Sensors</span>
        <Freshness at={mx.fetchedAt} error={mx.error} onRetry={mx.refetch}/>
      </div>
      {mx.loading&&!mx.data ? <Skeleton rows={6}/>
        : metricNames.length===0 ? <div className="infra-dim">No metrics reported</div>
        : <div className="sensor-wrap">
            <table className="sensor">
              <thead><tr>
                <th className="sensor-hcol">Host</th>
                {metricNames.map(m=><th key={m}>{m}</th>)}
              </tr></thead>
              <tbody>
                {hostNames.map(h=><tr key={h}>
                  <td className="sensor-hcol mono">{h}</td>
                  {metricNames.map(m=>{
                    const f=fmtMetric(pivot[h]&&pivot[h][m]);
                    const hot=hotSet.has(h+'␀'+m);
                    return <td key={m} className={'mono'+(f==null?' sensor-null':(hot?' sensor-hot':''))}>
                      {f==null?'·':f}</td>;
                  })}
                </tr>)}
              </tbody>
            </table>
          </div>}
    </div>
  </div>;
}

function SecTriageInbox(){
  const {data,error,fetchedAt,refetch,loading}=useApi('/api/hub/security',{poll:60000});
  const [sevF,setSevF]=useState('all');
  const [actF,setActF]=useState('all');
  const [acks,setAcks]=useState(()=>LS.get('acks',{}));
  const toggleAck=e=>{const k=secAckKey(e);setAcks(p=>{const n={...p};if(n[k])delete n[k];else n[k]=true;LS.set('acks',n);return n;});};
  const clearAcks=()=>{setAcks({});LS.set('acks',{});};
  if(loading&&!data) return <div><SecHead title="Triage inbox"/><Skeleton rows={8}/></div>;
  const d=data||{};
  const counts=d.counts||{};
  const events=Array.isArray(d.events)?d.events:[];
  let rows=events.filter(e=>{
    const sev=String(e.severity||'').toLowerCase();
    if(sevF!=='all'&&sev!==sevF) return false;
    const act=String(e.policy_action||'').toLowerCase();
    if(actF==='blocked'&&!(act==='block'||act==='redirect')) return false;
    if(actF==='logged'&&act!=='log') return false;
    return true;
  });
  rows=rows.map((e,i)=>({e,i})).sort((A,B)=>{
    const aa=acks[secAckKey(A.e)]?1:0,ab=acks[secAckKey(B.e)]?1:0;
    if(aa!==ab) return aa-ab;
    const ra=SEC_SEV_RANK[String(A.e.severity||'').toLowerCase()]??9,rb=SEC_SEV_RANK[String(B.e.severity||'').toLowerCase()]??9;
    if(ra!==rb) return ra-rb;
    return String(B.e.event_time||'').localeCompare(String(A.e.event_time||''));
  }).map(x=>x.e);
  return <div>
    <SecHead title="Triage inbox" at={fetchedAt} onRetry={refetch} error={error}>
      <span className="mono" style={{fontSize:'var(--t12)'}}>
        <span style={{color:'var(--crit)'}}>critical {counts.critical||0}</span>{' · '}
        <span style={{color:'var(--warn)'}}>high {counts.high||0}</span>{' · '}
        <span style={{color:'var(--text-dim)'}}>medium {counts.medium||0}</span>{' · '}
        <span style={{color:'var(--text-dim)'}}>low {counts.low||0}</span>
      </span>
      <span className="mono" style={{fontSize:'var(--t11)',color:'var(--text-faint)'}}>
        {(d.blocked||0)+' blocked · '+(d.logged||0)+' logged · '+(d.total||0)+' total'}
      </span>
    </SecHead>
    <div style={{display:'flex',alignItems:'center',gap:'var(--s3)',marginBottom:'var(--s3)',flexWrap:'wrap'}}>
      <SecChips value={sevF} onChange={setSevF} options={[{v:'all',label:'all'},{v:'critical',label:'critical'},{v:'high',label:'high'},{v:'medium',label:'medium'},{v:'low',label:'low'}]}/>
      <span style={{width:1,height:16,background:'var(--border)'}}/>
      <SecChips value={actF} onChange={setActF} options={[{v:'all',label:'all'},{v:'blocked',label:'blocked'},{v:'logged',label:'logged'}]}/>
      <button className="fresh-retry" style={{marginLeft:'auto'}} onClick={clearAcks}>Clear acks</button>
    </div>
    <div className="tbl-wrap">
      <table className="dt">
        <thead><tr>
          <th style={{width:28}} aria-label="Acknowledge"></th>
          <th>Severity</th><th>Query</th><th>Action</th><th>Feed</th><th>Device</th><th className="num">Time</th>
        </tr></thead>
        <tbody>
          {rows.length===0
            ? <tr><td className="dt-empty" colSpan={7}>No events</td></tr>
            : rows.map((e,i)=>{
                const acked=!!acks[secAckKey(e)];
                return <tr key={secAckKey(e)+'#'+i} style={{opacity:acked?0.45:1}}>
                  <td><input type="checkbox" checked={acked} onChange={()=>toggleAck(e)} aria-label="Acknowledge event"/></td>
                  <td className="mono" style={{color:secSevColor(e.severity),textTransform:'uppercase'}}>{e.severity||'—'}</td>
                  <td className="mono">{e.qname||'—'}</td>
                  <td>{e.policy_action||'—'}</td>
                  <td style={{color:'var(--text-dim)'}}>{e.feed_name||'—'}</td>
                  <td>{e.device||'—'}</td>
                  <td className="num mono" style={{color:'var(--text-faint)'}}>{secEvtAge(e.event_time)}</td>
                </tr>;
              })}
        </tbody>
      </table>
    </div>
  </div>;
}

function SecEntities({entities}){
  if(entities==null) return null;
  if(Array.isArray(entities)){
    if(!entities.length) return <div className="dt-empty">No matches</div>;
    if(typeof entities[0]==='object'&&entities[0]) return <DataTable cols={secAutoCols(entities)} rows={entities} csvName="threat-lookup"/>;
  }
  return <pre className="mono" style={{fontSize:'var(--t11)',color:'var(--text-dim)',whiteSpace:'pre-wrap',margin:0,padding:'var(--s3)',background:'var(--raised)',border:'1px solid var(--border)',borderRadius:'var(--r-ctl)',maxHeight:320,overflow:'auto'}}>{JSON.stringify(entities,null,2)}</pre>;
}
function SecThreatLookup(){
  const [q,setQ]=useState('');
  const [busy,setBusy]=useState(false);
  const [res,setRes]=useState(null);
  const [err,setErr]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const lookup=async()=>{
    const query=q.trim(); if(!query) return;
    setBusy(true);setErr(null);setRes(null);setConfirm(null);
    try{
      const r=await fetch('/api/threat-lookup?q='+encodeURIComponent(query),{cache:'no-store'});
      const body=await r.json().catch(()=>null);
      if(!r.ok||(body&&body.error)) setErr((body&&body.error)||('HTTP '+r.status));
      else setRes(body||{entities:[],query});
    }catch(e){setErr(String((e&&e.message)||e));}
    setBusy(false);
  };
  const write=async(kind)=>{
    const domain=q.trim(); if(!domain) return;
    const url=kind==='block'?'/api/block-domain':'/api/unblock-domain';
    setConfirm(null);
    try{
      const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain})});
      const body=await r.json().catch(()=>({}));
      if(r.status===401) toast('Requires bridge token','err');
      else if(r.ok&&body.ok) toast((kind==='block'?'Blocked ':'Unblocked ')+domain,'ok');
      else toast(body.error||('HTTP '+r.status),'err');
    }catch(e){toast(String((e&&e.message)||e),'err');}
  };
  return <div>
    <SecHead title="Threat lookup"/>
    <div style={{display:'flex',gap:'var(--s2)',marginBottom:'var(--s3)',flexWrap:'wrap'}}>
      <input className="mono" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')lookup();}}
        placeholder="domain, IP, or host…" aria-label="Threat lookup query"
        style={{flex:'1 1 260px',minWidth:200,height:28,padding:'0 var(--s3)',fontSize:'var(--t12)',color:'var(--text)',background:'var(--raised)',border:'1px solid var(--border)',borderRadius:'var(--r-ctl)'}}/>
      <button className="btn" onClick={lookup} disabled={busy||!q.trim()}>{busy?'Looking up…':'Lookup'}</button>
    </div>
    {err&&<div className="dt-empty" style={{color:'var(--crit)'}}>{err}</div>}
    {res&&<div style={{marginBottom:'var(--s3)'}}><SecEntities entities={res.entities}/></div>}
    <div style={{display:'flex',alignItems:'center',gap:'var(--s2)',flexWrap:'wrap'}}>
      {confirm==='block'
        ? <><span style={{fontSize:'var(--t12)',color:'var(--text-dim)'}}>Block {q.trim()}?</span>
            <button className="btn" onClick={()=>write('block')}>Confirm block</button>
            <button className="btn btn-ghost" onClick={()=>setConfirm(null)}>Cancel</button></>
        : <button className="btn" disabled={!q.trim()} onClick={()=>setConfirm('block')}>Block domain</button>}
      {confirm==='unblock'
        ? <><span style={{fontSize:'var(--t12)',color:'var(--text-dim)'}}>Unblock {q.trim()}?</span>
            <button className="btn" onClick={()=>write('unblock')}>Confirm unblock</button>
            <button className="btn btn-ghost" onClick={()=>setConfirm(null)}>Cancel</button></>
        : <button className="btn btn-ghost" disabled={!q.trim()} onClick={()=>setConfirm('unblock')}>Unblock domain</button>}
    </div>
  </div>;
}

function SecArrayTable({rows,csvName}){
  if(!Array.isArray(rows)||!rows.length) return <div className="dt-empty">None</div>;
  if(typeof rows[0]!=='object'||rows[0]===null) return <DataTable cols={[{key:'value',label:'Value'}]} rows={rows.map(v=>({value:v}))} csvName={csvName}/>;
  return <DataTable cols={secAutoCols(rows)} rows={rows} csvName={csvName}/>;
}
function SecRoaming({re}){
  if(!re||typeof re!=='object') return null;
  const byStatus=re.by_status||{};
  const tc=Array.isArray(re.top_countries)?re.top_countries:[];
  return <SecSection title="Roaming endpoints">
    <div style={{display:'flex',alignItems:'baseline',gap:'var(--s4)',marginBottom:'var(--s2)',flexWrap:'wrap'}}>
      <span className="mono" style={{fontSize:'var(--t28)',fontWeight:600}}>{re.total||0}</span>
      <span className="mono" style={{fontSize:'var(--t11)',color:'var(--text-dim)'}}>
        {Object.entries(byStatus).map(([k,v])=>k+' '+v).join(' · ')||'no status data'}
      </span>
    </div>
    {tc.length>0&&<DataTable cols={[{key:'country',label:'Country'},{key:'count',label:'Endpoints',mono:true,align:'right'}]}
      rows={tc.map(p=>Array.isArray(p)?{country:p[0],count:p[1]}:p)} csvName="roaming-countries"/>}
  </SecSection>;
}
function SecDomainPanels(){
  const {data,error,fetchedAt,refetch,loading}=useApi('/api/hub/domains');
  if(loading&&!data) return <div><SecHead title="Domain protection"/><Skeleton rows={10}/></div>;
  const d=data||{};
  const hosts=d.host_inventory&&Array.isArray(d.host_inventory.hosts)?d.host_inventory.hosts:(Array.isArray(d.hosts)?d.hosts:null);
  return <div>
    <SecHead title="Domain protection" at={fetchedAt} onRetry={refetch} error={error}/>
    <div style={{display:'flex',flexDirection:'column',gap:'var(--s6)'}}>
      {Array.isArray(d.threat_feeds)&&d.threat_feeds.length>0&&<SecSection title="Threat feeds"><SecArrayTable rows={d.threat_feeds} csvName="threat-feeds"/></SecSection>}
      {Array.isArray(d.named_lists)&&d.named_lists.length>0&&<SecSection title="Named lists"><SecArrayTable rows={d.named_lists} csvName="named-lists"/></SecSection>}
      {Array.isArray(d.security_policies)&&d.security_policies.length>0&&<SecSection title="Security policies"><SecArrayTable rows={d.security_policies} csvName="security-policies"/></SecSection>}
      {d.roaming_endpoints&&<SecRoaming re={d.roaming_endpoints}/>}
      {Array.isArray(d.anycast_ha)&&d.anycast_ha.length>0&&<SecSection title="Anycast HA"><SecArrayTable rows={d.anycast_ha} csvName="anycast-ha"/></SecSection>}
      {Array.isArray(d.dfp_services)&&d.dfp_services.length>0&&<SecSection title="DFP services"><SecArrayTable rows={d.dfp_services} csvName="dfp-services"/></SecSection>}
      {hosts&&hosts.length>0&&<SecSection title="Hosts"><SecArrayTable rows={hosts} csvName="hosts"/></SecSection>}
    </div>
  </div>;
}

function SecInsights(){
  const {data,error,fetchedAt,refetch,loading}=useApi('/api/insights');
  if(loading&&!data) return <div><SecHead title="SOC insights"/><Skeleton rows={6}/></div>;
  const rows=!data?[]:(Array.isArray(data)?data:(data.data||data.results||data.items||[]));
  return <div>
    <SecHead title="SOC insights" at={fetchedAt} onRetry={refetch} error={error}/>
    {rows.length?<DataTable cols={secAutoCols(rows)} rows={rows} csvName="soc-insights"/>:<div className="dt-empty">No insights</div>}
  </div>;
}
function SecActions(){
  const {data,error,fetchedAt,refetch,loading}=useApi('/api/actions');
  if(loading&&!data) return <div><SecHead title="Actions"/><Skeleton rows={6}/></div>;
  const rows=!data?[]:(Array.isArray(data)?data:(data.actions||data.results||data.data||[]));
  return <div>
    <SecHead title="Actions" at={fetchedAt} onRetry={refetch} error={error}/>
    {rows.length?<DataTable cols={secAutoCols(rows)} rows={rows} csvName="actions"/>:<div className="dt-empty">No actions</div>}
  </div>;
}

const SecurityTab=()=>
  <div style={{maxWidth:1200,margin:'0 auto',display:'flex',flexDirection:'column',gap:'var(--s8)'}}>
    <SecTriageInbox/>
    <SecThreatLookup/>
    <SecDomainPanels/>
    <SecInsights/>
    <SecActions/>
  </div>;
// ═══ END: SECURITY ═══

// ═══ REGION: ASKGLOBAL ═══
const AskTab=()=><Stub name="Ask"/>;
const AuditTab=()=><Stub name="Audit"/>;
function CommandPalette({open,onClose}){
  const inputRef=useRef(null);
  useEffect(()=>{if(open&&inputRef.current) inputRef.current.focus();},[open]);
  if(!open) return null;
  return <div className="palette-scrim" onClick={onClose}>
    <div className="palette" onClick={e=>e.stopPropagation()}>
      <input ref={inputRef} className="palette-in mono" placeholder="Search commands…"
        onKeyDown={e=>{if(e.key==='Escape') onClose();}}/>
      <div className="panel palette-body" style={{marginTop:8}}>Command palette — building</div>
    </div>
  </div>;
}
function ViewsMenu(){
  // A-later: saved views menu
  return null;
}
// ═══ END: ASKGLOBAL ═══

const TAB_COMPONENTS={
  overview:OverviewTab,
  network:NetworkTab,
  dns:DnsTab,
  infra:InfraTab,
  security:SecurityTab,
  audit:AuditTab,
  ask:AskTab,
};

/* ─────────────────────────────────────────────────────────────
   7. Top bar + Shell.
   ───────────────────────────────────────────────────────────── */
function TopBar({tab,org,fresh,onPalette}){
  const {orgName}=useAuth();
  const orgLabel=orgName||org;
  return <header className="topbar">
    <div className="brand">
      <BrandLogo/>
      <span className="brand-name">BloxSmith</span>
      {orgLabel?<span className="brand-org">{orgLabel}</span>:null}
    </div>
    <nav className="tabbar" aria-label="Sections">
      {TABS.map(t=><button key={t}
        className={'tab'+(t===tab?' active':'')}
        aria-current={t===tab?'page':undefined}
        onClick={()=>nav(t)}>{TAB_LABELS[t]}</button>)}
    </nav>
    <div className="topbar-right">
      {fresh}
      <AccountSlot/>
      <button className="kbd" onClick={onPalette} aria-label="Open command palette" title="Command palette">
        <span className="mono">⌘K</span>
      </button>
    </div>
  </header>;
}

function Shell(){
  const {tab}=useRoute();
  const [org]=useState(null);        // A2 fills real org name
  const [paletteOpen,setPaletteOpen]=useState(false);
  const [vaultTick,setVaultTick]=useState(0);

  // Re-check vault status whenever any request reports it locked.
  useEffect(()=>{
    const onLocked=()=>{
      fetch('/api/vault/status',{cache:'no-store'})
        .then(r=>r.json()).then(()=>setVaultTick(t=>t+1)).catch(()=>{});
    };
    window.addEventListener('bx:vault-locked',onLocked);
    return ()=>window.removeEventListener('bx:vault-locked',onLocked);
  },[]);

  // ⌘K / Ctrl-K toggles the palette.
  useEffect(()=>{
    const onKey=(e)=>{
      if((e.metaKey||e.ctrlKey)&&(e.key==='k'||e.key==='K')){
        e.preventDefault();setPaletteOpen(o=>!o);
      }
    };
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[]);

  const Active=TAB_COMPONENTS[tab]||OverviewTab;
  const fresh=<span className="fresh-slot"/>; // A2 wires real freshness

  return <div>
    <TopBar tab={tab} org={org} fresh={fresh} onPalette={()=>setPaletteOpen(true)}/>
    <main className="main" key={tab}>
      <Active vaultTick={vaultTick}/>
    </main>
    <CommandPalette open={paletteOpen} onClose={()=>setPaletteOpen(false)}/>
    <Toasts/>
  </div>;
}

function App(){
  return <VaultGate><Shell/></VaultGate>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
