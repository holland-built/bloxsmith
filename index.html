/* leasesInSubnet — ported verbatim from prior build (index-old.html ~L1061).
   Octet-prefix CIDR match: /8→1 octet, /16→2, /24→3, /32→4. */
function leasesInSubnet(leases, subnet) {
  const parts = (subnet.addr||'').split('.').map(Number);
  const cidr = subnet.cidr || 24;
  const octets = cidr <= 8 ? 1 : cidr <= 16 ? 2 : cidr <= 24 ? 3 : 4;
  const prefix = parts.slice(0, octets).join('.');
  return leases.filter(l => (l.addr || '').startsWith(prefix + '.') ||
                            (octets === 4 && l.addr === subnet.addr));
}

const NDA='NstarDnsActivity.';
function utilColor(u){return u>85?'var(--crit)':u>70?'var(--warn)':'var(--accent)';}
/* inline flat utilization bar + mono % (no gradients/shadows) */
function UtilBar(v){
  const u=Math.max(0,Math.min(100,Number(v)||0));
  return <span style={{display:'inline-flex',alignItems:'center',gap:8,justifyContent:'flex-end'}}>
    <span style={{width:60,height:4,background:'var(--raised)',borderRadius:2,overflow:'hidden',flex:'0 0 auto'}}>
      <span style={{display:'block',height:'100%',width:u+'%',background:utilColor(u)}}/>
    </span>
    <span className="mono" style={{minWidth:32,textAlign:'right'}}>{u}%</span>
  </span>;
}
/* 11px mono uppercase lease state — active green, everything else dim */
function StateText(state){
  const active=state==='active';
  return <span className="mono" style={{fontSize:'var(--t11)',textTransform:'uppercase',
    color:active?'var(--ok)':'var(--text-faint)'}}>{state||'—'}</span>;
}
function SectionHead({title,children}){

}

function NetworkTab(){
  const {params}=useRoute();
  const {data,error,locked,loading,fetchedAt,refetch}=useData();
  const {delta}=useSnapshots();
  if(locked) return null;
  if(loading&&!data) return <div className="page"><Skeleton rows={8}/></div>;
  if(error) return <div className="page"><Freshness error onRetry={refetch}/></div>;
  const subnets=(data&&data.subnets)||[];
  const leases=(data&&data.leases)||[];
  const drillKey=params.subnet||null;
  const drill=drillKey?subnets.find(s=>s.addr===drillKey||String(s.id)===drillKey):null;
  const drillLeases=drill?leasesInSubnet(leases,drill):[];

  // ── Synthesis band derivations ──
  const utilOf=s=>Number(s&&s.util)||0;
  const gt85=subnets.filter(s=>utilOf(s)>85).length;
  const b7085=subnets.filter(s=>{const u=utilOf(s);return u>=70&&u<=85;}).length;
  const activeLeases=leases.filter(l=>String(l.state||'').toLowerCase()==='active').length;
  const sorted=[...subnets].sort((a,b)=>utilOf(b)-utilOf(a));
  const worst=sorted[0]||null;
  const nearCount=subnets.filter(s=>utilOf(s)>70).length;
  const tone=gt85>0?'crit':b7085>0?'warn':'ok';
  const verdict=tone==='ok'
    ? 'DHCP capacity healthy — no subnet above 85%'
    : nearCount+' subnet'+(nearCount===1?'':'s')+' near exhaustion — worst: '+((worst&&(worst.name||worst.addr))||'—')+' at '+(worst?utilOf(worst):0)+'%';
  const facts=[
    {label:'Subnets >85%',value:gt85,delta:{v:delta('subnets.gt85'),good:'down'}},
    {label:'Watch 70-85%',value:b7085,delta:delta('subnets.b7085')},
    {label:'Active leases',value:activeLeases.toLocaleString(),delta:{v:delta('leases.active'),good:'up'}},
    {label:'Subnets total',value:subnets.length,delta:{v:delta('subnets.n'),good:'up'}},
  ];
  const chips=sorted.slice(0,3).map(s=>({
    label:(s.name||s.addr||'—')+' · '+utilOf(s)+'%',
    onClick:()=>nav('network',{subnet:s.addr||s.id}),
  }));

  const subnetCols=[
    {key:'name',label:'Subnet'},
    {key:'addr',label:'Network',mono:true,align:'left',render:(v,r)=>(r.addr||'')+(r.cidr?('/'+r.cidr):'')},
    {key:'util',label:'Utilization',align:'right',render:v=>UtilBar(v)},
    {key:'site',label:'Site',hideSm:true},
  ];

  return <div className="page">
    <SynthBand tone={tone} verdict={verdict} facts={facts} chips={chips}/>
    <section>
      <SectionHead title={drill?'Subnet detail':'Subnets'}>
        <Freshness at={fetchedAt} onRetry={refetch}/>
      </SectionHead>
      {drillKey
        ? (drill
            ? <div className="grid-2">
                <div className="panel" style={{padding:'var(--s4)'}}>
                  <button className="btn btn-ghost" onClick={()=>history.back()}>← Back</button>
                  <div style={{marginTop:'var(--s3)',fontWeight:600}}>{drill.name}</div>
                  <div className="mono" style={{color:'var(--text-dim)',marginTop:'var(--s1)'}}>{drill.addr}/{drill.cidr}</div>
                  <div style={{marginTop:'var(--s3)'}}>{UtilBar(drill.util||0)}</div>
                  <div className="mono" style={{marginTop:'var(--s3)',color:'var(--text-dim)',fontSize:'var(--t12)'}}>
                    {drillLeases.length} lease{drillLeases.length===1?'':'s'} in subnet</div>
                </div>
                <div>
                  {drillLeases.length
                    ? <DataTable cols={NET_LEASE_COLS} rows={drillLeases} defaultSort={{key:'addr',dir:'asc'}}
                        csvName={'leases-'+(drill.addr||drill.id)}/>

                <button className="btn btn-ghost" onClick={()=>history.back()}>← Back</button>
                <div className="dt-empty">Subnet not found</div>

            onRowClick={r=>nav('network',{subnet:r.addr||r.id})} csvName="subnets"/>}

      <SectionHead title={'All leases · '+leases.length}/>
      <DataTable cols={NET_LEASE_COLS} rows={leases} defaultSort={{key:'addr',dir:'asc'}} csvName="leases"/>

function DnsTab(){

  if(locked) return null;

        :anomalyCount+' volume anomaly flag'+(anomalyCount===1?'':'s'))+'; volume '+pctStr+' vs weekly average';

    {label:'Zones w/ issues',value:issueCount,delta:{v:delta('zones.issues'),good:'down'}},
    {label:'Anomalies',value:anomalyCount},

              {volume.slice(0,7).map((r,i)=>{const c=Number(r[NDA+'total_query_count'])||0;
                return <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'var(--s1)',minWidth:0}}>
                  <span className="mono" style={{fontSize:'var(--t11)',color:'var(--text-dim)'}}>{c.toLocaleString()}</span>
                  <span style={{width:'100%',background:'var(--accent)',borderRadius:'2px 2px 0 0',height:Math.round(c/vmax*80)+4}}/>
                  <span className="mono" style={{fontSize:'var(--t11)',color:'var(--text-faint)'}}>{fmtDay(r)}</span>

    </section>
    <section>
      <SectionHead title="Query types"/>
      {anLoading
        ? <Skeleton rows={4}/>
        : qtypes.length
          ? <div style={{display:'flex',flexDirection:'column',gap:'var(--s2)'}}>
              {qtypes.map((q,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:'var(--s3)'}}>
                <span className="mono" style={{width:64,flex:'0 0 auto',color:'var(--text-dim)'}}>{q.type}</span>

              </div>)}

          : <div className="dt-empty">No query-type data</div>}

    </div>
  </div>;

const M_HOST='HostMetrics.host_name', M_NAME='HostMetrics.metric_name', M_VAL='HostMetrics.avg_value';

function infraStatusColor(s){
  const v=(s||'').toLowerCase();
  if(v==='online'||v==='up') return 'var(--ok)';
  if(v==='degraded') return 'var(--warn)';
  if(v==='down'||v==='offline') return 'var(--crit)';
  return 'var(--text-faint)';
}
function fmtMetric(v){
  if(v==null||v==='') return null;
  const n=Number(v);
  if(!isFinite(n)) return null;
  const a=Math.abs(n);
  if(a>=1e6) return (n/1e6).toFixed(1)+'M';
  if(a>=1e3) return (n/1e3).toFixed(1)+'k';
  return n.toFixed(1);
}

function InfraTab({vaultTick}={}){
  const {params}=useRoute();
  const hostParam=params.host||'';
  const {data,error,locked,loading,fetchedAt,refetch}=useData();
  const mx=useApi('/api/host-metrics');

  // Re-fetch both feeds once a vault unlock is reported upstream.
  useEffect(()=>{ if(vaultTick){ refetch(); mx.refetch(); } },[vaultTick]);

  const hosts=(data&&data.hosts)||[];
  const metricRows=(mx.data&&mx.data.metrics)||[];

  // Pivot metrics into rows=host, cols=metric; flag each column's top decile.
  const {hostNames,metricNames,pivot,hotSet,hotByHost}=useMemo(()=>{
    const pv={},hSet=new Set(),mSet=new Set(),cols={};
    metricRows.forEach(r=>{
      const h=r[M_HOST],m=r[M_NAME];
      if(h==null||m==null) return;
      const val=Number(r[M_VAL]);
      hSet.add(h);mSet.add(m);
      (pv[h]||(pv[h]={}))[m]=isFinite(val)?val:null;
      if(isFinite(val)) (cols[m]||(cols[m]=[])).push(val);
    });
    const hot=new Set(),hotByHost={};
    Object.keys(cols).forEach(m=>{
      const vals=cols[m].slice().sort((a,b)=>a-b);
      if(vals.length<2||vals[0]===vals[vals.length-1]) return; // no spread → no tint
      const thr=vals[Math.floor(0.9*(vals.length-1))];
      Object.keys(pv).forEach(h=>{
        const v=pv[h][m];
        if(v!=null&&v>=thr){ hot.add(h+'␀'+m); hotByHost[h]=(hotByHost[h]||0)+1; }
      });
    });
    return {
      hostNames:[...hSet].sort((a,b)=>a.localeCompare(b)),
      metricNames:[...mSet].sort((a,b)=>a.localeCompare(b)),
      pivot:pv, hotSet:hot, hotByHost,
    };
  },[metricRows]);

  // ── Synthesis derivations (host status + hottest, day-over-day delta) ──
  const {delta}=useSnapshots();
  const online=hosts.filter(h=>/^(online|up)$/i.test(String(h.status||''))).length;
  const degradedHosts=hosts.filter(h=>/^degraded$/i.test(String(h.status||'')));
  const offlineHosts=hosts.filter(h=>/^(down|offline)$/i.test(String(h.status||'')));
  const total=hosts.length, degraded=degradedHosts.length, offline=offlineHosts.length;
  const byType=useMemo(()=>{const m={};hosts.forEach(h=>{const t=h.type||'—';m[t]=(m[t]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);},[hosts]);
  const hottest=Object.keys(hotByHost).reduce((best,h)=>hotByHost[h]>(hotByHost[best]||0)?h:best,null);

  if(locked||mx.locked) return null;

  // ── Per-host drill panel ──
  if(hostParam){
    const host=hosts.find(h=>h.name===hostParam);
    const drillRows=metricRows
      .filter(r=>r[M_HOST]===hostParam)
      .map(r=>({metric:r[M_NAME],value:Number(r[M_VAL])}));
    const drillCols=[
      {key:'metric',label:'Metric'},
      {key:'value',label:'Value',mono:true,align:'right',render:v=>{const f=fmtMetric(v);return f==null?'·':f;}},
    ];
    return <div className="infra-page">
      <div className="infra-sec">
        <div className="infra-drill-top">
          <button className="infra-back" onClick={()=>history.back()}>← Back</button>
          <span className="infra-h">{hostParam}</span>
          {host&&host.ip?<span className="infra-ip mono">{host.ip}</span>:null}
          {host?<span className="infra-st mono" style={{color:infraStatusColor(host.status)}}>{host.status}</span>:null}
        </div>
      </div>
      <div className="infra-sec">
        <div className="infra-head">
          <span className="infra-h">Metrics</span>
          <Freshness at={mx.fetchedAt} error={mx.error} onRetry={mx.refetch}/>
        </div>
        {mx.loading&&!mx.data ? <Skeleton rows={5}/>
          : drillRows.length===0 ? <div className="infra-dim">No metrics reported</div>
          : <DataTable cols={drillCols} rows={drillRows} defaultSort={{key:'metric',dir:'asc'}}/>}
      </div>
    </div>;
  }

  // ── Host inventory ──
  const hostCols=[
    {key:'name',label:'Host'},
    {key:'ip',label:'IP',mono:true},
    {key:'type',label:'Type',hideSm:true},
    {key:'status',label:'Status',render:v=><span className="mono infra-st" style={{color:infraStatusColor(v)}}>{v||'—'}</span>},
  ];

  // ── Answer-first synthesis band ──
  const tone=offline>0?'crit':degraded>0?'warn':'ok';
  const worst=(offlineHosts[0]&&offlineHosts[0].name)||(degradedHosts[0]&&degradedHosts[0].name)||'';
  const verdict=(offline===0&&degraded===0)
    ? 'All '+total+' hosts online — infrastructure healthy'
    : offline+' hosts offline, '+degraded+' degraded'+(worst?' — '+worst+' needs attention':'');
  const dOff={v:delta('hosts.offline'),good:'down'};
  const facts=[
    {label:'Hosts online',value:online+'/'+total,delta:dOff},
    {label:'Degraded',value:degraded},
    {label:'Offline',value:offline,delta:dOff},
    {label:'Hottest host',value:hottest||'—'},
  ];
  const chips=offlineHosts.map(h=>({label:h.name,onClick:()=>nav('infra',{host:h.name})}));

  return <div className="infra-page">
    <SynthBand tone={tone} verdict={verdict} facts={facts} chips={chips}/>

    <div className="grid-2">
      <div className="infra-sec">
        <div className="infra-head">
          <span className="infra-h">Hosts</span>
          <Freshness at={fetchedAt} error={error} onRetry={refetch}/>
        </div>
        {loading&&!data ? <Skeleton rows={6}/>
          : <DataTable cols={hostCols} rows={hosts} defaultSort={{key:'name',dir:'asc'}}
              csvName="infra-hosts" onRowClick={r=>nav('infra',{host:r.name})}/>}
      </div>

      <div className="infra-panel">
        <div className="infra-panel-h">Status</div>
        <div className="infra-stat"><span className="infra-stat-dot" style={{background:'var(--ok)'}}/><span className="infra-stat-l">Online</span><span className="infra-stat-v mono">{online}</span></div>
        <div className="infra-stat"><span className="infra-stat-dot" style={{background:'var(--warn)'}}/><span className="infra-stat-l">Degraded</span><span className="infra-stat-v mono">{degraded}</span></div>
        <div className="infra-stat"><span className="infra-stat-dot" style={{background:'var(--crit)'}}/><span className="infra-stat-l">Offline</span><span className="infra-stat-v mono">{offline}</span></div>
        <div className="infra-panel-div"/>
        <div className="infra-panel-h">By type</div>
        {byType.length
          ? byType.map(([t,c])=><div key={t} className="infra-panel-row"><span>{t}</span><span className="mono">{c}</span></div>)
          : <div className="infra-dim">No hosts</div>}
        {hottest?<React.Fragment>
          <div className="infra-panel-div"/>
          <div className="infra-panel-h">Hottest host</div>
          <button className="infra-panel-btn" onClick={()=>nav('infra',{host:hottest})}>{hottest} — {hotByHost[hottest]} sensors hot →</button>
        </React.Fragment>:null}
      </div>
    </div>

    <div className="infra-sec">
      <div className="infra-head">
        <span className="infra-h">Sensors</span>
        <Freshness at={mx.fetchedAt} error={mx.error} onRetry={mx.refetch}/>
      </div>
      {mx.loading&&!mx.data ? <Skeleton rows={6}/>
        : metricNames.length===0 ? <div className="infra-dim">No metrics reported</div>
        : <div className="sensor-wrap">
            <table className="sensor">
              <thead><tr>
                <th className="sensor-hcol">Host</th>
                {metricNames.map(m=><th key={m}>{m}</th>)}
              </tr></thead>
              <tbody>
                {hostNames.map(h=><tr key={h}>
                  <td className="sensor-hcol mono">{h}</td>
                  {metricNames.map(m=>{
                    const f=fmtMetric(pivot[h]&&pivot[h][m]);
                    const hot=hotSet.has(h+'␀'+m);
                    return <td key={m} className={'mono'+(f==null?' sensor-null':(hot?' sensor-hot':''))}>
                      {f==null?'·':f}</td>;
                  })}
                </tr>)}
              </tbody>
            </table>
          </div>}
    </div>
  </div>;
}
// ═══ END: INFRA ═══

// ═══ REGION: SECURITY ═══
/* Security region — triage inbox, threat lookup, domain panels, SOC insights,
   actions. Reuses useApi, DataTable, Freshness, toast, LS, Skeleton, relAge, tokens. */
const SEC_SEV_RANK={critical:0,high:1,medium:2,low:3};
const secSevColor=s=>({critical:'var(--crit)',high:'var(--warn)'})[String(s||'').toLowerCase()]||'var(--text-dim)';
const secAckKey=e=>String(e.event_time)+'|'+String(e.qname);
function secHumanize(k){return String(k).replace(/^InsightsSummaryView\./,'').replace(/[_.]/g,' ').replace(/\b\w/g,c=>c.toUpperCase()).trim();}
function secAutoCols(rows){
  const first=(rows||[]).find(r=>r&&typeof r==='object')||{};
  return Object.keys(first).map(k=>({key:k,label:secHumanize(k),mono:typeof first[k]==='number',align:typeof first[k]==='number'?'right':'left'}));
}
function secEvtAge(t){
  if(t==null||t==='') return '—';
  let ms;
  if(typeof t==='number') ms=t<1e12?t*1000:t;
  else if(/^\d+$/.test(String(t))){const n=Number(t);ms=n<1e12?n*1000:n;}
  else ms=new Date(t).getTime();
  if(isNaN(ms)) return String(t);
  return relAge(new Date(ms));
}
function SecHead({title,at,onRetry,error,children}){
  return <div style={{display:'flex',alignItems:'center',gap:'var(--s3)',marginBottom:'var(--s3)',flexWrap:'wrap'}}>
    <h2 style={{margin:0,fontSize:'var(--t13)',fontWeight:600}}>{title}</h2>
    {children}
    <span style={{marginLeft:'auto'}}><Freshness at={at} onRetry={onRetry} error={error}/></span>
  </div>;
}
function SecSection({title,children}){
  return <section>
    <h3 style={{margin:'0 0 var(--s2)',fontSize:'var(--t12)',fontWeight:600,color:'var(--text-dim)'}}>{title}</h3>
    {children}
  </section>;
}
const secChip=active=>({height:22,padding:'0 var(--s2)',fontSize:'var(--t11)',background:'transparent',color:active?'var(--accent-text)':'var(--text-dim)',border:'1px solid '+(active?'var(--accent)':'var(--border)'),borderRadius:'var(--r-ctl)',cursor:'pointer'});
function SecChips({options,value,onChange}){
  return <span style={{display:'inline-flex',gap:'var(--s1)'}}>
    {options.map(o=><button key={o.v} style={secChip(value===o.v)} onClick={()=>onChange(o.v)}>{o.label}</button>)}
  </span>;
}

/* Peek (F4) — full event detail with inline ack toggle + two-step Block. */
function SecEventPeek({e,acks,toggleAck}){
  const [acked,setAcked]=useState(!!acks[secAckKey(e)]);
  const [confirm,setConfirm]=useState(false);
  const [blocking,setBlocking]=useState(false);
  const fields=[
    ['Time',secEvtAge(e.event_time)+' · '+String(e.event_time??'—')],
    ['Query',e.qname],
    ['Severity',e.severity],
    ['Action',e.policy_action],
    ['Feed',e.feed_name],
    ['Threat',e.threat_indicator],
    ['Device',e.device],
    ['Network',e.network],
  ];
  const doBlock=async()=>{
    const domain=String(e.qname||'').trim(); if(!domain) return;
    setConfirm(false);setBlocking(true);
    try{
      const r=await fetch('/api/block-domain',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain})});
      const body=await r.json().catch(()=>({}));
      if(r.status===401) toast('Blocking requires bridge token','err');
      else if(r.ok&&body.ok) toast('Blocked '+domain,'ok');
      else toast(body.error||('HTTP '+r.status),'err');
    }catch(err){toast(String((err&&err.message)||err),'err');}
    setBlocking(false);
  };
  return <div style={{display:'flex',flexDirection:'column',gap:'var(--s3)'}}>
    <dl style={{margin:0,display:'grid',gridTemplateColumns:'auto 1fr',gap:'var(--s1) var(--s3)',fontSize:'var(--t12)'}}>
      {fields.map(([k,v])=><React.Fragment key={k}>
        <dt style={{color:'var(--text-dim)'}}>{k}</dt>
        <dd className="mono" style={{margin:0,color:k==='Severity'?secSevColor(v):'var(--text)',wordBreak:'break-all'}}>{v==null||v===''?'—':String(v)}</dd>
      </React.Fragment>)}
    </dl>
    <label style={{display:'flex',alignItems:'center',gap:'var(--s2)',fontSize:'var(--t12)'}}>
      <input type="checkbox" checked={acked} onChange={()=>{setAcked(x=>!x);toggleAck(e);}}/>
      Acknowledged
    </label>
    <div>
      {confirm
        ? <span style={{display:'inline-flex',gap:'var(--s2)',alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:'var(--t12)',color:'var(--text-dim)'}}>Block {e.qname}?</span>
            <button className="btn" disabled={blocking} onClick={doBlock}>Confirm</button>
            <button className="btn btn-ghost" onClick={()=>setConfirm(false)}>Cancel</button>
          </span>
        : <button className="btn" disabled={!e.qname||blocking} onClick={()=>setConfirm(true)}>{blocking?'Blocking…':'Block domain'}</button>}
    </div>
  </div>;
}

function SecTriageInbox({api,sevF,setSevF,acks,setAcks,toggleAck,clearAcks,triageRef,initialPeekKey}){
  const {data,error,locked,fetchedAt,refetch,loading}=api;
  const [actF,setActF]=useState('all');
  // Real 24h activity — bucket ALL events per qname by hour-of-day from real event_time.
  const activityByQname=useMemo(()=>{
    const evs=(data&&Array.isArray(data.events))?data.events:[];
    const parseHour=t=>{
      if(t==null||t==='') return null;
      let ms;
      if(typeof t==='number') ms=t<1e12?t*1000:t;
      else if(/^\d+$/.test(String(t))){const n=Number(t);ms=n<1e12?n*1000:n;}
      else ms=new Date(t).getTime();
      if(isNaN(ms)) return null;
      return new Date(ms).getHours();
    };
    const m={};
    evs.forEach(e=>{
      const q=e&&e.qname; if(!q) return;
      const h=parseHour(e.event_time); if(h==null) return;
      if(!m[q]) m[q]=new Array(24).fill(0);
      m[q][h]++;
    });
    return m;
  },[data]);
  if(locked) return null;
  if(loading&&!data) return <div><SecHead title="Triage inbox"/><Skeleton rows={8}/></div>;
  const d=data||{};
  const counts=d.counts||{};
  const events=Array.isArray(d.events)?d.events:[];
  let rows=events.filter(e=>{
    const sev=String(e.severity||'').toLowerCase();
    if(sevF!=='all'&&sev!==sevF) return false;
    const act=String(e.policy_action||'').toLowerCase();
    if(actF==='blocked'&&!(act==='block'||act==='redirect')) return false;
    if(actF==='logged'&&act!=='log') return false;
    return true;
  });
  rows=rows.map((e,i)=>({e,i})).sort((A,B)=>{
    const aa=acks[secAckKey(A.e)]?1:0,ab=acks[secAckKey(B.e)]?1:0;
    if(aa!==ab) return aa-ab;
    const ra=SEC_SEV_RANK[String(A.e.severity||'').toLowerCase()]??9,rb=SEC_SEV_RANK[String(B.e.severity||'').toLowerCase()]??9;
    if(ra!==rb) return ra-rb;
    return String(B.e.event_time||'').localeCompare(String(A.e.event_time||''));
  }).map(x=>x.e);
  const cols=[
    {key:'ack',label:'',width:28,render:(_,e)=>{
      const acked=!!acks[secAckKey(e)];
      return <input type="checkbox" checked={acked} onClick={ev=>ev.stopPropagation()} onChange={()=>toggleAck(e)} aria-label="Acknowledge event"/>;
    }},
    {key:'severity',label:'Severity',mono:true,render:v=><span style={{color:secSevColor(v),textTransform:'uppercase'}}>{v||'—'}</span>},
    {key:'qname',label:'Query',mono:true,copy:true,render:v=>v||'—'},
    {key:'spark',label:'24h',render:()=>'—',spark:e=>{const arr=activityByQname[e.qname];if(!arr)return null;const nz=arr.filter(x=>x>0).length;return nz>=2?arr:null;}},
    {key:'policy_action',label:'Action',render:v=>v||'—'},
    {key:'feed_name',label:'Feed',hideSm:true,render:v=><span style={{color:'var(--text-dim)'}}>{v||'—'}</span>},
    {key:'device',label:'Device',hideSm:true,render:v=>v||'—'},
    {key:'event_time',label:'Time',mono:true,align:'right',render:v=><span style={{color:'var(--text-faint)'}}>{secEvtAge(v)}</span>},
  ];
  const bulkActions=(rws)=>[
    {label:'Ack '+rws.length,flash:true,run:()=>{
      const prev={...acks};
      const next={...acks};
      rws.forEach(e=>{next[secAckKey(e)]=true;});
      setAcks(next);LS.set('acks',next);
      toast(rws.length+' acked','ok',{duration:5000,action:{label:'Undo',run:()=>{setAcks(prev);LS.set('acks',prev);}}});
    }},
    {label:'Block domains',confirm:'Block '+rws.length+' domain'+(rws.length===1?'':'s')+'?',flash:true,run:async()=>{
      const domains=[...new Set(rws.map(e=>e.qname).filter(Boolean))];
      let ok=0,fail=0,auth=false;
      for(const domain of domains){
        try{
          const r=await fetch('/api/block-domain',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain})});
          if(r.status===401){auth=true;break;}
          const body=await r.json().catch(()=>({}));
          if(r.ok&&body.ok)ok++;else fail++;
        }catch(e){fail++;}
      }
      if(auth) toast('Blocking requires bridge token','err');
      else toast(ok+' domain'+(ok===1?'':'s')+' blocked'+(fail?' · '+fail+' failed':''),(fail&&!ok)?'err':'ok');
    }},
  ];
  return <div ref={triageRef}>
    <SecHead title="Triage inbox" at={fetchedAt} onRetry={refetch} error={error}>
      <span className="mono" style={{fontSize:'var(--t12)'}}>
        <span style={{color:'var(--crit)'}}>critical {counts.critical||0}</span>{' · '}
        <span style={{color:'var(--warn)'}}>high {counts.high||0}</span>{' · '}
        <span style={{color:'var(--text-dim)'}}>medium {counts.medium||0}</span>{' · '}
        <span style={{color:'var(--text-dim)'}}>low {counts.low||0}</span>
      </span>
      <span className="mono" style={{fontSize:'var(--t11)',color:'var(--text-faint)'}}>
        {(d.blocked||0)+' blocked · '+(d.logged||0)+' logged · '+(d.total||0)+' total'}
      </span>
    </SecHead>
    <div style={{display:'flex',alignItems:'center',gap:'var(--s3)',marginBottom:'var(--s3)',flexWrap:'wrap'}}>
      <SecChips value={sevF} onChange={setSevF} options={[{v:'all',label:'all'},{v:'critical',label:'critical'},{v:'high',label:'high'},{v:'medium',label:'medium'},{v:'low',label:'low'}]}/>
      <span style={{width:1,height:16,background:'var(--border)'}}/>
      <SecChips value={actF} onChange={setActF} options={[{v:'all',label:'all'},{v:'blocked',label:'blocked'},{v:'logged',label:'logged'}]}/>
      <button className="fresh-retry" style={{marginLeft:'auto'}} onClick={clearAcks}>Clear acks</button>
    </div>
    {rows.length===0
      ? <div className="dt-empty">No events</div>
      : <DataTable cols={cols} rows={rows} tableId="triage"
          rowKey={r=>String(r.event_time)+'|'+String(r.qname)}
          selectable bulkActions={bulkActions} initialPeekKey={initialPeekKey}
          renderPeek={e=><SecEventPeek e={e} acks={acks} toggleAck={toggleAck}/>}/>}
  </div>;
}

function SecEntities({entities}){
  if(entities==null) return null;
  if(Array.isArray(entities)){
    if(!entities.length) return <div className="dt-empty">No matches</div>;
    if(typeof entities[0]==='object'&&entities[0]) return <DataTable cols={secAutoCols(entities)} rows={entities} csvName="threat-lookup"/>;
  }
  return <pre className="mono" style={{fontSize:'var(--t11)',color:'var(--text-dim)',whiteSpace:'pre-wrap',margin:0,padding:'var(--s3)',background:'var(--raised)',border:'1px solid var(--border)',borderRadius:'var(--r-ctl)',maxHeight:320,overflow:'auto'}}>{JSON.stringify(entities,null,2)}</pre>;
}
function SecThreatLookup(){
  const [q,setQ]=useState('');
  const [busy,setBusy]=useState(false);
  const [res,setRes]=useState(null);
  const [err,setErr]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const lookup=async()=>{
    const query=q.trim(); if(!query) return;
    setBusy(true);setErr(null);setRes(null);setConfirm(null);
    try{
      const r=await fetch('/api/threat-lookup?q='+encodeURIComponent(query),{cache:'no-store'});
      const body=await r.json().catch(()=>null);
      if(!r.ok||(body&&body.error)) setErr((body&&body.error)||('HTTP '+r.status));
      else setRes(body||{entities:[],query});
    }catch(e){setErr(String((e&&e.message)||e));}
    setBusy(false);
  };
  const write=async(kind)=>{
    const domain=q.trim(); if(!domain) return;
    const url=kind==='block'?'/api/block-domain':'/api/unblock-domain';
    setConfirm(null);
    try{
      const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain})});
      const body=await r.json().catch(()=>({}));
      if(r.status===401) toast('Requires bridge token','err');
      else if(r.ok&&body.ok) toast((kind==='block'?'Blocked ':'Unblocked ')+domain,'ok');
      else toast(body.error||('HTTP '+r.status),'err');
    }catch(e){toast(String((e&&e.message)||e),'err');}
  };
  return <div>
    <SecHead title="Threat lookup"/>
    <div style={{display:'flex',gap:'var(--s2)',marginBottom:'var(--s3)',flexWrap:'wrap'}}>
      <input className="mono" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')lookup();}}
        placeholder="domain, IP, or host…" aria-label="Threat lookup query"
        style={{flex:'1 1 260px',minWidth:200,height:28,padding:'0 var(--s3)',fontSize:'var(--t12)',color:'var(--text)',background:'var(--raised)',border:'1px solid var(--border)',borderRadius:'var(--r-ctl)'}}/>
      <button className="btn" onClick={lookup} disabled={busy||!q.trim()}>{busy?'Looking up…':'Lookup'}</button>
    </div>
    {err&&<div className="dt-empty" style={{color:'var(--crit)'}}>{err}</div>}
    {res&&<div style={{marginBottom:'var(--s3)'}}><SecEntities entities={res.entities}/></div>}
    <div style={{display:'flex',alignItems:'center',gap:'var(--s2)',flexWrap:'wrap'}}>
      {confirm==='block'
        ? <><span style={{fontSize:'var(--t12)',color:'var(--text-dim)'}}>Block {q.trim()}?</span>
            <button className="btn" onClick={()=>write('block')}>Confirm block</button>
            <button className="btn btn-ghost" onClick={()=>setConfirm(null)}>Cancel</button></>
        : <button className="btn" disabled={!q.trim()} onClick={()=>setConfirm('block')}>Block domain</button>}
      {confirm==='unblock'
        ? <><span style={{fontSize:'var(--t12)',color:'var(--text-dim)'}}>Unblock {q.trim()}?</span>
            <button className="btn" onClick={()=>write('unblock')}>Confirm unblock</button>
            <button className="btn btn-ghost" onClick={()=>setConfirm(null)}>Cancel</button></>
        : <button className="btn btn-ghost" disabled={!q.trim()} onClick={()=>setConfirm('unblock')}>Unblock domain</button>}
    </div>
  </div>;
}

function SecArrayTable({rows,csvName}){
  if(!Array.isArray(rows)||!rows.length) return <div className="dt-empty">None</div>;
  if(typeof rows[0]!=='object'||rows[0]===null) return <DataTable cols={[{key:'value',label:'Value'}]} rows={rows.map(v=>({value:v}))} csvName={csvName}/>;
  return <DataTable cols={secAutoCols(rows)} rows={rows} csvName={csvName}/>;
}

function SecSynthBand({api,acks,setSevF,triageRef}){
  const {delta}=useSnapshots();
  if(!api||!api.data) return null;
  const d=api.data||{};
  const events=Array.isArray(d.events)?d.events:[];
  const sevOf=e=>String(e.severity||'').toLowerCase();
  const unacked=events.filter(e=>!acks[secAckKey(e)]);
  const uCrit=unacked.filter(e=>sevOf(e)==='critical').length;
  const uHigh=unacked.filter(e=>sevOf(e)==='high').length;
  const blocked=Number(d.blocked)||0;
  const total=Number(d.total)||events.length;
  const tone=uCrit>0?'crit':uHigh>0?'warn':'ok';
  const pool=uCrit>0?unacked.filter(e=>sevOf(e)==='critical'):unacked;
  const topDev=(()=>{
    const freq={};
    pool.forEach(e=>{const v=e.device;if(v)freq[v]=(freq[v]||0)+1;});
    const arr=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
    return arr.length?arr[0][0]:null;
  })();
  const verdict=uCrit>0
    ? uCrit+' critical threat'+(uCrit===1?'':'s')+' awaiting triage'+(topDev?' (top target: '+topDev+')':'')
    : 'No unacknowledged critical threats — '+blocked+' blocked automatically';
  const facts=[
    {label:'Unacked critical', value:uCrit, delta:{v:delta('sec.crit'),good:'down'}},
    {label:'Unacked high', value:uHigh, delta:{v:delta('sec.high'),good:'down'}},
    {label:'Blocked', value:blocked, delta:{v:delta('sec.blocked'),good:'up'}},
    {label:'Total events', value:total},
  ];
  const jump=sev=>{setSevF(sev);if(triageRef&&triageRef.current)triageRef.current.scrollIntoView({behavior:'smooth',block:'start'});};
  const chips=[
    uCrit>0?{label:'Triage '+uCrit+' critical', onClick:()=>jump('critical')}:null,
    uHigh>0?{label:'Triage '+uHigh+' high', onClick:()=>jump('high')}:null,
    topDev?{label:'Top target: '+topDev, onClick:()=>jump(uCrit>0?'critical':'all')}:null,
  ].filter(Boolean);
  return <SynthBand tone={tone} verdict={verdict} facts={facts} chips={chips}/>;
}

/* Saved-view helpers shared by ViewsMenu + CommandPalette.
   Server (view_write) persists only name/widgets/order/layout/folder/saved_at
   and drops unknown top-level keys, so the route is mirrored inside layout
   (opaque to the server) as well as sent top-level per the view schema. */
function saveCurrentView(name,folder){
  const {tab,params}=parseHash();
  const route={tab,params};
  return fetch('/api/views',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,widgets:{},order:[],layout:{route},folder:folder||'',saved_at:new Date().toISOString(),route})})
    .then(async r=>{const j=await r.json().catch(()=>({}));return {ok:r.ok&&j.ok!==false,error:j&&j.error};});
}
function applyViewByName(name){
  fetch('/api/views/'+encodeURIComponent(name))
    .then(r=>r.ok?r.json():Promise.reject('HTTP '+r.status))
    .then(v=>{
      const route=(v&&v.route)||(v&&v.layout&&v.layout.route)||null;
      if(route&&route.tab){ nav(route.tab,route.params||{}); toast('View "'+name+'" applied','ok'); }
      else toast('Legacy view — no route stored','warn');
    })
    .catch(()=>toast('Could not load view "'+name+'"','err'));
}

/* Alert rules — LS-only thresholds polled against /api/data every 120s. */
const ALERT_DEFAULTS={subnetUtilOn:false,subnetUtil:85,hostOfflineOn:false};
function AlertRulesPanel(){
  const [rules,setRules]=useState(()=>({...ALERT_DEFAULTS,...LS.get('alertRules',{})}));
  const firedRef=useRef({});
  const save=next=>{setRules(next);LS.set('alertRules',next);};
  const toggle=(key,on)=>{
    if(on&&typeof Notification!=='undefined'&&Notification.permission==='default'){
      try{Notification.requestPermission();}catch(e){}
    }
    save({...rules,[key]:on});
  };
  const anyOn=rules.subnetUtilOn||rules.hostOfflineOn;
  useEffect(()=>{
    if(!anyOn) return;
    let alive=true;
    const notify=m=>{
      toast(m,'warn');
      if(typeof Notification!=='undefined'&&Notification.permission==='granted'){
        try{new Notification('BloxSmith alert',{body:m});}catch(e){}
      }
    };
    const check=()=>{
      fetch('/api/data',{cache:'no-store'}).then(r=>r.ok?r.json():null).then(d=>{
        if(!alive||!d||d.locked||d.error) return;
        if(rules.subnetUtilOn){
          const thr=Number(rules.subnetUtil)||85;
          (d.subnets||[]).forEach(s=>{
            if((s.util||0)>=thr){
              const k='sub:'+(s.id||s.name);
              if(!firedRef.current[k]){firedRef.current[k]=1;notify('Subnet '+(s.name||s.addr)+' at '+s.util+'% utilization (threshold '+thr+'%)');}
            }
          });
        }
        if(rules.hostOfflineOn){
          (d.hosts||[]).forEach(h=>{
            if(h.status==='offline'){
              const k='host:'+(h.id||h.name);
              if(!firedRef.current[k]){firedRef.current[k]=1;notify('Host '+(h.name||h.id)+' is offline');}
            }
          });
        }
      }).catch(()=>{});
    };
    check();
    const iv=setInterval(check,120000);
    return ()=>{alive=false;clearInterval(iv);};
  },[anyOn,rules.subnetUtilOn,rules.hostOfflineOn,rules.subnetUtil]);
  return <div className="panel" style={{padding:16}}>
    <div style={{fontSize:12,fontWeight:600}}>Alerts</div>
    <div style={{fontSize:11,color:'var(--text-faint)',margin:'4px 0 8px'}}>
      Checked every 2 minutes while this tab is open. Fires a toast plus a browser notification when permitted.
    </div>
    <label className="alerts-row">
      <input type="checkbox" checked={!!rules.subnetUtilOn} onChange={e=>toggle('subnetUtilOn',e.target.checked)}/>
      <span>Subnet utilization at or above</span>
      <input className="alerts-num mono" type="number" min="1" max="100" value={rules.subnetUtil}
        onChange={e=>save({...rules,subnetUtil:e.target.value})} aria-label="Subnet utilization threshold percent"/>
      <span>%</span>
    </label>
    <label className="alerts-row">
      <input type="checkbox" checked={!!rules.hostOfflineOn} onChange={e=>toggle('hostOfflineOn',e.target.checked)}/>
      <span>Any infrastructure host offline</span>
    </label>
  </div>;
}

/* AskTab — natural-language query console over POST /api/query. */
function AskTab(){
  const {params}=useRoute();
  const {data}=useData();
  const [input,setInput]=useState('');
  const [busy,setBusy]=useState(false);
  const [items,setItems]=useState([]); // newest first, capped at 5
  const askedRef=useRef(null);
  const push=entry=>setItems(list=>[{id:Date.now()+Math.random(),...entry},...list].slice(0,5));
  const submit=(qArg)=>{
    const q=String(qArg!=null?qArg:input).trim();
    if(!q||busy) return;
    setBusy(true);
    fetch('/api/query',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:q,context:''})})
      .then(async r=>{const j=await r.json().catch(()=>null);return {r,j};})
      .then(({r,j})=>{
        if(r.status===503||(j&&j.locked)){
          window.dispatchEvent(new CustomEvent('bx:vault-locked'));
          push({q,error:'Vault locked — unlock to query.'});
          return;
        }
        if(j&&j.error){ push({q,error:String(j.error)}); return; }
        if(!r.ok&&!(j&&typeof j.answer==='string')){ push({q,error:'HTTP '+r.status}); return; }
        push({
          q,
          answer:(j&&typeof j.answer==='string')?j.answer:'Query returned an unexpected response.',
          suggestions:(j&&Array.isArray(j.suggestions))?j.suggestions:[],
          trace:(j&&Array.isArray(j.trace))?j.trace:null,
        });
      })
      .catch(()=>toast('Query failed — server unreachable','err'))
      .finally(()=>setBusy(false));
  };
  // Palette hands off "#ask?q=…": prefill + submit once per distinct q.
  useEffect(()=>{
    const q=params&&params.q;
    if(q&&askedRef.current!==q){ askedRef.current=q; setInput(q); submit(q); }
  },[params&&params.q]);

  // ── Context band — inventory scope + real-numbered suggested questions ──
  const nSub=((data&&data.subnets)||[]).length;
  const nZone=((data&&data.zones)||[]).length;
  const nHost=((data&&data.hosts)||[]).length;
  const ar={...ALERT_DEFAULTS,...LS.get('alertRules',{})};
  const alertsArmed=ar.subnetUtilOn||ar.hostOfflineOn;
  const verdict='Ask anything about your network — '+nSub+' subnets, '+nZone+' zones, '+nHost+' hosts indexed';
  const facts=[{label:'Alert rules',value:alertsArmed?'Armed':'Disarmed'}];
  const ask=q=>{setInput(q);submit(q);};
  const chips=[
    {label:'Which subnets are nearly full?',onClick:()=>ask('Which subnets are nearly full?')},
    {label:'Are any of my '+nZone+' DNS zones misconfigured?',onClick:()=>ask('Are any of my '+nZone+' DNS zones misconfigured?')},
    {label:'Which of '+nHost+' hosts are offline?',onClick:()=>ask('Which of '+nHost+' hosts are offline?')},
    {label:'What changed in the last 24 hours?',onClick:()=>ask('What changed in the last 24 hours?')},
  ];

  return <div className="page">
    <SynthBand tone="ok" verdict={verdict} facts={facts} chips={chips}/>
    <div className="grid-2">
      <div className="prose" style={{display:'flex',flexDirection:'column',gap:'var(--s5)'}}>
        <div>
          <div className="ask-bar">
            <input className="ask-in mono" placeholder="Ask about your network… e.g. Which subnets are nearly full?"
              value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter')submit();}}
              aria-label="Natural-language query" autoFocus/>
            <button className="btn" style={{height:36}} onClick={()=>submit()} disabled={busy||!input.trim()}>Ask</button>
          </div>
          {busy&&<div className="ask-busy mono">Querying… (LLM — may take a moment)</div>}
        </div>
        {items.map(it=>
          <div key={it.id} className="panel ask-item">
            <div className="ask-q mono">&gt; {it.q}</div>
            {it.error
              ? <div className="ask-err">{it.error}</div>
              : <div className="ask-a">{it.answer}</div>}
            {!!(it.suggestions&&it.suggestions.length)&&<div className="ask-chips">
              {it.suggestions.map((sg,i)=>
                <button key={i} className="chip chip-btn" onClick={()=>{setInput(sg);submit(sg);}}>{sg}</button>)}
            </div>}
            {!!(it.trace&&it.trace.length)&&<div className="ask-trace mono">
              {it.trace.map((t,i)=><div key={i} className="ask-trace-row">
                <span>{t.tool}</span> <span className="args">{JSON.stringify(t.args)}</span>
              </div>)}
            </div>}
          </div>)}
      </div>
      <AlertRulesPanel/>
    </div>
  </div>;
}

/* AuditTab — audit rows from /api/data .auditLogs ({ts,user,action,resource,result}). */
const AUDIT_ACT_COLOR={CREATE:'var(--ok)',DELETE:'var(--crit)',UPDATE:'var(--warn)'};
function AuditTab(){
  const {data,error,locked,fetchedAt,refetch,loading}=useData();
  const [q,setQ]=useState('');
  const rows=(data&&(data.auditLogs||data.audit))||[];
  const filtered=useMemo(()=>{
    const t=q.trim().toLowerCase();
    if(!t) return rows;
    return rows.filter(r=>[r.user,r.resource,r.action].some(v=>String(v||'').toLowerCase().includes(t)));
  },[rows,q]);
  const cols=[
    {key:'ts',label:'Time',mono:true,align:'left',width:190},
    {key:'user',label:'User'},
    {key:'action',label:'Action',render:v=>{
      const a=String(v||'').toUpperCase();
      return <span className="mono" style={{fontSize:11,textTransform:'uppercase',color:AUDIT_ACT_COLOR[a]||'var(--text-dim)'}}>{a}</span>;
    }},
    {key:'resource',label:'Resource'},
    {key:'result',label:'Result',render:v=>
      <span style={{color:v==='failure'?'var(--crit)':'var(--text-dim)'}}>{v}</span>},
  ];

  // ── Answer-first synthesis band (snapshot schema has no audit → no deltas) ──
  const isFail=r=>String(r&&r.result||'').toLowerCase()==='failure';
  const total=rows.length;
  const fails=rows.filter(isFail);
  const deletes=rows.filter(r=>String(r&&r.action||'').toUpperCase()==='DELETE').length;
  const actorCount={};
  rows.forEach(r=>{const u=r&&r.user;if(u)actorCount[u]=(actorCount[u]||0)+1;});
  const topActor=Object.keys(actorCount).reduce((b,u)=>actorCount[u]>(actorCount[b]||0)?u:b,null);
  const recentFail=[...fails].sort((a,b)=>String(b.ts||'').localeCompare(String(a.ts||'')))[0];
  const tone=fails.length>0?'crit':deletes>0?'warn':'ok';
  const verdict=fails.length===0
    ? 'No failed changes in the last '+total+' operations'
    : fails.length+' failed operations — most recent by '+((recentFail&&recentFail.user)||'unknown');
  const facts=[
    {label:'Total ops',value:total},
    {label:'Failures',value:fails.length},
    {label:'Deletes',value:deletes},
    {label:'Top actor',value:topActor||'—'},
  ];

  return <div className="page">
    <SynthBand tone={tone} verdict={verdict} facts={facts}/>
    <div style={{display:'flex',alignItems:'center',gap:12}}>
      <input className="ask-in mono" style={{maxWidth:320,height:32,flex:'0 1 320px'}}
        placeholder="Filter user / resource / action…" value={q} onChange={e=>setQ(e.target.value)}
        aria-label="Filter audit log"/>
      <Freshness at={fetchedAt} error={error} onRetry={refetch}/>
    </div>
    <div className="panel" style={{padding:'4px 12px 12px'}}>
      {loading&&!data
        ? <Skeleton rows={6}/>
        : locked
          ? <div className="dt-empty">Vault locked — unlock to load the audit log.</div>
          : error
            ? <div className="dt-empty">Failed to load audit log — <button className="fresh-retry" onClick={refetch}>Retry</button></div>
            : <DataTable cols={cols} rows={filtered} defaultSort={{key:'ts',dir:'desc'}} csvName="audit"/>}
    </div>
  </div>;
}

/* subsequence match — chars of needle appear in order within hay (fuzzy go-to). */
function subseqMatch(needle,hay){
  if(!needle) return false;
  let i=0; for(let j=0;j<hay.length&&i<needle.length;j++){ if(hay[j]===needle[i]) i++; }
  return i===needle.length;
}

  const [sel,setSel]=useState(0);
  const [views,setViews]=useState([]);
  const [confirmBlock,setConfirmBlock]=useState(null);
  const [blocking,setBlocking]=useState(false);
  const [slot,setSlot]=useState(null);
  // Mount the saved-views dropdown into the topbar without editing Shell.
  useEffect(()=>{setSlot(document.querySelector('.topbar-right'));},[]);
  useEffect(()=>{
    if(!open) return;
    setQ('');setSel(0);setConfirmBlock(null);
    if(inputRef.current) inputRef.current.focus();
    fetch('/api/views').then(r=>r.ok?r.json():null).then(d=>setViews((d&&d.views)||[])).catch(()=>{});
  },[open]);
  useEffect(()=>{setSel(0);},[q]);
  const typed=q.trim();
  const needle=typed.toLowerCase();
  const base=[
    ...TABS.map(t=>({label:'Go to '+TAB_LABELS[t],kind:'nav',run:()=>{nav(t);onClose();}})),
    {label:'Alert rules',kind:'nav',run:()=>{nav('ask');onClose();}},
    ...views.map(v=>({label:'View: '+v.name,kind:'view',run:()=>{onClose();applyViewByName(v.name);}})),
  ];
  // F8a — contextual bulk actions for the active table's selection (or its cursor row as a 1-row selection).
  const ctxItems=[];
  if(open&&power&&power.getActive){
    const entry=power.getActive();
    const api=entry&&entry.api&&entry.api.current;
    if(api&&api.getState){
      const st=api.getState();
      const rowsSel=st.selected&&st.selected.size>0?st.selectedRows:(st.cursorRow?[st.cursorRow]:[]);
      if(rowsSel.length&&st.buildActions){
        st.buildActions(rowsSel).forEach(a=>ctxItems.push({label:a.label+' ('+rowsSel.length+')',kind:'action',
          run:()=>{onClose();try{a.run&&a.run();}catch(e){}}}));
      }
    }
  }
  const items=[...ctxItems,...base.filter(c=>c.label.toLowerCase().includes(needle))];
  if(typed){
    items.push({label:'Ask: '+typed,kind:'ask',run:()=>{onClose();nav('ask',{q:typed});}});
    items.push({label:'Block domain: '+typed,kind:'block',run:()=>setConfirmBlock(typed)});
    // F8b — fuzzy go-to jump into subnets / zones / hosts (subsequence match, cap 8).
    const dd=data||{};
    const go=[];
    const add=(label,fn)=>{ if(go.length<8&&label&&subseqMatch(needle,String(label).toLowerCase())) go.push({label:'Go: '+label,kind:'go',run:()=>{onClose();fn();}}); };
    (Array.isArray(dd.subnets)?dd.subnets:[]).forEach(s=>{const l=s.addr||s.name;add(l,()=>nav('network',{peek:s.addr||s.name}));});
    (Array.isArray(dd.zones)?dd.zones:[]).forEach(z=>add(z.fqdn,()=>nav('dns',{peek:z.fqdn})));
    (Array.isArray(dd.hosts)?dd.hosts:[]).forEach(h=>add(h.name,()=>nav('infra',{peek:h.name})));
    go.forEach(g=>items.push(g));
  }
  const runBlock=()=>{
    const domain=confirmBlock;
    if(!domain||blocking) return;
    setBlocking(true);
    fetch('/api/block-domain',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({domain})})
      .then(async r=>{
        const j=await r.json().catch(()=>({}));
        if(r.ok&&j.ok!==false) toast('Blocked '+domain+' network-wide','ok');
        else toast('Block failed: '+((j&&j.error)||('HTTP '+r.status)),'err');
      })
      .catch(()=>toast('Block failed — server unreachable','err'))
      .finally(()=>{setBlocking(false);setConfirmBlock(null);onClose();});
  };
  const onKey=e=>{
    if(e.key==='Escape'){e.preventDefault(); if(confirmBlock) setConfirmBlock(null); else onClose(); return;}
    if(confirmBlock){ if(e.key==='Enter'){e.preventDefault();runBlock();} return; }
    if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(s+1,Math.max(items.length-1,0)));}
    else if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(s-1,0));}
    else if(e.key==='Enter'){e.preventDefault();const it=items[sel];if(it)it.run();}
  };
  return <>
    {slot?ReactDOM.createPortal(<ViewsMenu/>,slot):null}
    {open&&<div className="palette-scrim" onClick={onClose}>
      <div className="palette" onClick={e=>e.stopPropagation()}>
        <input ref={inputRef} className="palette-in mono" value={q} onChange={e=>setQ(e.target.value)}
          onKeyDown={onKey} placeholder="Type a command, question, or domain…"
          aria-label="Command palette" role="combobox" aria-expanded="true"/>
        <div className="panel pal-list" role="listbox" aria-label="Commands">
          {confirmBlock
            ? <div className="pal-confirm">
                <span>Block <span className="mono">{confirmBlock}</span> network-wide?</span>
                <span style={{display:'inline-flex',gap:8}}>
                  <button className="btn" style={{borderColor:'var(--crit)',color:'var(--crit)'}}
                    disabled={blocking} onClick={runBlock}>{blocking?'Blocking…':'Confirm block'}</button>
                  <button className="btn" disabled={blocking} onClick={()=>setConfirmBlock(null)}>Cancel</button>
                </span>
              </div>
            : items.length===0
              ? <div className="pal-empty">No matching commands</div>
              : items.map((it,i)=>
                <button key={it.kind+':'+it.label} className={'pal-row'+(i===sel?' sel':'')}
                  role="option" aria-selected={i===sel}
                  onMouseEnter={()=>setSel(i)} onClick={()=>it.run()}>
                  <span>{it.label}</span>
                  <span className="pal-kind mono">{it.kind}</span>
                </button>)}
        </div>
      </div>
    </div>}
  </>;
}

/* ViewsMenu — topbar saved-views dropdown (GET/POST/DELETE /api/views). */
function ViewsMenu(){
  const [open,setOpen]=useState(false);
  const [views,setViews]=useState([]);
  const [err,setErr]=useState('');
  const [confirmDel,setConfirmDel]=useState(null);
  const refresh=useCallback(()=>{
    fetch('/api/views').then(r=>r.ok?r.json():Promise.reject())
      .then(d=>{setViews((d&&d.views)||[]);setErr('');})
      .catch(()=>setErr('Views unavailable'));
  },[]);
  useEffect(()=>{if(open){refresh();setConfirmDel(null);}},[open,refresh]);
  const saveCurrent=()=>{
    const name=window.prompt('Save current view as:');
    if(!name||!name.trim()) return;
    saveCurrentView(name.trim())
      .then(res=>{
        if(res.ok){toast('View "'+name.trim()+'" saved','ok');refresh();}
        else toast('Save failed: '+(res.error||'unknown error'),'err');
      })
      .catch(()=>toast('Save failed — server unreachable','err'));
  };
  const del=name=>{
    fetch('/api/views/'+encodeURIComponent(name),{method:'DELETE'})
      .then(r=>{ if(r.ok){toast('Deleted "'+name+'"','ok');refresh();} else toast('Delete failed','err'); })
      .catch(()=>toast('Delete failed — server unreachable','err'))
      .finally(()=>setConfirmDel(null));
  };
  const folders=[...new Set(views.map(v=>(v.folder||'').trim()))]
    .sort((a,b)=>{if(!a)return 1;if(!b)return -1;return a.localeCompare(b);});
  return <span className="views-slot">
    <button className="btn" aria-haspopup="menu" aria-expanded={open}
      title="Saved views" onClick={()=>setOpen(o=>!o)}>Views</button>
    {open&&<>
      <div className="views-overlay" onClick={()=>setOpen(false)}/>
      <div className="views-menu" role="menu">
        <button className="views-item" onClick={()=>{setOpen(false);saveCurrent();}}>Save current…</button>
        <div className="views-divider"/>
        {err&&<div className="views-empty">{err}</div>}
        {!err&&views.length===0&&<div className="views-empty">No saved views</div>}
        {folders.map(f=><div key={f||'(ungrouped)'}>
          {(f||folders.length>1)?<div className="views-folder">{f||'Ungrouped'}</div>:null}
          {views.filter(v=>((v.folder||'').trim())===f).map(v=>
            <div key={v.name} className="views-row">
              {confirmDel===v.name
                ? <>
                    <span className="views-confirm-q">Delete {v.name}?</span>
                    <button className="views-mini crit" onClick={()=>del(v.name)}>delete</button>
                    <button className="views-mini" onClick={()=>setConfirmDel(null)}>keep</button>
                  </>
                : <>
                    <button className="views-item" style={{flex:1}}
                      onClick={()=>{setOpen(false);applyViewByName(v.name);}}>
                      <span className="vname">{v.name}</span>
                      {v.saved_at?<span className="views-date mono">{String(v.saved_at).slice(0,10)}</span>:null}
                    </button>
                    <button className="views-mini crit" aria-label={'Delete view '+v.name}
                      onClick={()=>setConfirmDel(v.name)}>✕</button>
                  </>}
            </div>)}
        </div>)}
      </div>
    </>}
  </span>;
}
// ═══ END: ASKGLOBAL ═══

const TAB_COMPONENTS={
  overview:OverviewTab,
  daily:DailyTab,
  network:NetworkTab,
  dns:DnsTab,
  infra:InfraTab,
  security:SecurityTab,
  audit:AuditTab,
  ask:AskTab,
};

/* ─────────────────────────────────────────────────────────────
   7. Top bar + Shell.
   ───────────────────────────────────────────────────────────── */
/* ThemeToggle — flips document theme + persists. Text label only (no glyphs). */
function ThemeToggle(){
  const [theme,setTheme]=useState(()=>document.documentElement.dataset.theme||'dark');
  const toggle=()=>{
    const next=theme==='dark'?'light':'dark';
    document.documentElement.dataset.theme=next;
    LS.set('theme',next);
    setTheme(next);
  };
  return <button className="kbd" onClick={toggle}
    aria-label="Toggle color theme" title="Toggle light / dark theme">
    {theme==='dark'?'Light':'Dark'}
  </button>;
}

/* DensityToggle — flips compact/comfortable row height + persists (LS.set('density',…)). */
function DensityToggle(){
  const [d,setD]=useState(()=>document.documentElement.dataset.density||'compact');
  const toggle=()=>{
    const next=d==='compact'?'comfortable':'compact';
    document.documentElement.dataset.density=next;
    LS.set('density',next);
    setD(next);
  };
  return <button className="kbd" onClick={toggle}
    aria-label="Toggle row density" title="Toggle compact / comfortable rows">
    {d==='compact'?'Compact':'Comfort'}
  </button>;
}

function TopBar({tab,org,fresh,onPalette}){
  const {orgName}=useAuth();
  const orgLabel=orgName||org;
  return <header className="topbar">
    <div className="brand">
      <BrandLogo/>
      <span className="brand-name">BloxSmith</span>
      {orgLabel?<span className="brand-org">{orgLabel}</span>:null}
    </div>
    <nav className="tabbar" aria-label="Sections">
      {TABS.map(t=><button key={t}
        className={'tab'+(t===tab?' active':'')}
        aria-current={t===tab?'page':undefined}
        onClick={()=>nav(t)}>{TAB_LABELS[t]}</button>)}
    </nav>
    <div className="topbar-right">
      {fresh}
      <AccountSlot/>
      <DensityToggle/>
      <ThemeToggle/>
      <button className="kbd" onClick={onPalette} aria-label="Open command palette" title="Command palette">
        <span className="mono">⌘K</span>
      </button>
    </div>
  </header>;
}

function Shell(){
  const {tab}=useRoute();
  const [org]=useState(null);        // A2 fills real org name
  const [paletteOpen,setPaletteOpen]=useState(false);
  const [vaultTick,setVaultTick]=useState(0);

  // Re-check vault status whenever any request reports it locked.
  useEffect(()=>{
    const onLocked=()=>{
      fetch('/api/vault/status',{cache:'no-store'})
        .then(r=>r.json()).then(()=>setVaultTick(t=>t+1)).catch(()=>{});
    };
    window.addEventListener('bx:vault-locked',onLocked);
    return ()=>window.removeEventListener('bx:vault-locked',onLocked);
  },[]);

  // ⌘K / Ctrl-K toggles the palette.
  useEffect(()=>{
    const onKey=(e)=>{
      if((e.metaKey||e.ctrlKey)&&(e.key==='k'||e.key==='K')){
        e.preventDefault();setPaletteOpen(o=>!o);
      }
    };
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[]);

  const Active=TAB_COMPONENTS[tab]||OverviewTab;
  const fresh=<span className="fresh-slot"/>; // A2 wires real freshness

  return <PowerProvider>
    <div>
      <TopBar tab={tab} org={org} fresh={fresh} onPalette={()=>setPaletteOpen(true)}/>
      <main className="main" key={tab}>
        <Active vaultTick={vaultTick}/>
      </main>
      <CommandPalette open={paletteOpen} onClose={()=>setPaletteOpen(false)}/>
      <PeekDrawer/>
      <Toasts/>
      <SnapshotWriter/>
    </div>
  </PowerProvider>;
}

function App(){
  return <VaultGate><DataProvider><Shell/></DataProvider></VaultGate>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
