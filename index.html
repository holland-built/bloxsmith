        </div>
        {secByHour.some(v=>v>0)
          ? <div className="dly-hourly"><MiniBars values={secByHour} width={220} height={30} color="var(--warn)"/>
              <span className="dly-note" style={{marginTop:0}}>events · last 12h</span></div>
          : <div className="dly-note">No security events in the last 12 hours</div>}
      </Panel>

      <Panel title={'Top movers'+(baseline?' · vs '+baseline.date:'')} empty={!(baseline&&movers.length>0)}>
        {movers.map((m,i)=><div className="issue" key={m.a+i} role="button" tabIndex={0}
            onClick={()=>nav('network',{subnet:m.a})} onKeyDown={e=>{if(e.key==='Enter')nav('network',{subnet:m.a});}}
            {...hover.bind({title:m.a,rows:[['before',m.before+'%'],['after',m.after+'%'],['change',(m.d>0?'+':'')+m.d+'%']],spark:[m.before,m.after]})}>
            <span className="rank">{i+1}</span>
            <div className="body"><div className="t mono">{m.a}</div><div className="d">{m.before}% → {m.after}%</div></div>
            <MiniBars values={[m.before,m.after]} width={54} height={16} color={utilColor(m.after)}/>
            <Delta v={m.d} good="down"/>
          </div>)}
      </Panel>

      <Panel title="Capacity & threats" side={<span className="mono">30 days</span>} empty={allDays.length<2}>
        {trendSeries.map(ts=><div className="dly-trow" key={ts.l}>
          <span className="dly-trow-l">{ts.l}</span>
          <span className="dly-trow-s">{ts.s.length>=2
            ? <Sparkline values={ts.s} width={220} height={30} color={ts.c} fill={1}/>
            : <span className="dly-note" style={{marginTop:0}}>building history…</span>}</span>
          <span className="dly-trow-v mono">{ts.s.length?ts.s[ts.s.length-1]:'—'}</span>
        </div>)}
      </Panel>

      <Panel title="Top capacity subnets" side={<span className="mono">by utilization</span>} empty={!topSubs.length}>
        <div className="issues">
          {topSubs.map((s,i)=>{const u=Math.round(utilOf(s));const c=utilColor(u);return <div key={s.id||s.addr||i} className="issue" role="button" tabIndex={0}
              onClick={()=>nav('network',{subnet:s.addr||s.id})} onKeyDown={e=>{if(e.key==='Enter')nav('network',{subnet:s.addr||s.id});}}
              {...hover.bind({title:(s.addr||s.name||'subnet')+(s.cidr?'/'+s.cidr:''),rows:[['used',(s.used!=null?s.used:'—')+' / '+(s.total!=null?s.total:'—')],['util',u+'%'],['site',s.site||'—']],spark:[u*0.4,u*0.6,u*0.8,u]})}>
            <span className="rank">{i+1}</span>
            <div className="body"><div className="t mono">{s.addr||s.name}{s.cidr?'/'+s.cidr:''}</div><div className="d">{s.site||'—'}</div></div>
            <div className="ubar" style={{flex:'none',width:56}}><i style={{width:Math.max(4,u)+'%',background:c}}/></div>
            <span className="mono" style={{flex:'none',width:34,textAlign:'right',fontSize:11,color:c}}>{u}%</span>
          </div>;})}
        </div>
      </Panel>

      <Panel title="Hosts needing attention" side={<span className="mono">{attnHosts.length} of {nHost}</span>} empty={!attnHosts.length}>
        <div className="issues">
          {attnHosts.map((h,i)=>{const st=String(h.status||'').toLowerCase();const sv=st==='error'?'crit':st==='degraded'?'high':st==='offline'?'low':'med';return <div key={h.id||i} className="issue" role="button" tabIndex={0}
              onClick={()=>nav('infra')} onKeyDown={e=>{if(e.key==='Enter')nav('infra');}}
              {...hover.bind({title:h.name||'host',rows:[['ip',h.ip||'—'],['type',h.type||'—'],['status',h.status||'—']]})}>
            <span className={'sd '+(sv==='crit'?'crit':'warn')}/>
            <div className="body"><div className="t">{h.name||'—'}</div><div className="d">{h.ip||''}</div></div>
            <span className={'sev '+sv}>{h.status||'—'}</span>
          </div>;})}
        </div>
      </Panel>

      <Panel title="DNS zones with issues" side={<span className="mono">{zoneIssues} of {nZone}</span>} empty={!issueZones.length}>
        <div className="issues">
          {issueZones.map((z,i)=>{const n=z.issues.length;return <div key={z.id||z.fqdn||i} className="issue" role="button" tabIndex={0}
              onClick={()=>nav('dns')} onKeyDown={e=>{if(e.key==='Enter')nav('dns');}}
              {...hover.bind({title:z.fqdn||'zone',rows:[['view',z.view||'—'],['ttl',z.ttl!=null?z.ttl+'s':'—'],['issues',n]]})}>
            <span className="rank">{i+1}</span>
            <div className="body"><div className="t mono">{z.fqdn||'—'}</div><div className="d">{(z.view||'—')+' · '+n+' issue'+(n===1?'':'s')}</div></div>
            <span className="sev high">{n}</span>
          </div>;})}
        </div>
      </Panel>

    </div>

  </div>;
}

/* leasesInSubnet — ported verbatim from prior build (index-old.html ~L1061).
   Octet-prefix CIDR match: /8→1 octet, /16→2, /24→3, /32→4. */
function leasesInSubnet(leases, subnet) {
  const parts = (subnet.addr||'').split('.').map(Number);
  const cidr = subnet.cidr || 24;
  const octets = cidr <= 8 ? 1 : cidr <= 16 ? 2 : cidr <= 24 ? 3 : 4;
  const prefix = parts.slice(0, octets).join('.');
  return leases.filter(l => (l.addr || '').startsWith(prefix + '.') ||
                            (octets === 4 && l.addr === subnet.addr));
}

const NDA='NstarDnsActivity.';
function utilColor(u){return u>85?'var(--crit)':u>70?'var(--warn)':'var(--ok)';}
/* inline flat utilization bar + mono % (no gradients/shadows) */
function UtilBar(v){
  const u=Math.max(0,Math.min(100,Number(v)||0));

    </span>
    <span className="mono" style={{minWidth:32,textAlign:'right'}}>{u}%</span>
  </span>;
}
/* 11px mono uppercase lease state — active green, everything else dim */
function StateText(state){
  const active=state==='active';
  return <span className="mono" style={{fontSize:'var(--t11)',textTransform:'uppercase',
    color:active?'var(--ok)':'var(--text-faint)'}}>{state||'—'}</span>;
}
function SectionHead({title,children}){

}

const NET_LEASE_COLS=[
  {key:'addr',label:'IP',mono:true,align:'left'},
  {key:'mac',label:'MAC',mono:true,align:'left',render:v=>v||'—'},
  {key:'state',label:'State',align:'left',pivot:true,render:v=>StateText(v)},
  {key:'host',label:'Host'},
];

function NetworkTab(){
  const {params}=useRoute();
  const {data,error,locked,loading,fetchedAt,refetch}=useData();
  const {delta,prev}=useSnapshots();
  // Compare-to-snapshot — subnets AND leases (both tables now have row-level
  // shape in the snapshot store; see diffRows/snapKey/SnapshotWriter). Separate
  // toggle state per table since each has its own "Compare" button.
  // MUST run before any early return (hooks-order rule).
  const [compareOn,setCompareOn]=useState(false);
  const [leaseCompareOn,setLeaseCompareOn]=useState(false);
  // histByAddr — per-subnet util history from the snapshot store. Each snapshot day
  // holds subnets.top:[{a,u}]; assemble values=[u per day] keyed by addr. Only subnets
  // present across ≥2 days get a series → the Trend sparkline renders honestly (no fabrication).
  // MUST run before any early return (hooks-order rule).
  const histByAddr=useMemo(()=>{
    const days=(readSnaps().days||[]).slice().sort((a,b)=>String(a.date).localeCompare(String(b.date)));
    const h={};
    days.forEach(d=>{
      const top=(d&&d.subnets&&Array.isArray(d.subnets.top))?d.subnets.top:[];
      top.forEach(t=>{ if(t&&t.a!=null&&typeof t.u==='number'){ (h[t.a]||(h[t.a]=[])).push(t.u); } });
    });
    return h;
  },[fetchedAt]);
  // NETDNS region UI state — MUST run before any early return (hooks-order rule).
  // expandedSigs: 100%-util collapse groups the user has expanded (see collapseIdentical).
  // Unified BQL search: the subnets table is the single filter surface. Its search string is
  // NetworkTab-owned — seeded from the #…?sq= hash and mirrored back to it (like the f= pivot
  // mirror). Util-band presets + the "capacity by site" bars inject BQL tokens (util>=100,
  // site:X) into it. There is NO per-site chip wall and no separate band/siteFilter state.
  const [subnetQuery,setSubnetQuery]=useState(params.sq||'');
  useEffect(()=>{
    const {tab,params:hp}=parseHash(); const np={...hp};
    if(subnetQuery&&subnetQuery.trim()) np.sq=subnetQuery.trim(); else delete np.sq;
    if((np.sq||'')!==(hp.sq||'')) nav(tab,np); // never touches q (AI drawer)
  },[subnetQuery]);
  const [expandedSigs,setExpandedSigs]=useState(()=>new Set());
  const {bind}=useHoverDetail(); // cursor-following flavor card for subnet + top-consumer rows
  const flt=useFilters(); // "Capacity by site" bars → removable global site filter (FilterBar + Clear)
  const _whoNet=useApi('/api/whoami');
  const canEdit=(((_whoNet.data&&_whoNet.data.role)||'viewer')!=='viewer');
  if(locked) return null;
  if(loading&&!data) return <div className="page"><Skeleton rows={8}/></div>;
  if(error) return <div className="page"><Freshness error onRetry={refetch}/></div>;
  const subnets=(data&&data.subnets)||[];
  const leases=(data&&data.leases)||[];
  const drillKey=params.subnet||null;
  const drill=drillKey?subnets.find(s=>s.addr===drillKey||String(s.id)===drillKey):null;
  const drillLeases=drill?leasesInSubnet(leases,drill):[];

  // ── Synthesis band derivations ──
  const utilOf=s=>Number(s&&s.util)||0;
  const gt85=subnets.filter(s=>utilOf(s)>85).length;
  const b7085=subnets.filter(s=>{const u=utilOf(s);return u>=70&&u<=85;}).length;
  const activeLeases=leases.filter(l=>String(l.state||'').toLowerCase()==='active').length;
  const sorted=[...subnets].sort((a,b)=>utilOf(b)-utilOf(a));
  const worst=sorted[0]||null;
  const nearCount=subnets.filter(s=>utilOf(s)>70).length;
  const tone=gt85>0?'crit':b7085>0?'warn':'ok';
  const verdict=tone==='ok'
    ? 'DHCP capacity healthy — no subnet above 85%'
    : nearCount+' subnet'+(nearCount===1?'':'s')+' near exhaustion — worst: '+((worst&&(worst.name||worst.addr))||'—')+' at '+(worst?utilOf(worst):0)+'%';
  const facts=[
    {label:'Subnets >85%',value:gt85,delta:{v:delta('subnets.gt85'),good:'down'}},
    {label:'Watch 70-85%',value:b7085,delta:delta('subnets.b7085')},
    {label:'Active leases',value:activeLeases.toLocaleString(),delta:{v:delta('leases.active'),good:'up'}},
    {label:'Subnets total',value:subnets.length,delta:{v:delta('subnets.n'),good:'up'}},
  ];
  const chips=sorted.slice(0,3).map(s=>({
    label:(s.name||s.addr||'—')+' · '+utilOf(s)+'%',
    onClick:()=>nav('network',{subnet:s.addr||s.id}),
  }));

  const subnetCols=[
    {key:'name',label:'Subnet',render:(v,r)=>r.__group
      ? <span className="mono" style={{color:'var(--text-dim)',fontSize:'var(--t12)'}}>{r.__count} subnets at 100% ({(r.__group.split('|')[1])||''}) · Expand</span>
      : <span {...bind({title:(r.addr||'')+(r.cidr?('/'+r.cidr):''),
          rows:[['Util',utilOf(r)+'%'],['Site',r.site||'—'],['Leases',String(leasesInSubnet(leases,r).length)]],
          spark:histByAddr[r.addr]})}>{v||'—'}</span>},
    {key:'addr',label:'Network',mono:true,align:'left',render:(v,r)=>(r.addr||'')+(r.cidr?('/'+r.cidr):'')},
    {key:'util',label:'Utilization',align:'right',render:v=>UtilBar(v)},
    {key:'trend',label:'Trend',align:'left',spark:r=>histByAddr[r.addr]},
    {key:'site',label:'Site',hideSm:true,pivot:true},
    ...(canEdit?[{key:'__edit',label:'',align:'right',render:(v,r)=>r.__group?null:
      <button className="btn" onClick={e=>{e.stopPropagation();nav('editor',{type:'subnet',id:r.id||r.addr,name:r.name,cidr:r.cidr});}}>Edit subnet</button>}]:[]),
  ];

  // ── Capacity-by-site groups + top consumers (replaces the sparse treemap) ──
  const totalOf=s=>Number(s.total)||Math.pow(2,32-(Number(s.cidr)||32));
  // Backend defaults an untagged subnet's site to "–"; fall back to the /16 prefix so
  // untagged subnets still group into meaningful buckets instead of collapsing to one.
  const siteKey=s=>(s.site&&s.site!=='–')?s.site:(String(s.addr||'').split('.').slice(0,2).join('.')+'.0.0/16');
  const siteMap=new Map();
  subnets.forEach(s=>{
    const site=siteKey(s);
    let g=siteMap.get(site); if(!g){g={site,count:0,sum:0,worst:0};siteMap.set(site,g);}
    const u=utilOf(s); g.count++; g.sum+=u; if(u>g.worst) g.worst=u;
  });
  const siteRows=[...siteMap.values()].map(g=>({
    label:g.site, value:g.worst, site:g.site, count:g.count,
    detail:g.count+' subnet'+(g.count===1?'':'s')+' · avg '+Math.round(g.sum/g.count)+'%',
    color:utilColor(g.worst),
  })).sort((a,b)=>b.value-a.value);
  const topN=[...subnets].sort((a,b)=>utilOf(b)-utilOf(a)||totalOf(b)-totalOf(a)).slice(0,15);
  // Lease-state mix for the "Lease states" donut (Donut folds to 5 slices, tolerant of casing).
  const leaseStateCounts={};
  leases.forEach(l=>{const st=String(l.state||'unknown').toLowerCase();leaseStateCounts[st]=(leaseStateCounts[st]||0)+1;});
  const leaseSlices=Object.keys(leaseStateCounts).map(k=>({label:k,value:leaseStateCounts[k],
    color:k==='active'?'var(--ok)':k==='free'?'var(--text-faint)':(k==='expired'||k==='backup'||k==='offered')?'var(--warn)':'var(--accent)'}));
  // The subnets table owns all filtering now via BQL (subnetQuery ⇄ sq=); no pre-scoping here.
  // Still collapse 100%-util noise (≥5 rows sharing a /cidr → one group) unless expanded.
  const subnetRows=collapseIdentical(subnets,
    s=>{const sg=utilOf(s)===100?('100|/'+(s.cidr||'')):null; return (sg&&expandedSigs.has(sg))?null:sg;}, 5);

  // Compare-to-snapshot: prev.subnets.top is the only place the store keeps
  // per-row shape ({a,u} = addr,util for the top-20 by utilization — see
  // SnapshotWriter). Diffing against that (not a fresh snapshot system) means
  // the comparison is necessarily scoped to that top-20 set, not every subnet.
  const prevSubnetRows=(prev&&prev.subnets&&Array.isArray(prev.subnets.top))
    ?prev.subnets.top.map(t=>({addr:t.a,util:t.u})):[];
  const subnetDiff=(compareOn&&prev)
    ?diffRows(prevSubnetRows,subnetRows.filter(r=>!r.__group),r=>String(r.addr||r.id),['util'])
    :null;

  // Compare-to-snapshot (Leases): prev.leases.top mirrors the subnets top-N shape
  // (bounded, sorted by addr — leases have no natural "top" ranking; see
  // SnapshotWriter). Same scoping caveat as subnets: the diff runs against that
  // bounded prior set, not full lease history, so a lease outside the captured
  // top-50 will always read as "added" the first time it reappears.
  const prevLeaseRows=(prev&&prev.leases&&Array.isArray(prev.leases.top))
    ?prev.leases.top.map(t=>({addr:t.a,state:t.s,host:t.h})):[];
  const leaseKeyFn=r=>String(r.ip||r.addr||r.mac);
  const leaseDiff=(leaseCompareOn&&prev)
    ?diffRows(prevLeaseRows,leases,leaseKeyFn,['state','host'])
    :null;

  // Util-band presets → BQL tokens injected into the subnets search (replace any existing util
  // token; clicking the active band clears it). "Capacity by site" bars inject site:<name>.
  const UTIL_BQL={'100':'util>=100','9099':'util:90-99','7089':'util:70-89','lt70':'util<70'};
  const stripUtil=q=>String(q||'').split(/\s+/).filter(t=>t&&!/^-?util(:|>=|<=|>|<|=)/i.test(t)).join(' ');
  const activeUtilBand=(()=>{const parts=String(subnetQuery).split(/\s+/);for(const id in UTIL_BQL){if(parts.indexOf(UTIL_BQL[id])!==-1)return id;}return null;})();
  const injectUtilBand=id=>{const base=stripUtil(subnetQuery);setSubnetQuery((id==null||activeUtilBand===id)?base:((base?base+' ':'')+UTIL_BQL[id]));};

  return <div className="page fadein">
    <SynthBand tone={tone} verdict={verdict} facts={facts} chips={chips}/>
    {drillKey
      ? <section>
          <SectionRule title="Subnet detail"/>
          {drill
            ? <div className="grid">
                <div className="pcard">
                  <button className="btn btn-ghost" onClick={()=>history.back()}>← Back</button>
                  <div style={{marginTop:'var(--s3)',fontWeight:600}}>{drill.name}</div>
                  <div className="mono" style={{color:'var(--text-dim)',marginTop:'var(--s1)'}}>{drill.addr}/{drill.cidr}</div>
                  <div style={{marginTop:'var(--s3)'}}>{UtilBar(drill.util||0)}</div>
                  <div className="mono" style={{marginTop:'var(--s3)',color:'var(--text-dim)',fontSize:'var(--t12)'}}>
                    {drillLeases.length} lease{drillLeases.length===1?'':'s'} in subnet</div>
                </div>
                <Panel title={'Leases · '+drillLeases.length}>
                  {drillLeases.length
                    ? <DataTable cols={NET_LEASE_COLS} rows={drillLeases} defaultSort={{key:'addr',dir:'asc'}}
                        csvName={'leases-'+(drill.addr||drill.id)}
                        tableId={'drill-leases-'+(drill.addr||drill.id)} rowKey={r=>String(r.ip||r.addr||r.mac)} selectable/>
                    : <div className="dt-empty">No leases in this subnet</div>}
                </Panel>
              </div>
            : <div className="pcard">
                <button className="btn btn-ghost" onClick={()=>history.back()}>← Back</button>
                <div className="dt-empty">Subnet not found</div>
              </div>}
        </section>
      : <React.Fragment>
          <SectionRule title="Capacity & utilization"/>
          <div className="grid">
            <Panel title="Capacity by site" empty={siteRows.length<2}>
              <GroupedBar rows={siteRows} max={24} onClick={r=>flt.toggle('site',r.site,'Site: '+r.site)}/>
            </Panel>
            <Panel title="Top consumers" empty={topN.length===0}>
              <div className="issues">
                {topN.map((s,i)=>{
                  const go=()=>nav('network',{subnet:s.addr||s.id});
                  const hb=bind({title:(s.addr||'')+(s.cidr?('/'+s.cidr):''),
                    rows:[['Util',utilOf(s)+'%'],['Site',s.site||'—'],['Leases',String(leasesInSubnet(leases,s).length)]],
                    spark:histByAddr[s.addr]});
                  return <div key={i} className="issue" role="button" tabIndex={0}
                    onClick={go} onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();go();}}} {...hb}>
                    <span className="rank mono">{i+1}</span>
                    <div className="body">
                      <div className="t mono">{(s.addr||'')+(s.cidr?('/'+s.cidr):'')}</div>
                      <div className="d">{(s.name||'—')+' · '+(s.site||'—')}</div>
                    </div>
                    {UtilBar(s.util||0)}
                    <button className="btn" onClick={e=>{e.stopPropagation();nav('provision',{space:'',cidr:24,from:s.addr});}}>Provision subnet →</button>
                  </div>;
                })}
              </div>
            </Panel>
            <div style={{gridColumn:'1/-1',display:'flex',flexWrap:'wrap',alignItems:'center',gap:'var(--s2)'}}>
              <span className="mono" style={{fontSize:'var(--t11)',color:'var(--text-faint)'}}>Filter</span>
              <ValueBands rows={subnets} valueFn={s=>Number(s.util)||0} bands={UTIL_BANDS}
                value={activeUtilBand} onChange={id=>injectUtilBand(id)}/>
              <span className="mono" style={{fontSize:'var(--t11)',color:'var(--text-faint)'}}>
                Type <code>site:name</code> or <code>util&gt;=90</code> in the table search to scope by site</span>
            </div>
            <div style={{gridColumn:'1/-1'}}>
              <Panel title="Subnets" side={<span style={{display:'flex',alignItems:'center',gap:'var(--s2)'}}>
                  <button className="btn btn-ghost" aria-pressed={compareOn}
                    disabled={!prev} title={prev?'Diff current top subnets against yesterday\'s snapshot':'A prior daily snapshot is needed'}
                    onClick={()=>{
                      const next=!compareOn; setCompareOn(next);
                      if(next&&prev){
                        const d=diffRows(prevSubnetRows,subnetRows.filter(r=>!r.__group),r=>String(r.addr||r.id),['util']);
                        let added=0,changed=0; d.byKey.forEach(v=>{if(v.type==='+')added++;else changed++;});
                        toast(added+' added · '+changed+' changed · '+d.ghosts.length+' removed','ok');
                      }
                    }}>{compareOn?'Comparing':'Compare to snapshot'}</button>
                  <Freshness at={fetchedAt} onRetry={refetch}/>
                </span>}>
                <DataTable cols={subnetCols} rows={subnetRows} defaultSort={{key:'util',dir:'desc'}}
                  scrollBody={480}
                  problemsOnly={{label:'Problems only',test:s=>utilOf(s)>70,default:true}}
                  onRowClick={r=>{ if(r.__group){ setExpandedSigs(prev=>{const n=new Set(prev); if(n.has(r.__group)) n.delete(r.__group); else n.add(r.__group); return n;}); return; } nav('network',{subnet:r.addr||r.id}); }}
                  csvName="subnets"
                  tableId="subnets" rowKey={r=>r.__group?('grp:'+r.__group):String(r.addr||r.id)} selectable
                  diffMap={subnetDiff?subnetDiff.byKey:null} diffGhosts={subnetDiff?subnetDiff.ghosts:null}
                  filterable filterKeys={['addr','name','site']} query={subnetQuery} onQuery={setSubnetQuery}
                  searchSchema={{fields:{util:{type:'number'},cidr:{type:'number',key:'cidr'}}}}
                  initialPeekKey={params.peek}
                  renderPeek={row=>{
                    const rl=leasesInSubnet(leases,row);
                    return <div>
                      <div style={{fontWeight:600}}>{row.name||'—'}</div>
                      <div className="mono" style={{color:'var(--text-dim)',marginTop:'var(--s1)'}}>{(row.addr||'')+(row.cidr?('/'+row.cidr):'')}</div>
                      <div style={{marginTop:'var(--s3)'}}>{UtilBar(row.util||0)}</div>
                      <div style={{marginTop:'var(--s2)',fontSize:'var(--t12)',color:'var(--text-dim)'}}>Site: {row.site||'—'}</div>
                      <div className="mono" style={{marginTop:'var(--s3)',color:'var(--text-dim)',fontSize:'var(--t12)'}}>{rl.length} lease{rl.length===1?'':'s'} in subnet</div>
                      <div style={{marginTop:'var(--s2)',display:'flex',flexDirection:'column',gap:2}}>
                        {rl.slice(0,20).map((l,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',gap:'var(--s3)',fontSize:'var(--t12)'}}>
                          <span className="mono">{l.addr||'—'}</span>{StateText(l.state)}</div>)}
                        {rl.length>20?<div style={{fontSize:'var(--t11)',color:'var(--text-faint)',marginTop:2}}>+{rl.length-20} more</div>:null}
                      </div>
                    </div>;
                  }}
                  bulkActions={sel=>[{label:'Copy CIDRs',run:()=>{
                    const rows=sel.filter(r=>!r.__group);
                    const txt=rows.map(r=>(r.addr||'')+(r.cidr?('/'+r.cidr):'')).join('\n');
                    if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt);
                    toast('Copied '+rows.length+' CIDR'+(rows.length===1?'':'s'),'ok');
                  }}]}/>
              </Panel>
            </div>
            <Panel title={'All leases · '+leases.length} side={
                <button className="btn btn-ghost" aria-pressed={leaseCompareOn}
                  disabled={!prev} title={prev?'Diff current leases against yesterday\'s snapshot':'A prior daily snapshot is needed'}
                  onClick={()=>{
                    const next=!leaseCompareOn; setLeaseCompareOn(next);
                    if(next&&prev){
                      const d=diffRows(prevLeaseRows,leases,leaseKeyFn,['state','host']);
                      let added=0,changed=0; d.byKey.forEach(v=>{if(v.type==='+')added++;else changed++;});
                      toast(added+' added · '+changed+' changed · '+d.ghosts.length+' removed','ok');
                    }
                  }}>{leaseCompareOn?'Comparing leases':'Compare leases to snapshot'}</button>
              }>
              <DataTable cols={NET_LEASE_COLS} rows={leases} defaultSort={{key:'addr',dir:'asc'}} csvName="leases"
                scrollBody={420}
                tableId="all-leases" rowKey={leaseKeyFn} selectable
                diffMap={leaseDiff?leaseDiff.byKey:null} diffGhosts={leaseDiff?leaseDiff.ghosts:null}/>
            </Panel>
            <Panel title="Lease states" side={<span className="mono" style={{color:'var(--text-faint)'}}>{leases.length}</span>} empty={leases.length===0}>
              <Donut slices={leaseSlices} centerValue={leases.length} centerLabel="leases"/>
            </Panel>
          </div>
        </React.Fragment>}
  </div>;
}

function DnsTab(){
  const {params}=useRoute();
  const {data,error,locked,loading,fetchedAt,refetch}=useData();
  const an=useApi('/api/dns-analytics');
  const _whoDns=useApi('/api/whoami');
  const canEdit=(((_whoDns.data&&_whoDns.data.role)||'viewer')!=='viewer');
  const {delta}=useSnapshots();
  if(locked) return null;
  if(loading&&!data) return <div className="page"><Skeleton rows={8}/></div>;
  if(error) return <div className="page"><Freshness error onRetry={refetch}/></div>;
  const zones=(data&&data.zones)||[];
  const zoneCols=[
    {key:'fqdn',label:'Zone',mono:true,align:'left'},
    {key:'view',label:'View',hideSm:true,pivot:true},
    {key:'ttl',label:'TTL',mono:true,align:'right',
      render:heatCell(r=>Number(r.ttl),{warn:60,crit:86400,mode:'range',tip:'Flagged: TTL under 60s or over 24h'})},
    {key:'issues',label:'Issues',align:'left',render:v=>(v&&v.length)
      ? <span className="mono" style={{fontSize:'var(--t11)',color:'var(--crit)'}}>{v.join(', ')}</span> : ''},
    {key:'anomaly',label:'Flag',align:'left',render:v=>v
      ? <span className="mono" style={{fontSize:'var(--t11)',color:'var(--warn)'}}>anomaly</span> : ''},
    ...(canEdit?[{key:'__edit',label:'',align:'right',render:(v,z)=>
      <button className="btn" onClick={e=>{e.stopPropagation();nav('editor',{type:'dns_zone',id:z.id,fqdn:z.fqdn,view:z.view});}}>Edit</button>}]:[]),
  ];

  const volume=(an.data&&an.data.volume)||[];
  const clients=((an.data&&an.data.top_clients)||[]).map(r=>({
    device:r[NDA+'device_name']||'—',ip:r[NDA+'device_ip']||'—',
    queries:Number(r[NDA+'total_query_count'])||0}));
  const qtypes=((an.data&&an.data.query_types)||[]).map(r=>({
    type:r[NDA+'query_type']||'?',count:Number(r[NDA+'total_query_count'])||0}));
  const qmax=Math.max(1,...qtypes.map(q=>q.count));
  const fmtDay=(r)=>{const t=r[NDA+'timestamp.day']||r[NDA+'timestamp']||r.timestamp||'';
    const d=new Date(t);return isNaN(d)?String(t).slice(5,10):(d.getMonth()+1)+'/'+d.getDate();};
  const clientCols=[
    {key:'device',label:'Device'},
    {key:'ip',label:'IP',mono:true,align:'left'},
    {key:'queries',label:'Queries',mono:true,align:'right',render:v=>Number(v).toLocaleString()},
  ];
  const anLoading=an.loading&&!an.data;

  // ── Synthesis band derivations ──
  const issueCount=zones.filter(z=>Array.isArray(z.issues)&&z.issues.length>0).length;
  const anomalyCount=zones.filter(z=>z.anomaly).length;
  const volCounts=volume.map(r=>Number(r[NDA+'total_query_count'])||0);
  const volTotal=volCounts.reduce((a,b)=>a+b,0);
  const volAvg=volCounts.length?volTotal/volCounts.length:0;
  const volLast=volCounts.length?volCounts[volCounts.length-1]:0;
  const volPct=volAvg?Math.round((volLast-volAvg)/volAvg*100):0;
  const pctStr=(volPct>=0?'+':'')+volPct+'%';
  const tone=(issueCount>0||anomalyCount>0)?'crit':'ok';
  const verdict=tone==='ok'
    ? ('DNS healthy — no zone issues'+(volAvg>0&&volPct===0?', volume steady':''))
    : (issueCount>0?issueCount+' zone'+(issueCount===1?'':'s')+' with issues'
        :anomalyCount+' volume anomaly flag'+(anomalyCount===1?'':'s'))+(volAvg>0?('; volume '+pctStr+' vs weekly average'):'');
  const facts=[
    {label:'Zones',value:zones.length,delta:{v:delta('zones.n'),good:'up'}},
    {label:'Zones w/ issues',value:issueCount,delta:{v:delta('zones.issues'),good:'down'}},
    {label:'Anomalies',value:anomalyCount},
    {label:'7d volume',value:volTotal.toLocaleString()+(volAvg>0?(' ('+pctStr+')'):'')},
  ];
  // D: problem-zone chips were dead labels — now isolate that zone in the table
  // via a removable global filter on the fqdn column (clearable in FilterBar).
  const chips=zones
    .filter(z=>(Array.isArray(z.issues)&&z.issues.length>0)||z.anomaly)
    .slice(0,3).map(z=>({label:z.fqdn||'—',filter:{field:'fqdn',value:z.fqdn||'',label:'Zone: '+(z.fqdn||'—')}}));

  // Analytics panels render ONLY when their array is non-empty and no fetch error
  // (graceful empties → no dead bands). If all three are empty the whole analytics block renders nothing.
  const volBuckets=volume.slice(0,7).map(r=>({label:fmtDay(r),count:Number(r[NDA+'total_query_count'])||0}));
  const volEmpty=!(volume.length&&!an.error);
  const clientsEmpty=!(clients.length&&!an.error);
  const qtypesEmpty=!(qtypes.length&&!an.error);
  const allEmpty=volEmpty&&clientsEmpty&&qtypesEmpty;

  return <div className="page fadein">
    <SynthBand tone={tone} verdict={verdict} facts={facts} chips={chips}/>
    <Panel title="DNS zones" side={<div style={{display:'flex',alignItems:'center',gap:'var(--s2)'}}>{canEdit?<button className="btn" onClick={()=>nav('editor',{type:'dns_zone'})}>New zone</button>:null}<Freshness at={fetchedAt} onRetry={refetch}/></div>}>
      <DataTable cols={zoneCols} rows={zones} defaultSort={{key:'fqdn',dir:'asc'}} csvName="zones"
        scrollBody={480} columnToggle
        problemsOnly={{label:'Problems only',test:z=>(z.issues&&z.issues.length)||z.anomaly,default:true}}
        tableId="zones" rowKey={r=>String(r.fqdn)} selectable
        filterable filterKeys={['fqdn','view']}
        searchSchema={{fields:{ttl:{type:'number'},issues:{type:'array'}},aliases:{zone:'fqdn'}}}
        initialPeekKey={params.peek}
        renderPeek={row=><div>
          <div className="mono" style={{fontWeight:600}}>{row.fqdn}</div>
          <div style={{marginTop:'var(--s2)',fontSize:'var(--t12)',color:'var(--text-dim)'}}>View: {row.view||'—'}</div>
          <div className="mono" style={{marginTop:'var(--s1)',fontSize:'var(--t12)',color:'var(--text-dim)'}}>TTL: {row.ttl??'—'}</div>
          <div style={{marginTop:'var(--s3)'}}>
            <div className="band-fact-l">Issues</div>
            {(Array.isArray(row.issues)&&row.issues.length)
              ? <div className="mono" style={{fontSize:'var(--t12)',color:'var(--crit)',marginTop:2}}>{row.issues.join(', ')}</div>
              : <div style={{fontSize:'var(--t12)',color:'var(--text-faint)',marginTop:2}}>none</div>}
          </div>
          {row.anomaly?<div className="mono" style={{marginTop:'var(--s2)',fontSize:'var(--t11)',color:'var(--warn)'}}>anomaly flagged</div>:null}
        </div>}
        bulkActions={sel=>[{
          label:'Block domain',
          confirm:'Block '+sel.length+' domain'+(sel.length===1?'':'s')+'?',
          flash:true,
          run:()=>{
            sel.forEach(z=>{
              const domain=z.fqdn;
              fetch('/api/block-domain',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain})})
                .then(async r=>{
                  const j=await r.json().catch(()=>({}));
                  if(r.status===401) toast('Block '+domain+' — requires bridge token','err');
                  else if(r.ok&&j.ok!==false) toast('Blocked '+domain,'ok');
                  else toast('Block '+domain+' failed: '+((j&&j.error)||('HTTP '+r.status)),'err');
                })
                .catch(()=>toast('Block '+domain+' failed — server unreachable','err'));
            });
          }
        }]}/>
    </Panel>
    {anLoading
      ? <Skeleton rows={3}/>
      : allEmpty
      ? null
      : <React.Fragment>
          <div className="sec-h">
            <h2>DNS analytics</h2><span className="rule"/>
          </div>
          <div className="grid-dense">
            <Panel title="Query volume · 7d"
              side={<Freshness at={an.fetchedAt} onRetry={an.refetch} error={an.error?true:undefined}/>}
              empty={volEmpty}>
              <HistogramBar buckets={volBuckets}/>
            </Panel>
            <Panel title="Top clients" empty={clientsEmpty}>
              <DataTable cols={clientCols} rows={clients} defaultSort={{key:'queries',dir:'desc'}} csvName="top-clients" scrollBody={280}/>
            </Panel>
            <Panel title="Query types" empty={qtypesEmpty}>
              <div className="sites">
                {qtypes.map((q,i)=><div key={i} className="siterow">
                  <span className="nm">{q.type}</span>
                  <span className="track"><i style={{width:Math.round(q.count/qmax*100)+'%',background:'var(--accent)'}}/></span>
                  <span className="pc mono">{q.count.toLocaleString()}</span>
                </div>)}
              </div>
            </Panel>
          </div>
        </React.Fragment>}
  </div>;
}
// ═══ END: NETDNS ═══

const M_HOST='HostMetrics.host_name', M_NAME='HostMetrics.metric_name', M_VAL='HostMetrics.avg_value';

function infraStatusColor(s){
  const v=(s||'').toLowerCase();
  if(v==='online'||v==='up') return 'var(--ok)';
  if(v==='degraded') return 'var(--warn)';
  if(v==='down'||v==='offline') return 'var(--crit)';
  return 'var(--text-faint)';
}
function fmtMetric(v){
  if(v==null||v==='') return null;
  const n=Number(v);
  if(!isFinite(n)) return null;
  const a=Math.abs(n);
  if(a>=1e6) return (n/1e6).toFixed(1)+'M';
  if(a>=1e3) return (n/1e3).toFixed(1)+'k';
  return n.toFixed(1);
}

function InfraTab({vaultTick}={}){
  const {params}=useRoute();
  const hostParam=params.host||'';
  const {data,error,locked,loading,fetchedAt,refetch}=useData();
  const mx=useApi('/api/host-metrics');
  const _whoInfra=useApi('/api/whoami');
  const canEdit=(((_whoInfra.data&&_whoInfra.data.role)||'viewer')!=='viewer');

  // Re-fetch both feeds once a vault unlock is reported upstream.
  useEffect(()=>{ if(vaultTick){ refetch(); mx.refetch(); } },[vaultTick]);

  // Sensor grid is overwhelming by default — hide behind a disclosure.
  const [showSensors,setShowSensors]=useState(false);
  const {bind:hoverBind}=useHoverDetail();
  // Compare-to-snapshot (Hosts) — MUST run before any early return (hooks-order rule).
  const [hostCompareOn,setHostCompareOn]=useState(false);

  const hosts=(data&&data.hosts)||[];
  const metricRows=(mx.data&&mx.data.metrics)||[];

  // Pivot metrics into rows=host, cols=metric; flag each column's top decile.
  const {hostNames,metricNames,pivot,hotSet,hotByHost}=useMemo(()=>{
    const pv={},hSet=new Set(),mSet=new Set(),cols={};
    metricRows.forEach(r=>{
      const h=r[M_HOST],m=r[M_NAME];
      if(h==null||m==null) return;
      const val=Number(r[M_VAL]);
      hSet.add(h);mSet.add(m);
      (pv[h]||(pv[h]={}))[m]=isFinite(val)?val:null;
      if(isFinite(val)) (cols[m]||(cols[m]=[])).push(val);
    });
    const hot=new Set(),hotByHost={};
    Object.keys(cols).forEach(m=>{
      const vals=cols[m].slice().sort((a,b)=>a-b);
      if(vals.length<2||vals[0]===vals[vals.length-1]) return; // no spread → no tint
      const thr=vals[Math.floor(0.9*(vals.length-1))];
      Object.keys(pv).forEach(h=>{
        const v=pv[h][m];
        if(v!=null&&v>=thr){ hot.add(h+'␀'+m); hotByHost[h]=(hotByHost[h]||0)+1; }
      });
    });
    return {
      hostNames:[...hSet].sort((a,b)=>a.localeCompare(b)),
      metricNames:[...mSet].sort((a,b)=>a.localeCompare(b)),
      pivot:pv, hotSet:hot, hotByHost,
    };
  },[metricRows]);

  // ── Synthesis derivations (host status + hottest, day-over-day delta) ──
  const {delta,prev}=useSnapshots();
  const online=hosts.filter(h=>/^(online|up)$/i.test(String(h.status||''))).length;
  const degradedHosts=hosts.filter(h=>/^degraded$/i.test(String(h.status||'')));
  const offlineHosts=hosts.filter(h=>/^(down|offline)$/i.test(String(h.status||'')));
  const total=hosts.length, degraded=degradedHosts.length, offline=offlineHosts.length;
  const byType=useMemo(()=>{const m={};hosts.forEach(h=>{const t=h.type||'—';m[t]=(m[t]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);},[hosts]);
  const hottest=Object.keys(hotByHost).reduce((best,h)=>hotByHost[h]>(hotByHost[best]||0)?h:best,null);

  if(locked||mx.locked) return null;

  // ── Per-host drill panel ──
  if(hostParam){
    const host=hosts.find(h=>h.name===hostParam);
    const drillRows=metricRows
      .filter(r=>r[M_HOST]===hostParam)
      .map(r=>({metric:r[M_NAME],value:Number(r[M_VAL])}));
    const drillCols=[
      {key:'metric',label:'Metric'},
      {key:'value',label:'Value',mono:true,align:'right',render:v=>{const f=fmtMetric(v);return f==null?'·':f;}},
    ];
    return <div className="infra-page">
      <div className="infra-sec">
        <div className="infra-drill-top">
          <button className="infra-back" onClick={()=>history.back()}>← Back</button>
          <span className="infra-h">{hostParam}</span>
          {host&&host.ip?<span className="infra-ip mono">{host.ip}</span>:null}
          {host?<span className="infra-st mono" style={{color:infraStatusColor(host.status)}}>{host.status}</span>:null}
        </div>
      </div>
      <div className="infra-sec">
        <div className="infra-head">
          <span className="infra-h">Metrics</span>
          <Freshness at={mx.fetchedAt} error={mx.error} onRetry={mx.refetch}/>
        </div>
        {mx.loading&&!mx.data ? <Skeleton rows={5}/>
          : drillRows.length===0 ? <div className="infra-dim">No metrics reported</div>
          : <DataTable cols={drillCols} rows={drillRows} defaultSort={{key:'metric',dir:'asc'}}
              tableId="host-metrics" rowKey={r=>String(r.metric)} selectable
              csvName={'infra-'+hostParam+'-metrics'}/>}
      </div>
    </div>;
  }

  // Compare-to-snapshot (Hosts): prev.hosts.top mirrors the subnets top-N shape
  // (bounded, sorted by name — hosts have no natural "top" ranking; see
  // SnapshotWriter). Same scoping caveat as subnets/leases: diff runs against
  // that bounded prior set, not full host history.
  const prevHostRows=(prev&&prev.hosts&&Array.isArray(prev.hosts.top))
    ?prev.hosts.top.map(t=>({name:t.n,status:t.s})):[];
  const hostKeyFn=r=>String(r.name||r.id);
  const hostDiff=(hostCompareOn&&prev)
    ?diffRows(prevHostRows,hosts,hostKeyFn,['status'])
    :null;

  // ── Host inventory ──
  const hostCols=[
    {key:'name',label:'Host',primary:true},
    {key:'ip',label:'IP',mono:true},
    {key:'type',label:'Type',hideSm:true,pivot:true},
    {key:'status',label:'Status',pivot:true,render:v=><span className="mono infra-st" style={{color:infraStatusColor(v)}}>{v||'—'}</span>},
    ...(canEdit?[{key:'__edit',label:'',align:'right',render:(v,h)=>
      <button className="btn" onClick={e=>{e.stopPropagation();nav('editor',{type:'host',id:h.id||h.name,name:h.name});}}>Edit</button>}]:[]),
  ];

  // ── Answer-first synthesis band ──
  const tone=offline>0?'crit':degraded>0?'warn':'ok';
  const worst=(offlineHosts[0]&&offlineHosts[0].name)||(degradedHosts[0]&&degradedHosts[0].name)||'';
  const verdict=(offline===0&&degraded===0)
    ? 'All '+total+' hosts online — infrastructure healthy'
    : offline+' hosts offline, '+degraded+' degraded'+(worst?' — '+worst+' needs attention':'');
  const dOff={v:delta('hosts.offline'),good:'down'};
  const facts=[
    {label:'Hosts online',value:online+'/'+total,delta:dOff},
    {label:'Degraded',value:degraded},
    {label:'Offline',value:offline,delta:dOff},
    {label:'Hottest host',value:hottest||'—'},
  ];
  // D: status filter chips built from the ACTUAL non-online status strings present
  // (robust to down/offline/degraded) → toggles a global filter on the host table's
  // `status` column (clearable in the top FilterBar). Then the offline-host drill chips.
  const statusVals=[...new Set(hosts.map(h=>String(h.status||'')).filter(v=>v&&!/^(online|up)$/i.test(v)))];
  const chips=[
    ...statusVals.map(v=>{const n=hosts.filter(h=>String(h.status||'')===v).length;
      return {label:'Only '+v+' · '+n,filter:{field:'status',value:v,label:'Status: '+v}};}),
    ...offlineHosts.slice(0,2).map(h=>({label:h.name,onClick:()=>nav('infra',{host:h.name})})),
  ];

  const statusMix=[online,degraded,offline];
  const kpiTiles=[
    {label:'Online',value:online,sub:'of '+total,color:'var(--ok)',values:statusMix},
    {label:'Degraded',value:degraded,color:'var(--warn)',values:statusMix},
    {label:'Offline',value:offline,color:'var(--crit)',values:statusMix},
    ...(byType.length>1?[{label:'Types',value:byType.length,sub:'host types',color:'var(--accent)',values:byType.map(t=>t[1])}]:[]),
  ];
  const attention=[...offlineHosts,...degradedHosts];
  const attnSev=h=>/^(down|offline)$/i.test(String(h.status||''))?'crit':'high';

  return <div className="infra-page">
    <SynthBand tone={tone} verdict={verdict} facts={facts} chips={chips}/>

    <div className="kpis">
      {kpiTiles.map(k=><KpiSpark key={k.label} label={k.label} value={k.value} sub={k.sub}
        color={k.color} values={k.values} bars/>)}
    </div>

    <div className="grid-dense">
      <Panel title="Needs attention" side={attention.length+(attention.length===1?' host':' hosts')}>
        {attention.length
          ? <div className="issues">
              {attention.map((h,i)=><div key={h.name||i} className="issue" role="button" tabIndex={0}
                  onClick={()=>nav('infra',{host:h.name})}
                  onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();nav('infra',{host:h.name});}}}
                  {...hoverBind({title:h.name,rows:[['IP',h.ip||'—'],['Type',h.type||'—'],['Status',h.status||'—']]})}>
                <span className={'sev '+attnSev(h)}>{attnSev(h)==='crit'?'offline':'degraded'}</span>
                <div className="body">
                  <div className="t">{h.name}</div>
                  <div className="d mono">{h.ip||'—'}{h.type?' · '+h.type:''}</div>
                </div>
              </div>)}
            </div>
          : <div className="infra-dim">All {total} hosts online</div>}
      </Panel>

      <Panel title="Status" side={total+' hosts'}>
        <Donut slices={[
          {label:'online',value:online,color:'var(--ok)'},
          {label:'degraded',value:degraded,color:'var(--warn)'},
          {label:'offline',value:offline,color:'var(--crit)'},
        ]} centerValue={offline} centerLabel="offline"/>
      </Panel>

      <Panel title="By type" empty={byType.length<2} side={byType.length+(byType.length===1?' type':' types')}>
        {byType.length
          ? <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
              {byType.map(([t,c])=><div key={t} className="infra-panel-row"><span>{t}</span><span className="mono">{c}</span></div>)}
            </div>
          : <div className="infra-dim">No hosts</div>}
      </Panel>

      <Panel title="Hottest host" empty={!hottest}>
        <button className="infra-panel-btn" onClick={()=>{setShowSensors(true);nav('infra',{host:hottest});}}>{hottest} — {hottest?hotByHost[hottest]:0} sensors hot →</button>
      </Panel>
    </div>

    <Panel title="Hosts" side={<div style={{display:'flex',alignItems:'center',gap:'var(--s2)'}}>
        <button className="btn btn-ghost" aria-pressed={hostCompareOn}
          disabled={!prev} title={prev?'Diff current hosts against yesterday\'s snapshot':'A prior daily snapshot is needed'}
          onClick={()=>{
            const next=!hostCompareOn; setHostCompareOn(next);
            if(next&&prev){
              const d=diffRows(prevHostRows,hosts,hostKeyFn,['status']);
              let added=0,changed=0; d.byKey.forEach(v=>{if(v.type==='+')added++;else changed++;});
              toast(added+' added · '+changed+' changed · '+d.ghosts.length+' removed','ok');
            }
          }}>{hostCompareOn?'Comparing hosts':'Compare hosts to snapshot'}</button>
        {canEdit?<button className="btn" onClick={()=>nav('editor',{type:'host'})}>New host</button>:null}<Freshness at={fetchedAt} error={error} onRetry={refetch}/></div>}>
      {loading&&!data ? <Skeleton rows={6}/>
        : error&&!data ? <ErrorState error={error} onRetry={refetch}/>
        : <DataTable cols={hostCols} rows={hosts} defaultSort={{key:'name',dir:'asc'}}
            csvName="infra-hosts" onRowClick={r=>nav('infra',{host:r.name})}
            scrollBody={480} columnToggle
            problemsOnly={{label:'Needs attention',test:h=>!/^(online|up)$/i.test(String(h.status||'')),default:hosts.length>50}}
            {...{tableId:'hosts'}} rowKey={hostKeyFn}
            diffMap={hostDiff?hostDiff.byKey:null} diffGhosts={hostDiff?hostDiff.ghosts:null}
            selectable filterable filterKeys={['name','ip','type','status']}
            searchSchema={{fields:{status:{type:'enum'}}}}
            initialPeekKey={params.peek}
            bulkActions={rws=>[{label:'Copy IPs',run:()=>{
              const ips=rws.map(r=>String(r.ip||'')).filter(Boolean);
              if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(ips.join('\n'));
              toast('Copied '+ips.length+' IP'+(ips.length===1?'':'s'),'ok');
            }}]}
            renderPeek={row=>{
              const hm=metricRows.filter(r=>r[M_HOST]===row.name).map(r=>({m:r[M_NAME],v:r[M_VAL]}));
              return <div className="infra-peek">
                <div className="infra-panel-row"><span>Host</span><span className="mono">{row.name}</span></div>
                <div className="infra-panel-row"><span>IP</span><span className="mono">{row.ip||'—'}</span></div>
                <div className="infra-panel-row"><span>Type</span><span>{row.type||'—'}</span></div>
                <div className="infra-panel-row"><span>Status</span><span className="mono infra-st" style={{color:infraStatusColor(row.status)}}>{row.status||'—'}</span></div>
                <div className="infra-panel-div"/>
                <div className="infra-panel-h">Metrics</div>
                {hm.length
                  ? hm.map((x,i)=><div key={i} className="infra-panel-row"><span>{x.m}</span><span className="mono">{fmtMetric(x.v)==null?'·':fmtMetric(x.v)}</span></div>)
                  : <div className="infra-dim">No metrics reported</div>}
              </div>;
            }}/>}
    </Panel>

    <div className="infra-sec">
      <div className="infra-head">
        <button className="infra-panel-btn infra-h" style={{cursor:'pointer'}} onClick={()=>setShowSensors(v=>!v)}>
          {showSensors ? 'Hide sensor grid' : 'Show sensor grid ('+hostNames.length+' hosts × '+metricNames.length+' metrics)'}
        </button>
        {showSensors ? <Freshness at={mx.fetchedAt} error={mx.error} onRetry={mx.refetch}/> : null}
      </div>
      {!showSensors ? null
        : mx.loading&&!mx.data ? <Skeleton rows={6}/>
        : metricNames.length===0 ? <div className="infra-dim">No metrics reported</div>
        : <div className="sensor-wrap">
            <table className="sensor">
              <thead><tr>
                <th className="sensor-hcol">Host</th>
                {metricNames.map(m=><th key={m}>{m}</th>)}
              </tr></thead>
              <tbody>
                {hostNames.map(h=><tr key={h}>
                  <td className="sensor-hcol mono">{h}</td>
                  {metricNames.map(m=>{
                    const f=fmtMetric(pivot[h]&&pivot[h][m]);
                    const hot=hotSet.has(h+'␀'+m);
                    return <td key={m} className={'mono'+(f==null?' sensor-null':(hot?' sensor-hot':''))}>
                      {f==null?'·':f}</td>;
                  })}
                </tr>)}
              </tbody>
            </table>
          </div>}
    </div>
  </div>;
}
// ═══ END: INFRA ═══

// ═══ REGION: SECURITY ═══
/* Security region — triage inbox, threat lookup, domain panels, SOC insights,
   actions. Reuses useApi, DataTable, Freshness, toast, LS, Skeleton, relAge, tokens. */
const SEC_SEV_RANK={critical:0,high:1,medium:2,low:3};
const secSevColor=s=>({critical:'var(--crit)',high:'var(--warn)'})[String(s||'').toLowerCase()]||'var(--text-dim)';
const secAckKey=e=>String(e.event_time)+'|'+String(e.qname);
function secHumanize(k){return String(k).replace(/^InsightsSummaryView\./,'').replace(/[_.]/g,' ').replace(/\b\w/g,c=>c.toUpperCase()).trim();}
function secAutoCols(rows){
  const first=(rows||[]).find(r=>r&&typeof r==='object')||{};
  return Object.keys(first).map(k=>({key:k,label:secHumanize(k),mono:typeof first[k]==='number',align:typeof first[k]==='number'?'right':'left'}));
}
function secEvtAge(t){
  if(t==null||t==='') return '—';
  let ms;
  if(typeof t==='number') ms=t<1e12?t*1000:t;
  else if(/^\d+$/.test(String(t))){const n=Number(t);ms=n<1e12?n*1000:n;}
  else ms=new Date(t).getTime();
  if(isNaN(ms)) return String(t);
  return relAge(new Date(ms));
}
function SecHead({title,at,onRetry,error,children}){
  return <div style={{display:'flex',alignItems:'center',gap:'var(--s3)',marginBottom:'var(--s3)',flexWrap:'wrap'}}>
    <h2 style={{margin:0,fontSize:'var(--t13)',fontWeight:600}}>{title}</h2>
    {children}
    <span style={{marginLeft:'auto'}}><Freshness at={at} onRetry={onRetry} error={error}/></span>
  </div>;
}
function SecSection({title,children}){
  return <section>
    <h3 style={{margin:'0 0 var(--s2)',fontSize:'var(--t12)',fontWeight:600,color:'var(--text-dim)'}}>{title}</h3>
    {children}
  </section>;
}
const secChip=active=>({height:22,padding:'0 var(--s2)',fontSize:'var(--t11)',background:'transparent',color:active?'var(--accent-text)':'var(--text-dim)',border:'1px solid '+(active?'var(--accent)':'var(--border)'),borderRadius:'var(--r-ctl)',cursor:'pointer'});
function SecChips({options,value,onChange}){
  return <span style={{display:'inline-flex',gap:'var(--s1)'}}>
    {options.map(o=><button key={o.v} style={secChip(value===o.v)} onClick={()=>onChange(o.v)}>{o.label}</button>)}
  </span>;
}

/* Peek (F4) — full event detail with inline ack toggle + two-step Block. */
function SecEventPeek({e,acks,toggleAck,onExplain}){
  const [acked,setAcked]=useState(!!acks[secAckKey(e)]);
  const [confirm,setConfirm]=useState(false);
  const [blocking,setBlocking]=useState(false);
  const fields=[
    ['Time',secEvtAge(e.event_time)+' · '+String(e.event_time??'—')],
    ['Query',e.qname],
    ['Severity',e.severity],
    ['Action',e.policy_action],
    ['Feed',e.feed_name],
    ['Threat',e.threat_indicator],
    ['Device',e.device],
    ['Network',e.network],
  ];
  const doBlock=async()=>{
    const domain=String(e.qname||'').trim(); if(!domain) return;
    setConfirm(false);setBlocking(true);
    try{
      const r=await fetch('/api/block-domain',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain})});
      const body=await r.json().catch(()=>({}));
      if(r.status===401) toast('Blocking requires bridge token','err');
      else if(r.ok&&body.ok) toast('Blocked '+domain,'ok');
      else toast(body.error||('HTTP '+r.status),'err');
    }catch(err){toast(String((err&&err.message)||err),'err');}
    setBlocking(false);
  };
  return <div style={{display:'flex',flexDirection:'column',gap:'var(--s3)'}}>
    <dl style={{margin:0,display:'grid',gridTemplateColumns:'auto 1fr',gap:'var(--s1) var(--s3)',fontSize:'var(--t12)'}}>
      {fields.map(([k,v])=><React.Fragment key={k}>
        <dt style={{color:'var(--text-dim)'}}>{k}</dt>
        <dd className="mono" style={{margin:0,color:k==='Severity'?secSevColor(v):'var(--text)',wordBreak:'break-all'}}>{v==null||v===''?'—':String(v)}</dd>
      </React.Fragment>)}
    </dl>
    <label style={{display:'flex',alignItems:'center',gap:'var(--s2)',fontSize:'var(--t12)'}}>
      <input type="checkbox" checked={acked} onChange={()=>{setAcked(x=>!x);toggleAck(e);}}/>
      Acknowledged
    </label>
    <div style={{display:'flex',gap:'var(--s2)',alignItems:'center',flexWrap:'wrap'}}>
      {confirm
        ? <span style={{display:'inline-flex',gap:'var(--s2)',alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:'var(--t12)',color:'var(--text-dim)'}}>Block {e.qname}?</span>
            <button className="btn" disabled={blocking} onClick={doBlock}>Confirm</button>
            <button className="btn btn-ghost" onClick={()=>setConfirm(false)}>Cancel</button>
          </span>
        : <button className="btn" disabled={!e.qname||blocking} onClick={()=>setConfirm(true)}>{blocking?'Blocking…':'Block domain'}</button>}
      {onExplain&&<button className="btn btn-ghost" onClick={()=>onExplain([e])}>Explain</button>}
    </div>
  </div>;
}

function SecTriageInbox({api,sevF,setSevF,acks,setAcks,toggleAck,clearAcks,triageRef,initialPeekKey,range,onExplain}){
  const {data,error,locked,fetchedAt,refetch,loading}=api;
  const [actF,setActF]=useState('all');
  // Real 24h activity — bucket ALL events per qname by hour-of-day from real event_time.
  const activityByQname=useMemo(()=>{
    const evs=(data&&Array.isArray(data.events))?data.events:[];
    const parseHour=t=>{
      if(t==null||t==='') return null;
      let ms;
      if(typeof t==='number') ms=t<1e12?t*1000:t;
      else if(/^\d+$/.test(String(t))){const n=Number(t);ms=n<1e12?n*1000:n;}
      else ms=new Date(t).getTime();
      if(isNaN(ms)) return null;
      return new Date(ms).getHours();
    };
    const m={};
    evs.forEach(e=>{
      const q=e&&e.qname; if(!q) return;
      const h=parseHour(e.event_time); if(h==null) return;
      if(!m[q]) m[q]=new Array(24).fill(0);
      m[q][h]++;
    });
    return m;
  },[data]);
  if(locked) return null;
  if(loading&&!data) return <div><SecHead title="Triage inbox"/><Skeleton rows={8}/></div>;
  const d=data||{};
  const counts=d.counts||{};
  const events=Array.isArray(d.events)?d.events:[];
  let rows=events.filter(e=>{
    const sev=String(e.severity||'').toLowerCase();
    if(sevF!=='all'&&sev!==sevF) return false;
    const act=String(e.policy_action||'').toLowerCase();
    if(actF==='blocked'&&!(act==='block'||act==='redirect')) return false;
    if(actF==='logged'&&act!=='log') return false;
    if(range){const t=parseTs(e.event_time);if(!isFinite(t)||t<range[0]||t>range[1]) return false;}
    return true;
  });
  rows=rows.map((e,i)=>({e,i})).sort((A,B)=>{
    const aa=acks[secAckKey(A.e)]?1:0,ab=acks[secAckKey(B.e)]?1:0;
    if(aa!==ab) return aa-ab;
    const ra=SEC_SEV_RANK[String(A.e.severity||'').toLowerCase()]??9,rb=SEC_SEV_RANK[String(B.e.severity||'').toLowerCase()]??9;
    if(ra!==rb) return ra-rb;
    return String(B.e.event_time||'').localeCompare(String(A.e.event_time||''));
  }).map(x=>x.e);
  const cols=[
    {key:'ack',label:'',width:28,render:(_,e)=>{
      const acked=!!acks[secAckKey(e)];
      return <input type="checkbox" checked={acked} onClick={ev=>ev.stopPropagation()} onChange={()=>toggleAck(e)} aria-label="Acknowledge event"/>;
    }},

  ];

    {label:'Ack '+rws.length,flash:true,run:()=>{

      toast(rws.length+' acked','ok',{duration:5000,action:{label:'Undo',run:()=>{setAcks(prev);LS.set('acks',prev);}}});

    {label:'Block domains',confirm:'Block '+rws.length+' domain'+(rws.length===1?'':'s')+'?',flash:true,run:async()=>{

      for(const domain of domains){
        try{

      }
      if(auth) toast('Blocking requires bridge token','err');
      else toast(ok+' domain'+(ok===1?'':'s')+' blocked'+(fail?' · '+fail+' failed':''),(fail&&!ok)?'err':'ok');

        <span style={{color:'var(--text-dim)'}}>medium {counts.medium||0}</span>{' · '}
        <span style={{color:'var(--text-dim)'}}>low {counts.low||0}</span>

          rowKey={r=>String(r.event_time)+'|'+String(r.qname)}

          selectable bulkActions={bulkActions} initialPeekKey={initialPeekKey}

/* External intel (Dossier) — defensive render of /api/dossier summary + sources. */
function SecDossierSourceVal({src}){
  const bits=[];
  if(Array.isArray(src.records)) bits.push(src.records.length+' record'+(src.records.length===1?'':'s'));
  if(src.geo&&typeof src.geo==='object') bits.push('geo: '+[src.geo.country,src.geo.city].filter(Boolean).join(', '));
  else if(src.geo) bits.push('geo: '+String(src.geo));
  if(src.whois&&typeof src.whois==='object') bits.push('whois: '+[src.whois.registrar,src.whois.created].filter(Boolean).join(' · '));
  else if(src.whois) bits.push('whois: '+String(src.whois));
  if(src.actor) bits.push('actor: '+String(src.actor));
  if(src.malware) bits.push('malware: '+(Array.isArray(src.malware)?src.malware.join(', '):String(src.malware)));
  if(src.detail) bits.push(String(src.detail));
  return <span style={{color:'var(--text-dim)',wordBreak:'break-word'}}>{bits.length?bits.join(' · '):'—'}</span>;
}

    </div>
    {(classes.length||props.length)>0&&<div style={{display:'flex',gap:'var(--s1)',flexWrap:'wrap',marginBottom:'var(--s2)'}}>
      {classes.map((c,i)=><span key={'c'+i} className="chip">{String(c)}</span>)}

  </div>;
}
function SecThreatLookup(){
  const [q,setQ]=useState('');
  const [busy,setBusy]=useState(false);
  const [res,setRes]=useState(null);
  const [dossier,setDossier]=useState(null);
  const [err,setErr]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const lookup=async()=>{
    const query=q.trim(); if(!query) return;
    setBusy(true);setErr(null);setRes(null);setDossier(null);setConfirm(null);
    fetch('/api/dossier?q='+encodeURIComponent(query),{cache:'no-store'})
      .then(r=>r.json().catch(()=>null))
      .then(j=>{if(j)setDossier(j);})
      .catch(()=>{});
    try{
      const r=await fetch('/api/threat-lookup?q='+encodeURIComponent(query),{cache:'no-store'});
      const body=await r.json().catch(()=>null);
      if(!r.ok||(body&&body.error)) setErr((body&&body.error)||('HTTP '+r.status));
      else setRes(body||{entities:[],query});
    }catch(e){setErr(String((e&&e.message)||e));}
    setBusy(false);
  };
  const write=async(kind)=>{
    const domain=q.trim(); if(!domain) return;
    const url=kind==='block'?'/api/block-domain':'/api/unblock-domain';
    setConfirm(null);
    try{
      const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain})});
      const body=await r.json().catch(()=>({}));
      if(r.status===401) toast('Requires bridge token','err');
      else if(r.ok&&body.ok) toast((kind==='block'?'Blocked ':'Unblocked ')+domain,'ok');
      else toast(body.error||('HTTP '+r.status),'err');
    }catch(e){toast(String((e&&e.message)||e),'err');}
  };
  return <div>
    <SecHead title="Threat lookup"/>
    <div style={{display:'flex',gap:'var(--s2)',marginBottom:'var(--s3)',flexWrap:'wrap'}}>
      <input className="mono" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')lookup();}}
        placeholder="domain, IP, or host…" aria-label="Threat lookup query"
        style={{flex:'1 1 260px',minWidth:200,height:28,padding:'0 var(--s3)',fontSize:'var(--t12)',color:'var(--text)',background:'var(--raised)',border:'1px solid var(--border)',borderRadius:'var(--r-ctl)'}}/>
      <button className="btn" onClick={lookup} disabled={busy||!q.trim()}>{busy?'Looking up…':'Lookup'}</button>
    </div>
    {err&&<div className="dt-empty" style={{color:'var(--crit)'}}>{err}</div>}
    {res&&<div style={{marginBottom:'var(--s3)'}}><SecEntities entities={res.entities}/></div>}
    <SecDossier dossier={dossier}/>
    <div style={{display:'flex',alignItems:'center',gap:'var(--s2)',flexWrap:'wrap',marginTop:'var(--s3)'}}>
      {confirm==='block'
        ? <><span style={{fontSize:'var(--t12)',color:'var(--text-dim)'}}>Block {q.trim()}?</span>
            <button className="btn" onClick={()=>write('block')}>Confirm block</button>
            <button className="btn btn-ghost" onClick={()=>setConfirm(null)}>Cancel</button></>
        : <button className="btn" disabled={!q.trim()} onClick={()=>setConfirm('block')}>Block domain</button>}
      {confirm==='unblock'
        ? <><span style={{fontSize:'var(--t12)',color:'var(--text-dim)'}}>Unblock {q.trim()}?</span>
            <button className="btn" onClick={()=>write('unblock')}>Confirm unblock</button>
            <button className="btn btn-ghost" onClick={()=>setConfirm(null)}>Cancel</button></>
        : <button className="btn btn-ghost" disabled={!q.trim()} onClick={()=>setConfirm('unblock')}>Unblock domain</button>}
    </div>
  </div>;
}

function SecSynthBand({api,acks,setSevF,triageRef}){
  const {delta}=useSnapshots();
  if(!api||!api.data) return null;
  const d=api.data||{};
  const events=Array.isArray(d.events)?d.events:[];
  const sevOf=e=>String(e.severity||'').toLowerCase();
  const unacked=events.filter(e=>!acks[secAckKey(e)]);
  const uCrit=unacked.filter(e=>sevOf(e)==='critical').length;
  const uHigh=unacked.filter(e=>sevOf(e)==='high').length;
  const blocked=Number(d.blocked)||0;
  const total=Number(d.total)||events.length;
  const tone=uCrit>0?'crit':uHigh>0?'warn':'ok';
  const pool=uCrit>0?unacked.filter(e=>sevOf(e)==='critical'):unacked;
  const topDev=(()=>{
    const freq={};
    pool.forEach(e=>{const v=e.device;if(v)freq[v]=(freq[v]||0)+1;});
    const arr=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
    return arr.length?arr[0][0]:null;
  })();
  const verdict=uCrit>0
    ? uCrit+' critical threat'+(uCrit===1?'':'s')+' awaiting triage'+(topDev?' (top target: '+topDev+')':'')
    : 'No unacknowledged critical threats — '+blocked+' blocked automatically';
  const facts=[
    {label:'Unacked critical', value:uCrit, delta:{v:delta('sec.crit'),good:'down'}},
    {label:'Unacked high', value:uHigh, delta:{v:delta('sec.high'),good:'down'}},
    {label:'Blocked', value:blocked, delta:{v:delta('sec.blocked'),good:'up'}},
    {label:'Total events', value:total},
  ];
  const jump=sev=>{setSevF(sev);if(triageRef&&triageRef.current)triageRef.current.scrollIntoView({behavior:'smooth',block:'start'});};
  const chips=[
    uCrit>0?{label:'Triage '+uCrit+' critical', onClick:()=>jump('critical')}:null,
    uHigh>0?{label:'Triage '+uHigh+' high', onClick:()=>jump('high')}:null,
    topDev?{label:'Top target: '+topDev, onClick:()=>jump(uCrit>0?'critical':'all')}:null,
  ].filter(Boolean);
  const counts=d.counts||{};
  const sevChips=[
    {k:'critical',c:'crit',n:counts.critical},
    {k:'high',c:'high',n:counts.high},
    {k:'medium',c:'med',n:counts.medium},
    {k:'low',c:'low',n:counts.low},
  ];
  return <React.Fragment>
    <SynthBand tone={tone} verdict={verdict} facts={facts} chips={chips}/>
    <div style={{display:'flex',gap:'var(--s2)',flexWrap:'wrap'}}>
      {sevChips.map(s=><button key={s.k} className="svc" onClick={()=>jump(s.k)}
          style={{cursor:'pointer',flexDirection:'row',alignItems:'center',justifyContent:'space-between',gap:'var(--s3)'}}>

}

function SecurityTab(){
  const sec=useApi('/api/hub/security',{poll:60000});
  const route=useRoute();
  const time=useTimeRange();                 // global time window (P1 slice 5)
  const {data:allData}=useData();            // shared feed — carries auditLogs for annotations
  const [sevF,setSevF]=useState('all');
  const [range,setRange]=useState(null);
  const [acks,setAcks]=useState(()=>LS.get('acks',{}));
  const triageRef=useRef(null);
  const ai=useAiExplain();
  const toggleAck=e=>{const k=secAckKey(e);setAcks(p=>{const n={...p};if(n[k])delete n[k];else n[k]=true;LS.set('acks',n);return n;});};
  const clearAcks=()=>{setAcks({});LS.set('acks',{});};
  const secEvents=sec.data&&Array.isArray(sec.data.events)?sec.data.events:[];
  // Event annotations (part 4): audit/config-change ticks from the shared feed's
  // auditLogs (norm_audit → {ts,user,action,resource,result}). Empty ⇒ no ticks.
  const auditLogs=(allData&&Array.isArray(allData.auditLogs))?allData.auditLogs:[];
  const annotations=auditLogs.map(a=>({ts:a.ts,who:a.user,what:a.action,
    title:(a.action||'change')+' · '+(a.resource||''),
    rows:[['Who',a.user||'—'],['What',((a.action||'')+' '+(a.resource||'')).trim()||'—'],
          ['When',a.ts||'—'],['Result',a.result||'—']]}));
  const tWin=time.window;
  // Capture-to-zoom (part 2): a drag reports its window here; encode it as an
  // absolute `<from>-<to>` token in the global time hash. null ⇒ clear.
  const onZoom=r=>time.setRange(r?(Math.round(r[0])+'-'+Math.round(r[1])):null);
  // The triage inbox is a time-filtered table: it reads the local brush range if
  // set, else the global window — so a global preset/zoom narrows it too (part 1).
  const effRange=range||(tWin?[tWin.from,tWin.to]:null);
  const resetZoom=<button className="vh-reset" onClick={()=>{time.setRange(null);setRange(null);}}
    aria-label="Reset zoom — clear the time window">Reset zoom ✕</button>;
  return <div className="page">
    <SecSynthBand api={sec} acks={acks} setSevF={setSevF} triageRef={triageRef}/>
    <Panel title="Event volume" side={time.token?resetZoom:'brush to filter'} empty={secEvents.length===0}>
      <VolumeHistogram rows={secEvents} tsKey="event_time" buckets={48} onRange={setRange} selected={range}
        onZoom={onZoom} annotations={annotations} windowRange={tWin?[tWin.from,tWin.to]:null}/>
    </Panel>
    <Panel>
      <SecTriageInbox api={sec} sevF={sevF} setSevF={setSevF} acks={acks} setAcks={setAcks} toggleAck={toggleAck} clearAcks={clearAcks} triageRef={triageRef} initialPeekKey={route.params.peek} range={effRange} onExplain={ai.open}/>
    </Panel>
    <div className="grid-dense">
      <Panel><SecThreatLookup/></Panel>
      <Panel><SecLookalikes/></Panel>
      <SecInsights/>
      <SecActions/>
      <Panel><SecDomainPanels/></Panel>
    </div>
    {ai.node}
  </div>;
}

/* Saved-view helpers shared by ViewsMenu + CommandPalette.
   Server (view_write) persists only name/widgets/order/layout/folder/saved_at
   and drops unknown top-level keys, so the route is mirrored inside layout
   (opaque to the server) as well as sent top-level per the view schema. */
function saveCurrentView(name,folder){
  const {tab,params}=parseHash();
  const route={tab,params};
  return fetch('/api/views',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,widgets:{},order:[],layout:{route},folder:folder||'',saved_at:new Date().toISOString(),route})})
    .then(async r=>{const j=await r.json().catch(()=>({}));return {ok:r.ok&&j.ok!==false,error:j&&j.error};});
}
function applyViewByName(name){
  fetch('/api/views/'+encodeURIComponent(name))
    .then(r=>r.ok?r.json():Promise.reject('HTTP '+r.status))
    .then(v=>{
      const route=(v&&v.route)||(v&&v.layout&&v.layout.route)||null;
      if(route&&route.tab){ nav(route.tab,route.params||{}); toast('View "'+name+'" applied','ok'); }
      else toast('Legacy view — no route stored','warn');
    })
    .catch(()=>toast('Could not load view "'+name+'"','err'));
}

/* ─────────────────────────────────────────────────────────────
   Watch expressions (P1 slice 7) — a "watch" is just a saved BQL
   query (name + tab + query string) persisted in the SAME bx. LS
   namespace as saved views/scratchpad. Poor-man's alerting: a live
   MATCH COUNT is computed client-side from the shared /api/data feed
   via the existing parseQuery/deriveSchema/buildPredicate — no alert
   engine, no polling, no server. Clicking a watch re-applies its
   query through the existing sq= hash surface (nav). On-demand only.
   ───────────────────────────────────────────────────────────── */
const WATCH_KEY='watches';
function readWatches(){ const v=LS.get(WATCH_KEY,[]); return Array.isArray(v)?v:[]; }
function writeWatches(list){ LS.set(WATCH_KEY,Array.isArray(list)?list:[]); try{window.dispatchEvent(new CustomEvent('bx:watches'));}catch(e){} }
function addWatch(w){ if(!w||!w.name) return; const list=readWatches().filter(x=>x.name!==w.name); list.push(w); writeWatches(list); }
function removeWatch(name){ writeWatches(readWatches().filter(x=>x.name!==name)); }
// watchRows — the primary-entity rows for a tab, read from the shared /api/data
// body (same accessor the tab components use). Watches count against these.
function watchRows(data,tab){
  if(!data||typeof data!=='object') return [];
  switch(tab){
    case 'dns': return Array.isArray(data.zones)?data.zones:[];
    case 'infra': return Array.isArray(data.hosts)?data.hosts:[];
    case 'network':
    default: return Array.isArray(data.subnets)?data.subnets:[];
  }
}
// watchCount — live count of rows matching a watch's BQL query. Reuses the exact
// parse → schema → predicate pipeline the table search uses, so counts match the
// filtered view. Never throws (bad query → 0).
function watchCount(data,watch){
  if(!watch||!watch.query) return 0;
  const rows=watchRows(data,watch.tab);
  if(!rows.length) return 0;
  try{
    const cols=Object.keys(rows[0]||{}).map(k=>({key:k}));
    const schema=deriveSchema(cols,rows,{});
    const pred=buildPredicate(parseQuery(watch.query),schema);
    return rows.filter(pred).length;
  }catch(e){ return 0; }
}

/* Alert rules — LS-only thresholds polled against /api/data every 120s. */
const ALERT_DEFAULTS={subnetUtilOn:false,subnetUtil:85,hostOfflineOn:false};
function AlertRulesPanel(){
  const [rules,setRules]=useState(()=>({...ALERT_DEFAULTS,...LS.get('alertRules',{})}));
  const firedRef=useRef({});
  const save=next=>{setRules(next);LS.set('alertRules',next);};
  const toggle=(key,on)=>{
    if(on&&typeof Notification!=='undefined'&&Notification.permission==='default'){
      try{Notification.requestPermission();}catch(e){}
    }
    save({...rules,[key]:on});
  };
  const anyOn=rules.subnetUtilOn||rules.hostOfflineOn;
  useEffect(()=>{
    if(!anyOn) return;
    let alive=true;
    const notify=m=>{
      toast(m,'warn');
      if(typeof Notification!=='undefined'&&Notification.permission==='granted'){
        try{new Notification('Bloxsmith alert',{body:m});}catch(e){}
      }
    };
    const check=()=>{
      fetch('/api/data',{cache:'no-store'}).then(r=>r.ok?r.json():null).then(d=>{
        if(!alive||!d||d.locked||d.error) return;
        if(rules.subnetUtilOn){
          const thr=Number(rules.subnetUtil)||85;
          (d.subnets||[]).forEach(s=>{
            if((s.util||0)>=thr){
              const k='sub:'+(s.id||s.name);
              if(!firedRef.current[k]){firedRef.current[k]=1;notify('Subnet '+(s.name||s.addr)+' at '+s.util+'% utilization (threshold '+thr+'%)');}
            }
          });
        }
        if(rules.hostOfflineOn){
          (d.hosts||[]).forEach(h=>{
            if(h.status==='offline'){
              const k='host:'+(h.id||h.name);
              if(!firedRef.current[k]){firedRef.current[k]=1;notify('Host '+(h.name||h.id)+' is offline');}
            }
          });
        }
      }).catch(()=>{});
    };
    check();
    const iv=setInterval(check,120000);
    return ()=>{alive=false;clearInterval(iv);};
  },[anyOn,rules.subnetUtilOn,rules.hostOfflineOn,rules.subnetUtil]);
  return <div className="panel" style={{padding:16}}>
    <div style={{fontSize:12,fontWeight:600}}>Alerts</div>
    <div style={{fontSize:11,color:'var(--text-faint)',margin:'4px 0 8px'}}>
      Checked every 2 minutes while this tab is open. Fires a toast plus a browser notification when permitted.
    </div>
    <label className="alerts-row">
      <input type="checkbox" checked={!!rules.subnetUtilOn} onChange={e=>toggle('subnetUtilOn',e.target.checked)}/>
      <span>Subnet utilization at or above</span>
      <input className="alerts-num mono" type="number" min="1" max="100" value={rules.subnetUtil}
        onChange={e=>save({...rules,subnetUtil:e.target.value})} aria-label="Subnet utilization threshold percent"/>
      <span>%</span>
    </label>
    <label className="alerts-row">
      <input type="checkbox" checked={!!rules.hostOfflineOn} onChange={e=>toggle('hostOfflineOn',e.target.checked)}/>
      <span>Any infrastructure host offline</span>
    </label>
  </div>;
}

/* AiDrawer — non-modal right-side AI console over POST /api/query. Mounted in
   Shell (persists across tab switches). This is a functional prop-shell rename of
   the former AskTab; R5 fills/polishes the content. The submit builds an implicit
   context string from the current route + active table state (filter/selection). */
function AiDrawer({open,onClose,initialQ}){
  const power=usePower();
  const {data}=useData();
  const [input,setInput]=useState('');
  const [busy,setBusy]=useState(false);
  const [items,setItems]=useState([]); // newest first, capped at 5
  const askedRef=useRef(null);
  const inRef=useRef(null);
  const drawerRef=useRef(null);
  const [ctx,setCtx]=useState('');
  // Live short context label (mirrors what buildContext() sends on submit).
  useEffect(()=>{
    const upd=()=>{try{const {tab}=parseHash();setCtx((typeof TAB_LABELS!=='undefined'&&TAB_LABELS[tab])||tab||'');}catch(e){setCtx('');}};
    upd(); window.addEventListener('hashchange',upd);
    return ()=>window.removeEventListener('hashchange',upd);
  },[]);
  const push=entry=>setItems(list=>[{id:Date.now()+Math.random(),...entry},...list].slice(0,5));
  // Implicit tab context — current route + active DataTable state (filter/selection).
  const buildContext=()=>{
    try{
      const {tab}=parseHash();
      const a=power&&power.getActive&&power.getActive();
      const st=a&&a.api&&a.api.current&&a.api.current.getState&&a.api.current.getState();
      return 'User is on the '+tab+' tab'
        +(st&&st.filter?', table filter "'+st.filter+'"':'')
        +(st&&st.selected&&st.selected.size?', '+st.selected.size+' rows selected':'')+'.';
    }catch(e){ return ''; }
  };
  const submit=(qArg)=>{
    const q=String(qArg!=null?qArg:input).trim();
    if(!q||busy) return;
    setBusy(true);
    fetch('/api/query',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:q,context:buildContext()})})
      .then(async r=>{const j=await r.json().catch(()=>null);return {r,j};})
      .then(({r,j})=>{
        if(r.status===503||(j&&j.locked)){
          window.dispatchEvent(new CustomEvent('bx:vault-locked'));
          push({q,error:'Vault locked — unlock to query.'});
          return;
        }
        if(j&&j.error){ push({q,error:String(j.error)}); return; }
        if(!r.ok&&!(j&&typeof j.answer==='string')){ push({q,error:'HTTP '+r.status}); return; }
        push({
          q,
          answer:(j&&typeof j.answer==='string')?j.answer:'Query returned an unexpected response.',
          suggestions:(j&&Array.isArray(j.suggestions))?j.suggestions:[],
          trace:(j&&Array.isArray(j.trace))?j.trace:null,
        });
      })
      .catch(()=>toast('Query failed — server unreachable','err'))
      .finally(()=>setBusy(false));
  };
  // Slide: CSS class alone proved unreliable here (computed transform stuck
  // off-canvas), so drive transform/visibility inline with !important — authoritative.
  useEffect(()=>{
    const el=drawerRef.current; if(!el) return;
    el.style.setProperty('transform',open?'none':'translateX(100%)','important');
    el.style.setProperty('visibility',open?'visible':'hidden','important');
    el.style.setProperty('pointer-events',open?'auto':'none','important');
  },[open]);
  // Focus the input when the drawer opens (non-modal — no focus trap).
  useEffect(()=>{ if(open&&inRef.current) inRef.current.focus(); },[open]);
  // Click-off + window Escape close (trigger/toasts/action-bar exempt so they don't self-close).
  useEffect(()=>{
    if(!open) return;
    const onDown=e=>{
      const t=e.target;
      if(t&&t.closest&&(t.closest('.ai-drawer')||t.closest('.ai-trigger')||t.closest('.toast')||t.closest('.action-bar'))) return;
      onClose();
    };
    const onEsc=e=>{ if(e.key==='Escape'){ e.preventDefault(); onClose(); } };
    document.addEventListener('pointerdown',onDown);
    window.addEventListener('keydown',onEsc);
    return ()=>{ document.removeEventListener('pointerdown',onDown); window.removeEventListener('keydown',onEsc); };
  },[open,onClose]);
  // initialQ handoff (palette / bx:ai-open / #ask?q=…): prefill + submit once per distinct q.
  useEffect(()=>{
    if(!open) return;
    const q=initialQ;
    if(q&&askedRef.current!==q){ askedRef.current=q; setInput(q); submit(q); }
  },[open,initialQ]); // eslint-disable-line

  // ── suggested questions (real inventory numbers + threat-intel-aware) ──
  const nZone=((data&&data.zones)||[]).length;
  const nHost=((data&&data.hosts)||[]).length;
  // A real flagged domain from the live security events (highest-severity first).
  const evs=(data&&Array.isArray(data.events))?data.events:[];
  const flagged=((evs.find(e=>/crit|high/i.test(String(e&&e.severity||'')))||evs[0]||{}).qname)||'';
  const ask=q=>{setInput(q);submit(q);};
  const suggestions=[
    'Which subnets are nearly full?',
    flagged?'Is '+flagged+' malicious?':'Which domains are on threat feeds?',
    'Any lookalike domains of my brand?',
    'Are any of my '+nZone+' DNS zones misconfigured?',
    'Which of '+nHost+' hosts are offline?',
    'What changed in the last 24 hours?',
  ];

  // Stays mounted across open/close so the conversation (items) survives — slide handled above.
  return <aside ref={drawerRef} className="ai-drawer" role="complementary" aria-label="AI assistant"
    data-open={open?'':undefined} aria-hidden={open?undefined:'true'}
    onKeyDown={e=>{if(e.key==='Escape'){e.preventDefault();onClose();}}}>
    <div className="ai-drawer-head">
      <span className="ai-drawer-title"><span className="ai-dot"/>Ask AI</span>
      <button className="peek-close" aria-label="Close AI assistant" onClick={onClose}>✕</button>
    </div>
    <div className="ai-drawer-body">
      <div className="ai-ctx mono">Context: {ctx?ctx+' tab':'dashboard'}</div>
      <div className="ai-convo">
        {items.length===0&&!busy&&
          <div className="ai-empty">Ask a question or pick a suggestion below.</div>}
        {items.map(it=>
          <div key={it.id} className="panel ask-item">
            <div className="ask-q mono">&gt; {it.q}</div>
            {it.error
              ? <div className="ask-err">{it.error}</div>
              : <div className="ask-a prose">{it.answer}</div>}
            {!!(it.suggestions&&it.suggestions.length)&&<div className="ask-chips">
              {it.suggestions.map((sg,i)=>
                <button key={i} className="chip chip-btn" onClick={()=>ask(sg)}>{sg}</button>)}
            </div>}
            {!!(it.trace&&it.trace.length)&&<div className="ask-trace mono">
              {it.trace.map((t,i)=><div key={i} className="ask-trace-row">
                <span>{t.tool}</span> <span className="args">{JSON.stringify(t.args)}</span>
              </div>)}
            </div>}
          </div>)}
      </div>
      <div className="ai-foot">
        <div className="ask-chips">
          {suggestions.map((sg,i)=><button key={i} className="chip chip-btn" onClick={()=>ask(sg)}>{sg}</button>)}
        </div>
        <div className="ask-bar">
          <input ref={inRef} className="ask-in mono" placeholder="Ask about your network…"
            value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')submit();}}
            aria-label="Natural-language query"/>
          <button className="btn" style={{height:36}} onClick={()=>submit()} disabled={busy||!input.trim()}>Ask</button>
        </div>
        {busy&&<div className="ask-busy mono">Analyzing…</div>}
