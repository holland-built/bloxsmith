/* FIELD_SPECS — hardcoded field metadata (no schema endpoint), same idiom
   as RTYPE_HINTS above, for the 5 NEW /api/edit/<type> resource types Phase
   1 added server-side, plus 'tags' (targets the existing /api/retag/block
   block-status re-tag endpoint — not a literal free-form tag editor).
   dns_record/ip_address are intentionally absent here: EditorTab reuses
   SelfServiceTab's DNS-record CRUD + Allocate forms verbatim for those two
   types instead of a generic field-driven form (plan's do-NOT-touch
   SelfServiceTab blast-radius rule). */
const FIELD_SPECS={
  dns_zone:{label:'DNS Zone',endpoint:'/api/edit/dns_zone',fields:[
    {key:'fqdn',label:'FQDN',kind:'text',placeholder:'zone.example.com.',required:true},
    {key:'view',label:'View ID',kind:'text',placeholder:'view id',required:true},
    {key:'comment',label:'Comment',kind:'text'},
    {key:'tags',label:'Tags (key=value, key2=value2)',kind:'text',placeholder:'env=prod,team=noc'},
  ]},
  subnet:{label:'Subnet',endpoint:'/api/edit/subnet',fields:[
    {key:'block_id',label:'Address Block ID',kind:'text',placeholder:'block id',required:true},
    {key:'cidr',label:'CIDR (prefix length)',kind:'number',placeholder:'24',required:true},
    {key:'name',label:'Name',kind:'text'},
    {key:'comment',label:'Comment',kind:'text'},
    {key:'tags',label:'Tags (key=value, key2=value2)',kind:'text'},
  ]},
  address_block:{label:'Address Block',endpoint:'/api/edit/address_block',fields:[
    {key:'address',label:'Address',kind:'text',placeholder:'10.20.0.0',required:true},
    {key:'cidr',label:'CIDR (prefix length)',kind:'number',placeholder:'16',required:true},
    {key:'space',label:'IP Space',kind:'text',placeholder:'my-ip-space',required:true},
    {key:'comment',label:'Comment',kind:'text'},
    {key:'tags',label:'Tags (key=value, key2=value2)',kind:'text'},
  ]},
  dhcp_range:{label:'DHCP Range',endpoint:'/api/edit/dhcp_range',fields:[
    {key:'start',label:'Start address',kind:'text',placeholder:'10.20.0.100',required:true},
    {key:'end',label:'End address',kind:'text',placeholder:'10.20.0.200',required:true},
    {key:'space',label:'IP Space',kind:'text',placeholder:'my-ip-space',required:true},
    {key:'tags',label:'Tags (key=value, key2=value2)',kind:'text'},
  ]},
  host:{label:'Host',endpoint:'/api/edit/host',fields:[
    {key:'name',label:'Name',kind:'text',placeholder:'host.example.com',required:true},
    {key:'addresses',label:'Addresses (comma-separated)',kind:'text',placeholder:'10.0.0.5, 10.0.0.6',required:true},
    {key:'comment',label:'Comment',kind:'text'},
  ]},
  tags:{label:'Tags (block re-tag)',endpoint:'/api/retag/block',fields:[
    {key:'template',label:'Site template',kind:'text',placeholder:'template name'},
    {key:'site',label:'Site',kind:'text',placeholder:'site name'},
    {key:'address',label:'Block address',kind:'text',placeholder:'10.20.0.0'},
    {key:'cidr',label:'CIDR (prefix length)',kind:'number',placeholder:'16'},
    {key:'status',label:'Status',kind:'text',placeholder:'available'},
    {key:'ip_space',label:'IP Space',kind:'text',placeholder:'my-ip-space'},
  ]},
};
const EDITOR_TYPES=[
  {key:'dns_zone',label:'DNS Zone'},
  {key:'subnet',label:'Subnet'},
  {key:'address_block',label:'Address Block'},
  {key:'dhcp_range',label:'DHCP Range'},
  {key:'host',label:'Host'},
  {key:'tags',label:'Tags'},
];
// Phase 3: which /api/edit types support PATCH update vs DELETE (per _EDIT_RESOURCES).
const EDIT_UPDATE_TYPES=['dns_zone','subnet','dhcp_range','host'];
const EDIT_DELETE_TYPES=['dns_zone','subnet','dhcp_range','host','address_block'];

/* EditorTab — consolidated create surface for the 6 FIELD_SPECS-backed resource
   types (plan brainstorms/resource-editor-plan-2026-07-11.md, Phase 2; DNS Record
   and IP Address are handled by SelfServiceTab, not duplicated here). Each type
   renders a generic Panel form driven by FIELD_SPECS, dry-run-default ON,
   role-gated below operator. Deep-link params (type + per-field prefill, e.g.
   #editor?type=host&name=foo) seed the initial type/fields so Phase 3 row-level
   Edit/New links can pre-fill this form. */
function EditorTab(){
  const {params}=useRoute();
  const {locked}=useData();
  const whoamiApi=useApi('/api/whoami');
  const role=(whoamiApi.data&&whoamiApi.data.role)||'viewer';
  const isViewer=role==='viewer';
  const initialType=(params.type&&EDITOR_TYPES.some(t=>t.key===params.type))?params.type:'dns_zone';
  const [type,setType]=useState(initialType);
  const [editId,setEditId]=useState(params.id||null); // Phase 3: id present → edit (PATCH/DELETE) mode
  const [fields,setFields]=useState({});
  const [dry,setDry]=useState(true);
  const [busy,setBusy]=useState(false);
  const [preview,setPreview]=useState(null);
  const [err,setErr]=useState(null);

  // Re-seed the form whenever the type changes (including the initial
  // deep-link type) so #editor?type=host&name=foo prefills the Name field.
  useEffect(()=>{
    const spec=FIELD_SPECS[type];
    const seed={};
    if(spec) spec.fields.forEach(f=>{ if(params[f.key]!=null) seed[f.key]=params[f.key]; });
    setFields(seed);setDry(true);setPreview(null);setErr(null);
  },[type]);

  if(locked) return null;

  const spec=FIELD_SPECS[type];
  const isUpdate=!!editId&&EDIT_UPDATE_TYPES.includes(type); // PATCH vs POST branch
  const canDelete=!!editId&&EDIT_DELETE_TYPES.includes(type);

  const setField=(k,v)=>setFields(prev=>({...prev,[k]:v}));

  const parseTags=(str)=>{
    const out={};
    String(str||'').split(',').forEach(pair=>{
      const i=pair.indexOf('=');
      if(i<0) return;
      const k=pair.slice(0,i).trim();
      if(k) out[k]=pair.slice(i+1).trim();
    });
    return out;
  };

  const submit=()=>{
    if(!spec||busy) return;
    // Required-field check applies to create only — a PATCH update legitimately sends a partial body.
    if(!isUpdate){
      const missing=spec.fields.find(f=>f.required&&!String(fields[f.key]||'').trim());
      if(missing){ toast('Missing required field: '+missing.label,'err'); return; }
    }
    const body={};
    spec.fields.forEach(f=>{
      const raw=fields[f.key];
      if(raw==null||raw==='') return;
      if(f.key==='tags') body.tags=parseTags(raw);
      else if(f.key==='addresses') body.addresses=String(raw).split(',').map(s=>s.trim()).filter(Boolean).map(a=>({address:a}));
      else if(f.kind==='number') body[f.key]=Number(raw);
      else body[f.key]=raw;
    });
    body.dry=dry;
    // Branch POST /api/edit/<type>  vs  PATCH /api/edit/<type>/<id> purely on presence of an editId.
    const method=isUpdate?'PATCH':'POST';
    const url=isUpdate?(spec.endpoint+'/'+encodeURIComponent(editId)):spec.endpoint;
    const verb=isUpdate?'update':'create';
    setBusy(true);setErr(null);setPreview(null);
    fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(async r=>({ok:r.ok,data:await r.json().catch(()=>({}))}))
      .catch(()=>({ok:false,data:{error:'network error'}}))
      .then(({ok,data})=>{
        setBusy(false);
        const j=data||{};
        if(!ok||j.error||j.ok===false){
          const msg=(j&&j.error)||'request failed';
          setErr(msg);toast((dry?'Dry run':spec.label+' '+verb)+' failed: '+msg,'err');return;
        }
        if(dry){ setPreview(j); toast('Dry run complete','ok'); }
        else { setPreview(null); if(!isUpdate) setFields({}); toast(spec.label+' '+verb+'d','ok'); }
      });
  };

  // Delete flow — confirm, then DELETE /api/edit/<type>/<id>, toast, reset back to create mode.
  const del=()=>{
    if(!spec||!editId||busy) return;
    if(!window.confirm('Delete this '+spec.label+'? This cannot be undone.')) return;
    setBusy(true);setErr(null);setPreview(null);
    fetch(spec.endpoint+'/'+encodeURIComponent(editId),{method:'DELETE'})
      .then(async r=>({ok:r.ok,data:await r.json().catch(()=>({}))}))
      .catch(()=>({ok:false,data:{error:'network error'}}))
      .then(({ok,data})=>{
        setBusy(false);
        const j=data||{};
        if(!ok||j.error||j.ok===false){
          const msg=(j&&j.error)||'delete failed';
          setErr(msg);toast(spec.label+' delete failed: '+msg,'err');return;
        }
        toast(spec.label+' deleted','ok');
        setEditId(null);setFields({});setPreview(null);
      });
  };

  const previewBody=preview?(preview.would_create||preview.would_update||preview):null;

  return <div className="page fadein">
    <PageHeader title="Editor" subtitle="Directly edit DNS/DHCP records and objects"/>
    <div className="dly-seg" role="group" aria-label="Editor resource type" style={{marginBottom:'var(--s3)'}}>
      {EDITOR_TYPES.map(t=>
        <button key={t.key} className={'dly-seg-btn'+(type===t.key?' on':'')} onClick={()=>{setType(t.key);setEditId(null);}}>{t.label}</button>)}
    </div>
    <div className="mono" style={{fontSize:'var(--t11)',color:'var(--text-faint)',marginBottom:'var(--s3)'}}>
      Editor-created subnets and address blocks are ad-hoc — unlike Provision, they are not tracked by a site template.
    </div>
    {isViewer?<Astryx.Badge variant="warning" label="Viewer role — read-only"/>:null}
    <div className="grid-2">
          <Panel title={(spec&&spec.label)+(isUpdate?' — Update':' — Create')}>
            <div className="form-col">
              {spec&&spec.fields.map(f=>
                <label key={f.key} className="mono field-lbl">
                  {f.label}{f.required?' *':''}
                  <input className="vault-in" type={f.kind==='number'?'number':'text'}
                    value={fields[f.key]||''} placeholder={f.placeholder||''}
                    onChange={e=>setField(f.key,e.target.value)}/>
                </label>)}
              <label className="check-row">
                <input type="checkbox" checked={dry} onChange={e=>setDry(e.target.checked)}/>
                Dry-run (no changes)
              </label>
              {err?<div className="mono" style={{color:'var(--crit)',fontSize:'var(--t11)'}}>{err}</div>:null}
              <Astryx.Button variant="primary" isDisabled={busy||isViewer} onClick={submit}>
                {busy?'Submitting…':(dry?'Preview':(isUpdate?'Update':'Submit'))}
              </Astryx.Button>
              {canDelete&&!isViewer?<button className="btn" style={{borderColor:'var(--crit)',color:'var(--crit)'}}
                disabled={busy} onClick={del}>Delete {spec.label}</button>:null}
              {isViewer?<div className="mono field-lbl">
                Viewer role is read-only — creating resources requires operator or admin.
              </div>:null}
            </div>
          </Panel>
          {previewBody?<Panel title="Preview">
            <Astryx.Badge variant="warning" label="DRY RUN"/>
            <pre className="mono" style={{fontSize:'var(--t11)',whiteSpace:'pre-wrap',marginTop:'var(--s2)'}}>
              {JSON.stringify(previewBody,null,2)}
            </pre>
          </Panel>:null}
        </div>
  </div>;
}
// ═══ END: EDITOR ═══


/* DriftTab — read-only: pick a site template (+ optional ip_space override),
   POST /api/drift/check, render a status chip + drifts grouped by category.
   No writes, no dry-run toggle, no confirm gate — nothing here mutates. */
/* driftMark — pure presentation helper: classify a drift item into the shared
   glyph-diff vocabulary (+ only-in-template, − only-in-live, ~ changed) from its
   existing message text. No color signal — glyph + text label only, same law as
   diffRows/dt-diff. Derives from the message the backend already sends
   (detect_drift, server.py) — changes no drift logic. */
function driftMark(d){
  const m=String((d&&d.message)||'');
  if(/live value is/.test(m)) return {mark:'~',label:'changed'};
  if(/is not in the template/.test(m)) return {mark:'−',label:'only in live'};
  return {mark:'+',label:'only in template'};
}
function DriftTab(){
  const {locked}=useData();
  const {bind}=useHoverDetail();
  const templatesApi=useApi('/api/templates');
  const spacesApi=useApi('/api/ipam/spaces');
  const [template,setTemplate]=useState('');
  const [ipSpace,setIpSpace]=useState('');
  const [checking,setChecking]=useState(false);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState(null);
  const [showExample,setShowExample]=useState(false); // sample-render an illustrative drift result
  if(locked) return null;

  const templates=(Array.isArray(templatesApi.data)?templatesApi.data:[]).filter(t=>!t.type||t.type==='site');
  const spaces=(spacesApi.data&&spacesApi.data.spaces)||[];

  const check=()=>{
    if(checking||!template) return;
    setChecking(true);setResult(null);setErr(null);
    fetch('/api/drift/check',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({template,ip_space:ipSpace||undefined})})
      .then(async r=>{
        let body=null; try{body=await r.json();}catch(e){body=null;}
        if(!r.ok||(body&&body.error)){ setErr((body&&body.error)||('HTTP '+r.status)); setChecking(false); return; }
        setResult(body); setChecking(false);
      })
      .catch(e=>{ setErr(String((e&&e.message)||e)); setChecking(false); });
  };

  const groups={};
  if(result&&Array.isArray(result.drifts)){
    result.drifts.forEach(d=>{
      const cat=d.category||'other';
      (groups[cat]||(groups[cat]=[])).push(d);
    });
  }

  return <div className="page fadein">
    <PageHeader title="Drift" subtitle="Compare running DHCP/DNS config to source of truth"/>
    <div className="grid-2">
      <Panel title="Check drift">
        <div className="form-col">
          <label className="mono field-lbl"
            {...bind({title:'Site template',rows:[['What it does','The site blueprint to check. Drift compares this template against what actually exists in Infoblox.']]})}>
            Template
            <select className="vault-in" value={template} onChange={e=>setTemplate(e.target.value)}>
              <option value="">{templatesApi.loading?'Loading templates…':'Select a template'}</option>
              {templates.map(t=><option key={t.name} value={t.name}>
                {t.name+' — '+(t.region||'')+'/'+(t.environment||'')}
              </option>)}
            </select>
          </label>
          <label className="mono field-lbl"
            {...bind({title:'IP space override',rows:[['What it does','Check against this space instead of the template default.']]})}>
            IP space (override)
            <select className="vault-in" value={ipSpace} onChange={e=>setIpSpace(e.target.value)}>
              <option value="">— template default —</option>
              {spaces.map(sp=><option key={sp.id} value={sp.name}>{sp.name}</option>)}
            </select>
          </label>
          <div style={{display:'flex',alignItems:'center',gap:'var(--s2)'}}>
            <button className="btn" disabled={checking||!template} onClick={check}
              {...bind({title:'Check drift',rows:[['What it does','Compare your site template to the live Infoblox state and report the differences. Read-only — it changes nothing.']]})}>{checking?'Checking…':'Check drift'}</button>
            <KebabMenu label="More drift actions" items={[
              {label:showExample?'Hide example':'Show example', run:()=>setShowExample(v=>!v)},
            ]}/>
          </div>
          {showExample?<MarrisExampleDiff/>:null}
        </div>
      </Panel>
      {result?<Panel title="Result">
        {result.found===false
          ? <div className="dt-empty">Site not found for this template</div>
          : <>
              <div style={{display:'flex',alignItems:'center',gap:'var(--s3)',marginBottom:'var(--s3)'}}>
                <span className="mono" style={{fontSize:'var(--t12)'}}>{result.site||template}</span>
                <span className="chip" style={{color:result.drifted?'var(--crit)':'var(--ok)',borderColor:result.drifted?'var(--crit)':'var(--ok)'}}
                  {...bind({title:'Drift status',rows:[['✓ no drift','Live state matches the template — in sync.'],['✕ N items','N differences found between the template and live state.'],['Site not found','Never provisioned from this template.']]})}>
                  {result.drifted?('✕ '+((result.drifts&&result.drifts.length)||0)+' items'):'✓ no drift'}
                </span>
                {result.subnet_count!=null?<span className="mono field-lbl">{result.subnet_count} subnets</span>:null}
              </div>
              {result.summary?<div className="mono" style={{fontSize:'var(--t12)',color:'var(--text-dim)',marginBottom:'var(--s3)'}}>
                {typeof result.summary==='string'
                  ? result.summary
                  : ((result.summary.total??0)+' total · '+(result.summary.errors??0)+' error'+(result.summary.errors===1?'':'s')+' · '+(result.summary.warnings??0)+' warning'+(result.summary.warnings===1?'':'s'))}
              </div>:null}
              {Object.keys(groups).length===0
                ? <div className="dt-empty">No drift items</div>
                : Object.entries(groups).map(([cat,items])=>
                    <div key={cat} style={{marginBottom:'var(--s3)'}}>
                      <div className="mono" style={{fontSize:'var(--t11)',color:'var(--text-faint)',textTransform:'uppercase',marginBottom:'var(--s1)'}}>{cat}</div>
                      {/* Glyph-diff render — shared dt-diff vocabulary (+/−/~), monochrome
                          body text, accessible label per glyph. No color-only signal. */}
                      <table className="dt">
                        <tbody>
                          {items.map((d,i)=>{
                            const g=driftMark(d);
                            return <tr key={i}>
                              <td className="dt-diff mono"><span aria-label={g.label} title={g.label}>{g.mark}</span></td>
                              <td className="mono" style={{fontSize:'var(--t12)'}}>{d.message}</td>
                            </tr>;
                          })}
                        </tbody>
                      </table>
                    </div>)}
            </>}
      </Panel>:null}
      {err?<Panel title="Error"><div className="mono" style={{color:'var(--crit)'}}>{err}</div></Panel>:null}
    </div>
  </div>;
}

/* subsequence match — chars of needle appear in order within hay (fuzzy go-to). */
function subseqMatch(needle,hay){
  if(!needle) return false;
  let i=0; for(let j=0;j<hay.length&&i<needle.length;j++){ if(hay[j]===needle[i]) i++; }
  return i===needle.length;
}

/* CommandPalette — ⌘K overlay (Shell owns open state) + topbar ViewsMenu portal. */
function CommandPalette({open,onClose}){
  const power=usePower();
  const {data}=useData();
  const inputRef=useRef(null);
  const [q,setQ]=useState('');
  const [sel,setSel]=useState(0);
  const [views,setViews]=useState([]);
  const [confirmBlock,setConfirmBlock]=useState(null);
  const [blocking,setBlocking]=useState(false);
  const [slot,setSlot]=useState(null);
  // Mount the saved-views dropdown into the topbar without editing Shell.
  useEffect(()=>{setSlot(document.querySelector('.tools-slot'));},[]);
  useEffect(()=>{
    if(!open) return;
    setQ('');setSel(0);setConfirmBlock(null);
    if(inputRef.current) inputRef.current.focus();
    fetch('/api/views').then(r=>r.ok?r.json():null).then(d=>setViews((d&&d.views)||[])).catch(()=>{});
  },[open]);
  useEffect(()=>{setSel(0);},[q]);
  const typed=q.trim();
  const needle=typed.toLowerCase();
  const base=[
    ...TABS.map(t=>({label:'Go to '+TAB_LABELS[t],kind:'nav',run:()=>{nav(t);onClose();}})),
    ...PROVISION_TOOLS.map(t=>({label:'Go to Provision · '+t.label,kind:'nav',
      run:()=>{nav('provision',{tool:t.key});onClose();}})),
    {label:'Ask AI',kind:'ai',run:()=>{onClose();window.dispatchEvent(new CustomEvent('bx:ai-open',{detail:{q:''}}));}},
    {label:'Alert rules',kind:'nav',run:()=>{onClose();window.dispatchEvent(new CustomEvent('bx:ai-open',{detail:{q:''}}));}},
    // F3 — Copy link to this view. The hash already IS the canonical, deep-linkable
    // URL (parseHash/nav, tab + ?params survive reload — see the router above), so
    // this reuses location.href verbatim rather than re-serializing anything, and
    // reuses the F1 toast/aria-live bus for the "Link copied" announcement.
    {label:'Copy link to this view',kind:'action',run:()=>{
      onClose();
      if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(location.href);
      toast('Link copied','ok',{duration:1500});
    }},
    ...views.map(v=>({label:'View: '+v.name,kind:'view',run:()=>{onClose();applyViewByName(v.name);}})),
  ];
  // F8a — contextual bulk actions for the active table's selection (or its cursor row as a 1-row selection).
  const ctxItems=[];
  if(open&&power&&power.getActive){
    const entry=power.getActive();
    const api=entry&&entry.api&&entry.api.current;
    if(api&&api.getState){
      const st=api.getState();
      const rowsSel=st.selected&&st.selected.size>0?st.selectedRows:(st.cursorRow?[st.cursorRow]:[]);
      if(rowsSel.length&&st.buildActions){
        st.buildActions(rowsSel).forEach(a=>ctxItems.push({label:a.label+' ('+rowsSel.length+')',kind:'action',
          run:()=>{onClose();try{a.run&&a.run();}catch(e){}}}));
      }
      // F2 — "Export current view": CSV of the active table's full (filtered/sorted) rows.
      if(st.rows&&st.rows.length&&st.columns){
        ctxItems.push({label:'Export current view',kind:'action',
          run:()=>{onClose();downloadCSV(String((entry&&entry.label)||'export')+'.csv',st.rows,st.columns);}});
      }
      // F2 — "Ask AI about selection": seed the AI drawer's initialQ with the selected rows
      // (via the same bx:ai-open handoff the palette's other Ask actions already use).
      if(rowsSel.length){
        ctxItems.push({label:'Ask AI about selection ('+rowsSel.length+')',kind:'action',
          run:()=>{
            onClose();
            const col=(st.columns&&st.columns[0])||{key:Object.keys(rowsSel[0]||{})[0]};
            const names=rowsSel.slice(0,10).map(r=>String((col&&r[col.key])??'')).join(', ');
            const q='Tell me about these '+rowsSel.length+' selected row'+(rowsSel.length===1?'':'s')+': '+names+(rowsSel.length>10?', …':'');
            window.dispatchEvent(new CustomEvent('bx:ai-open',{detail:{q}}));
          }});
      }
      // F6 — time-as-preset: inject last:Nh/last:Nd into the active table's OWN
      // search input (same state F4's typeahead/history already drive). Deliberately
      // NOT a global control — rides the normal query path, no hash/snapshot changes.
      if(typeof api.setFilter==='function'){
        [['Last 1h','last:1h'],['Last 24h','last:24h'],['Last 7d','last:7d']].forEach(([label,token])=>{
          ctxItems.push({label,kind:'action',run:()=>{
            onClose();
            const cur=String(st.filter||'').replace(/(^|\s)-?last:\S+/gi,' ').trim();
            api.setFilter(cur?cur+' '+token:token);
          }});
        });
      }
    }
  }
  const items=[...ctxItems,...base.filter(c=>c.label.toLowerCase().includes(needle))];
  if(typed){
    items.push({label:'Ask: '+typed,kind:'ask',run:()=>{onClose();window.dispatchEvent(new CustomEvent('bx:ai-open',{detail:{q:typed||''}}));}});
    items.push({label:'Block domain: '+typed,kind:'block',run:()=>setConfirmBlock(typed)});
    // F8b — fuzzy go-to jump into subnets / zones / hosts (subsequence match, cap 8).
    const dd=data||{};
    const go=[];
    const add=(label,fn)=>{ if(go.length<8&&label&&subseqMatch(needle,String(label).toLowerCase())) go.push({label:'Go: '+label,kind:'go',run:()=>{onClose();fn();}}); };
    (Array.isArray(dd.subnets)?dd.subnets:[]).forEach(s=>{const l=s.addr||s.name;add(l,()=>nav('network',{peek:s.addr||s.name}));});
    (Array.isArray(dd.zones)?dd.zones:[]).forEach(z=>add(z.fqdn,()=>nav('dns',{peek:z.fqdn})));
    (Array.isArray(dd.hosts)?dd.hosts:[]).forEach(h=>add(h.name,()=>nav('infra',{peek:h.name})));
    go.forEach(g=>items.push(g));
  }
  const runBlock=()=>{
    const domain=confirmBlock;
    if(!domain||blocking) return;
    setBlocking(true);
    fetch('/api/block-domain',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({domain})})
      .then(async r=>{
        const j=await r.json().catch(()=>({}));
        if(r.ok&&j.ok!==false) toast('Blocked '+domain+' network-wide','ok');
        else toast('Block failed: '+((j&&j.error)||('HTTP '+r.status)),'err');
      })
      .catch(()=>toast('Block failed — server unreachable','err'))
      .finally(()=>{setBlocking(false);setConfirmBlock(null);onClose();});
  };
  const onKey=e=>{
    if(e.key==='Escape'){e.preventDefault(); if(confirmBlock) setConfirmBlock(null); else onClose(); return;}
    if(confirmBlock){ if(e.key==='Enter'){e.preventDefault();runBlock();} return; }
    if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(s+1,Math.max(items.length-1,0)));}
    else if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(s-1,0));}
    else if(e.key==='Enter'){e.preventDefault();const it=items[sel];if(it)it.run();}
  };
  return <>
    {slot?ReactDOM.createPortal(<WatchMenu/>,slot):null}
    {slot?ReactDOM.createPortal(<ViewsMenu/>,slot):null}
    {open&&<div className="palette-scrim" onClick={onClose}>
      <div className="palette" onClick={e=>e.stopPropagation()}>
        <input ref={inputRef} className="palette-in mono" value={q} onChange={e=>setQ(e.target.value)}
          onKeyDown={onKey} placeholder="Type a command, question, or domain…"
          aria-label="Command palette" role="combobox" aria-expanded="true"
          aria-activedescendant={(!confirmBlock&&items.length>0)?('pal-'+sel):undefined}/>
        <div className="panel pal-list" role="listbox" aria-label="Commands">
          {confirmBlock
            ? <div className="pal-confirm">
                <span>Block <span className="mono">{confirmBlock}</span> network-wide?</span>
                <span style={{display:'inline-flex',gap:8}}>
                  <button className="btn" style={{borderColor:'var(--crit)',color:'var(--crit)'}}
                    disabled={blocking} onClick={runBlock}>{blocking?'Blocking…':'Confirm block'}</button>
                  <button className="btn" disabled={blocking} onClick={()=>setConfirmBlock(null)}>Cancel</button>
                </span>
              </div>
            : items.length===0
              ? <div className="pal-empty">No matching commands</div>
              : items.map((it,i)=>
                <button key={it.kind+':'+it.label} id={'pal-'+i} className={'pal-row'+(i===sel?' sel':'')}
                  role="option" aria-selected={i===sel}
                  onMouseEnter={()=>setSel(i)} onClick={()=>it.run()}>
                  <span>{it.label}</span>
                  <span className="pal-kind mono">{it.kind}</span>
                </button>)}
        </div>
      </div>
    </div>}
  </>;
}

/* ViewsMenu — topbar saved-views dropdown (GET/POST/DELETE /api/views). */
function ViewsMenu(){
  const {bind}=useHoverDetail();
  const [open,setOpen]=useState(false);
  const [views,setViews]=useState([]);
  const [err,setErr]=useState('');
  const [confirmDel,setConfirmDel]=useState(null);

    fetch('/api/views').then(r=>r.ok?r.json():Promise.reject())
      .then(d=>{setViews((d&&d.views)||[]);setErr('');})
      .catch(()=>setErr('Views unavailable'));
  },[]);
  useEffect(()=>{if(open){refresh();setConfirmDel(null);}},[open,refresh]);
  const saveCurrent=()=>{
    const name=window.prompt('Save current view as:');
    if(!name||!name.trim()) return;
    saveCurrentView(name.trim())
      .then(res=>{
        if(res.ok){toast('View "'+name.trim()+'" saved','ok');refresh();}
        else toast('Save failed: '+(res.error||'unknown error'),'err');
      })
      .catch(()=>toast('Save failed — server unreachable','err'));

  const del=name=>{
    fetch('/api/views/'+encodeURIComponent(name),{method:'DELETE'})
      .then(r=>{ if(r.ok){toast('Deleted "'+name+'"','ok');refresh();} else toast('Delete failed','err'); })

            <div key={v.name} className="views-row">

/* WatchMenu — topbar saved-query dropdown. Mirrors ViewsMenu's markup/interaction
   (reuses .views-* classes) but is 100% client-side: watches live in bx.watches
   LS and each row shows a LIVE match count against the shared /api/data feed.
   "Watch current query…" saves whatever BQL query is in the current tab's sq=
   hash param; clicking a watch re-applies it via nav (the same sq= surface). */
function WatchMenu(){
  const {bind}=useHoverDetail();
  const [open,setOpen]=useState(false);
  const [watches,setWatches]=useState(()=>readWatches());
  const {data}=useData();
  const {tab,params}=useRoute();
  const curQuery=((params&&params.sq)||'').trim();
  // Shared KebabMenu/AbMenu menu behaviour: first item focused on open, ↑/↓
  // roves, Esc closes and returns focus to the trigger.
  const btnRef=useRef(null),menuRef=useRef(null);
  const close=()=>{ setOpen(false); if(btnRef.current) btnRef.current.focus(); };
  useEffect(()=>{ if(!open||!menuRef.current) return;
    const f=menuRef.current.querySelector('button:not(:disabled)'); if(f) f.focus(); },[open]);
  const move=delta=>{ const b=menuRef.current?Array.from(menuRef.current.querySelectorAll('button:not(:disabled)')):[];
    if(!b.length) return; let i=b.indexOf(document.activeElement); i=(i+delta+b.length)%b.length; b[i].focus(); };
  useEffect(()=>{
    const on=()=>setWatches(readWatches());
    window.addEventListener('bx:watches',on);
    return ()=>window.removeEventListener('bx:watches',on);
  },[]);
  const save=()=>{
    if(!curQuery){ toast('No active query to watch — search a table first','warn'); return; }
    const name=window.prompt('Save current query as a watch:',curQuery);
    if(!name||!name.trim()) return;
    addWatch({name:name.trim(),tab,query:curQuery,created:Date.now()});
    setWatches(readWatches());
    toast('Watch "'+name.trim()+'" saved','ok');
  };
  const apply=w=>{ setOpen(false); nav(w.tab,{sq:w.query}); toast('Watch "'+w.name+'" applied','ok'); };
  const del=name=>{ removeWatch(name); setWatches(readWatches()); };
  return <span className="views-slot watch-slot">
    <button ref={btnRef} className="btn" aria-haspopup="menu" aria-expanded={open}
      aria-label={'Watches'+(watches.length?', '+watches.length+' saved':'')}
      {...bind({title:'Watches',rows:[['What','Saved searches with a live match count'],['Add','Search a table, then save the query']]})} onClick={()=>setOpen(o=>!o)}>
      Watches{watches.length?<span className="watch-badge mono" aria-hidden="true">{watches.length}</span>:null}
    </button>
    {open&&<>
      <div className="views-overlay" onClick={close}/>
      <div ref={menuRef} className="dt-popover views-menu" role="menu" aria-label="Watches"
        onKeyDown={e=>{ if(e.key==='Escape'){ e.preventDefault(); e.stopPropagation(); close(); }
          else if(e.key==='ArrowDown'){ e.preventDefault(); move(1); }
          else if(e.key==='ArrowUp'){ e.preventDefault(); move(-1); } }}>
        <button className="views-item" role="menuitem" onClick={()=>save()}>Watch current query…</button>
        <div className="views-divider"/>
        {watches.length===0&&<div className="views-empty">No watches yet — search a table, then save the query.</div>}
        {watches.map(w=>{
          const n=watchCount(data,w);
          return <div key={w.name} className="views-row watch-row">
            <button className="views-item watch-item" role="menuitem" style={{flex:1}} onClick={()=>apply(w)}>
              <span className="vname">{w.name}</span>
              <span className="watch-count mono" aria-label={n+' matching row'+(n===1?'':'s')}>{n}</span>
            </button>
            <button className="views-mini crit" role="menuitem" aria-label={'Delete watch '+w.name}
              onClick={()=>del(w.name)}>✕</button>
          </div>;
        })}
      </div>
    </>}
  </span>;
}

/* ProblemsBadge — topbar chip summarizing the network's open problems. Count =
   unacked-critical threats + subnets over 85% util + offline hosts. Crit-tinted
   when >0, hidden at 0. Click navigates to the dominant contributor. */
function ProblemsBadge(){
  const {bind}=useHoverDetail();
  const {data}=useData();
  const sec=useApi('/api/hub/security');
  const acks=LS.get('acks',{});
  const events=(sec.data&&Array.isArray(sec.data.events))?sec.data.events:[];
  const unackedCrit=events.filter(e=>String(e.severity||'').toLowerCase()==='critical'
    &&!acks[String(e.event_time)+'|'+String(e.qname)]).length;
  const hotSubs=((data&&data.subnets)||[]).filter(s=>(Number(s.util)||0)>85).length;
  const offline=((data&&data.hosts)||[]).filter(h=>/^(down|offline)$/i.test(String(h.status||''))).length;
  const total=unackedCrit+hotSubs+offline;
  if(total<=0) return null;
  const go=()=>{ if(unackedCrit>0) nav('security'); else if(hotSubs>0) nav('network'); else nav('infra'); };
  return <button className="problems-badge crit" onClick={go}
    {...bind({title:total+' issues need attention',rows:[['Unacked critical',unackedCrit],['Subnets >85% util',hotSubs],['Hosts offline',offline],['Click','Jumps to the biggest contributor']]})}
    aria-label={total+' problems need attention'}>
    <span className="mono">● {total}</span> issues
  </button>;
}

/* ── HealthStrip (P1/4) — slim, always-visible service-health ribbon under the
   TopBar. One thin line: per-service dot (semantic color) + TEXT status label
   (never color-only) + a tiny sparkline, for DNS / DHCP / IPAM / Security. Each
   segment is a real button that navigates to that service's tab (aria-pressed
   reflects the active tab). Health is derived from the same shared feeds the
   tabs already read (no new heavy fetch beyond the small security hub call). ── */
const HEALTH_TXT={ok:'Operational',warn:'Degraded',crit:'Critical'};
function HealthStrip(){
  const {data}=useData();
  const sec=useApi('/api/hub/security');
  const route=useRoute();
  const d=data||{};
  const subnets=Array.isArray(d.subnets)?d.subnets:[];
  const zones=Array.isArray(d.zones)?d.zones:[];
  const util=s=>Number(s.util)||0;

  // DHCP / IPAM — capacity pressure across subnets (same thresholds Overview uses).
  const bands=[0,0,0,0]; // <70, 70-89, 90-99, 100
  subnets.forEach(s=>{const u=util(s); if(u>=100)bands[3]++; else if(u>=90)bands[2]++; else if(u>=70)bands[1]++; else bands[0]++;});
  const near=subnets.filter(s=>util(s)>=90).length;
  const over85=subnets.filter(s=>util(s)>85).length;
  const tight=subnets.some(s=>util(s)>=95);

  // DNS — zone health (unhealthy = a zone reporting a down/error/critical status).
  const zHealthy=zones.filter(z=>/^(ok|healthy|active|up|)$/i.test(String(z.status||''))).length;
  const zDown=zones.some(z=>/^(down|error|critical|fail)/i.test(String(z.status||'')));
  const zBad=zones.length-zHealthy;

  // Security — threat counts from the hub.
  const sc=(sec.data&&sec.data.counts)||{};
  const crit=Number(sc.critical)||0, high=Number(sc.high)||0, med=Number(sc.medium)||0;

  const lvl=(isCrit,isWarn)=>isCrit?'crit':isWarn?'warn':'ok';
  const col=sev=>'var(--'+(sev==='crit'?'crit':sev==='warn'?'warn':'ok')+')';
  const services=[
    {id:'dns',      label:'DNS',      tab:'dns',      sev:lvl(zDown, zBad>0),           values:[zHealthy, zones.length||0]},
    {id:'dhcp',     label:'DHCP',     tab:'network',  sev:lvl(near>0, over85>0),        values:bands},
    {id:'ipam',     label:'IPAM',     tab:'network',  sev:lvl(tight, over85>0),         values:bands},
    {id:'security', label:'Security', tab:'security', sev:lvl(crit>0, high>0),          values:[crit,high,med]},
  ];

const UPDATE_PHASE_TXT={
  idle:'Preparing…', prepulling:'Downloading update…', pulled:'Downloaded — starting…',
  checking:'Checking new version…', recreating:'Restarting service…',
  live:'Finishing up…', done:'Updated — reloading…', error:'Update failed',
  rolledback:'Update failed — rolled back',
};

/* UpdateBadge — version chip + self-update flow (topbar-right, next to AccountSlot).
   Reuses the `update` object already carried on vault status (fetched once by
   VaultGate) — no second poller for that. Only polls /api/update/status while an
   update is actively applying, and checks /api/update/rollback-status once on
   mount. Feature-detects vault.update so a File-mode/older server (no update key)
   never crashes this. */
function UpdateBadge(){
  const {vault}=useAuth();
  const upd=vault&&vault.update;
  const {bind}=useHoverDetail();
  const [open,setOpen]=useState(false);
  const [applying,setApplying]=useState(false);
  const [phase,setPhase]=useState('');
  const [pct,setPct]=useState(0);
  const [err,setErr]=useState('');
  const [rollback,setRollback]=useState(null);
  const pollRef=useRef(null);
  const startIdRef=useRef(null);

  useEffect(()=>{
    fetch('/api/update/rollback-status',{cache:'no-store'}).then(r=>r.json()).then(d=>{
      if(d&&d.rolledback) setRollback(d);
    }).catch(()=>{});
  },[]);

  useEffect(()=>{
    if(!open) return;
    const onKey=e=>{ if(e.key==='Escape'&&!applying) setOpen(false); };
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[open,applying]);

  useEffect(()=>()=>{ if(pollRef.current) clearInterval(pollRef.current); },[]);

  const stopPoll=()=>{ if(pollRef.current){ clearInterval(pollRef.current); pollRef.current=null; } };

  const startPoll=()=>{
    stopPoll();
    pollRef.current=setInterval(async()=>{
      try{
        const r=await fetch('/api/update/status',{cache:'no-store'});
        const d=await r.json();
        if(d.instance_id&&startIdRef.current&&d.instance_id!==startIdRef.current){
          stopPoll(); setPhase('done');
          setTimeout(()=>window.location.reload(),600);
          return;
        }
        setPhase(d.phase||''); setPct(Number(d.pct)||0);
        if(d.phase==='rolledback'||d.phase==='error'){
          stopPoll(); setApplying(false); setErr(d.error||'Update failed');
        }
      }catch(e){ /* server likely mid-recreate — keep polling silently */ }
    },2000);
  };

  const dismissRollback=async()=>{ setRollback(null); await vpost('/api/update/rollback-clear',{}); };

  const apply=async()=>{
    setErr('');
    const {ok,data}=await vpost('/api/update/apply',{});
    if(!ok||!data||data.ok===false){
      setErr(data&&data.error==='cooldown' ? ('Try again in '+(data.retry_after||0)+'s') : ((data&&data.error)||'Could not start update'));
      return;
    }
    startIdRef.current=upd&&upd.instance_id;
    setApplying(true); setPhase('checking'); setPct(0);
    startPoll();
  };

  if(!upd) return null;
  const {current,latest,available,url,selfUpdate,cooldown}=upd;

  return <>
    {rollback&&<div className="update-rollback-banner" role="status">
      <span>Rolled back from v{rollback.rollback_from} to v{rollback.rollback_to} — the update failed a health check.</span>
      <button className="update-rollback-x" onClick={dismissRollback} aria-label="Dismiss rollback notice">✕</button>
    </div>}
    <span className="update-slot">
      <span className="mono update-version"
        {...bind({title:'Bloxsmith v'+current,rows:available?[['Current','v'+current],['Latest','v'+latest]]:[['Current','v'+current],['Status','Up to date']]})}>
        v{current}
      </span>
      {available&&(selfUpdate
        ? <button className="update-pill" aria-haspopup="menu" aria-expanded={open}
            aria-label={'Update available, v'+latest} onClick={()=>setOpen(o=>!o)}>
            <span className="update-dot" aria-hidden="true"/>update available → v{latest}
          </button>
        : <a className="update-pill" href={url} target="_blank" rel="noopener noreferrer"
            aria-label={'Update available, v'+latest+' — opens the GitHub release'}>
            <span className="update-dot" aria-hidden="true"/>update available → v{latest}
          </a>
      )}
      {open&&selfUpdate&&<>
        <div className="views-overlay" onClick={()=>{ if(!applying) setOpen(false); }}/>
        <div className="update-menu" role="menu">
          <div className="update-menu-head">Update to v{latest}</div>
          {!applying?(<>
            {err&&<div className="update-menu-err">{err}</div>}
            <button className="btn" disabled={cooldown>0} onClick={apply}>
              {cooldown>0?('Try again in '+cooldown+'s'):'Update now'}
            </button>
            {url&&<a className="update-menu-link" href={url} target="_blank" rel="noopener noreferrer">View release notes</a>}
          </>):(
            <div className="update-progress">
              <div className="update-progress-phase">{UPDATE_PHASE_TXT[phase]||phase||'Working…'}</div>
              <div className="update-progress-bar"><div className="update-progress-fill" style={{width:Math.max(4,pct)+'%'}}/></div>
              {err&&<div className="update-menu-err">{err}</div>}
            </div>
          )}
        </div>
      </>}
    </span>
  </>;
}

  const [aiOpen,setAiOpen]=useState(false);
  const [aiQ,setAiQ]=useState('');
  const [vaultTick,setVaultTick]=useState(0);
  const drawerRef=useRef(null);      // last-handled route-drawer signature (open-once)

  // Re-check vault status whenever any request reports it locked.
  useEffect(()=>{
    const onLocked=()=>{
      fetch('/api/vault/status',{cache:'no-store'})
        .then(r=>r.json()).then(()=>setVaultTick(t=>t+1)).catch(()=>{});
    };
    window.addEventListener('bx:vault-locked',onLocked);
    return ()=>window.removeEventListener('bx:vault-locked',onLocked);
  },[]);

  // ⌘K toggles the palette; ⌘I toggles the AI drawer.
  useEffect(()=>{
    const onKey=(e)=>{
      if((e.metaKey||e.ctrlKey)&&(e.key==='k'||e.key==='K')){
        e.preventDefault();setPaletteOpen(o=>!o);
      }
      if((e.metaKey||e.ctrlKey)&&(e.key==='i'||e.key==='I')){
        e.preventDefault();setAiOpen(o=>!o);
      }
    };
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[]);

  // window 'bx:ai-open' (detail.q) → open drawer + carry query.
  useEffect(()=>{
    const on=e=>{ const q=(e&&e.detail&&e.detail.q)||''; setAiQ(q); setAiOpen(true); };
    window.addEventListener('bx:ai-open',on);
    return ()=>window.removeEventListener('bx:ai-open',on);
  },[]);

  // Legacy #ask / #search deep-link → parseHash set params.drawer; open once.
  useEffect(()=>{
    if(route.params&&route.params.drawer){
      const q=route.params.q||'';
      const sig=(route.params.drawer||'')+'|'+q;
      if(drawerRef.current!==sig){ drawerRef.current=sig; setAiQ(q); setAiOpen(true); }
    }
  },[route]);

  const Active=TAB_COMPONENTS[tab]||OverviewTab;
  const fresh=<span className="fresh-slot"/>; // A2 wires real freshness

  // Wallboard (NOC-TV) mode swaps out ALL chrome — no TopBar / nav / FilterBar. Its own
  // Esc + corner control return to the normal app. Still under the shared data/filter
  // providers (wraps in PowerProvider like the normal shell) so reused widgets work.
  if(route.wall){
    return <PowerProvider><Wallboard/></PowerProvider>;
  }

  return <PowerProvider>
    <div>
      <TopBar tab={tab} org={org} fresh={fresh} onPalette={()=>setPaletteOpen(true)} onAi={()=>setAiOpen(o=>!o)} aiOpen={aiOpen}/>
      <HealthStrip/>

      <main className="main" key={tab}>

      </main>
      <CommandPalette open={paletteOpen} onClose={()=>setPaletteOpen(false)}/>
      <AiDrawer open={aiOpen} onClose={()=>setAiOpen(false)} initialQ={aiQ}/>
      <PeekDrawer/>
      <Scratchpad/>
      <Toasts/>
      <ShortcutsHelp/>
      <GhostTour/>
      <SnapshotWriter/>
      <DrawerShift aiOpen={aiOpen}/>
      <HoverDetail/>
    </div>
  </PowerProvider>;
}

/* ── ShortcutsHelp (Feature 10) — global "?" opens a focus-trapped modal listing
   every app shortcut, including the verbs shipped across this plan. Esc closes and
   returns focus to wherever it was. Plain-text rows, neutral (no color coding). ── */
const SHORTCUTS=[
  ['j  /  k','Move the row cursor down / up'],
  ['g g  /  G','Jump to the first / last row'],
  ['Enter  /  o','Open the row detail (peek)'],
  ['t','Trace the row across DHCP / DNS / Audit / Security'],
  ['p','Pin the row to the scratchpad'],
  ['x','Toggle selection on the cursor row'],
  ['y','Copy the cursor row as JSON'],
  ['/','Focus the table search'],
  ['Shift + click','Add a column to the multi-sort (header)'],
  ['Menu  /  Shift + F10','Pivot on the focused cell'],
  ['Copy as…','Copy row / selection as CSV, JSON, BQL, or Markdown'],
  ['Copy link','Copy a deep link to the current view'],
  ['⌘ K','Open the command palette'],
  ['⌘ I','Toggle the AI assistant'],
  ['Esc','Close · clear selection'],
  ['?','Show this shortcut help'],
];
function ShortcutsHelp(){
  const [open,setOpen]=useState(false);
  const dialogRef=useRef(null),returnRef=useRef(null);
  useEffect(()=>{
    const onKey=e=>{
      if(e.key!=='?'||e.metaKey||e.ctrlKey||e.altKey) return;
      const t=e.target;
      if(t&&t.closest&&t.closest('input,textarea,select,[contenteditable="true"]')) return;
      e.preventDefault();
      returnRef.current=document.activeElement;
      setOpen(true);
    };
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[]);
  const close=useCallback(()=>{ setOpen(false);
    const r=returnRef.current; if(r&&r.focus){ try{r.focus();}catch(e){} } },[]);
  useEffect(()=>{ if(!open||!dialogRef.current) return;
    const f=dialogRef.current.querySelector('button'); if(f) f.focus(); },[open]);
  if(!open) return null;
  const onKeyDown=e=>{
    if(e.key==='Escape'){ e.preventDefault(); e.stopPropagation(); close(); return; }
    if(e.key==='Tab'){
      const f=dialogRef.current?Array.from(dialogRef.current.querySelectorAll('button,[href],[tabindex]:not([tabindex="-1"])')):[];
      if(!f.length) return;
      const first=f[0],last=f[f.length-1];
      if(e.shiftKey&&document.activeElement===first){ e.preventDefault(); last.focus(); }
      else if(!e.shiftKey&&document.activeElement===last){ e.preventDefault(); first.focus(); }
    }
  };
  return <div className="sc-scrim" onClick={close}>
    <div ref={dialogRef} className="sc-overlay panel" role="dialog" aria-modal="true" aria-label="Keyboard shortcuts"
      onClick={e=>e.stopPropagation()} onKeyDown={onKeyDown}>
      <div className="sc-head">
        <h2 className="sc-title">Keyboard shortcuts</h2>
        <div className="sc-head-acts">
          <button className="btn btn-ghost" onClick={()=>{ close(); try{window.dispatchEvent(new CustomEvent('bx:tour'));}catch(e){} }}>Show tour again</button>
          <button className="btn btn-ghost" onClick={close} aria-label="Close shortcut help">Close</button>
        </div>
      </div>
      <dl className="sc-list">
        {SHORTCUTS.map(([k,d],i)=><div key={i} className="sc-row">
          <dt><span className="kbd">{k}</span></dt><dd>{d}</dd>
        </div>)}
      </dl>
    </div>
  </div>;
}

/* ── Scratchpad (slice 6) — the on-demand pin tray. A floating "Pinned (N)" badge
   appears ONLY when pins exist (no standing chrome); it toggles a focus-trapped
   overlay listing the pinned entities with per-row trace/remove + whole-tray
   export (Copy JSON / Copy text / CSV — reuses copyText + downloadCSV). State is
   the LS scratchpad, refreshed on the shared 'bx:scratch' broadcast. ── */
function Scratchpad(){
  const [items,setItems]=useState(()=>scratchList());
  const [open,setOpen]=useState(false);
  const badgeRef=useRef(null),dialogRef=useRef(null);
  useEffect(()=>{
    const on=()=>setItems(scratchList());
    window.addEventListener('bx:scratch',on);
    window.addEventListener('storage',on);   // cross-tab / reload safety
    return ()=>{ window.removeEventListener('bx:scratch',on); window.removeEventListener('storage',on); };
  },[]);
  useEffect(()=>{ if(!items.length) setOpen(false); },[items.length]);
  useEffect(()=>{ if(!open||!dialogRef.current) return;
    const f=dialogRef.current.querySelector('button'); if(f) f.focus(); },[open]);
  const close=useCallback(()=>{ setOpen(false); const b=badgeRef.current; if(b&&b.focus){ try{b.focus();}catch(_){} } },[]);
  const copyText=txt=>{ if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt); };
  const exportCols=[{key:'kind',label:'Kind'},{key:'label',label:'Entity'},{key:'field',label:'Field'},{key:'value',label:'Value'}];
  const flatRows=()=>items.map(e=>({kind:e.kind,label:e.label,field:e.pred&&e.pred.field,value:e.pred&&e.pred.value}));
  const copyJSON=()=>{ copyText(JSON.stringify(items,null,2)); toast('Copied '+items.length+' pin'+(items.length===1?'':'s')+' as JSON','ok',{duration:1500}); };
  const copyTextList=()=>{ copyText(items.map(e=>e.label).join('\n')); toast('Copied '+items.length+' pin'+(items.length===1?'':'s'),'ok',{duration:1500}); };
  const csv=()=>{ downloadCSV('scratchpad.csv',flatRows(),exportCols); toast('Exported '+items.length+' pin'+(items.length===1?'':'s'),'ok',{duration:1500}); };
  if(!items.length&&!open) return null;
  const onKeyDown=e=>{
    if(e.key==='Escape'){ e.preventDefault(); e.stopPropagation(); close(); return; }
    if(e.key==='Tab'&&dialogRef.current){
      const f=Array.from(dialogRef.current.querySelectorAll('button,[href],[tabindex]:not([tabindex="-1"])'));
      if(!f.length) return; const first=f[0],last=f[f.length-1];
      if(e.shiftKey&&document.activeElement===first){ e.preventDefault(); last.focus(); }
      else if(!e.shiftKey&&document.activeElement===last){ e.preventDefault(); first.focus(); }
    }
  };
  return <>
    <button ref={badgeRef} className="scratch-badge" aria-haspopup="dialog" aria-expanded={open?'true':'false'}
      aria-label={'Scratchpad — '+items.length+' pinned'} onClick={()=>setOpen(o=>!o)}>
      <span className="scratch-badge-dot" aria-hidden="true"/>Pinned <span className="scratch-badge-n mono">{items.length}</span>
    </button>
    {open?<div className="scratch-scrim" onClick={close}>
      <div ref={dialogRef} className="scratch-tray panel" role="dialog" aria-modal="true" aria-label="Scratchpad"
        onClick={e=>e.stopPropagation()} onKeyDown={onKeyDown}>
        <div className="scratch-head">
          <h2 className="scratch-title">Scratchpad <span className="mono scratch-title-n">{items.length}</span></h2>
          <button className="btn btn-ghost" onClick={close} aria-label="Close scratchpad">Close</button>
        </div>
        <ul className="scratch-list">
          {items.map(e=><li key={e.key} className="scratch-item">
            <span className="scratch-kind">{e.kind}</span>
            <span className="scratch-label mono">{e.label}</span>
            <span className="scratch-item-acts">
              <button className="scratch-trace" aria-label={'Trace '+e.label+' in DHCP'}
                onClick={()=>{ close(); traceTo('network',{pred:e.pred}); }}>Trace</button>
              <button className="scratch-rm" aria-label={'Remove '+e.label+' from scratchpad'}
                onClick={()=>unpinEntity(e.key)}>✕</button>
            </span>
          </li>)}
        </ul>
        <div className="scratch-foot">
          <button className="btn" onClick={copyJSON}>Copy JSON</button>
          <button className="btn" onClick={copyTextList}>Copy text</button>
          <button className="btn" onClick={csv}>CSV</button>
          <button className="btn btn-ghost scratch-clear" onClick={()=>clearScratch()}>Clear all</button>
        </div>
      </div>
    </div>:null}
  </>;
}

/* ── Wallboard + first-run ghost tour styles (P2 slice 9) — scoped, tokens only,

   so tiles/heatmap/triage read from across a room. ── */

/* Wallboard (NOC-TV) — reuses the existing HealthStrip (health tiles) + the tab bodies
   (Overview carries the capacity heatmap, worst-offenders/top-consumers, and triage
   queue). No new data path. Optional auto-rotation cycles a couple of views every ~30s,
   pausable, and disabled entirely under reduced-motion. Esc / the corner Exit control
   return to the app. Zero-interaction by design. */
function Wallboard(){
  const [view,setView]=useState(0);
  const [paused,setPaused]=useState(false);
  const exitRef=useRef(null);
  const VIEWS=WALL_VIEWS;
  // Esc exits back to the normal app.
  useEffect(()=>{
    const onKey=e=>{ if(e.key==='Escape'){ e.preventDefault(); exitWall(); } };
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[]);
  // Auto-rotate ~30s — never under reduced-motion, never while paused.
  useEffect(()=>{
    if(paused||reduceMotion()||VIEWS.length<2) return;
    const id=setInterval(()=>setView(v=>(v+1)%VIEWS.length),30000);
    return ()=>clearInterval(id);
  },[paused,VIEWS.length]);
  useEffect(()=>{ if(exitRef.current){ try{exitRef.current.focus();}catch(e){} } },[]);
  const cur=VIEWS[view]||VIEWS[0];
  const Body=TAB_COMPONENTS[cur.tab]||OverviewTab;
  const canRotate=VIEWS.length>1 && !reduceMotion();
  return <div className="wallboard" data-wall role="region" aria-label="Wallboard — NOC display">
    <div className="wall-topline">
      <div className="wall-brand"><BrandLogo/><span className="wall-title">Bloxsmith · NOC</span></div>
      <div className="wall-views" role="group" aria-label="Wallboard views">
        {VIEWS.map((v,i)=><span key={v.tab} className={'wall-view-dot'+(i===view?' active':'')}
          aria-current={i===view?'true':undefined}>{v.label}</span>)}
      </div>
      <div className="wall-ctl">
        {canRotate?<button className="wall-btn" onClick={()=>setPaused(p=>!p)} aria-pressed={paused}
          aria-label={paused?'Resume auto-rotation':'Pause auto-rotation'}>{paused?'Paused':'Rotating'}</button>:null}
        <button ref={exitRef} className="wall-btn wall-exit" onClick={exitWall}
          aria-label="Exit wallboard mode (Esc)">Exit ✕</button>
      </div>
    </div>
    <HealthStrip/>
    <main className="wall-main" key={cur.tab}>
      <Body/>
    </main>
    <Toasts/>
    <HoverDetail/>
  </div>;
}

/* First-run ghost tour — a one-time, non-modal set of callouts pointing at the 5 power
   features. Shows once (persisted in LS bx.tourSeen), re-summonable from the "?" overlay
   via the shared 'bx:tour' event. Never modal, never traps focus, always dismissible
   (Skip / Esc). No JS motion (CSS entrance is killed globally under reduced-motion). */
const TOUR_KEY='tourSeen';
const TOUR_STEPS=[
  {id:'bql',    title:'BQL search',        key:'/',     body:'Filter any table with field:value queries — press / to focus the search, then type e.g. util>85 or state:active.'},
  {id:'palette',title:'Command palette',   key:'⌘K',    body:'Jump anywhere and run actions instantly — press ⌘K (Ctrl-K) to open the command palette.'},
  {id:'pivot',  title:'Pivot on cell',     key:'Menu',  body:'Press the Menu key (or Shift+F10) on any focused cell to pivot the whole view on that value.'},
  {id:'compare',title:'Compare snapshots', key:'',      body:'Every tab keeps a day-over-day snapshot — the delta chip shows what changed since your last visit, worst-first.'},
  {id:'vim',    title:'Vim row-nav',       key:'j / k', body:'Drive the table from the keyboard: j / k to move the cursor, g g / G to jump, Enter to open a row.'},
];
function GhostTour(){
  const [open,setOpen]=useState(false);
  const [step,setStep]=useState(0);
  // Auto-open once on first run.
  useEffect(()=>{
    if(!LS.get(TOUR_KEY,false)){ const t=setTimeout(()=>setOpen(true),400); return ()=>clearTimeout(t); }
  },[]);
  // Re-summon from the "?" overlay (or anywhere) via a broadcast.
  useEffect(()=>{
    const on=()=>{ setStep(0); setOpen(true); };
    window.addEventListener('bx:tour',on);
    return ()=>window.removeEventListener('bx:tour',on);
  },[]);
  const dismiss=useCallback(()=>{ setOpen(false); LS.set(TOUR_KEY,true); },[]);
  // Keyboard-dismissible: Esc closes + persists. Non-modal — no focus trap.
  useEffect(()=>{
    if(!open) return;
    const onKey=e=>{ if(e.key==='Escape'){ dismiss(); } };
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[open,dismiss]);
  if(!open) return null;
  const s=TOUR_STEPS[step]||TOUR_STEPS[0];
  const last=step>=TOUR_STEPS.length-1;
  const next=()=>{ if(last) dismiss(); else setStep(v=>v+1); };
  const prev=()=>setStep(v=>Math.max(0,v-1));
  const onCardKey=e=>{
    if(e.key==='ArrowRight'){ e.preventDefault(); next(); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); prev(); }
  };
  return <aside className="tour-callout" role="region" aria-label="Feature tour — 5 power features" onKeyDown={onCardKey}>
    <div className="tour-head">
      <span className="tour-eyebrow">New here? 5 power features</span>
      <button className="tour-x" onClick={dismiss} aria-label="Skip the feature tour">Skip ✕</button>
    </div>
    <ol className="tour-steps">
      {TOUR_STEPS.map((t,i)=><li key={t.id} className={'tour-step'+(i===step?' active':'')}
        aria-current={i===step?'step':undefined}>
        <span className="tour-step-dot" aria-hidden="true">{i===step?'●':'○'}</span>{t.title}
      </li>)}
    </ol>
    <div className="tour-body">
      <h3 className="tour-title">{s.title}{s.key?<span className="tour-key mono">{s.key}</span>:null}</h3>
      <p className="tour-desc">{s.body}</p>
    </div>
    <div className="tour-foot">
      <span className="tour-count mono">{step+1} / {TOUR_STEPS.length}</span>
      <span className="tour-acts">
        <button className="btn btn-ghost" onClick={prev} disabled={step===0}>Back</button>
        <button className="btn" onClick={next}>{last?'Done':'Next'}</button>
      </span>
    </div>
  </aside>;
}

function App(){
  return <VaultGate><DataProvider><FilterProvider><TimeProvider><Shell/></TimeProvider></FilterProvider></DataProvider></VaultGate>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
